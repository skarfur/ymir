<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Saumaklúbbur</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script>document.write('<script src="../shared/strings-'+(localStorage.getItem('ymirLang')||'IS').toLowerCase()+'.js"><\/script>');</script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/maintenance.js" defer></script>
  <style>
    .page-wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; transition: max-width .2s; }
    .page-wrap.wide-board { max-width: 1200px; }
    .page-title { font-size: 16px; font-weight: 600; color: var(--brass); margin-bottom: 4px; }
    .page-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

    /* ── Filter bar ── */
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; align-items:center; }
    .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted);
      border-radius:20px; padding:5px 14px; font-size:11px; font-family:inherit; cursor:pointer;
      letter-spacing:.5px; transition:all .2s; }
    .filter-btn.active { background:var(--brass); color:#0b1f38; border-color:var(--brass); }
    .filter-btn:hover:not(.active) { border-color:var(--brass); color:var(--brass); }

    /* ── Project card ── */
    .req-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
      padding:14px 16px; margin-bottom:10px; transition:border-color .2s,box-shadow .2s; cursor:pointer; box-shadow:var(--shadow-sm); }
    .req-card:hover { border-color:var(--brass)88; }
    .req-card.resolved { opacity:.45; }
    .req-card.sev-high     { border-left:3px solid var(--orange); }
    .req-card.sev-medium   { border-left:3px solid var(--yellow); }
    .req-card.sev-low      { border-left:3px solid var(--green); }
    .req-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .req-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .req-meta  { display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:11px; color:var(--muted); }
    .req-desc  { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
    .req-photo { width:80px; height:60px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--border);
      margin-top:8px; cursor:pointer; transition:opacity .2s; }
    .req-photo:hover { opacity:.8; }
    .comment-thread { margin-top:8px; border-top:1px solid var(--border)44; padding-top:8px; }
    .comment-item { margin-bottom:8px; }
    .verk-tag { font-size:11px; color:var(--brass); font-weight:500; }

    /* ── Badges ── */
    .badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:500; letter-spacing:.3px; }
    .badge-green  { background:var(--green)22;  color:var(--green);  border:1px solid var(--green)44; }
    .badge-yellow { background:var(--yellow)22; color:var(--yellow); border:1px solid var(--yellow)44; }
    .badge-orange { background:var(--orange)22; color:var(--orange); border:1px solid var(--orange)44; }
    .badge-red    { background:var(--red)22;    color:var(--red);    border:1px solid var(--red)44; }
    .badge-muted  { background:var(--surface);  color:var(--muted);  border:1px solid var(--border); }
    .badge-brass  { background:var(--brass)22;  color:var(--brass);  border:1px solid var(--brass)44; }
    .oos-badge { font-size:10px; background:var(--red)22; color:var(--red);
      border:1px solid var(--red)44; border-radius:3px; padding:2px 6px; font-weight:500; }

    .empty-wrap { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-icon { font-size:32px; margin-bottom:12px; }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:200;
      display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.hidden { display:none; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:22px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
    .modal h3 { color:var(--brass); margin-bottom:16px; font-size:15px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:10px; color:var(--muted); letter-spacing:.8px; margin-bottom:6px; }
    .field input, .field select, .field textarea {
      width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
      color:var(--text); padding:9px 10px; font-size:13px; font-family:inherit; box-sizing:border-box; transition:border-color .2s,box-shadow .2s; outline:none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--brass); box-shadow:0 0 0 3px rgba(212,175,55,.15); }
    .field textarea { resize:vertical; min-height:72px; }
    .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

    /* Priority selector */
    .prio-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .prio-btn { flex:1; min-width:70px; padding:8px 4px; border-radius:var(--radius-sm); border:1px solid;
      font-size:11px; font-family:inherit; cursor:pointer; text-align:center; font-weight:bold;
      letter-spacing:.5px; transition:all .2s; }
    .prio-btn[data-sev="low"]    { color:var(--green);  border-color:var(--green)55;  background:var(--green)11; }
    .prio-btn[data-sev="medium"] { color:var(--yellow); border-color:var(--yellow)55; background:var(--yellow)11; }
    .prio-btn[data-sev="high"]   { color:var(--orange); border-color:var(--orange)55; background:var(--orange)11; }
    .prio-btn.selected { filter:brightness(1.4); box-shadow:0 0 0 2px currentColor; }

    /* Category selector */
    .cat-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .cat-btn { flex:1; min-width:80px; padding:8px 6px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--surface); color:var(--muted); font-size:11px; font-family:inherit;
      cursor:pointer; text-align:center; transition:all .2s; }
    .cat-btn.selected, .cat-btn:hover { border-color:var(--brass); color:var(--brass); background:var(--brass)11; }

    .photo-preview { width:80px; height:60px; object-fit:cover; border-radius:var(--radius-sm);
      border:1px solid var(--border); margin-top:6px; display:none; }
    .photo-preview.show { display:block; }

    .photo-overlay { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:300;
      display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .photo-overlay.hidden { display:none; }
    .photo-overlay img { max-width:95vw; max-height:92vh; object-fit:contain; border-radius:var(--radius-md); }

    /* ── Kanban board ── */
    .kanban-board { display:flex; gap:12px; overflow-x:auto; padding-bottom:12px;
      -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity; }
    .kanban-col { flex:0 0 220px; min-width:220px; max-height:calc(100vh - 200px);
      display:flex; flex-direction:column; scroll-snap-align:start; }
    .kanban-col-header { font-size:10px; text-transform:uppercase; letter-spacing:1px;
      color:var(--muted); padding:8px 10px; display:flex; align-items:center;
      justify-content:space-between; border-bottom:2px solid var(--border);
      margin-bottom:8px; position:sticky; top:0; background:var(--bg); z-index:1; }
    .kanban-col-header .col-count { font-size:10px; color:var(--faint);
      background:var(--surface); padding:1px 7px; border-radius:10px; }
    .kanban-col-body { flex:1; overflow-y:auto; padding-right:4px; }
    .kanban-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:border-color .2s,box-shadow .2s; box-shadow:var(--shadow-sm); }
    .kanban-card:hover { border-color:var(--brass)88; }
    .kanban-card.sev-high   { border-left:3px solid var(--orange); }
    .kanban-card.sev-medium { border-left:3px solid var(--yellow); }
    .kanban-card.sev-low    { border-left:3px solid var(--green); }
    .kanban-card.on-hold    { opacity:.55; }
    .kanban-card .kc-title { font-size:12px; font-weight:500; color:var(--text);
      margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .kanban-card .kc-meta { display:flex; flex-wrap:wrap; gap:4px; align-items:center;
      font-size:10px; color:var(--muted); }
    .kanban-empty { text-align:center; padding:24px 8px; color:var(--faint);
      font-size:11px; font-style:italic; }

    /* ── View toggle extras ── */
    .view-bar { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .board-my-filter { font-size:11px; color:var(--muted); cursor:pointer;
      display:flex; align-items:center; gap:5px; }

    /* ── Responsive ── */
    @media(max-width:600px){
      .cat-btns .cat-btn{min-width:60px;padding:6px 4px;font-size:10px}
      .kanban-board { flex-direction:column; overflow-x:visible; }
      .kanban-col { flex:none; min-width:100%; max-height:none; }
      .kanban-col-body { max-height:300px; overflow-y:auto; }
    }
  </style>
</head>
<body>

<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-wrap">

  <div class="page-title" data-s="sauma.pageTitle">🧵 Saumaklúbbur</div>
  <div class="page-subtitle" data-s="sauma.pageSubtitle">Community maintenance projects</div>

  <button class="btn btn-primary mb-16" style="width:100%" onclick="openSuggestModal()" data-s="sauma.suggestBtn">+ New sewing circle project</button>

  <!-- View toggle -->
  <div class="view-bar">
    <div class="view-toggle">
      <button id="viewListBtn" class="active" onclick="setView('list')" data-s="sauma.viewList">List</button>
      <button id="viewBoardBtn" onclick="setView('board')" data-s="sauma.viewBoard">Board</button>
    </div>
    <label id="boardMyFilter" class="board-my-filter hidden">
      <input type="checkbox" id="boardMyOnly" onchange="renderBoard()"> <span data-s="sauma.myBoardFilter">My projects only</span>
    </label>
  </div>

  <!-- Filter bar (list view only) -->
  <div class="filter-bar" id="filterBar">
    <span class="section-label" data-s="lbl.filter">FILTER:</span>
    <button class="filter-btn active" data-filter="open"       onclick="setFilter('open')"       data-s="sauma.filterOpen">Open</button>
    <button class="filter-btn"        data-filter="my"         onclick="setFilter('my')"         data-s="sauma.filterMy">My Projects</button>
    <button class="filter-btn"        data-filter="unassigned" onclick="setFilter('unassigned')" data-s="sauma.filterUnassigned">Unassigned</button>
    <button class="filter-btn"        data-filter="onhold"     onclick="setFilter('onhold')"     data-s="sauma.filterOnHold">On Hold</button>
    <button class="filter-btn"        data-filter="completed"  onclick="setFilter('completed')"  data-s="sauma.filterCompleted">Completed</button>
    <button class="filter-btn"        data-filter="all"        onclick="setFilter('all')"        data-s="sauma.filterAll">All</button>
  </div>

  <div id="projectList"><div class="empty-wrap"><div class="spinner"></div></div></div>
  <div id="kanbanBoard" class="kanban-board hidden"></div>

</div>

<!-- ══ SUGGEST PROJECT MODAL ══ -->
<div class="modal-overlay hidden" id="suggestModal" onclick="if(event.target===this)closeSuggestModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 data-s="sauma.suggestTitle">🧵 New sewing circle project</h3>
      <button class="modal-close-x" onclick="closeSuggestModal()">&times;</button>
    </div>

    <div class="field">
      <label data-s="maint.category">Category</label>
      <div class="cat-btns">
        <button class="cat-btn" data-cat="boat"      onclick="selectCat('boat')">⛵ Boat</button>
        <button class="cat-btn" data-cat="equipment" onclick="selectCat('equipment')">🦺 Equipment</button>
        <button class="cat-btn" data-cat="facility"  onclick="selectCat('facility')">🏠 Facility</button>
      </div>
    </div>

    <div class="field hidden" id="boatField">
      <label data-s="lbl.boat">Boat</label>
      <select id="suggestBoat"><option value="">Select boat…</option></select>
    </div>

    <div class="field">
      <label data-s="maint.part">Location / part</label>
      <input type="text" id="suggestPart" placeholder="e.g. Hull, mast, clubhouse roof…">
    </div>

    <div class="field">
      <label data-s="sauma.priority">Priority</label>
      <div class="prio-btns">
        <button class="prio-btn" data-sev="low"    onclick="selectPrio('low')">LOW</button>
        <button class="prio-btn" data-sev="medium" onclick="selectPrio('medium')">MEDIUM</button>
        <button class="prio-btn" data-sev="high"   onclick="selectPrio('high')">HIGH</button>
      </div>
    </div>

    <div class="field">
      <label data-s="sauma.description">Description</label>
      <textarea id="suggestDesc" rows="3" placeholder="Describe the project…"></textarea>
    </div>

    <div class="field">
      <label data-s="sauma.materials">Materials Needed</label>
      <div id="suggestMaterialsList"></div>
      <div class="flex-center gap-6 mt-8">
        <input type="text" id="suggestMaterialInput" placeholder="e.g. Sandpaper 120-grit…" class="flex-1">
        <button type="button" class="btn-ghost-sm" onclick="addSuggestMaterial()">+ Add</button>
      </div>
    </div>

    <div class="field">
      <label data-s="sauma.photoLabel">Photo (optional, max 5 MB)</label>
      <input type="file" id="suggestPhoto" accept="image/*" onchange="handleSuggestPhoto(this)"
        class="text-md text-muted">
      <img id="suggestPhotoPreview" class="photo-preview" alt="preview">
      <div id="suggestPhotoErr" class="text-sm text-red mt-8"></div>
    </div>

    <div id="suggestErr" class="msg msg-err hidden mb-10"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeSuggestModal()" data-s="btn.cancel">Cancel</button>
      <button class="btn btn-primary" id="suggestSubmitBtn" onclick="submitSuggestion()" data-s="btn.submit">Submit</button>
    </div>
  </div>
</div>

<!-- ── Full-size photo overlay ── -->
<div class="photo-overlay hidden" id="photoOverlay" onclick="this.classList.add('hidden')">
  <img id="overlayImg" src="" alt="">
</div>

<script>

let allProjects = [];
let currentFilter = "open";
let currentView = "list";
let currentUserName = "";
let currentUserKt = "";
let boats = [];

// Suggest modal state
let suggestCat = "";
let suggestPrio = "";
let suggestPhotoData = null;
let suggestMaterials = [];

document.addEventListener("DOMContentLoaded", async () => {
  const user = requireAuth();
  if (!user) return;
  currentUserName = user.name || "";
  currentUserKt = user.kennitala || "";
  window._maintUser = user;

  buildHeader('saumaklubbur');
  applyStrings();

  try {
    const [rRes, cfgRes] = await Promise.all([
      apiGet("getMaintenance"),
      apiGet("getConfig"),
    ]);
    const all = rRes.requests || [];
    // Members only see approved projects (or their own pending ones)
    allProjects = all.filter(r => boolVal(r.saumaklubbur) && (boolVal(r.approved) || r.reportedBy === currentUserName));
    boats = (cfgRes.boats || []).filter(b => b.active !== false && b.active !== "false");
    populateBoatSelect();
    renderList();
  } catch(e) {
    document.getElementById("projectList").innerHTML =
      `<div class="empty-wrap"><div class="empty-icon">⚠️</div><p>Failed to load: ${esc(e.message)}</p></div>`;
  }

  warmContainer();
});

function populateBoatSelect() {
  const sel = document.getElementById("suggestBoat");
  boats.forEach(b => {
    const o = document.createElement("option");
    o.value = b.id;
    o.textContent = b.name + (b.category ? " (" + b.category + ")" : "");
    sel.appendChild(o);
  });
}

// ── Filters ──────────────────────────────────────────────────────────────────

function setView(view) {
  currentView = view;
  document.getElementById('viewListBtn').classList.toggle('active', view === 'list');
  document.getElementById('viewBoardBtn').classList.toggle('active', view === 'board');
  document.getElementById('projectList').classList.toggle('hidden', view === 'board');
  document.getElementById('kanbanBoard').classList.toggle('hidden', view === 'list');
  document.getElementById('filterBar').classList.toggle('hidden', view === 'board');
  document.getElementById('boardMyFilter').classList.toggle('hidden', view === 'list');
  document.querySelector('.page-wrap').classList.toggle('wide-board', view === 'board');
  if (view === 'board') renderBoard();
  else renderList();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.filter === f));
  renderList();
}

function getFiltered() {
  return allProjects.filter(r => {
    const resolved = boolVal(r.resolved);
    if (currentFilter === "open")       return !resolved;
    if (currentFilter === "completed")  return resolved;
    if (currentFilter === "unassigned") return !resolved && !r.verkstjori;
    if (currentFilter === "onhold")     return !resolved && boolVal(r.onHold);
    if (currentFilter === "my")         return isMyProject(r);
    return true;
  });
}

function _isFollowing(r) {
  var followers = parseJson(r.followers, []);
  return followers.some(function(f) { return String(f.kt || f) === String(currentUserKt); });
}

function isMyProject(r) {
  if (!currentUserName) return false;
  if (r.verkstjori && r.verkstjori === currentUserName) return true;
  if (_isFollowing(r)) return true;
  const comments = parseJson(r.comments, []);
  return comments.some(c => c.by === currentUserName);
}

function renderList() {
  const items = getFiltered();
  const el = document.getElementById("projectList");
  if (!items.length) {
    const key = currentFilter === "my" ? "sauma.emptyMy" : "sauma.emptyDefault";
    el.innerHTML = `<div class="empty-wrap"><div class="empty-icon">🧵</div><p data-s="${key}">No projects match this filter.</p></div>`;
    applyStrings();
    return;
  }

  // Sort: newest comment first, then by creation date
  items.sort((a,b) => {
    const ra = boolVal(a.resolved), rb = boolVal(b.resolved);
    if (!ra && rb) return -1;
    if (ra && !rb) return 1;
    const aComments = parseJson(a.comments, []);
    const bComments = parseJson(b.comments, []);
    const aLast = aComments.length ? (aComments[aComments.length-1].at || '') : '';
    const bLast = bComments.length ? (bComments[bComments.length-1].at || '') : '';
    if (aLast || bLast) {
      if (aLast > bLast) return -1;
      if (bLast > aLast) return 1;
    }
    return (b.createdAt||"") > (a.createdAt||"") ? 1 : -1;
  });

  el.innerHTML = items.map(r => renderProjectCard(r)).join("");
  el.onclick = e => {
    const card = e.target.closest('.sauma-card');
    if (!card) return;
    const r = allProjects.find(x => x.id === card.dataset.id);
    if (r) maintOpenDetail(r, currentUserName);
  };
  if (currentView === 'board') renderBoard();
}

function renderProjectCard(r) {
  const resolved  = boolVal(r.resolved);
  const sevClass  = 'sev-' + (r.severity||'low');
  const catIcon   = CAT_ICON[r.category] || '⚙️';
  const subjectLabel = r.category==='boat'
    ? esc(r.boatName||r.boatId||'')
    : '';
  const comments = parseJson(r.comments, []);
  const materials = parseJson(r.materials, []);
  const matDone = materials.filter(m=>m.purchased).length;
  const following = _isFollowing(r);
  const commentCount = comments.length;
  const lastComment = commentCount ? comments[commentCount-1] : null;

  return `<div class="sauma-card req-card ${sevClass}${resolved?' resolved':''}" data-id="${esc(r.id||'')}">
    <div class="req-header">
      <div class="flex-1" style="min-width:0">
        <div class="req-title">
          ${catIcon} ${subjectLabel ? subjectLabel : ''}${subjectLabel && r.part ? `<span class="text-muted text-md" style="font-weight:400"> · ${esc(r.part)}</span>` : ''}${!subjectLabel && r.part ? esc(r.part) : ''}
        </div>
        <div class="req-meta">
          <span class="badge ${SEV_BADGE[r.severity]||'badge-green'}">${r.severity||'low'}</span>
          ${boolVal(r.onHold) && !resolved ? `<span class="badge badge-yellow">⏸ On Hold</span>` : ''}
          ${r.verkstjori
            ? `<span class="verk-tag">Verkstjóri: ${esc(r.verkstjori)}</span>`
            : `<span class="text-sm text-muted" style="font-style:italic" data-s="sauma.needsVerkstjori">Needs verkstjóri</span>`}
          ${materials.length ? `<span>📦 ${matDone}/${materials.length}</span>` : ''}
          ${r.reportedBy ? `<span>${esc(r.reportedBy)}</span>` : ''}
          ${r.createdAt  ? `<span>${sstr(r.createdAt).slice(0,10)}</span>` : ''}
        </div>
      </div>
    </div>
    ${r.description ? `<div class="req-desc">${esc(r.description)}</div>` : ''}
    ${r.photoUrl ? `<img class="req-photo" src="${esc(r.photoUrl)}" onclick="event.stopPropagation();viewPhoto('${esc(r.photoUrl)}')">` : ''}
    <div class="flex-center gap-8 mt-8 text-sm text-muted">
      ${following ? '<span style="color:var(--brass)" title="' + s('sauma.unfollow') + '">★</span>' : ''}
      <span>💬 ${commentCount}</span>
      ${lastComment ? `<span>· ${esc(lastComment.by||'')} · ${sstr(lastComment.at).slice(0,16).replace('T',' ')}</span>` : ''}
    </div>
    ${!boolVal(r.approved) && !resolved ? `<div class="mt-8 text-sm text-brass" style="font-style:italic">⏳ Pending staff review</div>` : ''}
    ${resolved ? `<div class="mt-8 text-sm text-muted">✓ Completed ${sstr(r.resolvedAt).slice(0,10)} by ${esc(r.resolvedBy||'')}</div>` : ''}
  </div>`;
}

function viewPhoto(url) {
  document.getElementById("overlayImg").src = url;
  document.getElementById("photoOverlay").classList.remove("hidden");
}

// ── Kanban board ─────────────────────────────────────────────────────────────

function getProjectColumn(r) {
  if (boolVal(r.resolved))                        return 'done';
  if (boolVal(r.onHold))                           return 'onhold';
  if (r.verkstjori)                                return 'inprogress';
  return 'todo';
}

function renderBoard() {
  const myOnly = document.getElementById('boardMyOnly')?.checked;
  const projects = myOnly ? allProjects.filter(isMyProject) : allProjects;

  const columns = {
    todo:       { key: 'sauma.colTodo',       items: [] },
    inprogress: { key: 'sauma.colInProgress', items: [] },
    onhold:     { key: 'sauma.colOnHold',     items: [] },
    done:       { key: 'sauma.colDone',       items: [] },
  };

  projects.forEach(r => {
    const col = getProjectColumn(r);
    columns[col].items.push(r);
  });

  const sevOrder = { high: 0, medium: 1, low: 2 };
  Object.values(columns).forEach(col => {
    col.items.sort((a, b) =>
      (sevOrder[a.severity] ?? 2) - (sevOrder[b.severity] ?? 2)
      || ((b.createdAt || '') > (a.createdAt || '') ? 1 : -1));
  });

  const board = document.getElementById('kanbanBoard');
  board.innerHTML = Object.entries(columns).map(([id, col]) => `
    <div class="kanban-col" data-col="${id}">
      <div class="kanban-col-header">
        <span data-s="${col.key}">${s(col.key)}</span>
        <span class="col-count">${col.items.length}</span>
      </div>
      <div class="kanban-col-body">
        ${col.items.length
          ? col.items.map(r => renderKanbanCard(r)).join('')
          : `<div class="kanban-empty" data-s="sauma.colEmpty">${s('sauma.colEmpty')}</div>`}
      </div>
    </div>
  `).join('');

  board.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('click', () => {
      const r = allProjects.find(x => x.id === card.dataset.id);
      if (r) maintOpenDetail(r, currentUserName);
    });
  });
}

function renderKanbanCard(r) {
  const sevClass = 'sev-' + (r.severity || 'low');
  const onHold   = boolVal(r.onHold) && !boolVal(r.resolved);
  const catIcon  = CAT_ICON[r.category] || '⚙️';
  const subject  = r.category === 'boat'
    ? esc(r.boatName || r.boatId || '')
    : '';
  const comments  = parseJson(r.comments, []);
  const materials = parseJson(r.materials, []);
  const matDone   = materials.filter(m => m.purchased).length;

  return `<div class="kanban-card ${sevClass}${onHold ? ' on-hold' : ''}" data-id="${esc(r.id || '')}">
    <div class="kc-title">${catIcon} ${subject ? subject + (r.part ? ' · ' + esc(r.part) : '') : esc(r.part||'')}</div>
    <div class="kc-meta">
      <span class="badge ${SEV_BADGE[r.severity] || 'badge-green'}" style="font-size:9px;padding:1px 5px">${r.severity || 'low'}</span>
      ${onHold ? `<span class="badge badge-yellow" style="font-size:9px;padding:1px 5px">⏸</span>` : ''}
      ${r.verkstjori ? `<span class="verk-tag" style="font-size:10px">${esc(r.verkstjori)}</span>` : ''}
      ${materials.length ? `<span>📦 ${matDone}/${materials.length}</span>` : ''}
      ${comments.length ? `<span>💬 ${comments.length}</span>` : ''}
      ${_isFollowing(r) ? '<span style="color:var(--brass)">★</span>' : ''}
    </div>
  </div>`;
}

// ── Suggest modal ──────────────────────────────────────────────────────────────

function openSuggestModal() {
  suggestCat = ""; suggestPrio = ""; suggestPhotoData = null; suggestMaterials = [];
  ["suggestPart","suggestDesc"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("suggestBoat").value = "";
  document.getElementById("suggestPhoto").value = "";
  document.getElementById("suggestPhotoPreview").className = "photo-preview";
  document.getElementById("suggestPhotoErr").textContent = "";
  document.getElementById("suggestErr").classList.add("hidden");
  document.getElementById("suggestMaterialsList").innerHTML = "";
  document.getElementById("suggestMaterialInput").value = "";
  document.querySelectorAll(".prio-btn").forEach(b => b.classList.remove("selected"));
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("selected"));
  document.getElementById("boatField").classList.add("hidden");
  openModal("suggestModal");
}

function closeSuggestModal() { closeModal("suggestModal"); }

function selectCat(cat) {
  suggestCat = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("selected", b.dataset.cat === cat));
  document.getElementById("boatField").classList.toggle("hidden", cat !== "boat");
}

function selectPrio(sev) {
  suggestPrio = sev;
  document.querySelectorAll(".prio-btn").forEach(b => b.classList.toggle("selected", b.dataset.sev === sev));
}

function addSuggestMaterial() {
  const input = document.getElementById("suggestMaterialInput");
  const name = (input.value || "").trim();
  if (!name) return;
  suggestMaterials.push({ name, purchased: false });
  input.value = "";
  renderSuggestMaterials();
}
function removeSuggestMaterial(idx) {
  suggestMaterials.splice(idx, 1);
  renderSuggestMaterials();
}
function renderSuggestMaterials() {
  document.getElementById("suggestMaterialsList").innerHTML = suggestMaterials.map((m,i) =>
    `<div class="flex-center gap-6 text-md" style="padding:4px 0">
      <span class="flex-1">${esc(m.name)}</span>
      <button type="button" class="btn-dismiss" onclick="removeSuggestMaterial(${i})">&times;</button>
    </div>`
  ).join("");
}

function handleSuggestPhoto(input) {
  const file = input.files[0];
  const errEl = document.getElementById("suggestPhotoErr");
  const preview = document.getElementById("suggestPhotoPreview");
  if (!file) { suggestPhotoData = null; preview.className = "photo-preview"; return; }
  if (file.size > 5*1024*1024) {
    errEl.textContent = s("sauma.imgTooLarge");
    input.value = ""; suggestPhotoData = null; preview.className = "photo-preview"; return;
  }
  errEl.textContent = "";
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1400; let data;
      if (img.width <= maxW) { data = e.target.result; }
      else {
        const c = document.createElement("canvas"); const ratio = maxW/img.width;
        c.width = maxW; c.height = Math.round(img.height*ratio);
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        data = c.toDataURL("image/jpeg",0.82);
      }
      suggestPhotoData = { fileName: file.name, fileData: data, mimeType: file.type||'image/jpeg' };
      preview.src = data; preview.className = "photo-preview show";
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitSuggestion() {
  const btn = document.getElementById("suggestSubmitBtn");
  document.getElementById("suggestErr").classList.add("hidden");

  if (!suggestCat) { showSuggestErr(s("sauma.selectCategory")); return; }
  if (!suggestPrio) { showSuggestErr(s("sauma.selectPriority")); return; }
  const desc = document.getElementById("suggestDesc").value.trim();
  if (!desc) { showSuggestErr(s("sauma.describeProject")); return; }

  let boatId = "", boatName = "";
  if (suggestCat === "boat") {
    const sel = document.getElementById("suggestBoat");
    boatId = sel.value; boatName = sel.selectedOptions[0]?.text?.split(" (")[0] || "";
    if (!boatId) { showSuggestErr(s("sauma.selectBoat")); return; }
  }

  btn.disabled = true; btn.textContent = s("sauma.submitting");
  try {
    let photoUrl = "";
    if (suggestPhotoData) {
      btn.textContent = s("sauma.uploadingPhoto");
      const upRes = await apiPost("uploadMaintenancePhoto", suggestPhotoData);
      if (upRes.ok) photoUrl = upRes.photoUrl;
    }
    await apiPost("saveMaintenance", {
      category: suggestCat, boatId, boatName, itemName: '',
      part:        document.getElementById("suggestPart").value.trim(),
      severity:    suggestPrio,
      description: desc,
      markOos:     false,
      photoUrl,
      reportedBy:  currentUserName || 'Member',
      source:      "member",
      saumaklubbur: true,
      verkstjori:  '',
      materials:   suggestMaterials.length ? JSON.stringify(suggestMaterials) : '[]',
    });
    closeSuggestModal();
    const rRes = await apiGet("getMaintenance");
    allProjects = (rRes.requests || []).filter(r => boolVal(r.saumaklubbur));
    renderList();
    toast("✓ " + s("sauma.submitted"));
  } catch(e) {
    showSuggestErr("Error: " + e.message);
  } finally {
    btn.disabled = false; btn.textContent = s("btn.submit");
  }
}

function showSuggestErr(msg) {
  const el = document.getElementById("suggestErr");
  el.textContent = msg; el.classList.remove("hidden");
}

</script>
