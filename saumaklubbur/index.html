<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Saumaklúbbur</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/maintenance.js" defer></script>
  <style>
    .page-wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; transition: max-width .2s; }
    .page-wrap.wide-board { max-width: 1200px; }
    .page-title { font-size: 16px; font-weight: 600; color:var(--brass-fg); margin-bottom: 4px; }
    .page-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

    /* ── Filter bar ── */
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; align-items:center; }
    .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted);
      border-radius:20px; padding:5px 14px; font-size:11px; font-family:inherit; cursor:pointer;
      letter-spacing:.5px; transition:all .2s; }
    .filter-btn.active { background:var(--brass); color:#0b1f38; border-color:var(--brass); }
    .filter-btn:hover:not(.active) { border-color:var(--brass); color:var(--brass-fg); }

    /* ── Project card ── */
    .req-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
      padding:14px 16px; margin-bottom:10px; transition:border-color .2s,box-shadow .2s; cursor:pointer; box-shadow:var(--shadow-sm); }
    .req-card:hover { border-color:var(--brass)88; }
    .req-card.resolved { opacity:.45; }
    .req-card.sev-high     { border-left:3px solid var(--orange); }
    .req-card.sev-medium   { border-left:3px solid var(--yellow); }
    .req-card.sev-low      { border-left:3px solid var(--green); }
    .req-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .req-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .req-meta  { display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:11px; color:var(--muted); }
    .req-desc  { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
    .req-photo { width:80px; height:60px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--border);
      margin-top:8px; cursor:pointer; transition:opacity .2s; }
    .req-photo:hover { opacity:.8; }
    .comment-thread { margin-top:8px; border-top:1px solid var(--border)44; padding-top:8px; }
    .comment-item { margin-bottom:8px; }
    .verk-tag { font-size:11px; color:var(--brass-fg); font-weight:500; }

    /* ── Badges ── */
    .badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:500; letter-spacing:.3px; }
    .badge-green  { background:var(--green)22;  color:var(--green);  border:1px solid var(--green)44; }
    .badge-yellow { background:var(--yellow)22; color:var(--yellow); border:1px solid var(--yellow)44; }
    .badge-orange { background:var(--orange)22; color:var(--orange); border:1px solid var(--orange)44; }
    .badge-red    { background:var(--red)22;    color:var(--red);    border:1px solid var(--red)44; }
    .badge-muted  { background:var(--surface);  color:var(--muted);  border:1px solid var(--border); }
    .badge-brass  { background:var(--brass)22;  color:var(--brass-fg);  border:1px solid var(--brass)44; }
    .oos-badge { font-size:10px; background:var(--red)22; color:var(--red);
      border:1px solid var(--red)44; border-radius:3px; padding:2px 6px; font-weight:500; }

    .empty-wrap { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-icon { font-size:32px; margin-bottom:12px; }

    /* Modal overlay + .modal + .field styles from shared/style.css; form-body uses .field--compact. */
    .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

    /* Priority selector */
    .prio-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .prio-btn { flex:1; min-width:70px; padding:8px 4px; border-radius:var(--radius-sm); border:1px solid;
      font-size:11px; font-family:inherit; cursor:pointer; text-align:center; font-weight:bold;
      letter-spacing:.5px; transition:all .2s; }
    .prio-btn[data-sev="low"]    { color:var(--green);  border-color:var(--green)55;  background:var(--green)11; }
    .prio-btn[data-sev="medium"] { color:var(--yellow); border-color:var(--yellow)55; background:var(--yellow)11; }
    .prio-btn[data-sev="high"]   { color:var(--orange); border-color:var(--orange)55; background:var(--orange)11; }
    .prio-btn.selected { filter:brightness(1.4); box-shadow:0 0 0 2px currentColor; }

    /* Category selector */
    .cat-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .cat-btn { flex:1; min-width:80px; padding:8px 6px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--surface); color:var(--muted); font-size:11px; font-family:inherit;
      cursor:pointer; text-align:center; transition:all .2s; }
    .cat-btn.selected, .cat-btn:hover { border-color:var(--brass); color:var(--brass-fg); background:var(--brass)11; }

    .photo-preview { width:80px; height:60px; object-fit:cover; border-radius:var(--radius-sm);
      border:1px solid var(--border); margin-top:6px; display:none; }
    .photo-preview.show { display:block; }

    .photo-overlay { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:300;
      display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .photo-overlay.hidden { display:none; }
    .photo-overlay img { max-width:95vw; max-height:92vh; object-fit:contain; border-radius:var(--radius-md); }

    /* ── Kanban board ── */
    .kanban-board { display:flex; gap:12px; overflow-x:auto; padding-bottom:12px;
      -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity; }
    .kanban-col { flex:1 0 220px; min-width:220px; max-height:calc(100vh - 200px);
      display:flex; flex-direction:column; scroll-snap-align:start; }
    .kanban-col-header { font-size:10px; text-transform:uppercase; letter-spacing:1px;
      color:var(--muted); padding:8px 10px; display:flex; align-items:center;
      justify-content:space-between; border-bottom:2px solid var(--border);
      margin-bottom:8px; position:sticky; top:0; background:var(--bg); z-index:1; }
    .kanban-col-header .col-count { font-size:10px; color:var(--faint);
      background:var(--surface); padding:1px 7px; border-radius:10px; }
    .kanban-col-body { flex:1; overflow-y:auto; padding-right:4px; }
    .kanban-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:border-color .2s,box-shadow .2s; box-shadow:var(--shadow-sm); }
    .kanban-card:hover { border-color:var(--brass)88; }
    .kanban-card.sev-high   { border-left:3px solid var(--orange); }
    .kanban-card.sev-medium { border-left:3px solid var(--yellow); }
    .kanban-card.sev-low    { border-left:3px solid var(--green); }
    .kanban-card.on-hold    { opacity:.55; }
    .kanban-card .kc-title { font-size:12px; font-weight:500; color:var(--text);
      margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .kanban-card .kc-meta { display:flex; flex-wrap:wrap; gap:4px; align-items:center;
      font-size:10px; color:var(--muted); }
    .kanban-empty { text-align:center; padding:24px 8px; color:var(--faint);
      font-size:11px; font-style:italic; }

    /* ── View toggle extras ── */
    .view-bar { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .board-my-filter { font-size:11px; color:var(--muted); cursor:pointer;
      display:flex; align-items:center; gap:5px; }

    /* ── Responsive ── */
    @media(max-width:600px){
      .cat-btns .cat-btn{min-width:60px;padding:6px 4px;font-size:10px}
      .kanban-board { flex-direction:column; overflow-x:visible; }
      .kanban-col { flex:none; min-width:100%; max-height:none; }
      .kanban-col-body { max-height:300px; overflow-y:auto; }
    }
  </style>
</head>
<body>

<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-wrap">

  <div class="page-title" data-s="sauma.pageTitle">🧵 Saumaklúbbur</div>
  <div class="page-subtitle" data-s="sauma.pageSubtitle">Community maintenance projects</div>

  <button class="btn btn-primary mb-16" style="width:100%" data-sk-click="openSuggestModal" data-s="sauma.suggestBtn">+ New sewing circle project</button>

  <!-- View toggle -->
  <div class="view-bar">
    <div class="view-toggle">
      <button id="viewListBtn" class="active" data-sk-click="setView" data-sk-arg="list" data-s="sauma.viewList">List</button>
      <button id="viewBoardBtn" data-sk-click="setView" data-sk-arg="board" data-s="sauma.viewBoard">Board</button>
    </div>
    <label id="boardMyFilter" class="board-my-filter hidden">
      <input type="checkbox" id="boardMyOnly" data-sk-change="renderBoard"> <span data-s="sauma.myBoardFilter">My projects only</span>
    </label>
  </div>

  <!-- Filter bar (list view only) -->
  <div class="filter-bar" id="filterBar">
    <span class="section-label" data-s="lbl.filter">FILTER:</span>
    <button class="filter-btn active" data-filter="open"       data-sk-click="setFilter" data-sk-arg="open"       data-s="sauma.filterOpen">Open</button>
    <button class="filter-btn"        data-filter="my"         data-sk-click="setFilter" data-sk-arg="my"         data-s="sauma.filterMy">My Projects</button>
    <button class="filter-btn"        data-filter="unassigned" data-sk-click="setFilter" data-sk-arg="unassigned" data-s="sauma.filterUnassigned">Unassigned</button>
    <button class="filter-btn"        data-filter="onhold"     data-sk-click="setFilter" data-sk-arg="onhold"     data-s="sauma.filterOnHold">On Hold</button>
    <button class="filter-btn"        data-filter="completed"  data-sk-click="setFilter" data-sk-arg="completed"  data-s="sauma.filterCompleted">Completed</button>
    <button class="filter-btn"        data-filter="all"        data-sk-click="setFilter" data-sk-arg="all"        data-s="sauma.filterAll">All</button>
  </div>

  <div id="projectList"><div class="empty-wrap"><div class="spinner"></div></div></div>
  <div id="kanbanBoard" class="kanban-board hidden"></div>

</div>

<!-- ══ SUGGEST PROJECT MODAL ══ -->
<div class="modal-overlay hidden" id="suggestModal" data-sk-close-self>
  <div class="modal modal--md">
    <div class="modal-header">
      <h3 data-s="sauma.suggestTitle">🧵 New sewing circle project</h3>
      <button class="modal-close-x" data-sk-click="closeSuggestModal">&times;</button>
    </div>

    <div class="field field--compact">
      <label data-s="maint.category"></label>
      <div class="cat-btns">
        <button class="cat-btn" data-cat="boat"      data-sk-click="selectCat" data-sk-arg="boat" data-s="sauma.catBoat"></button>
        <button class="cat-btn" data-cat="equipment" data-sk-click="selectCat" data-sk-arg="equipment" data-s="sauma.catEquipment"></button>
        <button class="cat-btn" data-cat="facility"  data-sk-click="selectCat" data-sk-arg="facility" data-s="sauma.catFacility"></button>
      </div>
    </div>

    <div class="field field--compact hidden" id="boatField">
      <label data-s="lbl.boat"></label>
      <select id="suggestBoat"><option value="" data-s="sauma.selectBoatPh"></option></select>
    </div>

    <div class="field field--compact">
      <label data-s="maint.part"></label>
      <input type="text" id="suggestPart" data-s="sauma.partPh" data-s-attr="placeholder">
    </div>

    <div class="field field--compact">
      <label data-s="sauma.priority"></label>
      <div class="prio-btns">
        <button class="prio-btn" data-sev="low"    data-sk-click="selectPrio" data-sk-arg="low" data-s="maint.sevLow"></button>
        <button class="prio-btn" data-sev="medium" data-sk-click="selectPrio" data-sk-arg="medium" data-s="maint.sevMedium"></button>
        <button class="prio-btn" data-sev="high"   data-sk-click="selectPrio" data-sk-arg="high" data-s="maint.sevHigh"></button>
      </div>
    </div>

    <div class="field field--compact">
      <label data-s="sauma.description"></label>
      <textarea id="suggestDesc" rows="3" data-s="sauma.descPh" data-s-attr="placeholder"></textarea>
    </div>

    <div class="field field--compact">
      <label data-s="sauma.materials"></label>
      <div id="suggestMaterialsList"></div>
      <div class="flex-center gap-6 mt-8">
        <input type="text" id="suggestMaterialInput" data-s="sauma.materialPh" data-s-attr="placeholder" class="flex-1">
        <button type="button" class="btn-ghost-sm" data-sk-click="addSuggestMaterial" data-s="btn.add"></button>
      </div>
    </div>

    <div class="field field--compact">
      <label data-s="sauma.photoLabel"></label>
      <input type="file" id="suggestPhoto" accept="image/*" data-sk-change-el="handleSuggestPhoto"
        class="text-md text-muted">
      <img id="suggestPhotoPreview" class="photo-preview" alt="preview">
      <div id="suggestPhotoErr" class="text-sm text-red mt-8"></div>
    </div>

    <div id="suggestErr" class="msg msg-err hidden mb-10"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-sk-click="closeSuggestModal" data-s="btn.cancel">Cancel</button>
      <button class="btn btn-primary" id="suggestSubmitBtn" data-sk-click="submitSuggestion" data-s="btn.submit">Submit</button>
    </div>
  </div>
</div>

<!-- ── Full-size photo overlay ── -->
<div class="photo-overlay hidden" id="photoOverlay" data-sk-hide-self>
  <img id="overlayImg" src="" alt="">
</div>

<script src="saumaklubbur.js" defer></script>
</body>
</html>
