<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Member Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/weather.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/certs.js"></script>
<style>
/* ── Quick-action header strip ── */
.member-actions {
  display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;
}
.member-actions .act-btn {
  flex:1; min-width:100px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; cursor:pointer; font-family:inherit;
  font-size:11px; color:var(--text); text-align:center; text-decoration:none;
  transition:border-color .15s,background .15s; display:block;
}
.member-actions .act-btn:hover { border-color:var(--brass); background:var(--card); }

/* ── Tabs ── */
.hub-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:14px; overflow-x:auto; }
.hub-tab  { padding:10px 16px; border:none; background:none; color:var(--muted);
  font-family:inherit; font-size:11px; letter-spacing:.8px; cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; transition:color .15s; }
.hub-tab.active { color:var(--brass); border-bottom-color:var(--brass); }

/* ── Boat category section ── */
.boat-cat-toggle { display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; cursor:pointer; user-select:none; border-bottom:1px solid var(--border)44; }
.boat-cat-toggle:hover .bct-label { color:var(--brass); }
.bct-label { font-size:11px; font-weight:500; }
.bct-count { font-size:10px; color:var(--muted); }
.bct-arrow { font-size:10px; color:var(--muted); transition:transform .2s; }
.bct-arrow.open { transform:rotate(180deg); }
.boat-cat-body { display:none; padding:8px 0 4px; }
.boat-cat-body.open { display:block; }
.boat-cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }

/* ── Active checkouts ── */
.co-meta  { flex:1; min-width:0; }
.co-title { font-size:12px; font-weight:500; color:var(--text); }
.co-sub   { font-size:10px; color:var(--muted); margin-top:2px; }

/* ── Recent trips (log-as-crew) ── */
.pub-trip { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
.pub-trip:hover { border-color:var(--brass); }
.pub-trip-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.pub-trip-date  { font-size:10px; color:var(--brass); margin-bottom:2px; }
.pub-trip-title { font-size:12px; font-weight:500; }
.pub-trip-meta  { font-size:11px; color:var(--muted); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }

/* ── Logbook ── */
.trip-row { padding:10px 0; border-bottom:1px solid var(--border)44; font-size:13px; cursor:pointer; }
.trip-row:last-child { border-bottom:none; }
.trip-row:hover { background:var(--faint); margin:0 -4px; padding:10px 4px; border-radius:4px; }
.trip-label { font-weight:500; }
.trip-sub   { font-size:11px; color:var(--muted); margin-top:3px; }

/* ── Stats card ── */
.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:14px 12px; text-align:center; }
.stat-box .sn { font-size:24px; color:var(--brass); font-weight:500; }
.stat-box .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Cert badges (from shared/certs.js) ── */
.cert-section { background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:14px 16px; margin-bottom:12px; }
.cert-section-title { font-size:9px; color:var(--muted); letter-spacing:1.2px; margin-bottom:10px; }
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div style="max-width:720px;margin:0 auto;padding:16px 16px 60px">

  <div style="margin-bottom:14px">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="welcomeName">Member Hub</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px" id="welcomeSub">Loading…</div>
  </div>

  <!-- ══ WEATHER WIDGET ══ -->
  <div class="wx-widget" id="wxWidget" style="margin-bottom:10px">
    <div style="color:var(--muted);font-size:11px;padding:6px 0">Loading conditions…</div>
  </div>

  <!-- ══ QUICK ACTION STRIP ══ -->
  <div class="member-actions">
    <button class="act-btn" onclick="openLaunchPicker()" data-s="member.launchBoat"></button>
    <button class="act-btn" onclick="openCheckInPicker()" data-s="member.checkIn"></button>
    <a class="act-btn" href="../maintenance/?new=1" ... data-s="member.reportIssue"></a>
  </div>

  <!-- ══ ACTIVE CHECKOUTS (my boats) ══ -->
  <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin:4px 0 8px">
    <span data-s="member.myCheckout"></span>
    <span style="font-weight:normal;font-size:8px;letter-spacing:0"> — <span data-s="member.myCheckoutSub"></span></span>
  </div>
  <div id="activeList"><div class="empty-note">Loading…</div></div>

  <!-- ══ TABS ══ -->
  <div class="hub-tabs" style="margin-top:16px">
    <button class="hub-tab active" onclick="showTab('fleet')"  id="tabBtnFleet"  data-s="member.tabFleet"></button>
    <button class="hub-tab"        onclick="showTab('trips')"  id="tabBtnTrips"  data-s="member.tabTrips"></button>
    <button class="hub-tab"        onclick="showTab('logbook')" id="tabBtnLogbook"  data-s="member.tabLogbook"></button>
    <button class="hub-tab"        onclick="showTab('certs')"  id="tabBtnCerts" data-s="member.tabCerts"></button>
  </div>

  <!-- ═══ TAB: FLEET ═══ -->
  <div id="tab-fleet">
    <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:10px"  data-s="member.fleetAvail"></div>
    <div id="fleetByCat"></div>
  </div>

  <!-- ═══ TAB: LOG A RECENT TRIP ═══ -->
  <div id="tab-trips" class="hidden">
    <p style="font-size:11px;color:var(--muted);margin:0 0 12px;line-height:1.5" id="tripTabHint">
    </p>
    <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:8px"  data-s="member.recentTrips"></div>
    <div id="clubTrips"><div class="empty-note">Loading…</div></div>
    <div style="margin-top:12px">
      <button class="btn btn-secondary" style="width:100%" onclick="openManualTripModal()" data-s="member.logManually">
      </button>
    </div>
  </div>

  <!-- ═══ TAB: LOGBOOK ═══ -->
  <div id="tab-logbook" class="hidden">
    <div class="stats-grid" id="logbookStats">
      <div class="stat-box"><div class="sn" id="stTrips">—</div><div class="sl" data-s="member.statTrips"></div></div>
      <div class="stat-box"><div class="sn" id="stHours">—</div><div class="sl" data-s="member.statHours"></div></div>
      <div class="stat-box"><div class="sn" id="stBoat">—</div> <div class="sl" data-s="member.statBoat"></div></div>
      <div class="stat-box"><div class="sn" id="stSeason">—</div><div class="sl" data-s="member.statSeason"></div></div>
    </div>
    <div id="logbookList"><div class="empty-note">Loading…</div></div>
  </div>

  <!-- ═══ TAB: CERTIFICATIONS ═══ -->
  <div id="tab-certs" class="hidden">
    <div id="certsList"><div class="empty-note">Loading…</div></div>
  </div>

</div><!-- /container -->

<!-- ══ TRIP DETAIL MODAL (logbook) ══ -->
<div class="modal-overlay hidden" id="tripDetailModal" onclick="if(event.target===this)closeModal('tripDetailModal')">
  <div class="modal" style="max-width:440px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="tdTitle">Trip</h3>
      <button class="btn-ghost" onclick="closeModal('tripDetailModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="tdBody" style="font-size:13px"></div>
  </div>
</div>

<!-- ══ ADD AS CREW MODAL ══ -->
<div class="modal-overlay hidden" id="crewModal" onclick="if(event.target===this)closeModal('crewModal')">
  <div class="modal" style="max-width:400px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0">Add to logbook as crew</h3>
      <button class="btn-ghost" onclick="closeModal('crewModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="crewTripSummary" style="background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12px"></div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="crewNotes" placeholder="Any notes about your trip…">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('crewModal')">Cancel</button>
      <button class="btn btn-primary"   onclick="submitCrewLog()">Add to my logbook</button>
    </div>
    <div id="crewErr" class="msg msg-err" style="display:none;margin-top:8px"></div>
  </div>
</div>

<!-- ══ MANUAL TRIP MODAL ══ -->
<div class="modal-overlay hidden" id="manualTripModal" onclick="if(event.target===this)closeModal('manualTripModal')">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0">Log a Trip</h3>
      <button class="btn-ghost" onclick="closeModal('manualTripModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="rDate">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Boat</label>
        <select id="rBoat"><option value="">Select…</option></select></div>
      <div class="field"><label>Location</label>
        <select id="rLocation"><option value="">Select…</option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Departed</label><input type="time" id="rTimeOut"></div>
      <div class="field"><label>Returned</label><input type="time" id="rTimeIn"></div>
    </div>
    <div class="field">
      <label>Notes</label>
      <input type="text" id="rNotes" placeholder="Optional…">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('manualTripModal')">Cancel</button>
      <button class="btn btn-primary"   onclick="submitManualTrip()">Save Trip</button>
    </div>
    <div id="manualTripErr" class="msg msg-err" style="display:none;margin-top:8px"></div>
  </div>
</div>

<!-- ══ LAUNCH MODAL ══ -->
<div class="modal-overlay hidden" id="launchModal" onclick="if(event.target===this)closeModal('launchModal')">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="launchModalTitle">Launch a Boat</h3>
      <button class="btn-ghost" onclick="closeModal('launchModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="launchModalBody"></div>
  </div>
</div>

<!-- ══ RETURN MODAL ══ -->
<div class="modal-overlay hidden" id="returnModal" onclick="if(event.target===this)closeModal('returnModal')">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0">Check In</h3>
      <button class="btn-ghost" onclick="closeModal('returnModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="returnModalBody"></div>
  </div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
const user = requireAuth();
let boats=[], locations=[], checkouts=[], myTrips=[], allTrips=[];
let certDefs=[], currentWx=null;
let launchBoat=null, returnCo=null, pendingCrewTrip=null;
let tripsLoaded=false, logbookLoaded=false, certsLoaded=false;
const L = getLang();
// ══ INIT ═════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  buildHeader('member');
  document.getElementById('welcomeName').textContent = user.name || 'Member Hub';
  document.getElementById('welcomeSub').textContent  = user.kennitala || '';
  applystrings();
  document.getElementById('tripTabHint').innerHTML = s("member.tripsTapHint").replace('crew','<strong>'+s("member.crewRole")+'</strong>');
  
  wxWidget(document.getElementById('wxWidget'), {
    onData: snap => { currentWx = snap; },
  }).start();

  try {
    const [coRes, bRes, lRes] = await Promise.all([
      apiGet('getActiveCheckouts'),
      apiGet('getBoats'),
      apiGet('getLocations'),
    ]);
    checkouts = coRes.checkouts || [];
    boats     = (bRes.boats     || []).filter(b => b.active !== false && b.active !== 'false');
    locations = (lRes.locations || []).filter(l => l.active !== false && l.active !== 'false');

    populateFormSelects();
    renderActiveCheckouts();
    renderFleetByCat();
  } catch(e) {
    document.getElementById('activeList').innerHTML =
      `<div class="empty-note" style="color:var(--red)"${s("member.noCheckouts")}</div>`;
  }
});

// ══ TAB SWITCHING ════════════════════════════════════════════════════════════
function showTab(name) {
  ['fleet','trips','logbook','certs'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== name);
    document.getElementById('tabBtn'+t.charAt(0).toUpperCase()+t.slice(1))
      ?.classList.toggle('active', t === name);
  });
  if (name === 'trips'   && !tripsLoaded)   loadTripsTab();
  if (name === 'logbook' && !logbookLoaded) loadLogbookTab();
  if (name === 'certs'   && !certsLoaded)   loadCertsTab();
}

// ══ FLEET BY CATEGORY ════════════════════════════════════════════════════════
function renderFleetByCat() {
  const el     = document.getElementById('fleetByCat');
  const active = checkouts.filter(c => c.status === 'out');
  if (!boats.length) { el.innerHTML='<div class="empty-note">${s("member.noBoats")}</div>'; return; }

  const grouped = {};
  boats.forEach(b => {
    const cat = (b.category||'other').toLowerCase();
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(b);
  });

  el.innerHTML = Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([cat, catBoats]) => {
    const avail = catBoats.filter(b => {
      return !active.find(c => c.boatId===b.id) && !(b.oos===true||b.oos==='true');
    }).length;
    const cards = catBoats.map(b => {
      const co  = active.find(c => c.boatId===b.id);
      const oos = b.oos===true||b.oos==='true';
      const status = co ? 'out' : (oos ? 'oos' : 'avail');
      return `<div class="${status==='avail'?'':''}">` +
        renderBoatCard(b, {
          status, checkoutData: co,
          onClick: status==='avail' ? `launchBoatById('${b.id}')` : null,
        }) + '</div>';
    }).join('');
    const catId = 'mcat-'+cat.replace(/\s+/g,'_');
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:4px 16px;margin-bottom:8px">
      <div class="boat-cat-toggle" onclick="toggleBoatCat('${catId}')">
        <span class="bct-label">${boatEmoji(cat)} <span style="text-transform:capitalize">${esc(cat)}</span></span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="bct-count">${s("staff.availCount",{n:avail})}</span>
          <span class="bct-arrow" id="${catId}-arrow">▼</span>
        </span>
      </div>
      <div class="boat-cat-body" id="${catId}">
        <div class="boat-cat-grid">${cards}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleBoatCat(id) {
  const body  = document.getElementById(id);
  const arrow = document.getElementById(id+'-arrow');
  const open  = body.classList.toggle('open');
  arrow?.classList.toggle('open', open);
}

// ══ ACTIVE CHECKOUTS ═════════════════════════════════════════════════════════
function renderActiveCheckouts() {
  const el   = document.getElementById('activeList');
  const mine = checkouts.filter(c =>
    c.status==='out' && c.memberKennitala === user.kennitala
  );
  if (!mine.length) { el.innerHTML='<div class="empty-note">No active checkouts.</div>'; return; }
  el.innerHTML = mine.map(c =>
    renderCheckoutCard(c, {
      onReturn: `openReturnModal('${c.id}')`,
    })
  ).join('');
}

// ══ TRIPS TAB — recent 24h, add as crew ══════════════════════════════════════
async function loadTripsTab() {
  const el = document.getElementById('clubTrips');
  try {
    const res = await apiGet('getTrips', { limit: 120 });
    allTrips   = res.trips || [];
    tripsLoaded = true;
    renderRecentTrips();
  } catch(e) {
    el.innerHTML=`<div class="empty-note" style="color:var(--red)">${s("toast.loadFailed")}</div>`;
  }
}

function renderRecentTrips() {
  const el      = document.getElementById('clubTrips');
  const now     = Date.now();
  const cutoff  = now - 24*60*60*1000;
  const todayStr= new Date().toISOString().slice(0,10);
  const yestStr = new Date(now-86400000).toISOString().slice(0,10);

  const recent = allTrips.filter(t => {
    if (!t.date) return false;
    if (t.date !== todayStr && t.date !== yestStr) return false;
    if (t.timeIn) {
      const ts = new Date(t.date+'T'+t.timeIn).getTime();
      if (!isNaN(ts) && ts < cutoff) return false;
    }
    return true;
  });

  if (!recent.length) { el.innerHTML='<div class="empty-note">${s("member.noTrips")}</div>'; return; }

  el.innerHTML = recent.map(t => {
    const isMe = String(t.kennitala||'') === String(user.kennitala);
    const roleTag = isMe
      ? `<span style="font-size:9px;background:var(--brass)22;color:var(--brass);
          border:1px solid var(--brass)44;border-radius:8px;padding:1px 6px">SKIPPER</span>`
      : `<span style="font-size:9px;background:var(--surface);color:var(--muted);
          border:1px solid var(--border);border-radius:8px;padding:1px 6px">Add as crew →</span>`;
    return `<div class="pub-trip" onclick="${isMe?'void 0':`openCrewModal('${esc(t.id)}')`}"
      style="cursor:${isMe?'default':'pointer'}">
      <div class="pub-trip-head">
        <div>
          <div class="pub-trip-date">${esc(t.date||'—')}</div>
          <div class="pub-trip-title">${esc(t.boatName||'—')} · ${esc(t.locationName||'—')}</div>
          <div class="pub-trip-meta">
            <span>${esc(t.timeOut||'')}–${esc(t.timeIn||'')}</span>
            <span>${(parseFloat(t.hoursDecimal)||0).toFixed(1)}h</span>
            <span>👥 ${esc(t.crew||1)}</span>
            ${t.beaufort ? `<span>💨 Bft ${esc(t.beaufort)}</span>` : ''}
          </div>
          ${t.memberName ? `<div style="font-size:10px;color:var(--muted);margin-top:4px">${s("member.skipper")}: ${esc(t.memberName)}</div>` : ''}
        </div>
        <div>${roleTag}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Crew modal ────────────────────────────────────────────────────────────────
function openCrewModal(tripId) {
  const t = allTrips.find(x => x.id === tripId);
  if (!t) return;
  pendingCrewTrip = t;
  document.getElementById('crewTripSummary').innerHTML =
    `<div style="font-weight:500">${esc(t.boatName||'—')} · ${esc(t.locationName||'—')}</div>
     <div style="color:var(--muted);margin-top:4px">${esc(t.date||'')} · ${esc(t.timeOut||'')}–${esc(t.timeIn||'')} · ${(parseFloat(t.hoursDecimal)||0).toFixed(1)}h</div>
     <div style="color:var(--muted);font-size:11px;margin-top:3px">Skipper: ${esc(t.memberName||'—')}</div>`;
  document.getElementById('crewNotes').value = '';
  document.getElementById('crewErr').style.display = 'none';
  openModal('crewModal');
}

async function submitCrewLog() {
  const t   = pendingCrewTrip;
  const err = document.getElementById('crewErr');
  if (!t) return;
  try {
    await apiPost('saveTrip', {
      kennitala:   user.kennitala,
      memberName:  user.name,
      memberId:    user.id || user.kennitala,
      date:        t.date,
      boatId:      t.boatId,
      boatName:    t.boatName,
      locationId:  t.locationId,
      locationName:t.locationName,
      timeOut:     t.timeOut,
      timeIn:      t.timeIn,
      hoursDecimal:t.hoursDecimal,
      crew:        t.crew,
      beaufort:    t.beaufort,
      windDir:     t.windDir,
      notes:       document.getElementById('crewNotes').value.trim(),
      role:        'crew',
      isLinked:    true,
      linkedCheckoutId: t.id,
    });
    closeModal('crewModal');
    logbookLoaded = false;  // invalidate cache
    showMsg('✓ Added to your logbook as crew.','ok');
  } catch(e) { err.textContent='Error: '+e.message; err.style.display='block'; }
}

// ══ LOGBOOK TAB ══════════════════════════════════════════════════════════════
async function loadLogbookTab() {
  const el = document.getElementById('logbookList');
  try {
    const res = await apiGet('getTrips', { kennitala: user.kennitala, limit: 200 });
    myTrips     = (res.trips||[]).sort((a,b) => b.date>a.date?1:-1);
    logbookLoaded = true;
    renderStats();
    renderLogbook();
  } catch(e) {
    el.innerHTML=`<div class="empty-note" style="color:var(--red)">Could not load logbook.</div>`;
  }
}

function renderStats() {
  const now  = new Date();
  const year = now.getFullYear();
  const season = myTrips.filter(t => (t.date||'').startsWith(String(year)));
  const hours  = myTrips.reduce((s,t) => s+(parseFloat(t.hoursDecimal)||0), 0);

  // Most-sailed boat
  const boatCount = {};
  myTrips.forEach(t => { if (t.boatName) boatCount[t.boatName] = (boatCount[t.boatName]||0)+1; });
  const topBoat = Object.entries(boatCount).sort(([,a],[,b])=>b-a)[0];

  document.getElementById('stTrips').textContent  = myTrips.length;
  document.getElementById('stHours').textContent  = hours.toFixed(0)+'h';
  document.getElementById('stBoat').textContent   = topBoat ? topBoat[0] : '—';
  document.getElementById('stSeason').textContent = season.length;
}

function renderLogbook() {
  const el = document.getElementById('logbookList');
  if (!myTrips.length) { el.innerHTML='<div class="empty-note">${s("member.noTrips")}</div>'; return; }
  el.innerHTML = myTrips.map(t => {
    const roleTag = (t.role==='crew')
      ? `<span style="font-size:9px;color:var(--muted)">${s("member.crewRole")}/span>` : '';
    return `<div class="trip-row" onclick="openTripDetail('${esc(t.id)}')">
      <div class="trip-label">${esc(t.boatName||'—')} · ${esc(t.locationName||'—')}${roleTag}</div>
      <div class="trip-sub">
        ${esc(t.date||'—')} · ${esc(t.timeOut||'')}–${esc(t.timeIn||'')} ·
        ${(parseFloat(t.hoursDecimal)||0).toFixed(1)}h ·
        ${t.beaufort ? `💨 Bft ${esc(t.beaufort)}` : ''}
        ${t.verified&&t.verified!=='false' ? ' · ✓ verified' : ''}
      </div>
    </div>`;
  }).join('');
}

function openTripDetail(id) {
  const t = myTrips.find(x => x.id===id);
  if (!t) return;
  document.getElementById('tdTitle').textContent = (t.boatName||'Trip') + ' · ' + (t.date||'');
  const rows = [
    [s("lbl.boat"),     t.boatName||'—'],
    [s("lbl.location"), t.locationName||'—'],
    [s("lbl.date"),     t.date||'—'],
    [s("member.departed"), t.timeOut||'—'],
    [s("member.returned"), t.timeIn||'—'],
    [s("member.duration"),   (parseFloat(t.hoursDecimal)||0).toFixed(1)+'h'],
    [s("lbl.crew"),     t.crew||1],
    t.beaufort ? ['Wind',    `Bft ${t.beaufort}${t.windDir?' · '+t.windDir:''}`] : null,
    t.notes ? ['Notes',    t.notes] : null,
    [s("lbl.role"),     t.role||s("member.skipper")],
    [s("lbl.status"),     (t.verified&&t.verified!=='false') ? s("lbl.verified") : s("lbl.pending")],
    t.staffComment ? ['Staff note', t.staffComment] : null,
  ].filter(Boolean);
  document.getElementById('tdBody').innerHTML = rows.map(([l,v]) =>
    `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)44;font-size:12px">
      <span style="font-size:9px;color:var(--muted);letter-spacing:.8px;width:80px;flex-shrink:0;padding-top:2px">${esc(l.toUpperCase())}</span>
      <span style="flex:1;color:var(--text)">${esc(String(v))}</span>
    </div>`
  ).join('');
  openModal('tripDetailModal');
}

// ══ CERTIFICATIONS TAB ═══════════════════════════════════════════════════════
async function loadCertsTab() {
  const el = document.getElementById('certsList');
  try {
    const [mRes, cfgRes] = await Promise.all([
      apiGet('getMember', { kennitala: user.kennitala }),
      apiGet('getConfig'),
    ]);
    certDefs    = certDefsFromConfig(cfgRes.certDefs||[]);
    certsLoaded = true;
    const member = mRes.member || mRes;
    const certs  = enrichMemberCerts(parseJson(member.certifications,[]), certDefs);
    if (!certs.length) {
      el.innerHTML='<div class="empty-note">${s("cert.noCerts")}</div>'; return;
    }
    // Group by cert definition
    const grouped = {};
    certs.forEach(c => {
      const key = c.def?.name || c.certId;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(c);
    });
    el.innerHTML = Object.entries(grouped).map(([name, items]) => `
      <div class="cert-section">
        <div class="cert-section-title">${esc(name)}</div>
        <div>${items.map(certBadgeHTML).join('')}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML=`<div class="empty-note" style="color:var(--red)">Could not load certifications.</div>`;
  }
}

// ══ LAUNCH / RETURN (stubs — wire to shared/boats.js flow) ═══════════════════
function openLaunchPicker() { openModal('launchModal'); renderLaunchPicker(); }
function launchBoatById(id) { launchBoat = boats.find(b=>b.id===id)||null; openModal('launchModal'); renderLaunchPicker(id); }
function openReturnModal(coId) { returnCo = checkouts.find(c=>c.id===coId)||null; openModal('returnModal'); renderReturnForm(); }
function openCheckInPicker() {
  const mine = checkouts.filter(c=>c.status==='out'&&c.memberKennitala===user.kennitala);
  if (!mine.length) { showMsg('No active checkouts to check in.','warn'); return; }
  if (mine.length===1) { openReturnModal(mine[0].id); return; }
  openModal('returnModal');
  document.getElementById('returnModalBody').innerHTML =
    mine.map(c=>`<button class="btn btn-secondary" style="width:100%;margin-bottom:8px;text-align:left"
      onclick="openReturnModal('${c.id}')">⛵ ${esc(c.boatName)} — out since ${esc((c.checkedOutAt||c.timeOut||'').slice(0,5))}</button>`).join('');
}

function renderLaunchPicker(preselectedBoatId) {
  const active  = checkouts.filter(c=>c.status==='out');
  const avail   = boats.filter(b=>!active.find(c=>c.boatId===b.id)&&!(b.oos===true||b.oos==='true'));
  if (!avail.length) {
    document.getElementById('launchModalBody').innerHTML='<div class="empty-note">No boats currently available.</div>'; return;
  }
  // If we have a preselected boat, show the checklist/confirm form
  const selected = preselectedBoatId ? avail.find(b=>b.id===preselectedBoatId) : null;
  if (selected) {
    renderLaunchForm(selected);
  } else {
    // Show boat picker
    const grouped={};
    avail.forEach(b=>{ const cat=(b.category||'other').toLowerCase(); if(!grouped[cat])grouped[cat]=[]; grouped[cat].push(b); });
    document.getElementById('launchModalBody').innerHTML =
      Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([cat,catBoats])=>
        `<div style="margin-bottom:12px">
          <div style="font-size:9px;color:var(--muted);letter-spacing:1.2px;margin-bottom:6px;text-transform:uppercase">${boatEmoji(cat)} ${esc(cat)}</div>
          ${catBoats.map(b=>`<button class="btn btn-secondary" style="width:100%;margin-bottom:6px;text-align:left"
            onclick="renderLaunchForm(boats.find(x=>x.id==='${b.id}'))">
            ⛵ ${esc(b.name)}</button>`).join('')}
        </div>`
      ).join('');
  }
}

function renderLaunchForm(boat) {
  if (!boat) return;
  launchBoat = boat;
  document.getElementById('launchModalTitle').textContent = 'Launch — ' + boat.name;
  const cat = (boat.category||'dinghy').toLowerCase();
  const CHECKLISTS = {
    dinghy:   ['Life jacket fitted and fastened','Buoyancy aid for each crew member','Rudder and tiller attached correctly','Centreboard / daggerboard present','Mainsheet and jib sheets uncoiled','Bailer and paddle on board','Check forecast — conditions acceptable'],
    keelboat: ['Life jackets for all crew','Engine fuel & oil levels checked','Engine starts and in neutral','Navigation lights operational','VHF radio on and charged','Flares in date and accessible','Safety tether / harness available','MOB equipment ready','Lines and fenders stowed','Check forecast — conditions acceptable'],
    catamaran:['Life jackets for all crew','Both hulls dry — no ingress','Trampoline secure — no damage','Both rudder assemblies fitted','Both centreboards / foils checked','Mainsheet and traveller free','Check forecast — conditions acceptable'],
    kayak:    ['Paddle float and spare paddle','Spray deck fitted correctly','Dry bag with emergency kit','Whistle and light attached','Check forecast — conditions acceptable'],
  };
  const checklist = CHECKLISTS[cat] || CHECKLISTS.dinghy;
  document.getElementById('launchModalBody').innerHTML = `
    <div style="font-size:9px;color:var(--muted);letter-spacing:1.2px;margin-bottom:10px">PRE-LAUNCH CHECKLIST</div>
    <div style="margin-bottom:14px">
      ${checklist.map((item,i)=>`
        <label style="display:flex;align-items:center;gap:10px;padding:6px 0;
          border-bottom:1px solid var(--border)44;cursor:pointer;font-size:12px">
          <input type="checkbox" id="cl_${i}" style="width:15px;height:15px;accent-color:var(--green)">
          ${esc(item)}
        </label>`).join('')}
    </div>
    <div class="field">
      <label>Location</label>
      <select id="launchLocation">${locations.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}</select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Departure</label><input type="time" id="launchTimeOut" value="${new Date().toTimeString().slice(0,5)}"></div>
      <div class="field"><label>Est. return</label><input type="time" id="launchReturnBy"></div>
    </div>
    <div class="field">
      <label>Crew (incl. yourself)</label>
      <div style="display:flex;align-items:center;gap:12px">
        <button type="button" onclick="adjLaunchCrew(-1)"
          style="width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);font-size:16px;cursor:pointer">−</button>
        <span id="launchCrewNum" style="width:24px;text-align:center;font-size:16px">1</span>
        <button type="button" onclick="adjLaunchCrew(1)"
          style="width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);font-size:16px;cursor:pointer">+</button>
      </div>
    </div>
    <div id="launchErr" class="msg msg-err" style="display:none;margin-bottom:8px"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="renderLaunchPicker()">← Back</button>
      <button class="btn btn-primary"   onclick="submitLaunch()">Launch ⛵</button>
    </div>`;
  window._launchCrewCount = 1;
}

function adjLaunchCrew(d) {
  window._launchCrewCount = Math.max(1, Math.min(20, (window._launchCrewCount||1)+d));
  document.getElementById('launchCrewNum').textContent = window._launchCrewCount;
}

async function submitLaunch() {
  const err = document.getElementById('launchErr');
  const lid = document.getElementById('launchLocation')?.value;
  const tout= document.getElementById('launchTimeOut')?.value;
  const ret = document.getElementById('launchReturnBy')?.value;
  if (!lid) { err.textContent='Select a location.'; err.style.display='block'; return; }
  const location = locations.find(l=>l.id===lid)||{};
  const snap = (typeof wxSnapshot==='function') ? wxSnapshot(currentWx) : null;
  try {
    await apiPost('saveCheckout',{
      memberKennitala:user.kennitala, memberName:user.name,
      boatId:launchBoat.id, boatName:launchBoat.name, boatCategory:launchBoat.category||'',
      locationId:lid, locationName:location.name||lid,
      checkedOutAt:tout, expectedReturn:ret,
      crew:window._launchCrewCount||1,
      memberPhone:user.phone||'', memberIsMinor:user.isMinor||false,
      guardianName:user.guardianName||'', guardianPhone:user.guardianPhone||'',
      wxSnapshot:snap,
    });
    checkouts = (await apiGet('getActiveCheckouts')).checkouts||[];
    closeModal('launchModal');
    renderActiveCheckouts();
    renderFleetByCat();
    showMsg('✓ Safe sailing!','ok');
  } catch(e) { err.textContent='Error: '+e.message; err.style.display='block'; }
}

function renderReturnForm() {
  const co = returnCo;
  if (!co) return;
  document.getElementById('returnModalBody').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:12px 14px;margin-bottom:14px;font-size:12px">
      <div style="font-weight:500">${esc(co.boatName||'—')}</div>
      <div style="color:var(--muted);margin-top:3px">
        Departed ${esc((co.checkedOutAt||co.timeOut||'').slice(0,5))} · ${esc(co.locationName||'—')}
      </div>
    </div>
    <div class="field">
      <label>Return time</label>
      <input type="time" id="retTimeIn" value="${new Date().toTimeString().slice(0,5)}">
    </div>
    <div class="field">
      <label>Any damage to report?</label>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button class="btn btn-secondary" id="dmgNone" onclick="setDamage(false)"
          style="flex:1;border-color:var(--green)55;color:var(--green)">✓ No damage</button>
        <button class="btn btn-secondary" id="dmgYes"  onclick="setDamage(true)"
          style="flex:1;border-color:var(--orange)55;color:var(--orange)">⚠ Report issue</button>
      </div>
    </div>
    <div id="damageFields" style="display:none;margin-top:10px">
      <div class="field"><label>Description</label>
        <textarea id="dmgDesc" rows="2" style="width:100%;font-size:12px;resize:vertical"></textarea></div>
      <div class="field"><label>Severity</label>
        <select id="dmgSev">
          <option value="low">Low — cosmetic</option>
          <option value="medium">Medium — affects sailing</option>
          <option value="high">High — unsafe</option>
          <option value="critical">Critical — do not use</option>
        </select>
      </div>
    </div>
    <div id="retErr" class="msg msg-err" style="display:none;margin-top:8px"></div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn btn-secondary" onclick="closeModal('returnModal')">Cancel</button>
      <button class="btn btn-primary"   onclick="submitReturn('${co.id}')">✓ Check In</button>
    </div>`;
  window._reportDamage = false;
}

function setDamage(yes) {
  window._reportDamage = yes;
  document.getElementById('dmgNone').style.fontWeight = yes ? '' : 'bold';
  document.getElementById('dmgYes').style.fontWeight  = yes ? 'bold' : '';
  document.getElementById('damageFields').style.display = yes ? '' : 'none';
}

async function submitReturn(coId) {
  const timeIn = document.getElementById('retTimeIn')?.value;
  const err    = document.getElementById('retErr');
  const co     = checkouts.find(c=>c.id===coId);
  if (!co) return;
  try {
    await apiPost('checkIn',{ id:coId, timeIn,
      kennitala:user.kennitala, memberName:user.name,
      boatId:co.boatId, boatName:co.boatName,
      locationId:co.locationId, locationName:co.locationName,
      checkedOutAt:co.checkedOutAt||co.timeOut,
      launchBeaufort:currentWx?.bft ? String(currentWx.bft) : '',
      launchWindDir:currentWx?.dir || '',
      launchWaveHeight:currentWx?.wv!=null ? String(currentWx.wv) : '',
    });
    if (window._reportDamage) {
      const desc = document.getElementById('dmgDesc')?.value.trim();
      const sev  = document.getElementById('dmgSev')?.value;
      if (desc) {
        await apiPost('saveMaintenance',{
          category:'boat', boatId:co.boatId, boatName:co.boatName,
          reportedByKt:user.kennitala, reportedBy:user.name,
          description:desc, severity:sev, checkoutId:coId, source:'member-checkin',
        });
      }
    }
    checkouts = (await apiGet('getActiveCheckouts')).checkouts||[];
    closeModal('returnModal');
    renderActiveCheckouts();
    renderFleetByCat();
    logbookLoaded = false;
    showMsg(window._reportDamage?'✓ Return logged. Damage report submitted.':'✓ Safe return logged.','ok');
  } catch(e) { err.textContent='Error: '+e.message; err.style.display='block'; }
}

// ══ MANUAL TRIP ═══════════════════════════════════════════════════════════════
function openManualTripModal() {
  document.getElementById('rDate').value    = new Date().toISOString().slice(0,10);
  document.getElementById('rTimeOut').value = '';
  document.getElementById('rTimeIn').value  = '';
  document.getElementById('rNotes').value   = '';
  document.getElementById('manualTripErr').style.display='none';
  openModal('manualTripModal');
}

async function submitManualTrip() {
  const err   = document.getElementById('manualTripErr');
  const date  = document.getElementById('rDate').value;
  const bid   = document.getElementById('rBoat').value;
  const lid   = document.getElementById('rLocation').value;
  const tout  = document.getElementById('rTimeOut').value;
  const tin   = document.getElementById('rTimeIn').value;
  if (!date||!bid) { err.textContent='Date and boat are required.'; err.style.display='block'; return; }
  const boat     = boats.find(b=>b.id===bid)||{};
  const location = locations.find(l=>l.id===lid)||{};
  const h = tout&&tin ? ((new Date('2000-01-01T'+tin).getTime()-new Date('2000-01-01T'+tout).getTime())/3600000) : 0;
  try {
    await apiPost('saveTrip',{
      kennitala:user.kennitala, memberName:user.name, memberId:user.id||user.kennitala,
      date, boatId:bid, boatName:boat.name||bid,
      locationId:lid, locationName:location.name||lid,
      timeOut:tout, timeIn:tin,
      hoursDecimal: h>0 ? h.toFixed(2) : '',
      notes:document.getElementById('rNotes').value.trim(),
      role:'skipper',
    });
    closeModal('manualTripModal');
    logbookLoaded=false;
    showMsg('✓ Trip saved to logbook.','ok');
  } catch(e) { err.textContent='Error: '+e.message; err.style.display='block'; }
}

// ══ FORM SELECTS ══════════════════════════════════════════════════════════════
function populateFormSelects() {
  ['rBoat','manualBoat'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = '<option value="">Select…</option>';
    boats.forEach(b => {
      const o=document.createElement('option'); o.value=b.id; o.textContent=b.name; sel.appendChild(o);
    });
  });
  ['rLocation','manualLoc'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = '<option value="">Select…</option>';
    locations.forEach(l => {
      const o=document.createElement('option'); o.value=l.id; o.textContent=l.name; sel.appendChild(o);
    });
  });
  // Also populate the manual trip modal selects
  const rBoat = document.getElementById('rBoat');
  const rLoc  = document.getElementById('rLocation');
  if (rBoat) { rBoat.innerHTML='<option value="">Select…</option>'; boats.forEach(b=>{const o=document.createElement('option');o.value=b.id;o.textContent=b.name;rBoat.appendChild(o);}); }
  if (rLoc)  { rLoc.innerHTML='<option value="">Select…</option>';  locations.forEach(l=>{const o=document.createElement('option');o.value=l.id;o.textContent=l.name;rLoc.appendChild(o);}); }
}
</script>
