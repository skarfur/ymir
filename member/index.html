<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-src https://calendar.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Member Hub</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/guests.js" defer></script>
<script src="../shared/weather.js" defer></script>
<script src="../shared/tides.js" defer></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/volunteer.js" defer></script>
<script src="../shared/qr.js" defer></script>
<link rel="stylesheet" href="member.css">
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div class="fw-500" style="font-size:16px;color:var(--text)" id="welcomeName">Member Hub</div>
    <div class="text-sm text-muted mt-2" id="welcomeSub"></div>
  </div>

  <!-- ══ WEATHER WIDGET ══ -->
  <div class="wx-widget mb-14" id="wxWidget">
    <div class="text-muted text-sm" style="padding:6px 0" data-s="wx.loading"></div>
  </div>

  <!-- ══ TIDE WIDGET ══ -->
  <div id="tideWidget" class="mb-14"></div>

    <!-- ══ QUICK ACTION STRIP ══ -->
  <div class="member-actions">
    <button class="act-btn act-btn--launch" data-member-click="openLaunchPicker"  data-s="member.launchBoat"></button>
    <button class="act-btn act-btn--report" data-member-click="openStandaloneReport" data-s="member.reportIssue"></button>
    <a class="act-btn act-btn--logbook" id="logbookBtn" href="../logbook/"    data-s="nav.logbook"></a>
    <a class="act-btn act-btn--sauma" id="saumaBtn" href="../saumaklubbur/" data-s="nav.saumaklubbur"></a>
    <a class="act-btn act-btn--volunteer" id="volunteerBtn" href="../volunteer/" data-s="nav.volunteer"></a>
    <a class="act-btn act-btn--captain d-none" id="captainQBtn" href="../captain/" data-s="nav.captainQuarters"></a>
    <a class="act-btn act-btn--coxswain d-none" id="coxswainBtn" href="../coxswain/" data-s="nav.coxswainSeat"></a>
  </div>

  <!-- ══ ACTIVE CHECKOUTS ══ -->
  <div class="section-label" style="letter-spacing:1.5px;margin:4px 0 8px">
    <span data-s="member.myCheckout"></span>
    <span style="font-weight:normal;font-size:8px;letter-spacing:0"> — <span data-s="member.myCheckoutSub"></span></span>
  </div>
  <div id="activeList"><div class="empty-note" data-s="lbl.loading"></div></div>

  <!-- ═══ FLEET ═══ -->
  <div id="tab-fleet" class="mt-16">
    <div class="section-label mb-10" style="letter-spacing:1.5px" data-s="member.fleetAvail"></div>
    <div id="fleetStatus"></div>
  </div>

  <!-- ═══ CLUB CALENDARS ═══ -->
  <div id="clubCalendarSection" class="mt-16">
    <div class="section-label mb-10" style="letter-spacing:1.5px" data-s="member.calTitle"></div>
    <div id="clubCalendarList"></div>
  </div>

</div>

<!-- ══ MANUAL TRIP MODAL ══ -->
<div class="modal-overlay hidden" id="manualTripModal" data-member-close-self="manualTripModal">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div class="modal-header">
      <h3 id="manualTripTitle"></h3>
      <button class="modal-close-x" data-member-close="manualTripModal">×</button>
    </div>
    <div class="field"><label data-s="lbl.date"></label><input type="date" id="rDate"></div>
    <div class="grid2 gap-10">
      <div class="field"><label data-s="lbl.boat"></label><select id="rBoat"><option value="" id="rBoatOpt"></option></select></div>
      <div class="field"><label data-s="lbl.location"></label><select id="rLocation"><option value="" id="rLocOpt"></option></select></div>
    </div>
    <div class="grid2 gap-10">
      <div class="field"><label id="rDepartedLabel"></label><input type="text" id="rTimeOut" pattern="[0-9]{2}:[0-9]{2}" placeholder="HH:MM" maxlength="5" style="width:90px"></div>
      <div class="field"><label id="rReturnedLabel"></label><input type="text" id="rTimeIn"  pattern="[0-9]{2}:[0-9]{2}" placeholder="HH:MM" maxlength="5" style="width:90px"></div>
    </div>
    <div class="field"><label data-s="lbl.notes"></label><input type="text" id="rNotes"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-member-close="manualTripModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary"   data-member-click="submitManualTrip"            id="manualTripSaveBtn"></button>
    </div>
    <div id="manualTripErr" class="msg msg-err mt-8 d-none"></div>
  </div>
</div>

<!-- ══ LAUNCH MODAL ══ -->
<div class="modal-overlay hidden" id="launchModal" data-member-close-self="launchModal">
  <div class="modal" style="max-width:640px;max-height:92vh;overflow-y:auto">
    <div class="modal-header">
      <h3 id="launchModalTitle"></h3>
      <button class="modal-close-x" data-member-close="launchModal">×</button>
    </div>
    <div id="launchModalBody"></div>
  </div>
</div>

<!-- ══ RETURN MODAL ══ -->
<div class="modal-overlay hidden" id="returnModal" data-member-close-self="returnModal">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div class="modal-header">
      <h3 id="returnModalTitle"></h3>
      <button class="modal-close-x" data-member-close="returnModal">×</button>
    </div>
    <div id="returnModalBody"></div>
  </div>
</div>

<!-- ══ REPORT ISSUE MODAL ══ -->
<div class="modal-overlay hidden" id="reportModal" data-member-close-self="reportModal">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div class="modal-header">
      <h3 id="reportModalTitle">Report Issue</h3>
      <button class="modal-close-x" data-member-close="reportModal">&times;</button>
    </div>
    <div id="reportModalBody"></div>
  </div>
</div>

<!-- Guest prompt is rendered by shared/guests.js; invoked via openGuestPrompt(). -->

<script src="member.js" defer></script>
</body>
</html>
