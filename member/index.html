<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Member Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/weather.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/certs.js"></script>
<style>
/* ── Quick-action header strip ── */
.member-actions { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.member-actions .act-btn {
  flex:1; min-width:100px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; cursor:pointer; font-family:inherit;
  font-size:11px; color:var(--text); text-align:center; text-decoration:none;
  transition:border-color .15s,background .15s; display:block;
}
.member-actions .act-btn:hover { border-color:var(--brass); background:var(--card); }

/* ── Tabs ── */
.hub-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:14px; overflow-x:auto; }
.hub-tab  { padding:10px 16px; border:none; background:none; color:var(--muted);
  font-family:inherit; font-size:11px; letter-spacing:.8px; cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; transition:color .15s; }
.hub-tab.active { color:var(--brass); border-bottom-color:var(--brass); }

/* ── Boat category section ── */
.boat-cat-toggle { display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; cursor:pointer; user-select:none; border-bottom:1px solid var(--border)44; }
.boat-cat-toggle:hover .bct-label { color:var(--brass); }
.bct-label { font-size:11px; font-weight:500; }
.bct-count { font-size:10px; color:var(--muted); }
.bct-arrow { font-size:10px; color:var(--muted); transition:transform .2s; }
.bct-arrow.open { transform:rotate(180deg); }
.boat-cat-body { display:none; padding:8px 0 4px; }
.boat-cat-body.open { display:block; }
.boat-cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }

/* ── Active checkouts ── */
.co-meta  { flex:1; min-width:0; }
.co-title { font-size:12px; font-weight:500; color:var(--text); }
.co-sub   { font-size:10px; color:var(--muted); margin-top:2px; }

/* ── Recent trips ── */
.pub-trip { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
.pub-trip:hover { border-color:var(--brass); }
.pub-trip-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.pub-trip-date  { font-size:10px; color:var(--brass); margin-bottom:2px; }
.pub-trip-title { font-size:12px; font-weight:500; }
.pub-trip-meta  { font-size:11px; color:var(--muted); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }

/* ── Logbook ── */
.trip-row { padding:10px 0; border-bottom:1px solid var(--border)44; font-size:13px; cursor:pointer; }
.trip-row:last-child { border-bottom:none; }
.trip-row:hover { background:var(--faint); margin:0 -4px; padding:10px 4px; border-radius:4px; }
.trip-label { font-weight:500; }
.trip-sub   { font-size:11px; color:var(--muted); margin-top:3px; }

/* ── Stats card ── */
.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 12px; text-align:center; }
.stat-box .sn { font-size:24px; color:var(--brass); font-weight:500; }
.stat-box .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Cert badges ── */
.cert-section { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:12px; }
.cert-section-title { font-size:9px; color:var(--muted); letter-spacing:1.2px; margin-bottom:10px; }
/* ── Inline report form styles ── */
.cat-btns { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.cat-btn { flex:1; min-width:80px; padding:8px 6px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:11px; font-family:inherit; cursor:pointer; text-align:center; transition:all .15s; }
.cat-btn.selected, .cat-btn:hover { border-color:var(--brass); color:var(--brass); background:var(--brass)11; }
.sev-btns { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.sev-btn { flex:1; min-width:60px; padding:7px 4px; border-radius:6px; border:1px solid; font-size:11px; font-family:inherit; cursor:pointer; text-align:center; font-weight:600; letter-spacing:.4px; transition:all .15s; }
.sev-btn[data-sev="low"]      { color:var(--green);  border-color:var(--green)55;  background:var(--green)11;  }
.sev-btn[data-sev="medium"]   { color:var(--yellow); border-color:var(--yellow)55; background:var(--yellow)11; }
.sev-btn[data-sev="high"]     { color:var(--orange); border-color:var(--orange)55; background:var(--orange)11; }
.sev-btn[data-sev="critical"] { color:var(--red);    border-color:var(--red)55;    background:var(--red)11;    }
.sev-btn.selected { filter:brightness(1.4); box-shadow:0 0 0 2px currentColor; }
.ir-type-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:4px; }
/* ── Fleet status (shared with staff page) ─────────────────────────── */
.fleet-status-block { margin-bottom:4px; }
.fsb-header { display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-radius:6px;background:var(--surface);transition:background .15s;border-left:3px solid transparent; }
.fsb-header:hover { background:var(--surface2,#132233); }
.fsb-emoji { font-size:14px;flex-shrink:0; }
.fsb-label { font-size:12px;color:var(--muted);flex:1;text-transform:uppercase;letter-spacing:.04em; }
.fsb-bar-wrap { width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden; }
.fsb-bar { height:100%;border-radius:3px;transition:width .3s; }
.fsb-count { font-size:12px;font-weight:bold;min-width:32px;text-align:right; }
.fsb-count.has-avail { color:var(--green); }
.fsb-count.none-avail { color:var(--muted); }
.fsb-arrow { font-size:11px;color:var(--muted); }
.fsb-body { padding:4px 0; }
.fleet-cat-grid { display:flex;flex-wrap:wrap;gap:6px;padding:4px; }
.bc-card { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px; }
.bc-avail { border-left:3px solid #2ecc71;cursor:pointer; }
.bc-avail:hover { background:var(--surface2,#132233); }
.bc-out { border-left:3px solid var(--brass); }
.bc-overdue { border-left:3px solid var(--red); }
.bc-oos { opacity:.5; }
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div style="max-width:720px;margin:0 auto;padding:16px 16px 60px">

  <div style="margin-bottom:14px">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="welcomeName">Member Hub</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px" id="welcomeSub"></div>
  </div>

  <!-- ══ WEATHER WIDGET ══ -->
  <div class="wx-widget" id="wxWidget" style="margin-bottom:10px">
    <div style="color:var(--muted);font-size:11px;padding:6px 0" data-s="wx.loading"></div>
  </div>

  <!-- ══ QUICK ACTION STRIP ══ -->
  <div class="member-actions">
    <button class="act-btn" onclick="openLaunchPicker()"  data-s="member.launchBoat"></button>
    <a class="act-btn" href="../maintenance/?new=1"        data-s="member.reportIssue"></a>
    <a class="act-btn" href="../weather/"             data-s="nav.weather"></a>
    <a class="act-btn" href="../logbook/"             data-s="nav.logbook"></a>
  </div>

  <!-- ══ ACTIVE CHECKOUTS ══ -->
  <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin:4px 0 8px">
    <span data-s="member.myCheckout"></span>
    <span style="font-weight:normal;font-size:8px;letter-spacing:0"> — <span data-s="member.myCheckoutSub"></span></span>
  </div>
  <div id="activeList"><div class="empty-note" data-s="lbl.loading"></div></div>

  <!-- ══ TABS ══ -->
  <div class="hub-tabs" style="margin-top:16px">
    <button class="hub-tab active" onclick="showTab('fleet')"   id="tabBtnFleet"   data-s="member.tabFleet"></button>
    <button class="hub-tab"        onclick="showTab('trips')"   id="tabBtnTrips"   data-s="member.tabTrips"></button>
    <button class="hub-tab"        onclick="showTab('logbook')" id="tabBtnLogbook" data-s="member.tabLogbook"></button>
    <button class="hub-tab"        onclick="showTab('certs')"   id="tabBtnCerts"   data-s="member.tabCerts"></button>
  </div>

  <!-- ═══ TAB: FLEET ═══ -->
  <div id="tab-fleet">
    <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:10px" data-s="member.fleetAvail"></div>
    <div id="fleetByCat"></div>
  </div>

  <!-- ═══ TAB: LOG A RECENT TRIP ═══ -->
  <div id="tab-trips" class="hidden">
    <p style="font-size:11px;color:var(--muted);margin:0 0 12px;line-height:1.5" id="tripTabHint"></p>
    <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:8px" data-s="member.recentTrips"></div>
    <div id="clubTrips"><div class="empty-note" data-s="lbl.loading"></div></div>
    <div style="margin-top:12px">
      <button class="btn btn-secondary" style="width:100%" onclick="openManualTripModal()" data-s="member.logManual"></button>
    </div>
  </div>

  <!-- ═══ TAB: LOGBOOK ═══ -->
  <div id="tab-logbook" class="hidden">
    <div class="stats-grid" id="logbookStats">
      <div class="stat-box"><div class="sn" id="stTrips">—</div><div class="sl" data-s="member.statTrips"></div></div>
      <div class="stat-box"><div class="sn" id="stHours">—</div><div class="sl" data-s="member.statHours"></div></div>
      <div class="stat-box"><div class="sn" id="stBoat">—</div> <div class="sl" data-s="member.statBoat"></div></div>
      <div class="stat-box"><div class="sn" id="stSeason">—</div><div class="sl" data-s="member.statSeason"></div></div>
    </div>
    <div id="logbookList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ═══ TAB: CERTIFICATIONS ═══ -->
  <div id="tab-certs" class="hidden">
    <div id="certsList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

</div><!-- /container -->

<!-- ══ TRIP DETAIL MODAL ══ -->
<div class="modal-overlay hidden" id="tripDetailModal" onclick="if(event.target===this)closeModal('tripDetailModal')">
  <div class="modal" style="max-width:440px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="tdTitle">Trip</h3>
      <button class="btn-ghost" onclick="closeModal('tripDetailModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="tdBody" style="font-size:13px"></div>
  </div>
</div>

<!-- ══ ADD AS CREW MODAL ══ -->
<div class="modal-overlay hidden" id="crewModal" onclick="if(event.target===this)closeModal('crewModal')">
  <div class="modal" style="max-width:400px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="crewModalTitle"></h3>
      <button class="btn-ghost" onclick="closeModal('crewModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="crewTripSummary" style="background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12px"></div>
    <div class="field">
      <label data-s="lbl.notes"></label>
      <input type="text" id="crewNotes">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('crewModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary"   onclick="submitCrewLog()"         id="crewSubmitBtn"></button>
    </div>
    <div id="crewErr" class="msg msg-err" style="display:none;margin-top:8px"></div>
  </div>
</div>

<!-- ══ MANUAL TRIP MODAL ══ -->
<div class="modal-overlay hidden" id="manualTripModal" onclick="if(event.target===this)closeModal('manualTripModal')">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="manualTripTitle"></h3>
      <button class="btn-ghost" onclick="closeModal('manualTripModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div class="field">
      <label data-s="lbl.date"></label>
      <input type="date" id="rDate">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label data-s="lbl.boat"></label>
        <select id="rBoat"><option value="" id="rBoatOpt"></option></select></div>
      <div class="field"><label data-s="lbl.location"></label>
        <select id="rLocation"><option value="" id="rLocOpt"></option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label id="rDepartedLabel"></label><input type="text" id="rTimeOut" pattern="[0-9]{2}:[0-9]{2}" placeholder="HH:MM" maxlength="5" style="width:90px"></div>
      <div class="field"><label id="rReturnedLabel"></label><input type="text" id="rTimeIn"  pattern="[0-9]{2}:[0-9]{2}" placeholder="HH:MM" maxlength="5" style="width:90px"></div>
    </div>
    <div class="field">
      <label data-s="lbl.notes"></label>
      <input type="text" id="rNotes">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('manualTripModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary"   onclick="submitManualTrip()"            id="manualTripSaveBtn"></button>
    </div>
    <div id="manualTripErr" class="msg msg-err" style="display:none;margin-top:8px"></div>
  </div>
</div>

<!-- ══ LAUNCH MODAL ══ -->
<div class="modal-overlay hidden" id="launchModal" onclick="if(event.target===this)closeModal('launchModal')">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="launchModalTitle"></h3>
      <button class="btn-ghost" onclick="closeModal('launchModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="launchModalBody"></div>
  </div>
</div>

<!-- ══ RETURN MODAL ══ -->
<div class="modal-overlay hidden" id="returnModal" onclick="if(event.target===this)closeModal('returnModal')">
  <div class="modal" style="max-width:480px;max-height:92vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="returnModalTitle"></h3>
      <button class="btn-ghost" onclick="closeModal('returnModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div id="returnModalBody"></div>
  </div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
const user = requireAuth();
let boats=[], locations=[], checkouts=[], myTrips=[], allTrips=[];
let certDefs=[], currentWx=null;
let launchBoat=null, returnCo=null, pendingCrewTrip=null;
let tripsLoaded=false, logbookLoaded=false, certsLoaded=false;
const L = getLang();

// ══ INIT ═════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  buildHeader('member');
  applyStrings(); // ← FIXED: was applystrings() (wrong case)

  document.getElementById('welcomeName').textContent = user.name || s('member.tabFleet');
  document.getElementById('welcomeSub').textContent  = user.kennitala || '';

  // Wire modal titles and dynamic labels
  document.getElementById('launchModalTitle').textContent  = s('member.launchTitle');
  document.getElementById('returnModalTitle').textContent  = s('member.checkInTitle');
  document.getElementById('manualTripTitle').textContent   = s('member.manualTrip');
  document.getElementById('crewModalTitle').textContent    = s('member.addAsCrew');
  document.getElementById('crewSubmitBtn').textContent     = s('member.addAsCrew');
  document.getElementById('manualTripSaveBtn').textContent = s('btn.save');
  document.getElementById('rBoatOpt').textContent          = s('lbl.selectDots');
  document.getElementById('rLocOpt').textContent           = s('lbl.selectDots');
  document.getElementById('rDepartedLabel').textContent    = s('member.departed');
  document.getElementById('rReturnedLabel').textContent    = s('member.returned');
  document.getElementById('crewNotes').placeholder         = s('lbl.optional');
  document.getElementById('rNotes').placeholder            = s('lbl.optional');

  // Trip tab hint
  document.getElementById('tripTabHint').textContent = s('member.tripsTapHint');

  wxWidget(document.getElementById('wxWidget'), {
    onData: snap => { currentWx = snap; },
  }).start();

  try {
    const [coRes, cfgRes] = await Promise.all([
      apiGet('getActiveCheckouts'),
      apiGet('getConfig'),
    ]);
    checkouts = coRes.checkouts || [];
    boats     = (cfgRes.boats     || []).filter(b => b.active !== false && b.active !== 'false');
    locations = (cfgRes.locations || []).filter(l => l.active !== false && l.active !== 'false');
    if (cfgRes.launchChecklists && Object.keys(cfgRes.launchChecklists).length) {
      _launchChecklists = Object.assign({}, DEFAULT_LAUNCH_CHECKLISTS, cfgRes.launchChecklists);
    }

    populateFormSelects();
    renderActiveCheckouts();
    renderFleetByCat();
  } catch(e) {
    document.getElementById('activeList').innerHTML =
      `<div class="empty-note" style="color:var(--red)">${s('toast.loadFailed')}: ${esc(e.message)}</div>`;
  }

  warmContainer();
});

// ══ TAB SWITCHING ════════════════════════════════════════════════════════════
function showTab(name) {
  ['fleet','trips','logbook','certs'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== name);
    document.getElementById('tabBtn'+t.charAt(0).toUpperCase()+t.slice(1))
      ?.classList.toggle('active', t === name);
  });
  if (name === 'trips'   && !tripsLoaded)   loadTripsTab();
  if (name === 'logbook' && !logbookLoaded) loadLogbookTab();
  if (name === 'certs'   && !certsLoaded)   loadCertsTab();
}

// ══ FLEET BY CATEGORY ════════════════════════════════════════════════════════
function renderFleetByCat() {
  const active = checkouts.filter(c => c.status === 'out');
  renderFleetStatus('fleetByCat', boats, active, {
    onAvailClick: 'launchBoatById',
    toggleFn:     'toggleFleetCat',
    collapsed:    true,
  });
}

function toggleCat(el) { toggleFleetCat(el); }
function toggleFleetCat(toggle) {
  const targetId = toggle.dataset.target;
  const body  = targetId ? document.getElementById(targetId) : toggle.nextElementSibling;
  const arrow = toggle.querySelector('.fsb-arrow,.bct-arrow,.fct-arrow');
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : '';
  if (arrow) arrow.textContent = isOpen ? '▾' : '▴';
}

// ══ ACTIVE CHECKOUTS ═════════════════════════════════════════════════════════
function renderActiveCheckouts() {
  const el   = document.getElementById('activeList');
  const mine = checkouts.filter(c => c.status==='out' && c.memberKennitala===user.kennitala);
  if (!mine.length) { el.innerHTML = `<div class="empty-note">${s('member.noCheckouts')}</div>`; return; }
  boatRegistry.setCos(mine);
  el.innerHTML = mine.map(c =>
    renderCheckoutCard(c, {
      isMe: true,
      staffView: false,
      onReturn: `openReturnModal('${c.id}')`,
    })
  ).join('');
}

// ══ TRIPS TAB ════════════════════════════════════════════════════════════════
async function loadTripsTab() {
  const el = document.getElementById('clubTrips');
  el.innerHTML = '<div class="empty-note"><span class="spinner"></span></div>';
  try {
    const today = new Date().toISOString().slice(0,10);
    const res   = await apiGet('getTrips', { date: today, limit: 50 });
    allTrips    = (res.trips||[]).sort(function(a,b) { return (a.timeOut||"") > (b.timeOut||"") ? -1 : 1; });
    tripsLoaded = true;
    renderClubTrips();
  } catch(e) {
    el.innerHTML = '<div class="empty-note" style="color:var(--red)">' + s('toast.loadFailed') + ': ' + esc(e.message) + '</div>';
  }
}

function renderClubTrips() {
  const el = document.getElementById('clubTrips');
  if (!allTrips.length) { el.innerHTML = '<div class="empty-note">' + s('member.noRecent') + '</div>'; return; }

  // Helper: parse wx snapshot from a trip record
  function parseWxBadge(trip) {
    var wx = null;
    if (trip.wxSnapshot) { try { wx = typeof trip.wxSnapshot==='string' ? JSON.parse(trip.wxSnapshot) : trip.wxSnapshot; } catch(e){} }
    if (!wx && !trip.beaufort) return "";
    var flags = { green:"🟢", yellow:"🟡", orange:"🟠", red:"🔴" };
    if (wx) {
      var flag  = wx.flag ? (flags[wx.flag]||"") : "";
      var wind  = (wx.dir||"") + (wx.ws!=null ? " "+wx.ws+"m/s" : "") + (wx.bft!=null ? " Bft"+wx.bft : "");
      var cond  = wx.cond ? " "+wx.cond.icon : "";
      var waves = wx.wv!=null ? " · 🌊"+wx.wv+"m" : "";
      return '<div style="font-size:11px;color:var(--muted);margin-top:5px">'
           + (flag ? '<span style="font-size:12px;margin-right:4px">'+flag+'</span>' : "")
           + esc(wind.trim()) + cond + waves
           + '</div>';
    }
    // Fallback: just beaufort
    return '<div style="font-size:11px;color:var(--muted);margin-top:5px">💨 Bft ' + esc(trip.beaufort) + (trip.windDir ? " "+esc(trip.windDir) : "") + '</div>';
  }

  el.innerHTML = allTrips.map(function(trip) {
    var isMe = trip.kennitala === user.kennitala || trip.memberKennitala === user.kennitala;
    var roleTag = isMe
      ? '<span style="font-size:9px;background:var(--brass)22;color:var(--brass);border:1px solid var(--brass)44;border-radius:8px;padding:1px 6px">' + (getLang()==='IS'?'Skipari':'Skipper').toUpperCase() + '</span>'
      : '<span style="font-size:9px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:1px 6px">' + s('member.addAsCrew') + ' →</span>';
    var wxBadge = parseWxBadge(trip);
    return '<div class="pub-trip" onclick="' + (isMe ? 'void 0' : 'openCrewModal(\''+esc(trip.id)+'\')') + '"'
         + ' style="cursor:' + (isMe ? 'default' : 'pointer') + '">'
         + '<div class="pub-trip-head">'
         +   '<div style="flex:1;min-width:0">'
         +     '<div class="pub-trip-title">' + esc(trip.boatName||'—') + ' · ' + esc(trip.locationName||'—') + '</div>'
         +     '<div class="pub-trip-meta">'
         +       '<span>' + esc(trip.timeOut||'')+'–'+esc(trip.timeIn||'') + '</span>'
         +       '<span>' + (parseFloat(trip.hoursDecimal)||0).toFixed(1) + 'h</span>'
         +       '<span>👥 ' + esc(trip.crew||1) + '</span>'
         +     '</div>'
         +     wxBadge
         +     (!isMe && trip.memberName ? '<div style="font-size:10px;color:var(--muted);margin-top:3px">' + (getLang()==='IS'?'Skipari':'Skipper') + ': ' + esc(trip.memberName) + '</div>' : '')
         +   '</div>'
         +   '<div style="flex-shrink:0;padding-left:8px">' + roleTag + '</div>'
         + '</div>'
         + '</div>';
  }).join('');
}

function renderStats() {
  const year   = new Date().getFullYear();
  const season = myTrips.filter(t => (t.date||'').startsWith(String(year)));
  const hours  = myTrips.reduce((s,t) => s+(parseFloat(t.hoursDecimal)||0), 0);
  const boatCount = {};
  myTrips.forEach(t => { if (t.boatName) boatCount[t.boatName] = (boatCount[t.boatName]||0)+1; });
  const topBoat = Object.entries(boatCount).sort(([,a],[,b])=>b-a)[0];
  document.getElementById('stTrips').textContent  = myTrips.length;
  document.getElementById('stHours').textContent  = hours.toFixed(0)+'h';
  document.getElementById('stBoat').textContent   = topBoat ? topBoat[0] : '—';
  document.getElementById('stSeason').textContent = season.length;
}

function renderLogbook() {
  const el = document.getElementById('logbookList');

// ── Weather display helpers ─────────────────────────────────────────────────
function _wxSnapHtml(snap) {
  if (!snap) return '<div style="color:var(--muted);font-size:11px">No data</div>';
  var dir   = snap.dir   || snap.wDir     || "";
  var wv    = snap.wv    != null ? snap.wv    : snap.waveH;
  var tc    = snap.tc    != null ? snap.tc    : snap.airT;
  var feels = snap.feels != null ? snap.feels : snap.apparentT;
  var fi = { green:"🟢", yellow:"🟡", orange:"🟠", red:"🔴" };
  var rows = [];
  if (snap.flag)               rows.push([fi[snap.flag]||"", snap.flag.toUpperCase()]);
  if (snap.bft  != null)       rows.push(["💨", dir+" "+(snap.ws!=null?snap.ws+"m/s ":"")+"Bft"+snap.bft+(snap.wg!=null?" (gusts "+snap.wg+"m/s)":"")]);
  if (wv   != null)            rows.push(["🌊", wv+"m"+(snap.waveDir?" "+snap.waveDir:"")]);
  if (tc   != null)            rows.push(["🌡", tc+"°C"+(feels!=null?" / feels "+feels+"°C":"")]);
  if (snap.sst  != null)       rows.push(["🌊", "Sea "+snap.sst+"°C"]);
  if (snap.pres != null)       rows.push(["📊", Math.round(snap.pres)+"hPa"+(snap.presTrend?" "+snap.presTrend:"")]);
  if (snap.cond&&snap.cond.desc) rows.push([snap.cond.icon||"", snap.cond.desc]);
  if (!rows.length)            rows.push(["", "No detail available"]);
  return rows.map(function(r) {
    return '<div style="display:flex;gap:6px;font-size:11px;padding:2px 0">' +
      '<span style="width:16px;flex-shrink:0;text-align:center">' + r[0] + '</span>' +
      '<span style="color:var(--text)">' + esc(String(r[1]).trim()) + '</span></div>';
  }).join("");
}

function _updateWxDisplay() {
  var sel   = document.querySelector('[name="wxChoice"]:checked');
  var choice = sel ? sel.value : "checkout";
  var panel  = document.getElementById("wxDetailPanel");
  var snap = null;
  if (choice === "checkout")     snap = window._retCoSnap;
  else if (choice === "now")     snap = currentWx ? wxSnapshot(currentWx) : null;
  else if (choice === "manual") {
    var gn=function(id){var el=document.getElementById(id);return el&&el.value!=""?parseFloat(el.value):null;};
    var gs=function(id){var el=document.getElementById(id);return el?el.value.trim():"";};
    snap={bft:gn("manBft"),dir:gs("manDir"),ws:gn("manWs"),wg:gn("manWg"),
      wv:gn("manWv"),waveDir:gs("manWaveDir"),tc:gn("manTc"),feels:gn("manFeels"),
      pres:gn("manPres"),sst:gn("manSst"),flag:null,cond:null};
  }
  if (panel) panel.innerHTML = _wxSnapHtml(snap);
  var mf = document.getElementById("wxManualFields");
  if (mf) mf.style.display = choice === "manual" ? "grid" : "none";
}


function renderReturnForm() {
  if (!returnCo) return;
  document.getElementById('returnModalTitle').textContent =
    s('member.checkInTitle') + ' â ' + (returnCo.boatName || '');

  var coSnap = returnCo.wxSnapshot
    ? (typeof returnCo.wxSnapshot === 'string'
        ? JSON.parse(returnCo.wxSnapshot)
        : returnCo.wxSnapshot)
    : null;
  var nowSnap = currentWx ? wxSnapshot(currentWx) : null;
  // Fill gaps in coSnap from current wx where fields are missing
  if (coSnap && nowSnap) {
    var fill = ["waveDir","sst","feels","pres","presTrend","cond"];
    fill.forEach(function(k) {
      if (coSnap[k] == null && nowSnap[k] != null) coSnap[k] = nowSnap[k];
    });
  }
  window._retCoSnap = coSnap;
  window._retTimeIn = null;
  window._retWxSnap = null;

  function shortDesc(sn) {

function advanceToChecklist() {
  var retEl = document.getElementById('retTimeIn');
  window._retTimeIn = retEl && /^[0-9]{2}:[0-9]{2}$/.test(retEl.value) ? retEl.value : fmtTimeNow();
  var sel = document.querySelector('[name="wxChoice"]:checked');
  var wxC = sel ? sel.value : 'checkout';
  if (wxC === 'checkout') {
    window._retWxSnap = window._retCoSnap || null;
  } else if (wxC === 'now') {
    window._retWxSnap = currentWx ? wxSnapshot(currentWx) : null;
  } else {
    var mn = function (id) { var el = document.getElementById(id); return el && el.value !== '' ? parseFloat(el.value) : null; };
    var ms = function (id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
    window._retWxSnap = {
      bft: mn('manBft'), dir: ms('manDir'), ws: mn('manWs'), wg: mn('manWg'),
      wv: mn('manWv'), waveDir: ms('manWaveDir'), tc: mn('manTc'), feels: mn('manFeels'),
      pres: mn('manPres'), sst: mn('manSst'), flag: null, cond: null
    };
  }
  renderLandingChecklist();
}

function openInlineReport(type) {
  document.getElementById('returnModalTitle').textContent =
    type === 'damage' ? 'Report Damage' : 'Report Incident';

  var body = type === 'damage'
    ? _maintFormHtml()
    : _incidentFormHtml();

  document.getElementById('returnModalBody').innerHTML =
    body +
    '<div id="irErr" class="msg msg-err" style="display:none;margin-bottom:8px"></div>' +
    '<div class="btn-row">' +
      '<button class="btn btn-secondary" onclick="renderLandingChecklist()">&#8592; Back</button>' +
      '<button class="btn btn-primary" onclick="submitInlineReport(\'' + type + '\')">Submit</button>' +
    '</div>';

  // Auto-select cat after rendering
  if (type === 'damage') {
    setTimeout(function () {
      _irSelectCat('boat');
      var boatSel = document.getElementById('irBoat');
      if (boatSel && returnCo && returnCo.boatId) boatSel.value = returnCo.boatId;
    }, 0);

}

async function submitInlineReport(type) {
  var errEl = document.getElementById('irErr');
  var desc  = (document.getElementById('irDesc') || {}).value || '';
  if (!desc.trim()) {
    errEl.textContent = 'Description required.'; errEl.style.display = 'block'; return;
  }
  var co = returnCo;
  try {
    if (type === 'damage') {
      var cat  = window._irCat || 'boat';
      var sev  = window._irSev || 'medium';
      var bid  = cat === 'boat' ? ((document.getElementById('irBoat') || {}).value || co.boatId || '') : '';
      var bnm  = cat === 'boat' ? (boats.find(function(b){return b.id===bid;})||{name:co.boatName||''}).name : '';
      var item = cat !== 'boat' ? ((document.getElementById('irItem') || {}).value || '') : '';
      var part = (document.getElementById('irPart') || {}).value || '';
      await apiPost('saveMaintenance', {
        category: cat, boatId: bid, boatName: bnm, itemName: item,
        part: part, severity: sev, description: desc,
        markOos: false, reportedBy: user.name, source: 'member-checkin',
      });
    } else {
      var types = Array.from(document.querySelectorAll('.ir-type-box:checked')).map(function(el){return el.value;});
      if (!types.length) types = ['other'];
      var sev2 = window._irSev || 'medium';
      var irBoat = document.getElementById('irIncBoat');
      var irBoatId = irBoat ? irBoat.value : (co.boatId||'');
      var irBoatName = irBoatId ? (boats.find(function(b){return b.id===irBoatId;})||{name:''}).name : '';
      await apiPost('createIncident', {
        types: types, severity: sev2, description: desc,
        boatId: irBoatId, boatName: irBoatName,
        location: (document.getElementById('irLocation')||{}).value||'',
        involvedPersons: (document.getElementById('irPeople')||{}).value||'',
        injuries: (document.getElementById('irInjuries')||{}).value||'',
        actionTaken: (document.getElementById('irAction')||{}).value||'',
        handoffNotes: (document.getElementById('irHandoff')||{}).value||'',
        reportedBy: user.name, source: 'member-checkin',
      });
    }
    renderLandingChecklist();
    setTimeout(function () {
      var note = document.getElementById('reportFlagNote');
      if (note) {
        note.textContent = type === 'damage' ? '\u2713 Damage report submitted.' : '\u2713 Incident report submitted.';
        note.style.color = 'var(--green)'; note.style.display = 'block';
      }
    }, 50);
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message; errEl.style.display = 'block';
  }
}

async function confirmCheckIn(coId) {
  var boxes = document.querySelectorAll('.land-check');
  if (boxes.length && !Array.from(boxes).every(function (b) { return b.checked; })) {
    document.getElementById('landCheckErr').style.display = 'block'; return;
  }
  var timeIn   = window._retTimeIn || fmtTimeNow();
  var tripSnap = window._retWxSnap || null;
  var notes    = (document.getElementById('retNotes') || {}).value || '';
  var co = checkouts.find(function (c) { return c.id === coId; });
  if (!co) return;
  var tout  = (co.checkedOutAt || co.timeOut || '').slice(0, 5);
  var h     = (tout && timeIn) ? ((new Date('2000-01-01T' + timeIn) - new Date('2000-01-01T' + tout)) / 3600000) : 0;
  var today = new Date().toISOString().slice(0, 10);
  var errEl = document.getElementById('landCheckErr');
  try {
    await apiPost('checkIn', {
      id: coId, timeIn, kennitala: user.kennitala,
      memberName: user.name, boatId: co.boatId, boatName: co.boatName,
    });
    await apiPost('saveTrip', {
      kennitala: user.kennitala, memberName: user.name, memberId: user.id || user^kennitala,
      date: today, boatId: co.boatId, boatName: co.boatName,
      locationId: co.locationId || '', locationName: co.locationName || '',
      timeOut: tout, timeIn, hoursDecimal: h > 0 ? h.toFixed(2) : '0', crew: co.crew || 1,
      beaufort:   tripSnap ? tripSnap.bft : null,
      windDir:    tripSnap ? (tripSnap.dir || tripSnap.wDir || '') : '',
      wxSnapshot: tripSnap ? JSON.stringify(tripSnap) : null,
      notes, role: 'skipper', linkedCheckoutId: coId,
    });
    checkouts = (await apiGet('getActiveCheckouts')).checkouts || [];
    closeModal('returnModal');
    renderActiveCheckouts(); renderFleetByCat();
    logbookLoaded = false;
    showToast(s('toast.checkedIn'));
  } catch (e) {
    if (errEl) { errEl.textContent = s('toast.error') + ': ' + e.message; errEl.style.display = 'block'; }
  }
}

  document.getElementById('rTimeOut').value = '';
  document.getElementById('rTimeIn').value  = '';
  document.getElementById('rNotes').value   = '';
  document.getElementById('manualTripErr').style.display = 'none';
  openModal('manualTripModal');
}

async function submitManualTrip() {
  const err   = document.getElementById('manualTripErr');
  const date  = document.getElementById('rDate').value;
  const bid   = document.getElementById('rBoat').value;
  const lid   = document.getElementById('rLocation').value;
  const tout  = document.getElementById('rTimeOut').value;
  const tin   = document.getElementById('rTimeIn').value;
  if (!date||!bid) { err.textContent = s('lbl.date')+' + '+s('lbl.boat')+' required.'; err.style.display='block'; return; }
  const boat     = boats.find(b=>b.id===bid)||{};
  const location = locations.find(l=>l.id===lid)||{};
  const h = tout&&tin ? ((new Date('2000-01-01T'+tin).getTime()-new Date('2000-01-01T'+tout).getTime())/3600000) : 0;
  try {
    await apiPost('saveTrip',{
      kennitala:user.kennitala, memberName:user.name, memberId:user.id||user.kennitala,
      date, boatId:bid, boatName:boat.name||bid,
      locationId:lid, locationName:location.name||lid,
      timeOut:tout, timeIn:tin,
      hoursDecimal: h>0 ? h.toFixed(2) : '',
      notes:document.getElementById('rNotes').value.trim(),
      role:'skipper',
    });
    closeModal('manualTripModal');
    logbookLoaded = false;
    showToast(s('toast.saved'));
  } catch(e) { err.textContent = s('toast.error')+': '+e.message; err.style.display='block'; }
}

function populateFormSelects() {

  boats.forEach(b=>{ const o=document.createElement('option'); o.value=b.id; o.textContent=b.name; rBoat.appendChild(o); });
  locations.forEach(l=>{ const o=document.createElement('option'); o.value=l.id; o.textContent=l.name; rLoc.appendChild(o); });
}

function parseJson(v, fallback) {
  if (!v) return fallback;
  try { return typeof v==='string' ? JSON.parse(v) : v; } catch(e) { return fallback; }
}

  _afterReturnAction = _afterReturnAction === "incident" ? null : "incident";
  _updateReportBtns();
}
function _updateReportBtns() {
  var dmgBtn = document.querySelector('[onclick="flagDamageReport()"]');
  var incBtn = document.querySelector('[onclick="flagIncidentReport()"]');
  var note   = document.getElementById("reportFlagNote");
  if (dmgBtn) {
    dmgBtn.style.background = _afterReturnAction==="damage" ? "var(--orange)" : "";
    dmgBtn.style.color      = _afterReturnAction==="damage" ? "#fff" : "var(--orange)";
  }
  if (incBtn) {
    incBtn.style.background = _afterReturnAction==="incident" ? "var(--red)" : "";
    incBtn.style.color      = _afterReturnAction==="incident" ? "#fff" : "var(--red)";
  }
  if (note) {
    if (_afterReturnAction === "damage") {
      note.textContent = "⚠ Damage report will open after check-in.";
      note.style.color = "var(--orange)";
      note.style.display = "block";
    } else if (_afterReturnAction === "incident") {
      note.textContent = "🚨 Incident report will open after check-in.";
      note.style.color = "var(--red)";
      note.style.display = "block";
    } else {
      note.style.display = "none";
    }
  }
}
async function submitReturn(coId) {
  var retEl = document.getElementById("retTimeIn");
  var timeIn = retEl && /^[0-9]{2}:[0-9]{2}$/.test(retEl.value) ? retEl.value : fmtTimeNow();
  const err    = document.getElementById('retErr');
  const co     = checkouts.find(c=>c.id===coId);
  if (!co) return;
  // Resolve weather from whichever radio is selected
  var wxChoice = (document.querySelector('[name="wxChoice"]:checked')||{}).value || "checkout";
  var tripSnap = null;
  if (wxChoice === "checkout") {
    tripSnap = window._retCoSnap || null;
  } else if (wxChoice === "now") {
    tripSnap = currentWx ? wxSnapshot(currentWx) : null;
  } else if (wxChoice === "manual") {
    var _mn=function(id){var el=document.getElementById(id);return el&&el.value!=""?parseFloat(el.value):null;};
    var _ms=function(id){var el=document.getElementById(id);return el?el.value.trim():"";};
    tripSnap={bft:_mn("manBft"),dir:_ms("manDir"),ws:_mn("manWs"),wg:_mn("manWg"),
      wv:_mn("manWv"),waveDir:_ms("manWaveDir"),tc:_mn("manTc"),feels:_mn("manFeels"),
      pres:_mn("manPres"),sst:_mn("manSst"),flag:null,cond:null};
  }
  const tout = (co.checkedOutAt||co.timeOut||'').slice(0,5);
  const h    = (tout&&timeIn)
    ? ((new Date('2000-01-01T'+timeIn) - new Date('2000-01-01T'+tout)) / 3600000) : 0;
  const today = new Date().toISOString().slice(0,10);
  try {
    await apiPost('checkIn', { id:coId, timeIn, kennitala:user.kennitala,
      memberName:user.name, boatId:co.boatId, boatName:co.boatName });
    await apiPost('saveTrip', {
      kennitala:user.kennitala, memberName:user.name,
      memberId:user.id||user.kennitala,
      date:today, boatId:co.boatId, boatName:co.boatName,
      locationId:co.locationId||'', locationName:co.locationName||'',
      timeOut:tout, timeIn:timeIn,
      hoursDecimal:h>0 ? h.toFixed(2) : '0',
      crew:co.crew||1,
      beaufort: tripSnap ? tripSnap.bft : null,
      windDir:  tripSnap ? (tripSnap.dir||tripSnap.wDir||'') : '',
      wxSnapshot: tripSnap ? JSON.stringify(tripSnap) : null,
      notes: (document.getElementById('retNotes')||{}).value||'',
      role:'skipper', linkedCheckoutId:coId,
    });
    checkouts = (await apiGet('getActiveCheckouts')).checkouts||[];
    closeModal('returnModal');
    renderActiveCheckouts(); renderFleetByCat();
    logbookLoaded = false;
    showToast(s('toast.checkedIn'));
    // Handle post-return actions
    const action = _afterReturnAction; _afterReturnAction = null;
    if (action === 'damage') {
      const params = new URLSearchParams({ category:'boat', boatId:co.boatId||'', boatName:co.boatName||'' });
      window.location.href = '../maintenance/?new=1&' + params.toString();
    } else if (action === 'incident') {
      window.location.href = '../incidents/';
    }
  } catch(e) {
    err.textContent = s('toast.error')+': '+e.message;
    err.style.display = 'block';
  }
}

// ══ MANUAL TRIP MODAL ════════════════════════════════════════════════════════
function openManualTripModal() {
  document.getElementById('rDate').value    = new Date().toISOString().slice(0,10);
  document.getElementById('rTimeOut').value = '';
  document.getElementById('rTimeIn').value  = '';
  document.getElementById('rNotes').value   = '';
  document.getElementById('manualTripErr').style.display = 'none';
  openModal('manualTripModal');
}

async function submitManualTrip() {
  const err   = document.getElementById('manualTripErr');
  const date  = document.getElementById('rDate').value;
  const bid   = document.getElementById('rBoat').value;
  const lid   = document.getElementById('rLocation').value;
  const tout  = document.getElementById('rTimeOut').value;
  const tin   = document.getElementById('rTimeIn').value;
  if (!date||!bid) { err.textContent = s('lbl.date')+' + '+s('lbl.boat')+' required.'; err.style.display='block'; return; }
  const boat     = boats.find(b=>b.id===bid)||{};
  const location = locations.find(l=>l.id===lid)||{};
  const h = tout&&tin ? ((new Date('2000-01-01T'+tin).getTime()-new Date('2000-01-01T'+tout).getTime())/3600000) : 0;
  try {
    await apiPost('saveTrip',{
      kennitala:user.kennitala, memberName:user.name, memberId:user.id||user.kennitala,
      date, boatId:bid, boatName:boat.name||bid,
      locationId:lid, locationName:location.name||lid,
      timeOut:tout, timeIn:tin,
      hoursDecimal: h>0 ? h.toFixed(2) : '',
      notes:document.getElementById('rNotes').value.trim(),
      role:'skipper',
    });
    closeModal('manualTripModal');
    logbookLoaded = false;
    showToast(s('toast.saved'));
  } catch(e) { err.textContent = s('toast.error')+': '+e.message; err.style.display='block'; }
}

// ══ FORM SELECTS ══════════════════════════════════════════════════════════════
function populateFormSelects() {
  const rBoat = document.getElementById('rBoat');
  const rLoc  = document.getElementById('rLocation');
  boats.forEach(b=>{ const o=document.createElement('option'); o.value=b.id; o.textContent=b.name; rBoat.appendChild(o); });
  locations.forEach(l=>{ const o=document.createElement('option'); o.value=l.id; o.textContent=l.name; rLoc.appendChild(o); });
}

function parseJson(v, fallback) {
  if (!v) return fallback;
  try { return typeof v==='string' ? JSON.parse(v) : v; } catch(e) { return fallback; }
}
