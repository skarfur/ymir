<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
  <title>Ýmir — Admin</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/boats.js" defer></script>
  <script src="../shared/weather.js" defer></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/certs.js" defer></script>
  <script src="../shared/volunteer.js" defer></script>
  <script src="../shared/volunteer-role-presets.js" defer></script>
  <script src="../shared/scheduled-event.js" defer></script>
  <script src="../shared/mcm.js" defer></script>
  <script src="../shared/calendar.js"></script>
  <script src="../shared/boat-modal.js"></script>
  <script src="../shared/slot-modal.js"></script>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="page">
  <ymir-header></ymir-header>

  <main>
    <!-- Top-level tab bar -->
    <div class="tab-bar" id="topTabBar">
      <button class="tab-btn active" data-top="members"  data-admin-click="showTopTab" data-admin-arg="members"  data-s="admin.tabMembers"></button>
      <button class="tab-btn"        data-top="settings" data-admin-click="showTopTab" data-admin-arg="settings" data-s="admin.tabSettings"></button>
      <button class="tab-btn"        data-top="payroll"  data-admin-click="showTopTab" data-admin-arg="payroll"  data-s="admin.tabPayroll"></button>
    </div>

    <!-- ══ TOP: MEMBERS ══════════════════════════════════════════════════════ -->
    <div id="top-members">
      <div id="tab-members">

        <div class="flex-center flex-wrap gap-8 mb-14">
          <div class="search-bar flex-1" style="min-width:200px">
            <input type="text" id="memberSearch" data-admin-input="filterMembers">
          </div>
          <button class="btn btn-secondary" data-admin-click="showMemberSub" data-admin-arg="import" data-s="admin.importCsv"></button>
          <button class="btn btn-primary"   data-admin-click="openMemberModal" data-s="admin.addMember"></button>
        </div>

        <div id="memberSubList">
          <div class="col-section">
            <div class="col-head" data-admin-toggle-section>
              <div class="col-title">MEMBERS <strong id="memberCountLabel"></strong></div>
              <span class="col-toggle">▼</span>
            </div>
            <div class="col-body hidden" id="membersCard">
              <div class="loading-state"><span class="spinner"></span></div>
            </div>
          </div>
        </div>

        <div id="memberSubImport" class="hidden">
          <div class="flex-center gap-10 mb-12">
            <button class="btn-ghost" data-admin-click="showMemberSub" data-admin-arg="list" data-s="admin.backToList"></button>
            <span class="text-md text-muted" data-s="admin.importFromCsv"></span>
          </div>
          <div id="importStep1" data-step="1">
            <div class="import-card">
              <div class="col-hint mb-16">
                <div class="section-label mb-8" data-s="admin.csv.expectedCols"></div>
                <div class="col-hint-row"><span class="col-hint-field" data-s="admin.csv.col.name"></span><span class="col-hint-vals" data-s="admin.csv.col.nameHint"></span></div>
                <div class="col-hint-row"><span class="col-hint-field" data-s="admin.csv.col.kt"></span><span class="col-hint-vals" data-s="admin.csv.col.ktHint"></span></div>
                <div class="col-hint-row"><span class="col-hint-field" data-s="admin.csv.col.email"></span><span class="col-hint-vals" data-s="admin.csv.col.emailHint"></span></div>
                <div class="col-hint-row"><span class="col-hint-field" data-s="admin.csv.col.phone"></span><span class="col-hint-vals" data-s="admin.csv.col.phoneHint"></span></div>
                <div class="col-hint-row"><span class="col-hint-field" data-s="admin.csv.col.dob"></span><span class="col-hint-vals" data-s="admin.csv.col.dobHint"></span></div>
              </div>
              <label class="upload-zone" for="csvFile">
                <div style="font-size:24px">📄</div>
                <div class="text-base fw-500" data-s="admin.csv.dropZone"></div>
                <div class="text-sm text-muted" data-s="admin.csv.encoding"></div>
                <input type="file" id="csvFile" accept=".csv" class="hidden" data-admin-change-el="handleCSVUpload">
              </label>
            </div>
          </div>
          <div id="importStep2" data-step="2" class="hidden">
            <div class="import-card">
              <div class="text-base fw-500 mb-10" data-s="admin.csv.review"></div>
              <div class="text-sm text-muted mb-4" data-s="admin.csv.rolesProtected"></div>
              <div class="import-summary" id="importSummary"></div>
              <div id="importLists"></div>
              <div id="importError" class="text-red text-md mb-8 hidden rounded-4" style="padding:8px;background:color-mix(in srgb, var(--red) 8%, transparent);border:1px solid color-mix(in srgb, var(--red) 27%, transparent)"></div>
              <div class="btn-row mt-14">
                <button class="btn btn-secondary" data-admin-click="resetImport" data-s="admin.backToList"></button>
                <button class="btn btn-primary" data-admin-click="confirmImport" id="confirmImportBtn" data-s="admin.confirmImport"></button>
              </div>
            </div>
          </div>
          <div id="importStep3" data-step="3" class="hidden">
            <div class="import-card" style="text-align:center;padding:36px">
              <div class="mb-10" style="font-size:30px">✓</div>
              <div class="text-lg fw-500 text-green" id="importDoneMsg"></div>
              <div style="margin-top:18px">
                <button class="btn btn-secondary" data-admin-click="resetImport" data-s="admin.csv.importAnother"></button>
                <button class="btn btn-primary ml-auto ml-8" data-admin-click="showMemberSub" data-admin-arg="list" data-s="admin.csv.viewMembers"></button>
              </div>
            </div>
          </div>
        </div>
      </div><!-- /tab-members -->

    </div><!-- /top-members -->

    <!-- ══ TOP: SETTINGS ═════════════════════════════════════════════════════ -->
    <div id="top-settings" class="hidden">
      <!-- Settings inner tab bar (desktop) -->
      <div class="tab-bar" id="settingsTabBar">
        <button class="tab-btn active" data-tab="boats"      data-admin-click="showTab" data-admin-arg="boats"      data-s="admin.tabBoats"></button>
        <button class="tab-btn"        data-tab="locations"  data-admin-click="showTab" data-admin-arg="locations"  data-s="admin.tabLocations"></button>
        <button class="tab-btn"        data-tab="checklists" data-admin-click="showTab" data-admin-arg="checklists" data-s="admin.tabChecklists"></button>
        <button class="tab-btn"        data-tab="scheduling" data-admin-click="showTab" data-admin-arg="scheduling" data-s="admin.tabScheduling"></button>
        <button class="tab-btn"        data-tab="certs"      data-admin-click="showTab" data-admin-arg="certs"      data-s="admin.tabCerts"></button>
        <button class="tab-btn"        data-tab="flags"      data-admin-click="showTab" data-admin-arg="flags"      data-s="admin.tabFlags"></button>
        <button class="tab-btn"        data-tab="alerts"     data-admin-click="showTab" data-admin-arg="alerts"     data-s="admin.tabAlerts"></button>
        <button class="tab-btn"        data-tab="passport"   data-admin-click="showTab" data-admin-arg="passport"   data-s="passport.adminTitle">Rowing Passport</button>
        <button class="tab-btn"        data-tab="handbook"   data-admin-click="showTab" data-admin-arg="handbook"   data-s="admin.tabHandbook"></button>
      </div>
      <!-- Settings tab dropdown (mobile) -->
      <select class="tab-select" id="settingsTabSelect" data-admin-change-val="showTab">
        <option value="boats"      data-s="admin.tabBoats"></option>
        <option value="locations"  data-s="admin.tabLocations"></option>
        <option value="checklists" data-s="admin.tabChecklists"></option>
        <option value="scheduling" data-s="admin.tabScheduling"></option>
        <option value="certs"      data-s="admin.tabCerts"></option>
        <option value="flags"      data-s="admin.tabFlags"></option>
        <option value="alerts"     data-s="admin.tabAlerts"></option>
        <option value="passport"   data-s="passport.adminTitle"></option>
        <option value="handbook"   data-s="admin.tabHandbook"></option>
      </select>

    <!-- ══ BOATS ════════════════════════════════════════════════════════════ -->
    <div id="tab-boats" class="hidden">
      <!-- Boats by category -->
      <div id="boatSections">
        <div class="loading-state"><span class="spinner"></span></div>
      </div>
      <div style="padding:8px 0 4px">
        <button class="btn btn-secondary" data-admin-click="openBoatCatModal" data-s="admin.addCategory"></button>
      </div>
    </div>

    <!-- ══ LOCATIONS ════════════════════════════════════════════════════════ -->
    <div id="tab-locations" class="hidden">
      <div class="col-section">
        <div class="col-head open" data-admin-toggle-section>
          <div class="col-title" data-s="admin.locationsHdr"></div>
          <span class="col-toggle open">▼</span>
        </div>
        <div class="col-body" id="locationsCard">
          <div class="loading-state"><span class="spinner"></span></div>
        </div>
        <div style="padding:8px 0 4px">
          <button class="btn btn-primary" data-admin-click="openLocationModal" data-s="admin.addLocation"></button>
        </div>
      </div>
    </div>

    <!-- ══ CHECKLISTS ═══════════════════════════════════════════════════════ -->
    <div id="tab-checklists" class="hidden">

      <!-- Opening / Closing checklists -->
      <div class="section-label mb-8" data-s="admin.dailyChecklistsHdr"></div>
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.openingChecklist"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden" id="openingCLCard"><div class="loading-state"><span class="spinner"></span></div></div>
      </div>
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.closingChecklist"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden" id="closingCLCard"><div class="loading-state"><span class="spinner"></span></div></div>
      </div>
      <div style="padding:8px 0 12px">
        <button class="btn btn-primary" data-admin-click="openCLModal" data-s="admin.addItem"></button>
      </div>

      <!-- Launch / Landing checklists per category -->
      <div class="section-divider mt-8">
        <div class="section-label mb-12" data-s="admin.launchLandingHdr"></div>
        <div class="flex-center gap-8 mb-8">
          <label class="text-sm text-muted" data-s="admin.categoryColon"></label>
          <select id="launchCLCatFilter" data-admin-change="renderLaunchCLSections"
            class="text-xs" style="padding:3px 28px 3px 8px;width:auto">
          </select>
        </div>
        <div id="launchCLCard">
          <div class="section-label mb-6 text-9" data-s="admin.launchHdr"></div>
          <div id="launchCLLaunchList"></div>
          <div class="section-label mb-6 text-9 mt-12" data-s="admin.landingHdr"></div>
          <div id="launchCLLandingList"></div>
        </div>
        <div style="padding:8px 0 4px">
          <button class="btn btn-primary" data-admin-click="openLaunchCLModal" data-s="admin.addItem"></button>
        </div>
      </div>
    </div>

    <!-- ══ ACTIVITY TYPES ════════════════════════════════════════════════════ -->
    <div id="tab-scheduling" class="hidden">
      <!-- Upcoming events — unified timeline across volunteer events + bulk-scheduled activities.
           "+ Add event" creates a one-off (no parent activity type required); per-type instances
           appear here automatically once a type's bulk schedule has been authored. -->
      <div class="col-section">
        <div class="col-head open" data-admin-toggle-section>
          <div class="col-title" data-s="admin.schedUpcomingHdr"></div>
          <span class="col-toggle open">▼</span>
        </div>
        <div class="col-body" id="schedUpcomingCard">
          <div class="loading-state"><span class="spinner"></span></div>
        </div>
        <div style="padding:8px 0 4px">
          <button class="btn btn-primary" data-admin-click="openVolEventModal" data-s="admin.addOneOffEvent"></button>
        </div>
      </div>

      <!-- Activity types (templates) -->
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.actTypesTitle"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden" id="actTypesCard">
          <div class="loading-state"><span class="spinner"></span></div>
        </div>
        <div style="padding:8px 0 4px">
          <button class="btn btn-primary" data-admin-click="openActTypeModal" data-s="admin.addType"></button>
        </div>
      </div>

      <!-- Club calendars (GCal link registry) -->
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.tabCalendars"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden">
          <div class="text-xs text-muted mb-10" style="line-height:1.5" data-s="admin.calDesc"></div>
          <div id="clubCalList"></div>
          <button class="btn btn-secondary mt-8" data-admin-click="addClubCalRow" data-admin-arg="" data-admin-arg2="" data-s="admin.calAdd"></button>
          <div class="d-flex gap-8 items-center mt-12">
            <button class="btn btn-primary" data-admin-click="saveClubCalendars" data-s="btn.save"></button>
            <span id="clubCalSaveMsg" class="text-xs"></span>
          </div>
        </div>
      </div>

      <!-- Reservation slots — slots projected from activity-type schedules,
           plus any manually-created singles or recurring overrides. -->
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.tabReservations"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden">
          <div class="text-xs text-muted mb-10" style="line-height:1.5" data-s="admin.chartersDesc"></div>
          <div class="d-flex items-center gap-10 mb-10 flex-wrap">
            <select id="slotCatFilter" data-admin-change="loadSlotCalendar" class="filter-select"></select>
            <select id="slotBoatFilter" data-admin-change="renderSlotCalendar" class="filter-select">
              <option value="" data-s="slot.allBoats">All boats</option>
            </select>
            <div class="slot-week-nav">
              <button class="btn btn-secondary" data-admin-click="shiftSlotWeek" data-admin-arg="-1">&larr;</button>
              <span id="slotWeekLabel" class="week-label"></span>
              <button class="btn btn-secondary" data-admin-click="shiftSlotWeek" data-admin-arg="1">&rarr;</button>
              <button class="btn btn-secondary" data-admin-click="slotWeekToday" data-s="slot.today">Today</button>
            </div>
          </div>
          <div id="slotCalGrid" style="overflow-x:auto"></div>
          <div class="mt-8 d-flex gap-12 text-10 text-muted flex-wrap">
            <span><span class="d-inline-block bg-surface border-muted" style="width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendOpen">Open</span></span>
            <span><span class="d-inline-block" style="width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendBooked">Booked</span></span>
          </div>
          <details class="mt-12">
            <summary class="text-xs text-muted cursor-pointer" data-s="admin.manualSlotAdd">Add slot manually</summary>
            <div class="d-flex gap-8 mt-8 flex-wrap">
              <button class="btn btn-secondary" data-s="slot.addSingle" data-s-attr="title" data-admin-click="openNewSlotModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="12" cy="15.5" r="1.8" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.addSingle">+ Single</span></button>
              <button class="btn btn-secondary" data-s="slot.addRecurring" data-s-attr="title" data-admin-click="openRecurringSlotModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="18" r="1" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.addRecurring">+ Recurring</span></button>
            </div>
          </details>
        </div>
      </div>

      <!-- Reservation calendar sync — Ymir mirrors bookings to these GCals. -->
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.gcalSyncHdr"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden">
          <div class="grid2">
            <div>
              <div class="text-xs fw-600 mb-4" data-s="admin.rowingCal"></div>
              <div class="field">
                <label for="charterRowingCalId" data-s="admin.calendarId"></label>
                <input type="text" id="charterRowingCalId" placeholder="e.g. abc123@group.calendar.google.com">
              </div>
              <div class="check-row">
                <input type="checkbox" id="charterRowingCalActive">
                <label for="charterRowingCalActive" data-s="admin.syncRowing"></label>
              </div>
            </div>
            <div>
              <div class="text-xs fw-600 mb-4" data-s="admin.keelboatCal"></div>
              <div class="field">
                <label for="charterKeelboatCalId" data-s="admin.calendarId"></label>
                <input type="text" id="charterKeelboatCalId" placeholder="e.g. xyz789@group.calendar.google.com">
              </div>
              <div class="check-row">
                <input type="checkbox" id="charterKeelboatCalActive">
                <label for="charterKeelboatCalActive" data-s="admin.syncKeelboat"></label>
              </div>
            </div>
          </div>
          <div class="d-flex gap-8 items-center mt-8">
            <button class="btn btn-primary" data-admin-click="saveCharterCalendars" data-s="admin.saveCalSettings"></button>
            <span id="charterCalSaveMsg" class="text-xs"></span>
          </div>
          <div class="text-10 text-muted mt-6" data-s="admin.ymirOnlyTouchesOwn"></div>
        </div>
      </div>
    </div>

    <!-- ══ CERTIFICATIONS ════════════════════════════════════════════════════ -->
    <div id="tab-certs" class="hidden">

      <!-- Credential Categories -->
      <div class="col-section">
        <div class="col-head" data-admin-toggle-section>
          <div class="col-title" data-s="admin.certCategoriesTitle"></div>
          <span class="col-toggle">▼</span>
        </div>
        <div class="col-body hidden" id="certCatsCard">
          <div class="loading-state"><span class="spinner"></span></div>
        </div>
        <div style="padding:8px 0 4px" class="hidden" id="certCatsAddWrap">
          <div class="d-flex gap-8 items-center flex-wrap">
            <input type="text" id="newCatInputEN" placeholder="Name (EN)" class="flex-1 text-md" style="min-width:120px">
            <input type="text" id="newCatInputIS" placeholder="Nafn (IS)" class="flex-1 text-md" style="min-width:120px">
            <button class="btn btn-primary btn-sm" data-admin-click="addCertCategory" data-s="admin.addBtn"></button>
          </div>
        </div>
      </div>

      <!-- Credential Types -->
      <div class="col-section">
        <div class="col-head open" data-admin-toggle-section>
          <div class="col-title" data-s="admin.credentialsTitle"></div>
          <span class="col-toggle open">▼</span>
        </div>
        <div class="col-body" id="certDefsCard">
          <div class="loading-state"><span class="spinner"></span></div>
        </div>
        <div style="padding:12px 0 4px">
          <button class="btn btn-primary" data-admin-click="openCertDefModal" data-s="admin.certAddType"></button>
        </div>
      </div>

    </div>

    <!-- ══ ALERT SETTINGS ═══════════════════════════════════════════════════ -->
    <div id="tab-alerts" class="hidden">
      <div class="col-section">
        <div class="col-head open" data-admin-toggle-section>
          <div class="col-title">⚠️ <span data-s="admin.overdueAlerts"></span></div>
          <span class="col-toggle open">▼</span>
        </div>
        <div class="col-body" id="alertsCard">
          <div class="grid2 mb-14">
            <div class="field">
              <label data-s="admin.alertFirstMins" for="alertFirstMins"></label>
              <input type="number" id="alertFirstMins" min="1" max="999" value="30">
            </div>
            <div class="field">
              <label data-s="admin.alertRepeatMins" for="alertRepeatMins"></label>
              <input type="number" id="alertRepeatMins" min="1" max="999" value="15">
            </div>
            <div class="field">
              <label data-s="admin.alertSnoozeMins" for="alertSnoozeMins"></label>
              <input type="number" id="alertSnoozeMins" min="1" max="999" value="10">
            </div>
            <div class="field flex-center gap-8" style="padding-top:20px">
              <input type="checkbox" id="alertEnabled" checked>
              <label for="alertEnabled" data-s="admin.alertEnabled"></label>
            </div>
          </div>
          
          <div class="section-divider">
            <div class="text-sm fw-500 text-muted mb-10" style="letter-spacing:.5px" data-s="admin.notifyChannelsHdr"></div>
            <div class="flex-col gap-8 mb-14">
              <label class="check-label text-md"><input type="checkbox" id="chanWeb" checked><span data-s="admin.channelWeb"></span></label>
              <label class="check-label text-md"><input type="checkbox" id="chanEmail"><span>✉️ Email <span class="text-xs text-muted" data-s="admin.requiresBackend"></span></span></label>
              <label class="check-label text-md"><input type="checkbox" id="chanSms"><span>📱 SMS <span class="text-xs text-muted" data-s="admin.requiresBackend"></span></span></label>
            </div>
            <div class="field mb-10">
              <label class="text-sm" data-s="admin.emailRecipients"></label>
              <textarea id="alertEmailList" rows="2" class="text-sm w-full" style="resize:vertical" placeholder="person@club.is, other@club.is"></textarea>
            </div>
            <div class="field mb-14">
              <label class="text-sm" for="alertSmsList" data-s="admin.smsRecipients"></label>

        <input type="checkbox" id="veShowPhone"> <label for="veShowPhone" data-s="admin.volShowPhone"></label>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="admin.volNotes"></label><textarea id="veNotes" rows="2" class="w-full bg-surface border-muted rounded-4 font-inherit text-xs" style="box-sizing:border-box;color:var(--text);padding:5px 7px;resize:vertical"></textarea></div>
      <div class="field"><label data-s="admin.volNotesIS" for="veNotesIS"></label><textarea id="veNotesIS" rows="2" class="w-full bg-surface border-muted rounded-4 font-inherit text-xs" style="box-sizing:border-box;color:var(--text);padding:5px 7px;resize:vertical"></textarea></div>
    </div>
    <details class="border-muted rounded-6 mb-10" style="padding:10px 12px">
      <summary class="d-flex items-center justify-between" style="cursor:pointer;list-style:none">
        <span class="text-9 text-muted" style="letter-spacing:1px">
          <span data-s="admin.reservedBoats"></span>
          <span id="veBoatCount" class="text-muted" style="letter-spacing:0;text-transform:none"></span>
        </span>
        <span class="text-10 text-muted" data-s="admin.reservedBoatsHint" style="text-transform:none;letter-spacing:0"></span>
      </summary>
      <div id="veBoatPicker" class="d-flex gap-6 flex-wrap mt-8"></div>
    </details>
    <div class="mt-10">
      <div class="d-flex items-center justify-between mb-6 gap-8 flex-wrap">
        <label class="text-10 text-muted" style="letter-spacing:.8px" data-s="admin.volRoles" for="ccLabelEN"></label>
        <div class="d-flex gap-6 items-center flex-wrap">
          <select id="veRolePresetPicker" data-admin-preset-change="addVolRoleFromPreset" class="filter-select"></select>
          <button class="btn btn-secondary text-xs" style="padding:4px 10px" data-admin-click="addVolRoleRow" data-s="btn.add"></button>
        </div>
      </div>
      <div id="volRolesList"></div>
    </div>
    <div class="btn-row mt-14">
      <button class="btn btn-secondary" data-admin-close="volEventModal" data-s="btn.cancel"></button>
      <button class="btn btn-danger hidden icon-btn" id="veDeleteBtn" data-admin-click="deleteVolEvent" data-icon="trash-2" data-s-aria="btn.delete" data-s-title="btn.delete"></button>
      <button class="btn btn-primary" data-admin-click="saveVolEvent" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- Credential category modal -->
<div class="modal-overlay hidden" id="certCatModal" data-admin-close-self>
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 id="certCatModalTitle" data-s="admin.certCatModal.edit"></h3>
      <button class="modal-close-x" data-admin-close="certCatModal">&times;</button>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="admin.nameEN"></label><input type="text" id="ccLabelEN"></div>
      <div class="field"><label data-s="admin.nameIS" for="ccLabelIS"></label><input type="text" id="ccLabelIS"></div>

    <div class="field">
      <label data-s="admin.keyAutoSet" for="ccKey"></label>
      <input type="text" id="ccKey" readonly class="text-muted">
    </div>
    <div class="text-xs text-muted mb-10" data-s="admin.certCatKeyHint"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-admin-close="certCatModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-admin-click="saveCertCat" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- Credential type modal -->
<div class="modal-overlay hidden" id="certDefModal" data-admin-close-self>
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="certDefModalTitle" data-s="admin.certDefModal.add"></h3>
      <button class="modal-close-x" data-admin-close="certDefModal">&times;</button>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="admin.nameEN" for="cdNameEN"></label><input type="text" id="cdNameEN"></div>
      <div class="field"><label data-s="admin.nameIS" for="cdNameIS"></label><input type="text" id="cdNameIS"></div>
    </div>
    <div class="grid2">
      <div class="field">
        <label for="cdDescEN"><span data-s="admin.certDescEN"></span> <span class="text-muted" style="font-weight:normal" data-s="admin.certDescOptional"></span></label>
        <textarea id="cdDescEN" rows="2" class="w-full text-base" style="resize:vertical"></textarea>
      </div>
      <div class="field">
        <label for="cdDescIS"><span data-s="admin.certDescIS"></span> <span class="text-muted" style="font-weight:normal" data-s="admin.certDescOptional"></span></label>
        <textarea id="cdDescIS" rows="2" class="w-full text-base" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="field" id="cdCategoryField">
      <label data-s="admin.certDefCategory" for="cdCategory"></label>
      <select id="cdCategory">
        <option value="" data-s="admin.none"></option>
      </select>
    </div>
    <div class="field">
      <label for="cdIssuingAuthority"><span data-s="admin.certIssuing"></span> <span class="text-muted" style="font-weight:normal" data-s="admin.certDescOptional"></span></label>
      <input type="text" id="cdIssuingAuthority">
    </div>

    <div class="field d-flex items-center flex-wrap mb-4" style="gap:16px">
      <label class="d-flex items-center gap-6 cursor-pointer">
        <input type="checkbox" id="cdClubEndorsement" data-admin-change="toggleCdEndorsement"> <span data-s="admin.certClubEndorsement"></span>
      </label>
      <label class="d-flex items-center gap-8 flex-wrap" for="ppsNameEN"><span data-s="admin.certCardColour"></span>
        <input type="color" id="cdColor" class="border-muted rounded-4 cursor-pointer" style="width:36px;height:26px;padding:2px">
        <div id="cdColorSwatches"></div>
        <span class="text-10 text-muted" data-s="admin.certAutoBlank"></span>
      </label>
    </div>

    <div class="field d-flex items-center flex-wrap mb-4" style="gap:16px">
      <label class="d-flex items-center gap-6 cursor-pointer">
        <input type="checkbox" id="cdExpires"> <span data-s="admin.certExpires"></span>
      </label>
      <label class="text-md cursor-pointer d-flex items-center gap-6 mt-8">
        <input type="checkbox" id="cdHasIdNumber"> <span data-s="admin.certHasId"></span>
      </label>
    </div>

    <div class="mt-14">
      <div class="d-flex items-center justify-between mb-6">
        <label class="text-10 text-muted" style="letter-spacing:.8px" data-s="admin.certSubcategories"></label>
        <button class="btn btn-secondary btn-sm" data-admin-click="addSubcatRow" data-s="btn.add"></button>
      </div>
      <div id="subcatRows"></div>
      <div class="text-xs text-muted mt-6" style="padding-top:6px" data-s="admin.certSubcatHint">
      </div>
    </div>

    <div class="d-flex gap-8 justify-between items-center" style="margin-top:18px">
      <button class="btn btn-danger hidden icon-btn" id="certDefDeleteBtn" data-admin-click="deleteCertDef" data-icon="trash-2" data-s-aria="btn.delete" data-s-title="btn.delete"></button>
      <div class="d-flex gap-8">
        <button class="btn btn-secondary" data-admin-close="certDefModal" data-s="btn.cancel"></button>
        <button class="btn btn-primary" id="saveCertDefBtn" data-admin-click="saveCertDef" data-s="btn.save"></button>
      </div>
    </div>
  </div>
</div>

<!-- Boat QR modal -->
<div class="modal-overlay hidden" id="qrModal" data-admin-close-self>
  <div class="modal" style="max-width:360px;text-align:center">
    <div class="modal-header">
      <h3 id="qrBoatName" style="font-size:18px"></h3>
      <button class="modal-close-x" data-admin-close="qrModal">&times;</button>
    </div>
    <div class="text-xs text-muted mb-16" id="qrCategory"></div>
    <img id="qrImg" src="" alt="QR code" class="rounded-8 border-muted" style="width:220px;height:220px">
    <div class="text-10 text-muted mt-10" style="word-break:break-all" id="qrUrl"></div>
    <div class="text-10 mt-4" style="color:var(--border)" id="qrBoatId"></div>
    <div class="text-xs text-muted mt-12" style="line-height:1.5" data-s="admin.qrScanHint">
    </div>
    <div class="d-flex gap-8 mt-12">
      <button class="btn btn-secondary" data-admin-close="qrModal" data-s="btn.close"></button>

</div>

<!-- Slot modals (recurring + single) — markup injected by shared/slot-modal.js -->

<!-- Passport settings modal -->
<div class="modal-overlay hidden" id="passportSettingsModal" data-admin-close-self>
  <div class="modal">
    <div class="modal-header">
      <h3 data-s="passport.settingsTitle">Passport settings</h3>
      <button class="modal-close-x" data-admin-close="passportSettingsModal">&times;</button>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="passport.nameEN">Name (English)</label><input type="text" id="ppsNameEN"></div>
      <div class="field"><label data-s="passport.nameIS" for="ppsNameIS">Name (Icelandic)</label><input type="text" id="ppsNameIS"></div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="passport.idReadOnly" for="ppsId">ID (read-only)</label><input type="text" id="ppsId" readonly class="text-muted"></div>
      <div class="field"><label data-s="passport.requiredSigs" for="ppsRequiredSigs">Required signatures</label><input type="number" id="ppsRequiredSigs" min="1" max="10" value="2"></div>
    </div>
    <div class="field"><label data-s="passport.promoteCertId" for="ppsPromoteCertId">Promotes certificate</label><input type="text" id="ppsPromoteCertId" placeholder="rowing_division"></div>
    <div class="grid2">
      <div class="field"><label data-s="passport.fromSub" for="ppsFromSub">From sub-category</label><input type="text" id="ppsFromSub" placeholder="restricted"></div>
      <div class="field"><label data-s="passport.toSub" for="ppsToSub">To sub-category</label><input type="text" id="ppsToSub" placeholder="released"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-admin-close="passportSettingsModal" data-s="btn.cancel">Cancel</button>
      <button class="btn btn-primary" data-admin-click="savePassportSettings" data-s="btn.save">Save</button>
    </div>
  </div>
</div>

<!-- Passport item modal -->
<div class="modal-overlay hidden" id="passportItemModal" data-admin-close-self>
  <div class="modal">
    <div class="modal-header">
      <h3 id="passportItemModalTitle" data-s="passport.itemTitle">Passport item</h3>
      <button class="modal-close-x" data-admin-close="passportItemModal">&times;</button>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="passport.itemNameEN" for="ppiNameEN">Item name (English)</label><input type="text" id="ppiNameEN"></div>
      <div class="field"><label data-s="passport.itemNameIS" for="ppiNameIS">Item name (Icelandic)</label><input type="text" id="ppiNameIS"></div>
    </div>
    <div class="field">
      <label data-s="passport.itemDescEN" for="ppiDescEN">Description (English)</label>
      <textarea id="ppiDescEN" rows="3" class="w-full border-muted rounded-4 bg-surface" style="font:inherit;padding:6px;color:var(--text);resize:vertical"></textarea>
    </div>
    <div class="field">
      <label data-s="passport.itemDescIS" for="ppiDescIS">Description (Icelandic)</label>
      <textarea id="ppiDescIS" rows="3" class="w-full border-muted rounded-4 bg-surface" style="font:inherit;padding:6px;color:var(--text);resize:vertical"></textarea>
    </div>
    <div class="grid2">
      <div class="field">
        <label data-s="passport.assessmentType" for="ppiAssessment">Assessment type</label>
        <select id="ppiAssessment">
          <option value="practical" data-s="passport.practical">Practical</option>
          <option value="theory" data-s="passport.theory">Theoretical</option>
        </select>
      </div>
      <div class="field">
        <label data-s="passport.itemModule" for="ppiModule">Module (teaching order)</label>
        <input type="number" id="ppiModule" min="0" step="1" placeholder="0">
      </div>
    </div>
    <div class="field"><label data-s="passport.idReadOnly" for="ppiId">ID (read-only)</label><input type="text" id="ppiId" readonly class="text-muted"></div>
    <div class="check-row mb-12">
      <input type="checkbox" id="ppiRetired"> <label for="ppiRetired" data-s="passport.retire">Retire</label>
    </div>
    <div class="btn-row">
      <button class="btn btn-danger hidden icon-btn" id="ppiDeleteBtn" data-admin-click="deletePassportItem" data-icon="trash-2" data-s-aria="btn.delete" data-s-title="btn.delete"></button>
      <button class="btn btn-secondary" data-admin-close="passportItemModal" data-s="btn.cancel">Cancel</button>
      <button class="btn btn-primary" data-admin-click="savePassportItem" data-s="btn.save">Save</button>
    </div>
  </div>
</div>

<!-- Passport category modal -->
<div class="modal-overlay hidden" id="passportCategoryModal" data-admin-close-self>
  <div class="modal">
    <div class="modal-header">
      <h3 id="passportCategoryModalTitle" data-s="passport.categoryTitle">Passport category</h3>
      <button class="modal-close-x" data-admin-close="passportCategoryModal">&times;</button>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="passport.categoryNameEN">Category name (English)</label><input type="text" id="ppcNameEN"></div>
      <div class="field"><label data-s="passport.categoryNameIS" for="ppcNameIS">Category name (Icelandic)</label><input type="text" id="ppcNameIS"></div>
    </div>
    <div class="field"><label data-s="passport.idReadOnly" for="ppcId">ID (read-only)</label><input type="text" id="ppcId" readonly class="text-muted"></div>
    <div class="btn-row">
      <button class="btn btn-danger hidden" id="ppcDeleteBtn" data-admin-click="deletePassportCategory" data-s="passport.deleteCategory">Delete category</button>
      <button class="btn btn-secondary" data-admin-close="passportCategoryModal" data-s="btn.cancel">Cancel</button>
      <button class="btn btn-primary" data-admin-click="savePassportCategory" data-s="btn.save">Save</button>
    </div>
  </div>
</div>

<!-- Per-tab modules: each is a single-concern slice of the old admin.js
     monolith, 40-550 lines each. All use defer so order here is purely
     documentary — DOMContentLoaded waits for every one. admin.js loads
     last because its DOMContentLoaded handler (loadAll, showTopTab,
     etc.) calls functions defined across these modules. -->
<script src="members.js" defer></script>
<script src="boats.js" defer></script>
<script src="locations.js" defer></script>
<script src="checklists.js" defer></script>
<script src="act-types.js" defer></script>
<script src="volunteers.js" defer></script>
<script src="scheduling.js" defer></script>
<script src="certs.js" defer></script>
<script src="alerts.js" defer></script>
<script src="flags.js" defer></script>
<script src="import.js" defer></script>
<script src="calendars.js" defer></script>
<script src="passport.js" defer></script>
<script src="handbook.js" defer></script>
<script src="admin.js" defer></script>
</body>
