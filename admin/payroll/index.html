<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ýmir — Payroll</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <script src="../../shared/api.js"></script>
  <script src="../../shared/strings.js"></script>
  <script src="../../shared/ui.js"></script>
  <script src="../../shared/payroll.js"></script>
  <style>
    /* ── Payroll tabs ── */
    .pr-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:10px;flex-wrap:wrap}
    .pr-tab{padding:6px 16px;border:1px solid var(--border);border-radius:16px;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .15s}
    .pr-tab.active{background:var(--brass);color:#fff;border-color:var(--brass)}
    .pr-tab:hover:not(.active){border-color:var(--brass);color:var(--brass)}

    /* ── Employee list ── */
    .emp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)44;flex-wrap:wrap}
    .emp-row:last-child{border-bottom:none}
    .emp-name{font-weight:600;font-size:13px;flex:1;min-width:120px}
    .emp-kt{font-size:11px;color:var(--muted);width:90px;flex-shrink:0}
    .pr-badge-on{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--green);color:#fff}
    .pr-badge-off{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .emp-fields{width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:10px 0 4px}
    .emp-fields .field{margin:0}
    .emp-fields label{font-size:10px}

    /* ── Time reporting toolbar ── */
    .ts-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
    .ts-toolbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
    .ts-total{font-size:11px;color:var(--muted)}
    .view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .view-toggle button{background:none;border:none;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .1s}
    .view-toggle button.active{background:var(--brass);color:#fff}

    /* ── Calendar ── */
    .cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:16px;color:var(--text);line-height:1.2;font-family:inherit}
    .cal-nav-btn:hover{border-color:var(--brass);color:var(--brass)}
    .cal-month{font-weight:700;font-size:15px;min-width:160px;text-align:center}
    .cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
    .cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;letter-spacing:.5px}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-cell{min-height:80px;border:1px solid var(--border)44;border-radius:6px;padding:5px;background:var(--surface)44;cursor:pointer;transition:background .1s}
    .cal-cell:hover{background:var(--surface);border-color:var(--brass)66}
    .cal-cell.other-month{opacity:.3}
    .cal-cell.today{border-color:var(--brass);background:var(--brass)11}
    .cal-day-num{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px;display:block}
    .cal-cell.today .cal-day-num{color:var(--brass)}
    .cal-pill{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block;line-height:1.5;border:1px solid transparent}
    .cal-pill:hover{filter:brightness(1.1)}
    .cal-more{font-size:9px;color:var(--muted);margin-top:1px;padding-left:2px}

    /* ── List view ── */
    .ts-group-header{font-weight:600;font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
    .ts-group-total{font-size:11px;color:var(--muted)}
    .ts-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:22px}
    .ts-table th{text-align:left;padding:5px 8px;font-size:10px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600;letter-spacing:.4px}
    .ts-table td{padding:5px 8px;border-bottom:1px solid var(--border)44;vertical-align:middle}
    .ts-table tr:last-child td{border-bottom:none}
    .src-admin{color:var(--brass)}

    /* ── Modal ── */
    .modal-bg{position:fixed;inset:0;background:#00000077;z-index:200;display:flex;align-items:center;justify-content:center}
    .modal-box{background:var(--card);border-radius:12px;padding:22px 26px;min-width:320px;max-width:460px;width:90vw;box-shadow:0 8px 40px #00000055}
    .modal-title{margin:0 0 16px;font-size:15px;font-weight:700}
    .modal-err{font-size:11px;color:var(--red);min-height:14px;margin-bottom:2px}
    .modal-actions{display:flex;gap:8px;margin-top:16px;align-items:center}
    .modal-actions .spacer{margin-left:auto}

    /* ── Periods / Payslips ── */
    .period-card{border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
    .period-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);cursor:pointer}
    .period-title{font-weight:600;font-size:13px}
    .period-meta{font-size:11px;color:var(--muted)}
    .period-body{padding:12px 14px}
    .sec-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
    .pill-ok{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--green);color:#fff}
    .pill-open{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}

    /* ── Payslip preview rows ── */
    .confirm-row{background:var(--surface);border-radius:6px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .confirm-emp{font-weight:600;font-size:13px;min-width:160px;padding-top:2px}
    .confirm-emp-title{font-size:10px;color:var(--muted)}
    .hrs-inp{width:72px;text-align:right;font-size:12px}
    .hrs-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .hrs-label{font-size:11px}
    .ml-row{display:grid;grid-template-columns:1fr 1fr 80px 28px;gap:6px;align-items:center;margin-bottom:4px}
    .ml-row input{font-size:11px}
    .calc-summary{width:100%;font-size:11px;color:var(--muted);margin-top:4px}
    .action-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}

    /* ── Launamiðlar ── */
    .lm-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
    .lm-table th{text-align:right;padding:4px 10px;font-size:10px;color:var(--muted);border-bottom:2px solid var(--border)}
    .lm-table th:first-child{text-align:left}
    .lm-table td{padding:5px 10px;border-bottom:1px solid var(--border)44;text-align:right}
    .lm-table td:first-child{text-align:left;font-weight:500}
    .lm-table tr.lm-total td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;background:var(--surface)}

    /* ── Misc ── */
    .btn-del{font-size:10px;padding:2px 8px;background:var(--red)22;color:var(--red);border:1px solid var(--red)44;border-radius:6px;cursor:pointer}
    .edited-badge{font-size:9px;color:var(--muted);margin-left:3px}
  </style>
</head>
<body>
<div class="page">
  <header id="ym-header"><div class="header-left"></div><div class="header-right"></div></header>
  <main>
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:20px">
      <h2 style="margin:0;font-size:18px" data-s="admin.tabPayroll"></h2>
      <a href="../" style="font-size:11px;color:var(--muted);text-decoration:none">&#8592; Admin</a>
    </div>
    <div class="pr-tabs">
      <button class="pr-tab active" data-tab="employees"   onclick="prTab('employees')"   data-s="payroll.tabEmployees"></button>
      <button class="pr-tab"        data-tab="timesheets"  onclick="prTab('timesheets')"  data-s="payroll.tabTimeReporting"></button>
      <button class="pr-tab"        data-tab="periods"     onclick="prTab('periods')"     data-s="payroll.tabTimesheets"></button>
      <button class="pr-tab"        data-tab="launamidlar" onclick="prTab('launamidlar')" data-s="payroll.tabLaunamidlar"></button>
    </div>

    <!-- EMPLOYEES -->
    <div id="pr-employees">
      <div id="prEmpList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- TIME REPORTING -->
    <div id="pr-timesheets" class="hidden">
      <div class="ts-toolbar">
        <select id="prTsEmp" onchange="prTsFilter()" style="min-width:160px">
          <option value="" data-s="payroll.allStaff"></option>
        </select>
        <div class="view-toggle">
          <button id="btnCal" class="active" onclick="prSetView('cal')" data-s="payroll.calView"></button>
          <button id="btnList" onclick="prSetView('list')" data-s="payroll.listView"></button>
        </div>
        <div class="ts-toolbar-right">
          <span id="prTsTotal" class="ts-total"></span>
          <button class="btn btn-primary" style="font-size:11px" onclick="prOpenModal(null,null)" data-s="payroll.addEntry"></button>
        </div>
      </div>
      <div id="prCalView">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="prCalMove(-1)">&#8249;</button>
          <span class="cal-month" id="prCalLabel"></span>
          <button class="cal-nav-btn" onclick="prCalMove(1)">&#8250;</button>
        </div>
        <div class="cal-dows">
          <div class="cal-dow" data-s="lbl.monShort"></div>
          <div class="cal-dow" data-s="lbl.tueShort"></div>
          <div class="cal-dow" data-s="lbl.wedShort"></div>
          <div class="cal-dow" data-s="lbl.thuShort"></div>
          <div class="cal-dow" data-s="lbl.friShort"></div>
          <div class="cal-dow" data-s="lbl.satShort"></div>
          <div class="cal-dow" data-s="lbl.sunShort"></div>
        </div>
        <div id="prCalDays" class="cal-days"></div>
      </div>
      <div id="prListView" class="hidden">
        <div id="prTsList"><div class="empty-note" data-s="lbl.loading"></div></div>
      </div>
    </div>

    <!-- TIMESHEETS / LAUNASEDLAR -->
    <div id="pr-periods" class="hidden">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px">
        <div class="sec-lbl" data-s="payroll.definePeriod"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
          <label style="font-size:11px;font-weight:600" data-s="payroll.periodFrom"></label>
          <input id="prPeriodFrom" type="date" style="min-width:140px">
          <label style="font-size:11px;font-weight:600" data-s="payroll.periodTo"></label>
          <input id="prPeriodTo" type="date" style="min-width:140px">
          <label style="font-size:11px;font-weight:600" data-s="payroll.paymentDate"></label>
          <input id="prPaymentDate" type="date" style="min-width:140px">
          <button class="btn btn-primary" style="font-size:11px" onclick="prBuildPreview()" data-s="payroll.previewPayslips"></button>
        </div>
      </div>
      <div id="prPreviewPanel" class="hidden">
        <div class="sec-lbl" data-s="payroll.hoursConfirm"></div>
        <div id="prPreviewList"></div>
        <div class="action-bar" style="margin-top:16px">
          <button class="btn btn-primary" onclick="prApprovePeriod()" data-s="payroll.approvePeriod"></button>
          <span id="prApproveMsg" style="font-size:11px;color:var(--green)"></span>
        </div>
      </div>
      <div class="sec-lbl" style="margin-top:20px" data-s="payroll.pastPeriods"></div>
      <div id="prPeriodsList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- LAUNAMIDLAR -->
    <div id="pr-launamidlar" class="hidden">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <label style="font-size:12px;font-weight:600" data-s="lbl.year"></label>
        <input id="prLmYear" type="number" value="2026" min="2024" max="2035" style="width:90px">
        <button class="btn btn-primary" onclick="prLoadLaunamidlar()" data-s="payroll.exportXml"></button>
        <a id="prLmDownload" class="btn btn-secondary" style="display:none;font-size:11px">&#11015; <span data-s="payroll.exportXml"></span></a>
      </div>
      <div id="prLmTable"><div class="empty-note" data-s="payroll.noPeriodDefined"></div></div>
    </div>
  </main>
</div>

<!-- Entry modal -->
<div id="prModal" class="modal-bg hidden" onclick="if(event.target===this)prCloseModal()">
  <div class="modal-box">
    <h3 class="modal-title" id="prModalTitle"></h3>
    <div class="field">
      <label data-s="payroll.employee"></label>
      <select id="meEmp" style="width:100%"></select>
    </div>
    <div class="field">
      <label data-s="payroll.clockInLabel"></label>
      <input id="meIn" type="datetime-local" style="width:100%">
    </div>
    <div class="field">
      <label data-s="payroll.clockOutLabel"></label>
      <input id="meOut" type="datetime-local" style="width:100%" onchange="meCalcMins()">
    </div>
    <div class="field">
      <label><span data-s="payroll.minsLabel"></span> — <span data-s="payroll.autoCalc" style="font-weight:400;color:var(--muted)"></span></label>
      <input id="meMins" type="number" min="0" style="width:100%">
    </div>
    <div class="field">
      <label data-s="payroll.noteOptional"></label>
      <input id="meNote" type="text" style="width:100%" data-s-attr="placeholder" data-s="payroll.notePlaceholder">
    </div>
    <div id="meErr" class="modal-err"></div>
    <div class="modal-actions">
      <button id="meDelBtn" class="btn-del" style="display:none" onclick="meDelete()" data-s="payroll.deleteEntry"></button>
      <span class="spacer"></span>
      <button class="btn btn-secondary" onclick="prCloseModal()" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="meSave()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<script>
/* ── Helpers ──────────────────────────────────────────────────────────────── */
function prHide(id){var el=document.getElementById(id);if(el)el.classList.add('hidden');}
function prShow(id){var el=document.getElementById(id);if(el)el.classList.remove('hidden');}
function prToggleId(id){var el=document.getElementById(id);if(el)el.classList.toggle('hidden');}

/* ── Bootstrap ───────────────────────────────────────────────────────────── */
var user=requireAuth(isAdmin);
if(user){buildHeader('payroll');applyStrings(document.body);}
var _members=[],_empData={},_empByMember={},_previewData={},_tsEmployees=[],_closedPeriods=new Set();
var _tsEntries=[],_calYear=new Date().getFullYear(),_calMonth=new Date().getMonth(),_calView='cal',_editId=null;
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function kr(n){return Math.round(n||0).toLocaleString('is-IS')+' kr.';}
function fmtMins(m){var h=Math.floor((+m)/60),mn=Math.round((+m)%60);return h+'h '+String(mn).padStart(2,'0')+'m';}
function toLocal(iso){if(!iso)return '';var d=new Date(iso);return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);}
function locale(){return (typeof getLang==='function')&&getLang()==='IS'?'is-IS':'en-GB';}
var EMP_COLORS=['#4e9a8c','#7b5ea7','#c97c3a','#3a79c9','#b84a4a','#5a9e47','#a04a7c','#7a8a3a'];
function empColor(eid){var i=_tsEmployees.findIndex(function(x){return x.id===eid;});return EMP_COLORS[Math.max(0,i)%EMP_COLORS.length];}
function empName(eid){var e=_tsEmployees.find(function(x){return x.id===eid;});return e?e.name:eid;}

/* ── Tab router ──────────────────────────────────────────────────────────── */
function prTab(tab){
  ['employees','timesheets','periods','launamidlar'].forEach(function(t){
    document.getElementById('pr-'+t).classList.toggle('hidden',t!==tab);
  });
  document.querySelectorAll('.pr-tab').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});
  var url=new URL(window.location.href);url.searchParams.set('tab',tab);history.replaceState(null,'',url);
  if(tab==='employees')  prLoadEmployees();
  if(tab==='timesheets') prInitTimesheets();
  if(tab==='periods')    prLoadPeriods();
}

/* ══ EMPLOYEES ══════════════════════════════════════════════════════════════ */
async function prLoadEmployees(){
  var list=document.getElementById('prEmpList');
  list.innerHTML='<div class="empty-note" data-s="lbl.loading"></div>';applyStrings(list);
  try{
    var res=await Promise.all([apiGet('getMembers'),apiGet('getEmployees')]);
    _members=(res[0].members||[]).filter(function(m){return m.role==='staff'||m.role==='admin';});
    _empData={};_empByMember={};
    (res[1].employees||[]).forEach(function(e){_empData[e.id]=e;if(e.memberId)_empByMember[e.memberId]=e;});
    if(!_members.length){list.innerHTML='<div class="empty-note" data-s="lbl.noData"></div>';applyStrings(list);return;}
    list.innerHTML=_members.map(function(m){
      var emp=_empByMember[m.id]||null;
      var act=emp&&(emp.payrollEnabled===true||emp.payrollEnabled==='true');
      return prEmpRowHTML(m,emp,act);
    }).join('');
    applyStrings(list);
  }catch(e){list.innerHTML='<div class="empty-note" style="color:var(--red)">'+_e(e.message)+'</div>';}
}
function prEmpRowHTML(m,emp,act){
  var mid=_e(m.id);
  var cfg=window.PAYROLL_CONFIG||{};
  var defP=((emp&&emp.lifeyrir!=null?emp.lifeyrir:cfg.employeePension||0.04)*100).toFixed(1);
  var defS=((emp&&emp.sereignarsjodur||0)*100).toFixed(1);
  var defA=String(emp&&emp.personuafslattr!=null?emp.personuafslattr:cfg.personuafslattr||68681);
  var defU=((emp&&emp.unionDuesRate||cfg.unionDuesRate||0)*100).toFixed(1);
  var h='<div class="emp-row" id="emprow_'+mid+'">';
  h+='<span class="emp-name">'+_e(m.name)+'</span>';
  h+='<span class="emp-kt">'+_e(m.kennitala||'')+'</span>';
  h+='<span class="'+(act?'pr-badge-on':'pr-badge-off')+'" data-s="'+(act?'payroll.tabEmployees':'payroll.notEnabled')+'"></span>';
  h+='<button class="btn btn-secondary" style="font-size:11px;padding:3px 10px" onclick="prToggleEdit(\''+mid+'\')" data-s="btn.edit"></button>';
  h+='</div>';
  h+='<div id="empedit_'+mid+'" class="hidden" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
  h+='<strong style="font-size:13px">'+_e(m.name)+'</strong>';
  h+='<label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">';
  h+='<input type="checkbox" id="prEnabled_'+mid+'" '+(act?'checked':'')+' onchange="prToggleFields(\''+mid+'\')">';
  h+='<span data-s="payroll.enablePayroll"></span></label></div>';
  h+='<div class="emp-fields" id="prFields_'+mid+'"'+(!act?' style="display:none"':'')+' >';
  h+='<div class="field"><label data-s="payroll.titleField"></label><input id="prTitle_'+mid+'" type="text" value="'+_e(emp&&emp.title||'')+'"></div>';
  h+='<div class="field"><label data-s="payroll.baseRate"></label><input id="prRate_'+mid+'" type="number" min="0" value="'+_e(String(emp&&emp.baseRateKr||''))+'"></div>';
  h+='<div class="field"><label data-s="payroll.bankAccount"></label><input id="prBank_'+mid+'" type="text" value="'+_e(emp&&emp.bankAccount||'')+'"></div>';
  h+='<div class="field"><label data-s="payroll.orlofsreikningur"></label><input id="prOrlof_'+mid+'" type="text" value="'+_e(emp&&emp.orlofsreikningur||'')+'"></div>';
  h+='<div class="field"><label data-s="payroll.union"></label><input id="prUnion_'+mid+'" type="text" value="'+_e(emp&&emp.union||'')+'"></div>';
  h+='<div class="field"><label data-s="payroll.empPensionRate"></label><input id="prLifeyrir_'+mid+'" type="number" min="0" max="15" step="0.5" value="'+defP+'"></div>';
  h+='<div class="field"><label data-s="payroll.sereignRate"></label><input id="prSereign_'+mid+'" type="number" min="0" max="4" step="0.5" value="'+defS+'"></div>';
  h+='<div class="field"><label data-s="payroll.personuafslattr"></label><input id="prPersona_'+mid+'" type="number" min="0" value="'+_e(defA)+'"></div>';
  h+='<div class="field"><label data-s="payroll.unionDuesRate"></label><input id="prUnionDues_'+mid+'" type="number" min="0" max="5" step="0.1" value="'+defU+'"></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:8px;margin-top:10px">';
  h+='<button class="btn btn-primary" style="font-size:11px" onclick="prSaveEmployee(\''+mid+'\')" data-s="btn.save"></button>';
  h+='<button class="btn btn-secondary" style="font-size:11px" onclick="prToggleEdit(\''+mid+'\')" data-s="btn.cancel"></button>';
  h+='<span id="prMsg_'+mid+'" style="font-size:11px;margin-left:4px"></span>';
  h+='</div></div>';
  return h;
}
function prToggleEdit(mid){var el=document.getElementById('empedit_'+mid);if(!el)return;var was=el.classList.toggle('hidden');if(!was)applyStrings(el);}

async function prLoadTsEntries(){
  var empId=document.getElementById('prTsEmp').value;
  var firstDay=new Date(_calYear,_calMonth,1);
  var startDow=(firstDay.getDay()+6)%7;
  var rangeStart=new Date(_calYear,_calMonth,1-startDow);
  var lastDay=new Date(_calYear,_calMonth+1,0);
  var endDow=(lastDay.getDay()+6)%7;
  var rangeEnd=new Date(_calYear,_calMonth+1,7-endDow);
  try{
    var params={
      from:rangeStart.toISOString().slice(0,10),
      to:rangeEnd.toISOString().slice(0,10),
      period:_calYear+'-'+String(_calMonth+1).padStart(2,'0')+'-01'
    };
    if(empId) params.employeeId=empId;
    var res=await apiGet('getTimeEntries',params);
    _tsEntries=(res.entries||res.timeEntries||[]).map(function(e){
      if(!e.clockIn&&e.originalTimestamp) e.clockIn=e.originalTimestamp;
      return e;
    });
    var filtered=empId?_tsEntries.filter(function(e){return e.employeeId===empId;}):_tsEntries;
    var totalMins=filtered.reduce(function(s,e){return s+(+(e.durationMinutes||0));},0);
    document.getElementById('prTsTotal').textContent=fmtMins(totalMins)+' '+s('payroll.totalHours');
    if(_calView==='cal') prRenderCalDays();
    else                 prRenderList();
  }catch(e){document.getElementById('prTsTotal').textContent='';}
}
  
function prRenderCalDays(){
  var container=document.getElementById('prCalDays');
  var empId=document.getElementById('prTsEmp').value;
  var today=new Date();today.setHours(0,0,0,0);
  var firstDay=new Date(_calYear,_calMonth,1);
  var startDow=(firstDay.getDay()+6)%7;
  var lastDay=new Date(_calYear,_calMonth+1,0).getDate();
  var endDow=(new Date(_calYear,_calMonth+1,0).getDay()+6)%7;
  var byDate={};
  _tsEntries.forEach(function(e){
    if(empId&&e.employeeId!==empId)return;
    var d=(e.clockIn||e.timestamp||'').slice(0,10);
    if(!d)return;
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(e);
  });
  var totalCells=startDow+lastDay+(endDow<6?6-endDow:0);
  var html='';
  for(var i=0;i<totalCells;i++){
    var dayNum=i-startDow+1;
    var cellDate=new Date(_calYear,_calMonth,dayNum);
    var isOther=dayNum<1||dayNum>lastDay;
    var isToday=cellDate.getTime()===today.getTime();
    var dateStr=cellDate.toISOString().slice(0,10);
    var dayEntries=byDate[dateStr]||[];
    var cls='cal-cell'+(isOther?' other-month':'')+(isToday?' today':'');
    var shown=dayEntries.slice(0,3);
    var pills=shown.map(function(e){
      var col=empColor(e.employeeId);
      var inT=e.clockIn?new Date(e.clockIn).toLocaleTimeString(locale(),{hour:'2-digit',minute:'2-digit'}):'?';
      var outT=e.timestamp?new Date(e.timestamp).toLocaleTimeString(locale(),{hour:'2-digit',minute:'2-digit'}):'?';
      var dur=e.durationMinutes?fmtMins(+e.durationMinutes):'';
      var label=empId?(inT+'\u2013'+outT):(empName(e.employeeId));
      var edata=JSON.stringify(e).replace(/"/g,'&quot;');
      return '<span class="cal-pill" style="background:'+col+'22;color:'+col+';border-color:'+col+'44"'
        +' onclick="event.stopPropagation();prOpenModal(JSON.parse(this.dataset.e),null)" data-e="'+edata+'"'
        +' title="'+_e(empName(e.employeeId))+' '+inT+'\u2013'+outT+' ('+dur+')">'+_e(label)+'</span>';
    }).join('');
    if(dayEntries.length>3)pills+='<div class="cal-more">+'+(dayEntries.length-3)+' '+s('payroll.moreEntries')+'</div>';
    html+='<div class="'+cls+'" onclick="prOpenModal(null,\''+dateStr+'\')">'
      +'<span class="cal-day-num">'+cellDate.getDate()+'</span>'+pills+'</div>';
  }
  container.innerHTML=html;
}
function prRenderList(){
  var list=document.getElementById('prTsList');
  var empId=document.getElementById('prTsEmp').value;
  var filtered=empId?_tsEntries.filter(function(e){return e.employeeId===empId;}):_tsEntries;

  var byEmp={};
  filtered.forEach(function(e){
    var k=e.employeeId||'unknown';
    if(!byEmp[k])byEmp[k]={name:e.employeeName||empName(k),entries:[]};
    byEmp[k].entries.push(e);
  });
  list.innerHTML=Object.keys(byEmp).map(function(eid){
    var grp=byEmp[eid];
    var tot=grp.entries.reduce(function(s,e){return s+(+(e.durationMinutes||0));},0);
    var rows=grp.entries.slice().sort(function(a,b){
      return (a.clockIn||a.timestamp||'')>(b.clockIn||b.timestamp||'')?1:-1;
    }).map(function(e){
      var ci=e.clockIn?new Date(e.clockIn):null,co=e.timestamp?new Date(e.timestamp):null;
      var loc=locale();
      var dateStr=ci?ci.toLocaleDateString(loc,{day:'2-digit',month:'short',year:'numeric'}):'--';
      var inT=ci?ci.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'}):'--';
      var outT=co?co.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'}):'--';
      var dur=e.durationMinutes?fmtMins(+e.durationMinutes):'--';
      var srcLabel=e.source==='admin'?('<span class="src-admin">\u270e '+s('lbl.admin')+'</span>'):s('lbl.staff');
      var edited=e.originalTimestamp?('<span class="edited-badge">'+s('lbl.edited')+'</span>'):'';
      var edata=JSON.stringify(e).replace(/"/g,'&quot;');
      return '<tr><td>'+dateStr+'</td><td>'+inT+'</td><td>'+outT+edited+'</td><td>'+dur+'</td><td>'+srcLabel+'</td>'
        +'<td style="text-align:right"><button class="btn btn-secondary" style="font-size:10px;padding:2px 7px"'
        +' onclick="prOpenModal(JSON.parse(this.dataset.e),null)" data-e="'+edata+'" data-s="btn.edit"></button></td></tr>';
    }).join('');
    return '<div><div class="ts-group-header"><span>'+_e(grp.name)+'</span>'
      +'<span class="ts-group-total">'+fmtMins(tot)+' '+s('payroll.totalHours')+'</span></div>'
      +'<table class="ts-table"><thead><tr>'
      +'<th data-s="lbl.date"></th><th data-s="payroll.clockInLabel"></th>'
      +'<th data-s="payroll.clockOutLabel"></th><th data-s="lbl.duration"></th>'
      +'<th data-s="lbl.type"></th><th></th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
  }).join('');
  applyStrings(list);
}

async function meSave(){
  var err=document.getElementById('meErr');err.textContent='';

  var outV=document.getElementById('meOut').value;

  try{

async function prBuildPreview(){

  try{
    var empRes  = await apiGet('getEmployees');

    var tsRes   = await apiGet('getTimeEntries',{from:from,to:to,period:from.slice(0,7)+'-01'});
    var ytdRes  = await apiGet('getPayroll');

    var employees=(empRes.employees||[]).filter(function(e){return e.payrollEnabled===true||e.payrollEnabled==='true';});

      if(!e.clockIn&&e.originalTimestamp) e.clockIn=e.originalTimestamp;
      return e;
    });
    var closedRows=ytdRes.payroll||[];

    // Build minutes-per-employee from completed entries only
    var minsByEmp={};
    entries.filter(function(e){return +e.durationMinutes>0;}).forEach(function(e){
      if(!e.employeeId)return;
      if(!minsByEmp[e.employeeId])minsByEmp[e.employeeId]=0;
      minsByEmp[e.employeeId]+=(+(e.durationMinutes||0));
    });

    // Build YTD totals per employee from closed payroll rows
    var ytdByEmp={};
    closedRows.forEach(function(r){
      var eid=r.employeeId;if(!eid)return;
      if(!ytdByEmp[eid])ytdByEmp[eid]={grossTotal:0,taxWithheld:0,employeePension:0,netPay:0,orlofIBanki:0,employerPension:0};
      var y=ytdByEmp[eid];
      y.grossTotal+=(+(r.grossTotal||0));
      y.taxWithheld+=(+(r.taxWithheld||r.taxAfterCredit||0));
      y.employeePension+=(+(r.employeePension||0));
      y.netPay+=(+(r.netPay||0));
      y.orlofIBanki+=(+(r.orlofIBanki||0));
      y.employerPension+=(+(r.employerPension||0));
    });

    _previewData={from:from,to:to,payDate:payDate,employees:{}};

      _previewData.employees[emp.id]={emp:emp,regularMins:mins,ot1Mins:0,ot2Mins:0,manualLines:[],ytd:ytd};
      var calc=calculatePayslip(emp,mins,0,0,[]);

      return prPayslipCard(emp,calc,ytd,mins);

}

  function prCalcHTML(calc,ytd){
  function row(lbl,val,cls){return '<div class="psc-row'+(cls?' '+cls:'')+'">'
    +'<span>'+lbl+'</span><span>'+val+'</span></div>';}
  function rowS(key,val,cls){return row(s(key),val,cls);}
  function sep(){return '<div class="psc-sep"></div>';}

  var h='<div class="psc-breakdown">';

  // ── Laun / Earnings
  h+='<div class="psc-section-lbl" data-s="payroll.earningsSection"></div>';
  h+=rowS('payroll.regularHours', calc.regularHrs.toFixed(2)+' hrs × '+kr(calc.dagvinna&&calc.regularHrs?(calc.dagvinna/calc.regularHrs):0)+'/hr = '+kr(calc.dagvinna));
  if(calc.ot1Hrs>0) h+=rowS('payroll.ot1Hours', calc.ot1Hrs.toFixed(2)+' hrs (1.33×) = '+kr(calc.eftirvinna1));
  if(calc.ot2Hrs>0) h+=rowS('payroll.ot2Hours', calc.ot2Hrs.toFixed(2)+' hrs (1.55×) = '+kr(calc.eftirvinna2));
  if(calc.manualLines&&calc.manualLines.length){
    calc.manualLines.forEach(function(l){h+=row(_e(l.label),kr(l.amount));});
  }
  h+=rowS('payroll.orlofsRate', '('+Math.round((calc.orlofsRate||0.1017)*100)+'%) '+kr(calc.orlofslaun));
  h+=rowS('payroll.grossLabel', kr(calc.grossTotal), 'psc-subtotal');
  h+=sep();

  // ── Frádráttur / Deductions
  h+='<div class="psc-section-lbl" data-s="payroll.deductionsSection"></div>';
  h+=rowS('payroll.empPensionRate', '('+Math.round((calc.pensionRate||0.04)*100)+'%) '+kr(calc.employeePension));
  if(calc.sereignarsjodur>0) h+=rowS('payroll.sereignRate', '('+Math.round((calc.sereignRate||0)*100)+'%) '+kr(calc.sereignarsjodur));
  if(calc.unionDues>0)       h+=rowS('payroll.union', '('+Math.round((calc.unionRate||0)*100)+'%) '+kr(calc.unionDues));
  h+=row(s('payroll.taxWithheld')+' (base: '+kr(calc.taxBase)+')', kr(calc.taxGross));
  h+=row(s('payroll.personuafslattr'), '− '+kr(calc.personalCredit));
  h+=rowS('payroll.taxWithheld', kr(calc.taxAfterCredit), 'psc-tax');
  h+=rowS('payroll.totalDeductions', kr(calc.totalDeductions), 'psc-subtotal');
  h+=sep();

  // ── Net
  h+=rowS('payroll.netLabel', kr(calc.netPay), 'psc-net');
  h+=sep();

  // ── Til uppsöfnunar / Accumulated
  h+='<div class="psc-section-lbl" data-s="payroll.accumulatedSection"></div>';
  h+=rowS('payroll.orlofslaun', kr(calc.orlofIBanki));
  h+=sep();

  // ── Framlag launagreiðanda / Employer
  h+='<div class="psc-section-lbl" data-s="payroll.employerSection"></div>';
  h+=row(s('payroll.empPensionRate')+' ('+Math.round((window.PAYROLL_CONFIG&&window.PAYROLL_CONFIG.employerPension||0.115)*100)+'%)', kr(calc.employerPensionAmt));
  h+=row('Endurhæfingarsjóður (0.1%)', kr(calc.endurhaefingarsjodur));
  h+=sep();

  // ── YTD
  h+='<div class="psc-section-lbl" data-s="payroll.ytdSection"></div>';
  h+=rowS('payroll.grossLabel',    kr((ytd.grossTotal||0)+calc.grossTotal),    'psc-ytd');
  h+=rowS('payroll.taxWithheld',   kr((ytd.taxWithheld||0)+calc.taxAfterCredit),'psc-ytd');
  h+=rowS('payroll.empPensionRate',kr((ytd.employeePension||0)+calc.employeePension),'psc-ytd');
  h+=rowS('payroll.netLabel',      kr((ytd.netPay||0)+calc.netPay),             'psc-ytd');

  h+='</div>';

  // ── Preview button
  h+='<div style="margin-top:8px">';
  h+='<button class="btn btn-secondary" style="font-size:10px;padding:2px 8px" onclick="prPreviewLocal(\''+_e(ytd._empId||'')+'\')" data-s="payroll.exportPdf"></button>';
  h+='</div>';

  return h;
}
  
function prGetLines(empId){
  var c=document.getElementById('pManual_'+empId);if(!c)return[];
  var lines=[];
  c.querySelectorAll('.ml-row').forEach(function(row){
    var en=row.querySelector('.ml-en'),is=row.querySelector('.ml-is'),amt=row.querySelector('.ml-amt');
    if(en&&amt)lines.push({label:en.value,labelIS:is?is.value:en.value,amount:+(amt.value)||0});
  });
  return lines;
}
  
function prRecalc(empId){
  var d=(_previewData.employees||{})[empId];if(!d)return;
  var hrs=+(document.getElementById('pHrs_'+empId)||{value:0}).value||0;
  var ot1=+(document.getElementById('pOt1_'+empId)||{value:0}).value||0;
  var ot2=+(document.getElementById('pOt2_'+empId)||{value:0}).value||0;
  var manual=prGetLines(empId);
  var calc=window.calculatePayslip(d.emp,hrs*60,ot1*60,ot2*60,manual);
  d.regularMins=hrs*60;d.ot1Mins=ot1*60;d.ot2Mins=ot2*60;d.manualLines=manual;d.calc=calc;
  var el=document.getElementById('pCalc_'+empId);
  if(el){el.innerHTML=prCalcHTML(calc,d.ytd||{});applyStrings(el);}
}
  
function prAddLine(empId){
  var c=document.getElementById('pManual_'+empId);if(!c)return;

  row.innerHTML='<input class="ml-en" type="text" data-s-attr="placeholder" data-s="payroll.lineDescription" style="font-size:11px">'

    +'<input class="ml-amt" type="number" data-s-attr="placeholder" data-s="payroll.lineAmount" style="font-size:11px;text-align:right" onchange="prRecalc(\''+_e(empId)+'\')">'
    +'<button style="background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:0" onclick="this.parentNode.remove();prRecalc(\''+_e(empId)+'\')">\u00d7</button>';

}

  function prPayslipCard(emp, calc, ytd, regularMins){
  var eid = _e(emp.id);
  var h = '<div class="payslip-card" id="prevrow_'+eid+'">';

  // ── Header row: name + hour inputs
  h += '<div class="psc-header">';
  h += '<div class="psc-identity">';
  h += '<div class="psc-name">'+_e(emp.name)+'</div>';
  h += '<div class="psc-sub">'+_e(emp.title||'')+'</div>';
  h += '<div class="psc-sub">'+s('payroll.bankAccount')+': '+_e(emp.bankAccount||'—')+'</div>';
  h += '</div>';
  h += '<div class="psc-hrs">';
  h += '<label class="hrs-label" data-s="payroll.regularHours"></label>';
  h += '<input class="hrs-inp" id="pHrs_'+eid+'" type="number" min="0" step="0.25" value="'+(regularMins/60).toFixed(2)+'" onchange="prRecalc(\''+eid+'\')">';
  h += '<label class="hrs-label" data-s="payroll.ot1Hours"></label>';
  h += '<input class="hrs-inp" id="pOt1_'+eid+'" type="number" min="0" step="0.25" value="0" onchange="prRecalc(\''+eid+'\')">';
  h += '<label class="hrs-label" data-s="payroll.ot2Hours"></label>';
  h += '<input class="hrs-inp" id="pOt2_'+eid+'" type="number" min="0" step="0.25" value="0" onchange="prRecalc(\''+eid+'\')">';
  h += '</div></div>';

  // ── Manual lines
  h += '<div id="pManual_'+eid+'" style="margin:4px 0"></div>';
  h += '<button class="btn-link" onclick="prAddLine(\''+eid+'\')" data-s="payroll.addLine"></button>';

  // ── Live calc breakdown (re-rendered by prRecalc)
  h += '<div id="pCalc_'+eid+'">'+prCalcHTML(calc, ytd, emp.id)+'</div>';
  h += '</div>';
  return h;
}

function prCalcHTML(calc, ytd, empId){
  var cfg = window.PAYROLL_CONFIG || {};
  var loc = locale();

  function n(v){ return Math.round(v||0).toLocaleString('is-IS'); }
  function pct(v){ return ((v||0)*100).toFixed(2).replace(/\.?0+$/,'')+'%'; }

  // ── Samtölur box (top summary like the payslip header box)
  var ytdGross  = (ytd.grossTotal||0) + calc.grossTotal;
  var ytdDeduct = (ytd.totalDeductions||0) + calc.totalDeductions;
  var ytdNet    = (ytd.netPay||0) + calc.netPay;

  var h = '<div class="psc-samtolur">';
  h += '<div class="psc-samtolur-grid">';
  h += '<div></div><div class="psc-col-hdr" data-s="payroll.periodLabel"></div><div class="psc-col-hdr" data-s="payroll.ytdSection"></div>';
  h += '<div data-s="payroll.grossLabel"></div><div class="psc-num">'+n(calc.grossTotal)+'</div><div class="psc-num psc-ytd-val">'+n(ytdGross)+'</div>';
  h += '<div data-s="payroll.totalDeductions"></div><div class="psc-num">'+n(calc.totalDeductions)+'</div><div class="psc-num psc-ytd-val">'+n(ytdDeduct)+'</div>';
  h += '<div data-s="payroll.netLabel"></div><div class="psc-num psc-net-val">'+n(calc.netPay)+'</div><div class="psc-num psc-ytd-val">'+n(ytdNet)+'</div>';
  h += '</div></div>';

  // ── Laun section
  h += '<table class="psc-table">';
  h += '<thead><tr>';
  h += '<th data-s="payroll.periodLabel"></th>';
  h += '<th data-s="lbl.type"></th>';
  h += '<th class="num" data-s="payroll.units"></th>';
  h += '<th class="num" data-s="payroll.rate"></th>';
  h += '<th class="num" data-s="payroll.amount"></th>';
  h += '<th class="num" data-s="payroll.ytdUnits"></th>';
  h += '<th class="num">ISK</th>';
  h += '</tr></thead><tbody>';

  var period = _previewData.from ? _previewData.from.slice(0,7).replace('-','.')+'–'+(_previewData.to||'').slice(0,7).replace('-','.') : '';
  var rateKr = emp&&emp.baseRateKr ? emp.baseRateKr : (calc.dagvinna&&calc.regularHrs>0 ? Math.round(calc.dagvinna/calc.regularHrs) : 0);

  function tr(period, type, units, rate, amt, ytdUnits, ytdAmt, bold){
    var cls = bold ? ' class="psc-total-row"' : '';
    return '<tr'+cls+'>'
      +'<td>'+_e(period)+'</td>'
      +'<td>'+_e(type)+'</td>'
      +'<td class="num">'+_e(String(units))+'</td>'
      +'<td class="num">'+_e(String(rate))+'</td>'
      +'<td class="num">'+n(amt)+'</td>'
      +'<td class="num psc-ytd-val">'+_e(String(ytdUnits))+'</td>'
      +'<td class="num psc-ytd-val">'+n(ytdAmt)+'</td>'
      +'</tr>';
  }

  var ytdReg  = (ytd.regularHrs||0) + calc.regularHrs;
  var ytdOt1  = (ytd.ot1Hrs||0)     + calc.ot1Hrs;
  var ytdOt2  = (ytd.ot2Hrs||0)     + calc.ot2Hrs;
  var ytdDag  = (ytd.dagvinna||0)   + calc.dagvinna;
  var ytdEt1  = (ytd.eftirvinna1||0)+ calc.eftirvinna1;
  var ytdEt2  = (ytd.eftirvinna2||0)+ calc.eftirvinna2;
  var ytdOrlof= (ytd.orlofslaun||0) + calc.orlofslaun;

  h += tr(period, s('payroll.dagvinna'), calc.regularHrs.toFixed(2), n(rateKr), calc.dagvinna, ytdReg.toFixed(2), ytdDag);
  h += tr(period, s('payroll.ot1Label'), calc.ot1Hrs.toFixed(2), n(Math.round(rateKr*1.33)), calc.eftirvinna1, ytdOt1.toFixed(2), ytdEt1);
  h += tr(period, s('payroll.ot2Label'), calc.ot2Hrs.toFixed(2), n(Math.round(rateKr*1.55)), calc.eftirvinna2, ytdOt2.toFixed(2), ytdEt2);

  // Manual lines
  if(calc.manualLines && calc.manualLines.length){
    calc.manualLines.forEach(function(l){
      h += tr(period, _e(l.label), '—', '—', l.amount, '—', 0);
    });
  }

  h += tr(period, s('payroll.orlofsRate')+' '+pct(calc.orlofsRate), '—', '—', calc.orlofslaun, '—', ytdOrlof);
  h += '<tr class="psc-total-row"><td colspan="4" data-s="payroll.grossLabel"></td>'
    +'<td class="num">'+n(calc.grossTotal)+'</td>'
    +'<td class="num psc-ytd-val" colspan="2">'+n(ytdGross)+'</td></tr>';

  // ── Frádráttur section header
  h += '<tr class="psc-section-hdr"><td colspan="2" data-s="payroll.deductionsSection"></td>'
    +'<th class="num" data-s="payroll.units"></th>'
    +'<th class="num" data-s="payroll.rate"></th>'
    +'<th class="num" data-s="payroll.amount"></th>'
    +'<td colspan="2" class="num">ISK</td></tr>';

  var ytdPension = (ytd.employeePension||0) + calc.employeePension;
  var ytdTax     = (ytd.taxWithheld||0)     + calc.taxAfterCredit;
  var ytdOrlofB  = (ytd.orlofIBanki||0)     + calc.orlofIBanki;

  h += tr('', s('payroll.empPensionRate')+' '+pct(calc.pensionRate), n(calc.grossTotal), pct(calc.pensionRate), calc.employeePension, '', ytdPension);
  if(calc.sereignarsjodur>0) h += tr('', s('payroll.sereignRate')+' '+pct(calc.sereignRate), n(calc.grossTotal), pct(calc.sereignRate), calc.sereignarsjodur, '', (ytd.sereignarsjodur||0)+calc.sereignarsjodur);
  if(calc.unionDues>0)       h += tr('', s('payroll.union'), '—', pct(calc.unionRate), calc.unionDues, '', (ytd.unionDues||0)+calc.unionDues);

  // Tax brackets
  cfg.taxBrackets && cfg.taxBrackets.forEach(function(b, i){
    h += tr('', s('payroll.taxBracket'+(i+1)), n(calc.taxBase), pct(b.rate), calc.taxGross && i===0 ? calc.taxGross : 0, '', 0);
  });

  h += tr('', s('payroll.taxComputed'), '—', '—', calc.taxGross, '', (ytd.taxGross||0)+calc.taxGross);
  h += tr('', s('payroll.personuafslattr'), n(calc.personalCredit), '1,00', -calc.personalCredit, '', -(ytd.personalCredit||calc.personalCredit));
  h += tr('', s('payroll.taxWithheld'), '—', '—', calc.taxAfterCredit, '', ytdTax);
  h += tr('', s('payroll.orlofslaun'), '—', '—', calc.orlofIBanki, '', ytdOrlofB);

  h += '<tr class="psc-total-row"><td colspan="4" data-s="payroll.totalDeductions"></td>'
    +'<td class="num">'+n(calc.totalDeductions)+'</td>'
    +'<td class="num psc-ytd-val" colspan="2">'+n(ytdDeduct)+'</td></tr>';

  // ── Framlag launagreiðanda
  h += '<tr class="psc-section-hdr"><td colspan="2" data-s="payroll.employerSection"></td>'
    +'<td></td><th class="num" data-s="payroll.rate"></th><th class="num" data-s="payroll.amount"></th>'
    +'<td colspan="2" class="num">ISK</td></tr>';

  var ytdEmpPen = (ytd.employerPension||0) + calc.employerPensionAmt;
  var ytdEndur  = (ytd.endurhaefingarsjodur||0) + calc.endurhaefingarsjodur;

  h += tr('', s('payroll.employerPension')+' '+pct(cfg.employerPension||0.115), '—', pct(cfg.employerPension||0.115), calc.employerPensionAmt, '', ytdEmpPen);
  h += tr('', s('payroll.endurhaefingarsjodur')+' '+pct(cfg.endurhaefingarsjodur||0.001), '—', pct(cfg.endurhaefingarsjodur||0.001), calc.endurhaefingarsjodur, '', ytdEndur);

  // ── Til uppsöfnunar
  h += '<tr class="psc-section-hdr"><td colspan="5" data-s="payroll.accumulatedSection"></td>'
    +'<td class="num" data-s="payroll.now"></td><td class="num" data-s="payroll.ytdSection"></td></tr>';
  h += '<tr><td colspan="4" data-s="payroll.orlofslaun"></td>'
    +'<td></td>'
    +'<td class="num psc-ytd-val">'+n(calc.orlofIBanki)+'</td>'
    +'<td class="num psc-ytd-val">'+n(ytdOrlofB)+'</td></tr>';

  h += '</tbody></table>';

  // ── Preview button
  h += '<div style="margin-top:10px;display:flex;gap:8px">';
  h += '<button class="btn btn-secondary" style="font-size:10px;padding:3px 10px" onclick="prPreviewLocal(\''+_e(empId||'')+'\')">&#128196; <span data-s="payroll.exportPdf"></span></button>';
  h += '</div>';

  return h;
}
  
function prPreviewLocal(empId){
  var d=(_previewData.employees||{})[empId];
  if(!d||!d.calc){showToast(s('payroll.hoursConfirm'),'err');return;}
  var html=renderPayslip({employee:d.emp,calc:d.calc,ytd:{},period:_previewData.from||'',
    employer:{employerName:'',employerKt:'',employerAddress:''},
    paymentDate:_previewData.payDate||'',slipNumber:'PREVIEW'});
  window.open(URL.createObjectURL(new Blob([html],{type:'text/html'})),'_blank');
}
async function prExportXml(periodKey){
  try{
    var res=await apiPost('generatePayrollXml',{period:periodKey});
    if(res.xml){
      var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([res.xml],{type:'application/xml'}));
      a.download='payroll-'+periodKey.replace(/[^\w-]/g,'-')+'.xml';a.click();
    }else showToast(s('toast.error'),'err');
  }catch(e){showToast(e.message,'err');}
}

async function prLoadLaunamidlar(){
  var year=document.getElementById('prLmYear').value||new Date().getFullYear();
  var div=document.getElementById('prLmTable'),dl=document.getElementById('prLmDownload');
  div.innerHTML='<div class="empty-note" data-s="lbl.loading"></div>';applyStrings(div);dl.style.display='none';
  try{
    var res=await apiPost('generateLaunamidlar',{year:year});
    var emps=res.employees||[];
    if(emps.length){
      var tG=emps.reduce(function(s,r){return s+(+(r.grossTotal||0));},0);
      var tT=emps.reduce(function(s,r){return s+(+(r.taxWithheld||0));},0);
      var tP=emps.reduce(function(s,r){return s+(+(r.pension||0));},0);
      var tN=emps.reduce(function(s,r){return s+(+(r.netPay||0));},0);
      div.innerHTML='<table class="lm-table"><thead><tr>'
        +'<th data-s="lbl.name"></th><th>kt.</th>'
        +'<th data-s="payroll.grossLabel"></th><th data-s="payroll.pension"></th>'
        +'<th data-s="payroll.taxWithheld"></th><th data-s="payroll.netLabel"></th>'
        +'</tr></thead><tbody>'
        +emps.map(function(r){return '<tr><td>'+_e(r.name||r.employeeId||'')+'</td>'
          +'<td style="color:var(--muted);font-size:11px">'+_e(r.kt||'')+'</td>'
          +'<td>'+kr(r.grossTotal)+'</td><td>'+kr(r.pension)+'</td>'
          +'<td>'+kr(r.taxWithheld)+'</td><td>'+kr(r.netPay)+'</td></tr>';}).join('')
        +'</tbody><tfoot><tr class="lm-total">'
        +'<td colspan="2">'+s('lbl.season')+' '+_e(String(year))+'</td>'
        +'<td>'+kr(tG)+'</td><td>'+kr(tP)+'</td><td>'+kr(tT)+'</td><td>'+kr(tN)+'</td>'
        +'</tr></tfoot></table>';
      applyStrings(div);
    }else div.innerHTML='<div class="empty-note" data-s="payroll.noClosedPeriods"></div>';
    if(res.xml){
      dl.href=URL.createObjectURL(new Blob([res.xml],{type:'application/xml'}));
      dl.download='launamidlar-'+year+'.xml';dl.style.display='inline-block';
    }
  }catch(e){div.innerHTML='<div class="empty-note" style="color:var(--red)">'+_e(e.message)+'</div>';}
}
