<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ýmir — Payroll</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <script src="../../shared/api.js"></script>
  <script src="../../shared/strings.js"></script>
  <script src="../../shared/ui.js"></script>
  <script src="../../shared/payroll.js"></script>
  <style>
    .pr-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:10px;flex-wrap:wrap}
    .pr-tab{padding:6px 16px;border:1px solid var(--border);border-radius:16px;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .15s}
    .pr-tab.active{background:var(--brass);color:#fff;border-color:var(--brass)}
    .pr-tab:hover:not(.active){border-color:var(--brass);color:var(--brass)}
    .emp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)44;flex-wrap:wrap}
    .emp-row:last-child{border-bottom:none}
    .emp-name{font-weight:600;font-size:13px;flex:1;min-width:120px}
    .emp-kt{font-size:11px;color:var(--muted);width:90px;flex-shrink:0}
    .pr-badge-on{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--green);color:#fff}
    .pr-badge-off{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .emp-fields{width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:10px 0 4px}
    .emp-fields .field{margin:0}.emp-fields label{font-size:10px}
    .ts-table{width:100%;border-collapse:collapse;font-size:12px}
    .ts-table th{text-align:left;padding:5px 8px;font-size:10px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600;letter-spacing:.4px}
    .ts-table td{padding:5px 8px;border-bottom:1px solid var(--border)44;vertical-align:middle}
    .ts-table tr:last-child td{border-bottom:none}
    .period-card{border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
    .period-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);cursor:pointer}
    .period-title{font-weight:600;font-size:13px}.period-meta{font-size:11px;color:var(--muted)}
    .period-body{padding:12px 14px}
    .sec-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
    .confirm-row{background:var(--surface);border-radius:6px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .confirm-emp{font-weight:600;font-size:13px;min-width:160px;padding-top:2px}
    .hrs-inp{width:72px;text-align:right;font-size:12px}
    .ml-row{display:grid;grid-template-columns:1fr 1fr 80px 28px;gap:6px;align-items:center;margin-bottom:4px}
    .ml-row input{font-size:11px}
    .pill-ok{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--green);color:#fff}
    .pill-open{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .action-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .lm-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
    .lm-table th{text-align:right;padding:4px 10px;font-size:10px;color:var(--muted);border-bottom:2px solid var(--border)}
    .lm-table th:first-child{text-align:left}.lm-table td{padding:5px 10px;border-bottom:1px solid var(--border)44;text-align:right}
    .lm-table td:first-child{text-align:left;font-weight:500}
    .lm-table tr.lm-total td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;background:var(--surface)}
    .btn-del{font-size:10px;padding:2px 7px;background:var(--red)22;color:var(--red);border:1px solid var(--red)44;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
<div class="page">
  <header id="ym-header"><div class="header-left"></div><div class="header-right"></div></header>
  <main>
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:20px">
      <h2 style="margin:0;font-size:18px" data-s="admin.tabPayroll"></h2>
      <a href="../" style="font-size:11px;color:var(--muted);text-decoration:none">&#8592; Admin</a>
    </div>
    <div class="pr-tabs">
      <button class="pr-tab active" data-tab="employees"   onclick="prTab('employees')"   data-s="payroll.tabEmployees"></button>
      <button class="pr-tab"        data-tab="timesheets"  onclick="prTab('timesheets')"  data-s="payroll.tabTimeReporting"></button>
      <button class="pr-tab"        data-tab="periods"     onclick="prTab('periods')"     data-s="payroll.tabTimesheets"></button>
      <button class="pr-tab"        data-tab="launamidlar" onclick="prTab('launamidlar')" data-s="payroll.tabLaunamidlar"></button>
    </div>

    <!-- EMPLOYEES -->
    <div id="pr-employees">
      <div id="prEmpList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- TIME REPORTING / TÍMASKRÁNING -->
    <div id="pr-timesheets" class="hidden">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <select id="prTsEmp" onchange="prLoadTimesheets()" style="min-width:160px">
          <option value="">All staff</option>
        </select>
        <input id="prTsFrom" type="date" onchange="prLoadTimesheets()" style="min-width:140px">
        <span style="font-size:12px;color:var(--muted)">&#8211;</span>
        <input id="prTsTo" type="date" onchange="prLoadTimesheets()" style="min-width:140px">
      </div>
      <div id="prTsList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- TIMESHEETS / LAUNASEÐLAR -->
    <div id="pr-periods" class="hidden">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px">
        <div class="sec-lbl" data-s="payroll.definePeriod"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
          <label style="font-size:11px;font-weight:600" data-s="payroll.periodFrom"></label>
          <input id="prPeriodFrom" type="date" style="min-width:140px">
          <label style="font-size:11px;font-weight:600" data-s="payroll.periodTo"></label>
          <input id="prPeriodTo" type="date" style="min-width:140px">
          <label style="font-size:11px;font-weight:600" data-s="payroll.paymentDate"></label>
          <input id="prPaymentDate" type="date" style="min-width:140px">
          <button class="btn btn-primary" style="font-size:11px" onclick="prBuildPreview()" data-s="payroll.previewPayslips"></button>
        </div>
      </div>
      <div id="prPreviewPanel" class="hidden">
        <div class="sec-lbl" data-s="payroll.hoursConfirm"></div>
        <div id="prPreviewList"></div>
        <div class="action-bar" style="margin-top:16px">
          <button class="btn btn-primary" onclick="prApprovePeriod()" data-s="payroll.approvePeriod"></button>
          <span id="prApproveMsg" style="font-size:11px;color:var(--green)"></span>
        </div>
      </div>
      <div class="sec-lbl" style="margin-top:20px">Past periods / Fyrri t&#237;mabil</div>
      <div id="prPeriodsList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- LAUNAMIÐLAR -->
    <div id="pr-launamidlar" class="hidden">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <label style="font-size:12px;font-weight:600">Year</label>
        <input id="prLmYear" type="number" value="2026" min="2024" max="2035" style="width:90px">
        <button class="btn btn-primary" onclick="prLoadLaunamidlar()" data-s="payroll.exportXml"></button>
        <a id="prLmDownload" class="btn btn-secondary" style="display:none;font-size:11px">&#11015; Download XML</a>
      </div>
      <div id="prLmTable"><div class="empty-note">Select year and generate.</div></div>
    </div>
  </main>
</div>
<script>
/* ── Helpers ──────────────────────────────────────────────────────────────── */
function prHide(id){var el=document.getElementById(id);if(el)el.classList.add('hidden');}
function prShow(id){var el=document.getElementById(id);if(el)el.classList.remove('hidden');}
function prToggleId(id){var el=document.getElementById(id);if(el)el.classList.toggle('hidden');}

/* ── Bootstrap ───────────────────────────────────────────────────────────── */
var user=requireAuth(isAdmin);
if(user){buildHeader('payroll');applyStrings(document.body);}
var _members=[],_empData={},_empByMember={},_previewData={},_tsEmployees=[],_closedPeriods=new Set();
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function kr(n){return Math.round(n||0).toLocaleString('is-IS')+' kr.';}
function fmtMins(m){var h=Math.floor((+m)/60),mn=Math.round((+m)%60);return h+'h '+String(mn).padStart(2,'0')+'m';}

/* ── Tab router ──────────────────────────────────────────────────────────── */
function prTab(tab){
  ['employees','timesheets','periods','launamidlar'].forEach(function(t){
    document.getElementById('pr-'+t).classList.toggle('hidden',t!==tab);
  });
  document.querySelectorAll('.pr-tab').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});
  var url=new URL(window.location.href);url.searchParams.set('tab',tab);history.replaceState(null,'',url);
  if(tab==='employees')  prLoadEmployees();
  if(tab==='timesheets') prInitTimesheets();
  if(tab==='periods')    prLoadPeriods();
}

/* ══ EMPLOYEES ══════════════════════════════════════════════════════════════ */
async function prLoadEmployees(){
  var list=document.getElementById('prEmpList');
  list.innerHTML='<div class="empty-note" data-s="lbl.loading"></div>';applyStrings(list);
  try{
    var res=await Promise.all([apiGet('getMembers'),apiGet('getEmployees')]);
    _members=(res[0].members||[]).filter(function(m){return m.role==='staff'||m.role==='admin';});
    _empData={};_empByMember={};
    (res[1].employees||[]).forEach(function(e){_empData[e.id]=e;if(e.memberId)_empByMember[e.memberId]=e;});
    if(!_members.length){list.innerHTML='<div class="empty-note">No staff found.</div>';return;}
    list.innerHTML=_members.map(function(m){
      var emp=_empByMember[m.id]||null;
      var act=emp&&(emp.payrollEnabled===true||emp.payrollEnabled==='true');
      return prEmpRowHTML(m,emp,act);
    }).join('');
    applyStrings(list);
  }catch(e){list.innerHTML='<div class="empty-note" style="color:var(--red)">'+_e(e.message)+'</div>';}
}
function prEmpRowHTML(m,emp,act){
  var mid=_e(m.id);
  var cfg=window.PAYROLL_CONFIG||{};
  var defP=((emp&&emp.lifeyrir!=null?emp.lifeyrir:cfg.employeePension||0.04)*100).toFixed(1);
  var defS=((emp&&emp.sereignarsjodur||0)*100).toFixed(1);
  var defA=String(emp&&emp.personuafslattr!=null?emp.personuafslattr:cfg.personuafslattr||68681);
  var defU=((emp&&emp.unionDuesRate||cfg.unionDuesRate||0)*100).toFixed(1);
  var h='<div class="emp-row" id="emprow_'+mid+'">';
  h+='<span class="emp-name">'+_e(m.name)+'</span>';
  h+='<span class="emp-kt">'+_e(m.kennitala||'')+'</span>';
  h+='<span class="'+(act?'pr-badge-on':'pr-badge-off')+'">'+(act?s('payroll.tabEmployees'):s('payroll.notEnabled'))+'</span>';
  h+='<button class="btn btn-secondary" style="font-size:11px;padding:3px 10px" onclick="prToggleEdit(\''+mid+'\')" data-s="btn.edit"></button>';
  h+='</div>';
  h+='<div id="empedit_'+mid+'" class="hidden" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
  h+='<strong style="font-size:13px">'+_e(m.name)+'</strong>';
  h+='<label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">';
  h+='<input type="checkbox" id="prEnabled_'+mid+'" '+(act?'checked':'')+' onchange="prToggleFields(\''+mid+'\')">';
  h+='<span data-s="payroll.enablePayroll"></span></label></div>';
  h+='<div class="emp-fields" id="prFields_'+mid+'"'+(!act?' style="display:none"':'')+' >';
  h+='<div class="field"><label>Title / Starfsheiti</label><input id="prTitle_'+mid+'" type="text" value="'+_e(emp&&emp.title||'')+'"></div>';
  h+='<div class="field"><label>Base rate (kr/hr)</label><input id="prRate_'+mid+'" type="number" min="0" value="'+_e(String(emp&&emp.baseRateKr||''))+'"></div>';
  h+='<div class="field"><label>Bank / Launareikningur</label><input id="prBank_'+mid+'" type="text" value="'+_e(emp&&emp.bankAccount||'')+'"></div>';
  h+='<div class="field"><label>Orlofsreikningur</label><input id="prOrlof_'+mid+'" type="text" value="'+_e(emp&&emp.orlofsreikningur||'')+'"></div>';
  h+='<div class="field"><label>Union / St\u00e9ttarf\u00e9lag</label><input id="prUnion_'+mid+'" type="text" value="'+_e(emp&&emp.union||'')+'"></div>';
  h+='<div class="field"><label>L\u00edfeyrir % (employee)</label><input id="prLifeyrir_'+mid+'" type="number" min="0" max="15" step="0.5" value="'+defP+'"></div>';
  h+='<div class="field"><label>S\u00e9reign %</label><input id="prSereign_'+mid+'" type="number" min="0" max="4" step="0.5" value="'+defS+'"></div>';
  h+='<div class="field"><label>Pers\u00f3nuafsl\u00e1ttur (kr/m\u00e1n)</label><input id="prPersona_'+mid+'" type="number" min="0" value="'+_e(defA)+'"></div>';
  h+='<div class="field"><label>Union dues %</label><input id="prUnionDues_'+mid+'" type="number" min="0" max="5" step="0.1" value="'+defU+'"></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:8px;margin-top:10px">';
  h+='<button class="btn btn-primary" style="font-size:11px" onclick="prSaveEmployee(\''+mid+'\')" data-s="btn.save"></button>';
  h+='<button class="btn btn-secondary" style="font-size:11px" onclick="prToggleEdit(\''+mid+'\')" data-s="btn.cancel"></button>';
  h+='<span id="prMsg_'+mid+'" style="font-size:11px;margin-left:4px"></span>';
  h+='</div></div>';
  return h;
}
function prToggleEdit(mid){var el=document.getElementById('empedit_'+mid);if(!el)return;var was=el.classList.toggle('hidden');if(!was)applyStrings(el);}
function prToggleFields(mid){var cb=document.getElementById('prEnabled_'+mid);var f=document.getElementById('prFields_'+mid);if(f)f.style.display=(cb&&cb.checked)?'':'none';}
async function prSaveEmployee(memberId){
  var msg=document.getElementById('prMsg_'+memberId);
  var member=_members.find(function(m){return m.id===memberId;});if(!member)return;
  var existing=_empByMember[memberId]||null;
  var empId=existing?existing.id:('emp_'+Date.now().toString(36));
  function fv(pre){var el=document.getElementById(pre+'_'+memberId);return el?el.value.trim():'';}
  function fn(pre){var el=document.getElementById(pre+'_'+memberId);return el?+(el.value):0;}
  var payload={id:empId,memberId:memberId,name:member.name,kt:member.kennitala||'',
    title:fv('prTitle'),baseRateKr:fn('prRate'),bankAccount:fv('prBank'),
    orlofsreikningur:fv('prOrlof'),union:fv('prUnion'),
    lifeyrir:fn('prLifeyrir')/100,sereignarsjodur:fn('prSereign')/100,
    personuafslattr:fn('prPersona'),unionDuesRate:fn('prUnionDues')/100,
    payrollEnabled:!!(document.getElementById('prEnabled_'+memberId)&&document.getElementById('prEnabled_'+memberId).checked)};
  if(msg)msg.textContent='\u2026';
  try{
    await apiPost('saveEmployee',payload);
    _empData[empId]=payload;_empByMember[memberId]=payload;
    if(msg){msg.textContent='\u2713';msg.style.color='var(--green)';}
    setTimeout(function(){prLoadEmployees();},800);
  }catch(e){if(msg){msg.textContent=e.message;msg.style.color='var(--red)';}}
}

/* ══ TIME REPORTING — full CRUD ═════════════════════════════════════════════
   Reads punch clock entries (same source as staff hub clock-in/out).
   Admin can add / edit / delete any entry for any employee.
══════════════════════════════════════════════════════════════════════════ */
async function prInitTimesheets(){
  if(_tsEmployees.length===0){
    try{
      var res=await apiGet('getEmployees');
      _tsEmployees=(res.employees||[]).filter(function(e){return e.payrollEnabled===true||e.payrollEnabled==='true';});
      var sel=document.getElementById('prTsEmp');
      _tsEmployees.forEach(function(e){
        var opt=document.createElement('option');opt.value=e.id;opt.textContent=e.name;sel.appendChild(opt);
      });
    }catch(e){}
  }
  var now=new Date(),y=now.getFullYear(),mo=String(now.getMonth()+1).padStart(2,'0');
  var fromEl=document.getElementById('prTsFrom'),toEl=document.getElementById('prTsTo');
  if(fromEl&&!fromEl.value) fromEl.value=y+'-'+mo+'-01';
  if(toEl&&!toEl.value)     toEl.value=now.toISOString().slice(0,10);
  prLoadTimesheets();
}
async function prLoadTimesheets(){
  var list=document.getElementById('prTsList');
  list.innerHTML='<div class="empty-note" data-s="lbl.loading"></div>';applyStrings(list);
  var empId=document.getElementById('prTsEmp').value;
  var from =document.getElementById('prTsFrom').value;
  var to   =document.getElementById('prTsTo').value;
  try{
    var params={};
    if(empId) params.employeeId=empId;
    if(from)  params.from=from;
    if(to)    params.to=to;
    if(from)  params.period=from.slice(0,7);
    var res=await apiGet('getTimeEntries',params);
    var entries=res.entries||res.timeEntries||[];
    var byEmp={};
    entries.forEach(function(e){
      var k=e.employeeId||'unknown';
      if(!byEmp[k])byEmp[k]={name:e.employeeName||k,entries:[]};
      byEmp[k].entries.push(e);
    });
    var now=new Date(),off=now.getTimezoneOffset()*60000;
    var localNow=new Date(now-off).toISOString().slice(0,16);
    var localHourAgo=new Date(now-3600000-off).toISOString().slice(0,16);
    var empOpts=_tsEmployees.map(function(e){return '<option value="'+_e(e.id)+'">'+_e(e.name)+'</option>';}).join('');
    var addBar='<div style="display:flex;justify-content:flex-end;margin-bottom:10px">'
      +'<button class="btn btn-primary" style="font-size:11px" onclick="prToggleId(\'prAddForm\')">'
      +'+ Add entry / B\u00e6ta vi\u00f0 f\u00e6rslu</button></div>'
      +'<div id="prAddForm" class="hidden" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px">'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px">'
      +'<div class="field"><label>Employee</label><select id="newTsEmp">'+empOpts+'</select></div>'
      +'<div class="field"><label>Clock in</label><input id="newTsIn" type="datetime-local" value="'+localHourAgo+'"></div>'
      +'<div class="field"><label>Clock out</label><input id="newTsOut" type="datetime-local" value="'+localNow+'"></div>'
      +'<div class="field"><label>Note (optional)</label><input id="newTsNote" type="text" placeholder="e.g. forgotten punch-in"></div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<button class="btn btn-primary" style="font-size:11px" onclick="prSubmitAddEntry()">Save entry</button>'
      +'<button class="btn btn-secondary" style="font-size:11px" onclick="prHide(\'prAddForm\')">Cancel</button>'
      +'<span id="newTsMsg" style="font-size:11px;color:var(--red);margin-left:4px"></span>'
      +'</div></div>';
    if(!Object.keys(byEmp).length){
      list.innerHTML=addBar+'<div class="empty-note">No entries found.</div>';
      applyStrings(list);return;
    }
    list.innerHTML=addBar+Object.keys(byEmp).map(function(eid){
      var grp=byEmp[eid];
      var tot=grp.entries.reduce(function(s,e){return s+(+(e.durationMinutes||0));},0);
      var rows=grp.entries.map(function(e){return prTsRow(e);}).join('');
      return '<div style="margin-bottom:22px">'
        +'<div style="font-weight:600;font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">'
        +'<span>'+_e(grp.name)+'</span>'
        +'<span style="font-size:11px;color:var(--muted)">'+fmtMins(tot)+' total</span>'
        +'</div>'
        +'<table class="ts-table"><thead><tr>'
        +'<th>Date</th><th>Clock in</th><th>Clock out</th><th>Duration</th><th>Source</th>'
        +'<th style="text-align:right">Actions</th>'
        +'</tr></thead><tbody id="tsBody_'+_e(eid)+'">'+rows+'</tbody></table></div>';
    }).join('');
    applyStrings(list);
  }catch(e){list.innerHTML='<div class="empty-note" style="color:var(--red)">'+_e(e.message)+'</div>';}
}
function prTsRow(entry){
  var id=entry.id;
  var clockIn =entry.clockIn  ? new Date(entry.clockIn)  : null;
  var clockOut=entry.timestamp? new Date(entry.timestamp) : null;
  var dateStr=clockIn?clockIn.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'--';
  var inT =clockIn ?clockIn.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'--';
  var outT=clockOut?clockOut.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'--';
  var dur =entry.durationMinutes?fmtMins(+entry.durationMinutes):'--';
  var src =entry.source==='admin'?'<span style="color:var(--brass)">\u270e admin</span>':'staff';
  var edited=entry.originalTimestamp?'<span style="font-size:9px;color:var(--muted);margin-left:3px">edited</span>':'';
  var inISO=JSON.stringify(entry.clockIn||'');
  var outISO=JSON.stringify(entry.timestamp||'');
  var mins=+(entry.durationMinutes||0);
  var sid=JSON.stringify(id);
  return '<tr data-tsid="'+_e(id)+'">'
    +'<td>'+dateStr+'</td><td>'+inT+'</td><td>'+outT+edited+'</td><td>'+dur+'</td><td>'+src+'</td>'
    +'<td style="text-align:right;white-space:nowrap">'
    +'<button class="btn btn-secondary" style="font-size:10px;padding:2px 7px" onclick="prEditTsInline('+sid+','+inISO+','+outISO+','+mins+')">Edit</button>'
    +' <button class="btn-del" onclick="prDeleteTs('+sid+')">Delete</button>'
    +'</td></tr>';
}
async function prSubmitAddEntry(){
  var msg=document.getElementById('newTsMsg');
  var empId=document.getElementById('newTsEmp').value;
  var inVal=document.getElementById('newTsIn').value;
  var outVal=document.getElementById('newTsOut').value;
  var note=document.getElementById('newTsNote').value.trim();
  if(!empId||!inVal||!outVal){if(msg)msg.textContent='All fields required';return;}
  var inISO=new Date(inVal).toISOString();
  var outISO=new Date(outVal).toISOString();
  var mins=Math.round((new Date(outVal)-new Date(inVal))/60000);
  if(mins<=0){if(msg)msg.textContent='Clock-out must be after clock-in';return;}
  if(msg)msg.textContent='\u2026';
  try{
    await apiPost('adminAddTime',{employeeId:empId,clockIn:inISO,timestamp:outISO,durationMinutes:mins,note:note||'admin entry',source:'admin'});
    prHide('prAddForm');prLoadTimesheets();
  }catch(e){if(msg)msg.textContent=e.message;}
}
function prEditTsInline(id,clockInISO,clockOutISO,currentMins){
  document.querySelectorAll('.ts-edit-row').forEach(function(r){r.remove();});
  document.querySelectorAll('[data-tsid]').forEach(function(r){r.style.display='';});
  var row=document.querySelector('[data-tsid="'+id+'"]');if(!row)return;
  row.style.display='none';
  function toLocal(iso){if(!iso)return '';var d=new Date(iso);return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);}
  var sid=JSON.stringify(id);
  var editRow=document.createElement('tr');editRow.className='ts-edit-row';
  editRow.innerHTML='<td colspan="6" style="padding:8px 4px;background:var(--surface)">'
    +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
    +'<label style="font-size:11px">Clock in</label>'
    +'<input id="editIn_'+_e(id)+'" type="datetime-local" value="'+_e(toLocal(clockInISO))+'" style="font-size:11px">'
    +'<label style="font-size:11px">Clock out</label>'
    +'<input id="editOut_'+_e(id)+'" type="datetime-local" value="'+_e(toLocal(clockOutISO))+'" style="font-size:11px" onchange="prAutoMins('+sid+')">'
    +'<label style="font-size:11px">Mins</label>'
    +'<input id="editMins_'+_e(id)+'" type="number" value="'+currentMins+'" min="0" style="width:70px;font-size:11px">'
    +'<button class="btn btn-primary" style="font-size:11px;padding:3px 10px" onclick="prSaveTs('+sid+')" data-s="btn.save"></button>'
    +'<button class="btn btn-secondary" style="font-size:11px;padding:3px 10px" onclick="prLoadTimesheets()" data-s="btn.cancel"></button>'
    +'<span id="editMsg_'+_e(id)+'" style="font-size:11px;color:var(--red)"></span>'
    +'</div></td>';
  row.parentNode.insertBefore(editRow,row.nextSibling);applyStrings(editRow);
}
function prAutoMins(id){
  var i=document.getElementById('editIn_'+id),o=document.getElementById('editOut_'+id),m=document.getElementById('editMins_'+id);
  if(i&&o&&m){var d=Math.round((new Date(o.value)-new Date(i.value))/60000);if(d>0)m.value=d;}
}
async function prSaveTs(id){
  var inEl=document.getElementById('editIn_'+id),outEl=document.getElementById('editOut_'+id),minsEl=document.getElementById('editMins_'+id);
  var msg=document.getElementById('editMsg_'+id);
  var newIn=inEl&&inEl.value?new Date(inEl.value).toISOString():'';
  var newOut=outEl&&outEl.value?new Date(outEl.value).toISOString():'';
  var newMins=minsEl?+(minsEl.value):0;
  try{
    await apiPost('adminEditTime',{id:id,clockIn:newIn,timestamp:newOut,durationMinutes:newMins,note:'admin edit',source:'admin'});
    showToast(s('toast.saved'));prLoadTimesheets();
  }catch(e){if(msg)msg.textContent=e.message;else showToast(e.message,'err');}
}
async function prDeleteTs(id){
  var IS=(typeof getLang==='function')&&getLang()==='IS';
  if(!confirm(IS?'Ey\u00f0a \u00fe essari t\u00edmaf\u00e6rslu?':'Delete this time entry?'))return;
  try{
    await apiPost('adminDeleteTime',{id:id});
    showToast(IS?'Eytt':'Deleted');prLoadTimesheets();
  }catch(e){showToast(e.message,'err');}
}

async function prLoadPeriods(){
  var list=document.getElementById('prPeriodsList');
  list.innerHTML='<div class="empty-note" data-s="lbl.loading"></div>';applyStrings(list);
  var now=new Date(),y=now.getFullYear(),mo=String(now.getMonth()+1).padStart(2,'0');
  var lastDay=new Date(y,now.getMonth()+1,0).getDate();
  var fromEl=document.getElementById('prPeriodFrom'),toEl=document.getElementById('prPeriodTo'),payEl=document.getElementById('prPaymentDate');
  if(fromEl&&!fromEl.value) fromEl.value=y+'-'+mo+'-01';
  if(toEl&&!toEl.value)     toEl.value=y+'-'+mo+'-'+String(lastDay).padStart(2,'0');
  if(payEl&&!payEl.value)   payEl.value=new Date(y,now.getMonth()+1,1).toISOString().slice(0,10);
  try{
    var res=await apiGet('getPayroll');
    var rows=res.payroll||[];
    if(!rows.length){list.innerHTML='<div class="empty-note" data-s="payroll.noClosedPeriods"></div>';applyStrings(list);return;}
    var byPeriod={};
    rows.forEach(function(r){
      var k=r.periodFrom&&r.periodTo?(r.periodFrom+' \u2013 '+r.periodTo):r.period;
      if(!byPeriod[k])byPeriod[k]=[];
      byPeriod[k].push(r);
      _closedPeriods.add(r.period||r.periodFrom);
    });
    list.innerHTML=Object.keys(byPeriod).sort().reverse().map(function(p){
      var pr=byPeriod[p];
      var totG=pr.reduce(function(s,r){return s+(+(r.grossTotal||0));},0);
      var totN=pr.reduce(function(s,r){return s+(+(r.netPay||0));},0);
      var isApproved=pr[0]&&pr[0].approved;
      var pid=p.replace(/[^a-zA-Z0-9]/g,'_');
      var empRows=pr.map(function(r){
        return '<tr><td>'+_e(r.employeeName||r.employeeId||'')+'</td>'
          +'<td style="text-align:right">'+_e(r.totalHours||'\u2013')+'</td>'
          +'<td style="text-align:right">'+kr(r.grossTotal)+'</td>'
          +'<td style="text-align:right">'+kr(r.taxWithheld||r.stadgreidslaSkattur||0)+'</td>'
          +'<td style="text-align:right">'+kr(r.netPay)+'</td>'
          +'<td><button class="btn btn-secondary" style="font-size:10px;padding:2px 6px"'
          +' onclick="prViewPayslip(this)" data-row="'+_e(JSON.stringify(r))+'">PDF</button></td>'
          +'</tr>';
      }).join('');
      return '<div class="period-card">'
        +'<div class="period-head" onclick="prToggleId(\'pb_'+pid+'\')">'
        +'<span class="period-title">'+_e(p)+'</span>'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span class="period-meta">Gross: '+kr(totG)+' \u00b7 Net: '+kr(totN)+' \u00b7 '+pr.length+' empl.</span>'
        +'<span class="'+(isApproved?'pill-ok':'pill-open')+'">'+(isApproved?'Approved':'Open')+'</span>'
        +'</div></div>'
        +'<div class="period-body hidden" id="pb_'+pid+'">'
        +'<table class="ts-table"><thead><tr>'
        +'<th>Employee</th><th style="text-align:right">Hours</th>'
        +'<th style="text-align:right">Gross</th><th style="text-align:right">Tax</th>'
        +'<th style="text-align:right">Net</th><th></th>'
        +'</tr></thead><tbody>'+empRows+'</tbody></table>'
        +'<div class="action-bar" style="margin-top:8px">'
        +'<button class="btn btn-secondary" style="font-size:11px" onclick="prExportXml(\''+_e(p)+'\')" data-s="payroll.exportXml"></button>'
        +'</div></div></div>';
    }).join('');
    applyStrings(list);
  }catch(e){list.innerHTML='<div class="empty-note" style="color:var(--red)">'+_e(e.message)+'</div>';}
}
async function prBuildPreview(){
  var from=document.getElementById('prPeriodFrom').value;
  var to  =document.getElementById('prPeriodTo').value;
  var payDate=document.getElementById('prPaymentDate').value;
  if(!from||!to){showToast('Set From and To dates first','err');return;}
  var panel=document.getElementById('prPreviewPanel'),listEl=document.getElementById('prPreviewList');
  listEl.innerHTML='<div class="empty-note" data-s="lbl.loading"></div>';applyStrings(listEl);
  panel.classList.remove('hidden');
  try{
    var empRes=await apiGet('getEmployees');
    var tsRes =await apiGet('getTimeEntries',{from:from,to:to,period:from.slice(0,7)});
    var employees=(empRes.employees||[]).filter(function(e){return e.payrollEnabled===true||e.payrollEnabled==='true';});
    var entries=tsRes.entries||tsRes.timeEntries||[];
    var minsByEmp={};
    entries.forEach(function(e){var k=e.employeeId;if(!k)return;if(!minsByEmp[k])minsByEmp[k]=0;minsByEmp[k]+=(+(e.durationMinutes||0));});
    if(!employees.length){listEl.innerHTML='<div class="empty-note">No payroll employees found.</div>';return;}
    _previewData={from:from,to:to,payDate:payDate,employees:{}};
    listEl.innerHTML=employees.map(function(emp){
      var mins=minsByEmp[emp.id]||0,hrs=(mins/60).toFixed(2);
      _previewData.employees[emp.id]={emp:emp,regularMins:mins,ot1Mins:0,ot2Mins:0,manualLines:[]};
      return '<div class="confirm-row" id="prevrow_'+_e(emp.id)+'">'
        +'<div class="confirm-emp">'+_e(emp.name)+'<div style="font-size:10px;color:var(--muted)">'+_e(emp.title||'')+'</div></div>'
        +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
        +'<label style="font-size:11px">Regular hrs</label>'
        +'<input class="hrs-inp" id="pHrs_'+_e(emp.id)+'" type="number" min="0" step="0.25" value="'+hrs+'" onchange="prRecalc(\''+_e(emp.id)+'\')">'
        +'<label style="font-size:11px">OT 1.33\u00d7</label>'
        +'<input class="hrs-inp" id="pOt1_'+_e(emp.id)+'" type="number" min="0" step="0.25" value="0" onchange="prRecalc(\''+_e(emp.id)+'\')">'
        +'<label style="font-size:11px">OT 1.55\u00d7</label>'
        +'<input class="hrs-inp" id="pOt2_'+_e(emp.id)+'" type="number" min="0" step="0.25" value="0" onchange="prRecalc(\''+_e(emp.id)+'\')">'
        +'</div>'
        +'<div style="width:100%;margin-top:6px">'
        +'<div id="pManual_'+_e(emp.id)+'" style="margin-bottom:4px"></div>'
        +'<button style="font-size:10px;color:var(--brass);background:none;border:none;cursor:pointer;padding:0" onclick="prAddLine(\''+_e(emp.id)+'\')">+ Add line</button>'
        +'</div>'
        +'<div id="pCalc_'+_e(emp.id)+'" style="width:100%;font-size:11px;color:var(--muted);margin-top:4px"></div>'
        +'</div>';
    }).join('');
    employees.forEach(function(emp){prRecalc(emp.id);});
  }catch(e){listEl.innerHTML='<div class="empty-note" style="color:var(--red)">'+_e(e.message)+'</div>';}
}
function prGetLines(empId){
  var c=document.getElementById('pManual_'+empId);if(!c)return[];
  var lines=[];
  c.querySelectorAll('.ml-row').forEach(function(row){
    var en=row.querySelector('.ml-en'),is=row.querySelector('.ml-is'),amt=row.querySelector('.ml-amt');
    if(en&&amt)lines.push({label:en.value,labelIS:is?is.value:en.value,amount:+(amt.value)||0});
  });
  return lines;
}
function prRecalc(empId){
  var d=(_previewData.employees||{})[empId];if(!d)return;
  var hrs=+(document.getElementById('pHrs_'+empId)||{value:0}).value||0;
  var ot1=+(document.getElementById('pOt1_'+empId)||{value:0}).value||0;
  var ot2=+(document.getElementById('pOt2_'+empId)||{value:0}).value||0;
  var manual=prGetLines(empId);
  var calc=window.calculatePayslip(d.emp,hrs*60,ot1*60,ot2*60,manual);
  d.regularMins=hrs*60;d.ot1Mins=ot1*60;d.ot2Mins=ot2*60;d.manualLines=manual;d.calc=calc;
  var el=document.getElementById('pCalc_'+empId);
  if(el)el.innerHTML='Gross: <strong>'+kr(calc.grossTotal)+'</strong>'
    +' \u00b7 Tax: '+kr(calc.taxAfterCredit)
    +' \u00b7 Pension: '+kr(calc.employeePension)
    +' \u00b7 Orlof \u00ed banki: '+kr(calc.orlofIBanki)
    +' \u00b7 <strong>Net: '+kr(calc.netPay)+'</strong>'
    +' &nbsp;<button class="btn btn-secondary" style="font-size:10px;padding:2px 8px;margin-left:8px"'
    +' onclick="prPreviewLocal(\''+_e(empId)+'\')">&#128196; Preview PDF</button>';
}
function prAddLine(empId){
  var c=document.getElementById('pManual_'+empId);if(!c)return;

  row.innerHTML='<input class="ml-en" type="text" placeholder="Description (EN)" style="font-size:11px">'
