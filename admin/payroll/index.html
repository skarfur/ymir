<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../../shared/logo.svg">
  <title>Ýmir — Payroll</title>
  <script src="../../shared/theme-init.js"></script>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="payroll.css">
  <script src="../../shared/api.js" defer></script>
  <script src="../../shared/strings.js"></script>
  <script src="../../shared/ui.js" defer></script>
  <script src="../../shared/layout.js" defer></script>
  </head>
<body>
<div class="page">
  <ymir-header class="pr-standalone-only"></ymir-header>
  <main>
    <div class="pr-standalone-only d-flex items-baseline gap-12" style="margin-bottom:20px">
      <h2 style="margin:0;font-size:18px" data-s="admin.tabPayroll"></h2>
      <a href="../" class="text-xs text-muted" style="text-decoration:none" data-s="admin.payroll.backToAdmin">&#8592; Admin</a>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="employees"  data-pr-click="prTab" data-pr-arg="employees"  data-s="payroll.tabEmployees"></button>
      <button class="tab-btn"        data-tab="timesheets" data-pr-click="prTab" data-pr-arg="timesheets" data-s="payroll.tabTimeReporting"></button>
    </div>

    <!-- EMPLOYEES -->
    <div id="pr-employees">
      <div class="d-flex items-center gap-10 bg-surface border-muted mb-14" style="padding:10px 14px;border-radius:var(--radius-md);box-shadow:var(--shadow-sm)">
        <label class="toggle-wrap d-flex items-center gap-8 cursor-pointer" style="margin:0">
          <input type="checkbox" id="cfgAllowBreaks" data-pr-change="cfgSaveAllowBreaks" style="width:16px;height:16px;accent-color:var(--accent)">
          <span class="text-md" data-s="payroll.allowBreaks"></span>
        </label>
        <span id="cfgAllowBreaksLbl" class="text-xs text-muted"></span>
      </div>
      <div id="prEmpList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- TIME REPORTING -->
    <div id="pr-timesheets" class="hidden">
      <div class="d-flex gap-8 items-center mb-14 flex-wrap">
        <select id="prTsEmp" data-pr-change="prTsFilter" style="min-width:160px">
          <option value="" data-s="payroll.allStaff"></option>
        </select>
        <div class="view-toggle">
          <button id="btnCal" class="active" data-pr-click="prSetView" data-pr-arg="cal" data-s="payroll.calView"></button>
          <button id="btnList" data-pr-click="prSetView" data-pr-arg="list" data-s="payroll.listView"></button>
        </div>
        <div class="ml-auto d-flex gap-8 items-center">
          <span id="prTsTotal" class="ts-total text-xs text-muted"></span>
          <button class="btn btn-secondary text-xs" data-pr-click="prToggleExport" data-s="payroll.export"></button>
          <button class="btn btn-primary text-xs" data-pr-click="prOpenModal" data-s="payroll.addEntry"></button>
        </div>
      </div>
      <!-- EXPORT PANEL -->
      <div id="prExportPanel" class="hidden bg-surface border-muted mb-14" style="border-radius:var(--radius-md);padding:14px 16px;box-shadow:var(--shadow-sm)">
        <div class="sec-lbl" data-s="payroll.export"></div>
        <div class="d-flex gap-8 items-center flex-wrap mb-10">
          <label class="text-10 text-muted" data-s="payroll.periodFrom" for="prExpFrom"></label>
          <input id="prExpFrom" type="date" class="text-xs" style="padding:3px 6px;width:140px">
          <label class="text-10 text-muted" data-s="payroll.periodTo" for="prExpTo"></label>
          <input id="prExpTo" type="date" class="text-xs" style="padding:3px 6px;width:140px">
          <button class="btn btn-primary text-xs" data-pr-click="prExportTimeData" data-s="payroll.export"></button>
          <span id="prExpMsg" class="text-xs"></span>
        </div>
        <div class="mb-6">
          <label class="text-10 text-muted mb-4" style="display:block" data-s="payroll.externalUrl" for="prExpUrl"></label>
          <input id="prExpUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" data-pr-input="prSaveExportUrl" class="w-full text-xs" style="max-width:560px;padding:5px 8px">
        </div>
        <div class="text-10 text-muted" data-s="payroll.externalUrlHint"></div>
      </div>
      <div id="prCalView">
        <div class="cal-nav">
          <button data-pr-click="prCalMove" data-pr-arg="-1">&#8249;</button>
          <span class="cal-month" id="prCalLabel"></span>
          <button data-pr-click="prCalMove" data-pr-arg="1">&#8250;</button>
        </div>
        <div class="cal-dows">
          <div class="cal-dow" data-s="lbl.monShort"></div>
          <div class="cal-dow" data-s="lbl.tueShort"></div>
          <div class="cal-dow" data-s="lbl.wedShort"></div>
          <div class="cal-dow" data-s="lbl.thuShort"></div>
          <div class="cal-dow" data-s="lbl.friShort"></div>
          <div class="cal-dow" data-s="lbl.satShort"></div>
          <div class="cal-dow" data-s="lbl.sunShort"></div>
        </div>
        <div id="prCalDays" class="cal-days"></div>
      </div>
      <div id="prListView" class="hidden">
        <div id="prTsList"><div class="empty-note" data-s="lbl.loading"></div></div>
      </div>
    </div>

  </main>
</div>

<!-- Entry modal -->
<div id="prModal" class="modal-bg hidden" data-pr-close-self>
  <div class="modal-box">
    <div class="d-flex items-center justify-between mb-14">
      <h3 class="modal-title" id="prModalTitle" style="margin:0"></h3>
      <button class="modal-close-x" data-pr-close="prModal">&times;</button>
    </div>
    <div class="field"><label data-s="payroll.employee" for="meEmp"></label>
      <select id="meEmp" class="w-full"></select></div>
    <div class="field"><label data-s="payroll.clockInLabel" for="meIn"></label>
      <input id="meIn" type="datetime-local" class="w-full"></div>
    <div class="field"><label data-s="payroll.clockOutLabel" for="meOut"></label>
      <input id="meOut" type="datetime-local" class="w-full" data-pr-change="meCalcMins"></div>
    <div class="field"><label for="meMins"><span data-s="payroll.minsLabel"></span> — <span data-s="payroll.autoCalc" class="fw-400 text-muted"></span></label>
      <input id="meMins" type="number" min="0" class="w-full"></div>
    <div class="field"><label data-s="payroll.noteOptional" for="meNote"></label>
      <input id="meNote" type="text" class="w-full" data-s-attr="placeholder" data-s="payroll.notePlaceholder"></div>
    <div id="meErr" class="modal-err"></div>
    <div class="modal-actions">
      <button id="meDelBtn" class="btn-del d-none" data-pr-click="meDelete" data-s="payroll.deleteEntry"></button>
      <span class="ml-auto"></span>
      <button class="btn btn-secondary" data-pr-close="prModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-pr-click="meSave" data-s="btn.save"></button>
    </div>
  </div>
</div>

<script src="payroll.js" defer></script>
</body>
</html>
