<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../../shared/logo.svg">
  <title>Ýmir — Payroll</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <style>
    .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px; overflow-x:auto; }
    .tab-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted);
      font-family:inherit; font-size:11px; letter-spacing:.6px; padding:10px 16px; cursor:pointer;
      margin-bottom:-1px; transition:color .2s,border-color .2s; white-space:nowrap; }
    .tab-btn.active { color:var(--brass-fg); border-bottom-color:var(--brass); }
    .tab-btn:hover:not(.active) { color:var(--text); }
    @media(max-width:600px){ .tab-btn{padding:8px 10px;font-size:10px;letter-spacing:.5px} }
  </style>
  <script src="../../shared/api.js"></script>
  <script src="../../shared/strings.js"></script>
  <script src="../../shared/ui.js"></script>
  </head>
<body>
<div class="page">
  <header id="ym-header" class="pr-standalone-only"><div class="header-left"></div><div class="header-right"></div></header>
  <main>
    <div class="pr-standalone-only" style="display:flex;align-items:baseline;gap:12px;margin-bottom:20px">
      <h2 style="margin:0;font-size:18px" data-s="admin.tabPayroll"></h2>
      <a href="../" style="font-size:11px;color:var(--muted);text-decoration:none">&#8592; Admin</a>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="employees"  data-pr-click="prTab" data-pr-arg="employees"  data-s="payroll.tabEmployees"></button>
      <button class="tab-btn"        data-tab="timesheets" data-pr-click="prTab" data-pr-arg="timesheets" data-s="payroll.tabTimeReporting"></button>
    </div>

    <!-- EMPLOYEES -->
    <div id="pr-employees">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:14px;box-shadow:var(--shadow-sm)">
        <label class="toggle-wrap" style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="cfgAllowBreaks" data-pr-change="cfgSaveAllowBreaks" style="width:16px;height:16px;accent-color:var(--brass)">
          <span style="font-size:12px" data-s="payroll.allowBreaks"></span>
        </label>
        <span id="cfgAllowBreaksLbl" style="font-size:11px;color:var(--muted)"></span>
      </div>
      <div id="prEmpList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- TIME REPORTING -->
    <div id="pr-timesheets" class="hidden">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <select id="prTsEmp" data-pr-change="prTsFilter" style="min-width:160px">
          <option value="" data-s="payroll.allStaff"></option>
        </select>
        <div class="view-toggle">
          <button id="btnCal" class="active" data-pr-click="prSetView" data-pr-arg="cal" data-s="payroll.calView"></button>
          <button id="btnList" data-pr-click="prSetView" data-pr-arg="list" data-s="payroll.listView"></button>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
          <span id="prTsTotal" class="ts-total" style="font-size:11px;color:var(--muted)"></span>
          <button class="btn btn-secondary" style="font-size:11px" data-pr-click="prToggleExport" data-s="payroll.export"></button>
          <button class="btn btn-primary" style="font-size:11px" data-pr-click="prOpenModal" data-s="payroll.addEntry"></button>
        </div>
      </div>
      <!-- EXPORT PANEL -->
      <div id="prExportPanel" class="hidden" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm)">
        <div class="sec-lbl" data-s="payroll.export"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
          <label style="font-size:10px;color:var(--muted)" data-s="payroll.periodFrom"></label>
          <input id="prExpFrom" type="date" style="font-size:11px;padding:3px 6px;width:140px">
          <label style="font-size:10px;color:var(--muted)" data-s="payroll.periodTo"></label>
          <input id="prExpTo" type="date" style="font-size:11px;padding:3px 6px;width:140px">
          <button class="btn btn-primary" style="font-size:11px" data-pr-click="prExportTimeData" data-s="payroll.export"></button>
          <span id="prExpMsg" style="font-size:11px"></span>
        </div>
        <div style="margin-bottom:6px">
          <label style="font-size:10px;color:var(--muted);display:block;margin-bottom:4px" data-s="payroll.externalUrl"></label>
          <input id="prExpUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" data-pr-input="prSaveExportUrl" style="width:100%;max-width:560px;font-size:11px;padding:5px 8px">
        </div>
        <div style="font-size:10px;color:var(--muted)" data-s="payroll.externalUrlHint"></div>
      </div>
      <div id="prCalView">
        <div class="cal-nav">
          <button data-pr-click="prCalMove" data-pr-arg="-1">&#8249;</button>
          <span class="cal-month" id="prCalLabel"></span>
          <button data-pr-click="prCalMove" data-pr-arg="1">&#8250;</button>
        </div>
        <div class="cal-dows">
          <div class="cal-dow" data-s="lbl.monShort"></div>
          <div class="cal-dow" data-s="lbl.tueShort"></div>
          <div class="cal-dow" data-s="lbl.wedShort"></div>
          <div class="cal-dow" data-s="lbl.thuShort"></div>
          <div class="cal-dow" data-s="lbl.friShort"></div>
          <div class="cal-dow" data-s="lbl.satShort"></div>
          <div class="cal-dow" data-s="lbl.sunShort"></div>
        </div>
        <div id="prCalDays" class="cal-days"></div>
      </div>
      <div id="prListView" class="hidden">
        <div id="prTsList"><div class="empty-note" data-s="lbl.loading"></div></div>
      </div>
    </div>

  </main>
</div>

<!-- Entry modal -->
<div id="prModal" class="modal-bg hidden" data-pr-close-self>
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 class="modal-title" id="prModalTitle" style="margin:0"></h3>
      <button class="modal-close-x" data-pr-close="prModal">&times;</button>
    </div>
    <div class="field"><label data-s="payroll.employee"></label>
      <select id="meEmp" style="width:100%"></select></div>
    <div class="field"><label data-s="payroll.clockInLabel"></label>
      <input id="meIn" type="datetime-local" style="width:100%"></div>
    <div class="field"><label data-s="payroll.clockOutLabel"></label>
      <input id="meOut" type="datetime-local" style="width:100%" data-pr-change="meCalcMins"></div>
    <div class="field"><label><span data-s="payroll.minsLabel"></span> — <span data-s="payroll.autoCalc" style="font-weight:400;color:var(--muted)"></span></label>
      <input id="meMins" type="number" min="0" style="width:100%"></div>
    <div class="field"><label data-s="payroll.noteOptional"></label>
      <input id="meNote" type="text" style="width:100%" data-s-attr="placeholder" data-s="payroll.notePlaceholder"></div>
    <div id="meErr" class="modal-err"></div>
    <div class="modal-actions">
      <button id="meDelBtn" class="btn-del" style="display:none" data-pr-click="meDelete" data-s="payroll.deleteEntry"></button>
      <span style="margin-left:auto"></span>
      <button class="btn btn-secondary" data-pr-close="prModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-pr-click="meSave" data-s="btn.save"></button>
    </div>
  </div>
</div>

<script src="payroll.js" defer></script>
</body>
</html>
