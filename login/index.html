<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .anchor {
      font-size: 42px;
      display: block;
      margin-bottom: 8px;
    }
    .login-logo h1 {
      color: var(--brass);
      font-size: 24px;
      letter-spacing: 3px;
      font-weight: bold;
    }
    .login-logo p {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .kt-input {
      text-align: center;
      font-size: 22px;
      letter-spacing: 4px;
    }
    .lang-row {
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<div class="login-box">

  <div class="login-logo">
    <span class="anchor">⚓</span>
    <h1>ÝMIR</h1>
    <p id="subtitle">SIGLINGAFÉLAGIÐ</p>
  </div>

  <div class="card">
    <div class="field">
      <label id="ktLabel">Kennitala</label>
      <input
        type="text"
        id="ktInput"
        class="kt-input"
        maxlength="10"
        inputmode="numeric"
        autocomplete="off"
        placeholder="0000000000"
      >
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
        <span id="btnText">Sign In</span>
      </button>
    </div>

    <div id="errMsg" class="msg msg-err" style="display:none"></div>
  </div>

  <div class="lang-row">
    <button class="btn-ghost" onclick="toggleLang()" id="langBtn">IS</button>
  </div>

</div>

<script>
  // ── LANG ────────────────────────────────────────────────────────────────────
  const L = getLang();

  const STRINGS = {
    subtitle: { EN: "SAILING CLUB", IS: "SIGLINGAFÉLAGIÐ" },
    ktLabel:  { EN: "Kennitala", IS: "Kennitala" },
    btnText:  { EN: "Sign In",   IS: "Innskrá" },
    notFound: { EN: "Kennitala not found or account inactive.", IS: "Kennitala finnst ekki eða aðgangur er óvirkur." },
    error:    { EN: "Something went wrong. Try again.", IS: "Eitthvað fór úrskeiðis. Reyndu aftur." },
    langBtn:  { EN: "IS", IS: "EN" },
  };

  function s(k) { return STRINGS[k][L] || STRINGS[k]["EN"]; }

  document.getElementById("subtitle").textContent = s("subtitle");
  document.getElementById("ktLabel").textContent  = s("ktLabel");
  document.getElementById("btnText").textContent  = s("btnText");
  document.getElementById("langBtn").textContent  = s("langBtn");

  // Allow Enter key
  document.getElementById("ktInput").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  // ── LOGIN ───────────────────────────────────────────────────────────────────
  async function doLogin() {
    const kt  = document.getElementById("ktInput").value.trim().replace(/\D/g, "");
    const btn = document.getElementById("loginBtn");
    const err = document.getElementById("errMsg");

    if (kt.length < 10) {
      err.textContent = L === "EN" ? "Enter your 10-digit kennitala." : "Sláðu inn 10 stafa kennitölu.";
      err.style.display = "block";
      return;
    }

    err.style.display = "none";
    btn.disabled = true;
    document.getElementById("btnText").innerHTML = '<span class="spinner"></span>' + (L === "EN" ? "Checking…" : "Athuga…");

    try {
      const data = await apiGet("validateMember", { kennitala: kt });
      setUser(data.member);

      // Redirect based on role
      const role = data.member.role;
      if (role === "admin" || role === "staff") {
        window.location.href = "../admin/";
      } else {
        window.location.href = "../admin/"; // member hub TBD
      }

    } catch (e) {
      err.textContent = (e.message && e.message.includes("Not found") || e.message.includes("Inactive"))
        ? s("notFound")
        : s("error");
      err.style.display = "block";
      btn.disabled = false;
      document.getElementById("btnText").textContent = s("btnText");
    }
  }
</script>
</body>
</html>
