<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/strings.js"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-box { width:100%; max-width:400px; }
    .login-logo { text-align:center; margin-bottom:32px; }
    .login-logo .anchor { font-size:42px; display:block; margin-bottom:8px; }
    .login-logo h1 { color:var(--brass); font-size:24px; letter-spacing:3px; font-weight:bold; }
    .login-logo p { color:var(--muted); font-size:12px; letter-spacing:1px; margin-top:4px; }
    .kt-input { text-align:center; font-size:22px; letter-spacing:4px; }
    .lang-row { text-align:center; margin-top:16px; }
    #roleScreen { display:none; }
    .role-greeting { color:var(--brass); font-size:13px; margin-bottom:20px; text-align:center; letter-spacing:.5px; }
    .role-btn {
      width:100%; padding:18px 20px; margin-bottom:10px; border-radius:8px;
      border:1px solid var(--border); background:var(--surface); cursor:pointer;
      display:flex; align-items:center; gap:14px; transition:border-color .15s, background .15s;
      text-align:left;
    }
    .role-btn:hover { border-color:var(--brass); background:var(--card); }
    .role-btn .role-icon { font-size:22px; flex-shrink:0; }
    .role-btn .role-label { color:var(--text); font-size:13px; font-weight:500; letter-spacing:.5px; }
    .role-btn .role-desc { color:var(--muted); font-size:11px; margin-top:2px; }
    .role-btn.role-admin { border-color:#e74c3c44; }
    .role-btn.role-admin:hover { border-color:#e74c3c; }
    .role-btn.role-staff { border-color:var(--brass)44; }
    .role-btn.role-member { border-color:#2ecc7144; }
    .role-btn.role-member:hover { border-color:#2ecc71; }
    .back-link { display:block; text-align:center; margin-top:12px; color:var(--muted); font-size:12px; cursor:pointer; }
    .back-link:hover { color:var(--brass); }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <span class="anchor">⚓</span>
    <p id="subtitle">SIGLINGAFÉLAGIÐ</p>
    <h1>ÝMIR</h1>
  </div>

  <div id="ktScreen">
    <div class="card">
      <div class="field">
        <label id="ktLabel">Kennitala</label>
        <input type="text" id="ktInput" class="kt-input" maxlength="10"
          inputmode="numeric" autocomplete="off" placeholder="0000000000">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
          <span id="btnText">Sign In</span>
        </button>
      </div>
      <div id="errMsg" class="msg msg-err" style="display:none"></div>
    </div>
  </div>

  <div id="roleScreen">
    <div class="card">
      <div class="role-greeting" id="roleGreeting"></div>
      <div id="roleBtns"></div>
    </div>
    <span class="back-link" onclick="goBack()" id="backLink">← Sign in as someone else</span>
  </div>

  <div class="lang-row">
    <button class="btn-ghost" onclick="toggleLang()" id="langBtn">IS</button>
  </div>
</div>

<script>
const L = getLang();

document.getElementById("subtitle").textContent = s("subtitle");
document.getElementById("ktLabel").textContent   = s("ktLabel");
document.getElementById("btnText").textContent   = s("btnText");
document.getElementById("langBtn").textContent   = s("langBtn");
document.getElementById("backLink").textContent  = s("backLink");
document.getElementById("ktInput").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

async function doLogin() {
  const kt  = document.getElementById("ktInput").value.trim().replace(/\D/g,"");
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("errMsg");
  if (kt.length < 10) {
    err.textContent = L==="EN" ? "Enter your 10-digit kennitala." : "Sláðu inn 10 stafa kennitölu.";
    err.style.display="block"; return;
  }
  err.style.display="none"; btn.disabled=true;
  document.getElementById("btnText").innerHTML='<span class="spinner"></span>'+(L==="EN"?"Checking…":"Athuga…");
  try {
    const data = await apiGet("validateMember", { kennitala: kt });
    const user = data.member;
    setUser(user);
    if (user.role === "admin") {
      showRolePicker(user, ["member","staff","admin"]);
    } else if (user.role === "staff") {
      showRolePicker(user, ["member","staff"]);
    } else {
      window.location.href = "../member/";
    }
  } catch(e) {
    err.textContent = (e.message?.includes("Not found")||e.message?.includes("Inactive")) ? s("notFound") : s("error");
    err.style.display="block"; btn.disabled=false;
    document.getElementById("btnText").textContent=s("btnText");
  }
}

function showRolePicker(user, roles) {
  document.getElementById("ktScreen").style.display   = "none";
  document.getElementById("roleScreen").style.display = "block";
  document.getElementById("roleGreeting").textContent = s("welcome")+" "+user.name.split(" ")[0]+" — "+s("chooseView");
  const dests = {
    admin:  { icon:"⚙️", lk:"r_admin_label",  dk:"r_admin_desc",  href:"../admin/",  cls:"role-admin" },
    staff:  { icon:"🧭", lk:"r_staff_label",  dk:"r_staff_desc",  href:"../staff/",  cls:"role-staff" },
    member: { icon:"⛵", lk:"r_member_label", dk:"r_member_desc", href:"../member/", cls:"role-member" },
  };
  const container = document.getElementById("roleBtns");
  container.innerHTML = "";
  roles.forEach(r => {
    const d = dests[r];
    const btn = document.createElement("button");
    btn.className = "role-btn "+d.cls;
    btn.innerHTML = `<span class="role-icon">${d.icon}</span><div><div class="role-label">${s(d.lk)}</div><div class="role-desc">${s(d.dk)}</div></div>`;
    btn.onclick = () => { window.location.href = d.href; };
    container.appendChild(btn);
  });
}

function goBack() {
  document.getElementById("ktScreen").style.display   = "block";
  document.getElementById("roleScreen").style.display = "none";
  document.getElementById("ktInput").value = "";
  document.getElementById("loginBtn").disabled = false;
  document.getElementById("btnText").textContent = s("btnText");
}
</script>
</body>
</html>
