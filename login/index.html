<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com/gsi/; frame-src https://accounts.google.com/gsi/; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
  <title>Ýmir — Sign In</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js" defer></script>
  <script src="../shared/strings.js" defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="login-logo-img" role="img" aria-label="Ýmir Siglingafélag"></div>
  </div>

  <div id="ktScreen">
    <div class="card">
      <div id="googleBtnWrap" class="d-none mb-14">
        <div id="googleBtn"></div>
        <div id="googleDivider" class="login-or" aria-hidden="true"><span id="googleDividerText"></span></div>
        <div id="googleErr" class="msg msg-err d-none mb-8"></div>
      </div>
      <div class="field">
        <label id="ktLabel" for="ktInput"></label>
        <input type="text" id="ktInput" class="kt-input" maxlength="12"
          autocomplete="username" autocapitalize="characters">
      </div>
      <div class="field">
        <label id="pwLabel" for="pwInput"></label>
        <input type="password" id="pwInput" class="pw-input"
          autocomplete="current-password">
      </div>
      <div class="stay-row">
        <label><input type="checkbox" id="stayLoggedIn"> <span id="stayLabel"></span></label>
      </div>
      <div class="btn-row mt-14">
        <button class="btn btn-primary" id="loginBtn" data-login-click="doLogin">
          <span id="btnText"></span>
        </button>
      </div>
      <div id="pwHint" class="msg d-none mt-8 text-xs text-muted"></div>
      <div id="errMsg" class="msg msg-err d-none"></div>
    </div>
  </div>

  <div id="accountScreen">
    <div class="role-greeting" id="accountGreeting"></div>
    <div id="accountBtns"></div>
    <div id="accountErr" class="msg msg-err d-none mt-8"></div>
    <span class="back-link" data-login-click="goBack" id="accountBackLink"></span>
  </div>

  <div id="forceChangeScreen">
    <div class="card">
      <div class="role-greeting" id="changeGreeting"></div>
      <div class="settings-hint text-md text-muted mb-14" id="changeHint" style="text-align:center"></div>
      <div class="field">
        <label id="newPwLabel" for="newPwInput"></label>
        <input type="password" id="newPwInput" class="pw-input" autocomplete="new-password">
      </div>
      <div class="field">
        <label id="confirmPwLabel" for="confirmPwInput"></label>
        <input type="password" id="confirmPwInput" class="pw-input" autocomplete="new-password">
      </div>
      <div class="btn-row mt-14">
        <button class="btn btn-primary" id="changeBtn" data-login-click="submitForceChange">
          <span id="changeBtnText"></span>
        </button>
      </div>
      <div id="changeErr" class="msg msg-err d-none mt-8"></div>
    </div>
    <span class="back-link" data-login-click="goBack" id="changeBackLink"></span>
  </div>

  <div id="roleScreen">
    <div class="role-greeting" id="roleGreeting"></div>
    <div id="roleBtns"></div>
    <span class="back-link" data-login-click="goBack" id="backLink"></span>
  </div>

  <div class="lang-row">
    <button class="btn-ghost" data-login-click="toggleLang" id="langBtn"></button>
  </div>
</div>

<script src="login.js" defer></script>
</body>
</html>
