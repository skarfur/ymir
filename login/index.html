<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Sign In</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script>document.write('<script src="../shared/strings-'+(localStorage.getItem('ymirLang')||'IS').toLowerCase()+'.js"><\/script>');</script>
  <script src="../shared/strings.js"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-box { width:100%; max-width:400px; }
    .login-logo { text-align:center; margin-bottom:32px; }
    .login-logo .anchor { font-size:42px; display:block; margin-bottom:8px; }
    .login-logo h1 { color:var(--brass); font-size:24px; letter-spacing:3px; font-weight:bold; }
    .login-logo p { color:var(--muted); font-size:12px; letter-spacing:1px; margin-top:4px; }
    .kt-input { text-align:center; font-size:22px; letter-spacing:4px; }
    .lang-row { text-align:center; margin-top:16px; }
    #roleScreen { display:none; }
    .role-greeting { color:var(--brass); font-size:13px; margin-bottom:20px; text-align:center; letter-spacing:.5px; }
    .role-btn {
      width:100%; padding:18px 20px; margin-bottom:10px; border-radius:8px;
      border:1px solid var(--border); background:var(--surface); cursor:pointer;
      display:flex; align-items:center; gap:14px; transition:border-color .15s, background .15s;
      text-align:left;
    }
    .role-btn:hover { border-color:var(--brass); background:var(--card); }
    .role-btn .role-icon { font-size:22px; flex-shrink:0; }
    .role-btn .role-label { color:var(--text); font-size:13px; font-weight:500; letter-spacing:.5px; }
    .role-btn .role-desc { color:var(--muted); font-size:11px; margin-top:2px; }
    .role-btn.role-admin  { border-color:#e74c3c44; }
    .role-btn.role-admin:hover { border-color:#e74c3c; }
    .role-btn.role-staff  { border-color:var(--brass)44; }
    .role-btn.role-member { border-color:#2ecc7144; }
    .role-btn.role-member:hover { border-color:#2ecc71; }
    .back-link { display:block; text-align:center; margin-top:12px; color:var(--muted); font-size:12px; cursor:pointer; }
    .back-link:hover { color:var(--brass); }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <span class="anchor">⚓️</span>
    <p id="subtitle"></p>
    <h1>ÝMIR</h1>
  </div>

  <div id="ktScreen">
    <div class="card">
      <div class="field">
        <label id="ktLabel"></label>
        <input type="text" id="ktInput" class="kt-input" maxlength="10"
          inputmode="numeric" autocomplete="off">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
          <span id="btnText"></span>
        </button>
      </div>
      <div id="errMsg" class="msg msg-err" style="display:none"></div>
    </div>
  </div>

  <div id="roleScreen">
    <div class="card">
      <div class="role-greeting" id="roleGreeting"></div>
      <div id="roleBtns"></div>
    </div>
    <span class="back-link" onclick="goBack()" id="backLink"></span>
  </div>

  <div class="lang-row">
    <button class="btn-ghost" onclick="toggleLang()" id="langBtn"></button>
  </div>
</div>

<script>
// Wire all strings on load — no hard-coded text in HTML
document.getElementById('subtitle').textContent  = s('login.subtitle');
// EN: title above subtitle; IS: subtitle above title
if (getLang() !== 'IS') {
  var logo = document.querySelector('.login-logo');
  logo.appendChild(document.getElementById('subtitle'));
}
document.getElementById('ktLabel').textContent   = s('login.kennitala');
document.getElementById('ktInput').placeholder   = s('login.placeholder');
document.getElementById('btnText').textContent   = s('login.btn');
document.getElementById('langBtn').textContent   = s('nav.langToggle');
document.getElementById('backLink').textContent  = s('login.back');

document.getElementById('ktInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Warm the Apps Script container early so post-login API calls are fast
apiGet('getConfig');

async function doLogin() {
  const kt  = document.getElementById('ktInput').value.trim().replace(/\D/g, '');
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');

  if (kt.length < 10) {
    err.textContent    = s('login.tooShort');
    err.style.display  = 'block';
    return;
  }

  err.style.display  = 'none';
  btn.disabled       = true;
  document.getElementById('btnText').innerHTML =
    `<span class="spinner"></span>${s('login.loading')}`;

  try {
    const data = await apiGet('validateMember', { kennitala: kt });
    const user = data.member;
    setUser(user);

    // Sync server preferences → localStorage so all pages see saved settings
    var serverPrefs = parseJson(user.preferences, {});
    if (Object.keys(serverPrefs).length) {
      setPrefs(serverPrefs);
      if (serverPrefs.theme) setTheme(serverPrefs.theme);
      if (serverPrefs.lang) setLang(serverPrefs.lang);
    }

    // Prefetch data the landing page will need while user is on role picker
    // (or racing the redirect for regular members). Results land in
    // sessionStorage via apiGet's cache, so the target page skips the call.
    window._prefetchConfig = apiGet('getConfig');
    if (user.role === 'admin') {
      window._prefetchMembers = apiGet('getMembers');
      window._prefetchCheckouts = apiGet('getActiveCheckouts');
      showRolePicker(user, ['member', 'staff', 'admin']);
    } else if (user.role === 'staff') {
      window._prefetchMembers = apiGet('getMembers');
      window._prefetchCheckouts = apiGet('getActiveCheckouts');
      showRolePicker(user, ['member', 'staff']);
    } else {
      window._prefetchCheckouts = apiGet('getActiveCheckouts');
      window.location.href = '../member/';
    }
  } catch(e) {
    const isNotFound = e.message?.includes('Not found') || e.message?.includes('Inactive');
    err.textContent   = isNotFound ? s('login.notFound') : s('login.error');
    err.style.display = 'block';
    btn.disabled      = false;
    document.getElementById('btnText').textContent = s('login.btn');
  }
}

function showRolePicker(user, roles) {
  document.getElementById('ktScreen').style.display   = 'none';
  document.getElementById('roleScreen').style.display = 'block';
  document.getElementById('roleGreeting').textContent =
    s('login.welcome') + ' ' + user.name.split(' ')[0] + ' — ' + s('login.chooseView');

  const dests = {
    admin:  { icon: '⚙️', label: s('login.admin.label'),  desc: s('login.admin.desc'),  href: '../admin/',  cls: 'role-admin'  },
    staff:  { icon: '🧭', label: s('login.staff.label'),  desc: s('login.staff.desc'),  href: '../staff/',  cls: 'role-staff'  },
    member: { icon: '⛵', label: s('login.member.label'), desc: s('login.member.desc'), href: '../member/', cls: 'role-member' },
  };

  const container = document.getElementById('roleBtns');
  container.innerHTML = '';
  roles.forEach(r => {
    const d   = dests[r];
    const btn = document.createElement('button');
    btn.className = 'role-btn ' + d.cls;
    btn.innerHTML = `<span class="role-icon">${d.icon}</span>
      <div>
        <div class="role-label">${d.label}</div>
        <div class="role-desc">${d.desc}</div>
      </div>`;
    btn.onclick = () => { window.location.href = d.href; };
    container.appendChild(btn);
  });
}

function goBack() {
  document.getElementById('ktScreen').style.display   = 'block';
  document.getElementById('roleScreen').style.display = 'none';
  document.getElementById('ktInput').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('btnText').textContent = s('login.btn');
}
</script>
</body>
</html>
