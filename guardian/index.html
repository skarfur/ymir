<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://api.open-meteo.com https://marine-api.open-meteo.com https://nominatim.openstreetmap.org; frame-src 'self' https://calendar.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Guardian</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script>document.write('<script src="../shared/strings-'+(localStorage.getItem('ymirLang')||'IS').toLowerCase()+'.js"><\/script>');</script>
<script src="../shared/strings.js"></script>
<style>
.guardian-hero { text-align:center; margin:24px 0 18px; }
.guardian-hero h1 { font-size:18px; font-weight:500; margin:0 0 4px; }
.guardian-hero .sub { font-size:12px; color:var(--muted); }

.ward-list { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.ward-btn {
  width:100%; padding:16px 18px; border-radius:var(--radius-md);
  border:1px solid var(--border); background:var(--surface); cursor:pointer;
  display:flex; align-items:center; gap:14px; transition:all .2s;
  text-align:left; box-shadow:var(--shadow-sm); font-family:inherit;
}
.ward-btn:hover { border-color:var(--moss-d); background:var(--card); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.ward-btn .ward-icon { width:22px; height:22px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:20px; }
.ward-btn .ward-name { color:var(--text); font-size:14px; font-weight:500; }
.ward-btn .ward-sub  { color:var(--muted); font-size:11px; margin-top:2px; }

.empty-wards { text-align:center; padding:24px 16px; color:var(--muted); font-size:13px; border:1px dashed var(--border); border-radius:var(--radius-md); }

.guardian-err { margin-top:10px; }
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<main class="container">
  <div class="guardian-hero">
    <h1 id="gHello"></h1>
    <div class="sub" id="gSub"></div>
  </div>

  <div id="wardList" class="ward-list"></div>
  <div id="gErr" class="msg msg-err guardian-err" style="display:none"></div>
</main>

<script>
var user = requireAuth();
if (!user) throw new Error('not authenticated');

document.addEventListener('DOMContentLoaded', async function() {
  buildHeader('guardian');
  applyStrings();

  var firstName = (user.name || '').split(' ')[0] || user.name || '';
  document.getElementById('gHello').textContent = s('login.welcome') + ' ' + firstName;
  document.getElementById('gSub').textContent = s('guardian.sub');

  try {
    // validateMember returns { member, wards } — wards is what we need.
    var data = await apiGet('validateMember', { kennitala: user.kennitala, _fresh: 1 });
    renderWards(Array.isArray(data.wards) ? data.wards : []);
  } catch (e) {
    renderWards([]);
    var err = document.getElementById('gErr');
    err.textContent = s('guardian.loadError');
    err.style.display = 'block';
  }
});

function renderWards(wards) {
  var list = document.getElementById('wardList');
  list.innerHTML = '';
  if (!wards.length) {
    var empty = document.createElement('div');
    empty.className = 'empty-wards';
    empty.textContent = s('guardian.noWards');
    list.appendChild(empty);
    return;
  }
  wards.forEach(function(w) {
    var btn = document.createElement('button');
    btn.className = 'ward-btn';
    btn.innerHTML =
      '<span class="ward-icon">🧒</span>' +
      '<div>' +
        '<div class="ward-name">' + esc(w.name) + '</div>' +
        '<div class="ward-sub">' + s('login.wardMinor') +
          (w.birthYear ? ' · ' + esc(w.birthYear) : '') + '</div>' +
      '</div>';
    btn.onclick = function() { switchToWard(w); };
    list.appendChild(btn);
  });
}

async function switchToWard(ward) {
  var err = document.getElementById('gErr');
  err.style.display = 'none';
  // Drop per-user caches so the ward's hub doesn't show stale guardian data.
  try {
    ['ymir_getTrips_','ymir_getCrews_','ymir_getCrewBoard_','ymir_getCrewInvites_']
      .forEach(function(k) { sessionStorage.removeItem(k); });
  } catch(e) {}
  try {
    // Preserve the guardian's current session so switchBackToGuardian can
    // restore it without re-login; it's cleared when the user fully signs out.
    var parent = getSessionInfo();
    if (parent && parent.token) setParentSession(parent);
    var data = await apiPost('validateWard', {
      guardianKennitala: user.kennitala,
      wardKennitala:     ward.kennitala,
      userAgent:         (navigator.userAgent || '').slice(0, 200),
    });
    if (data.sessionToken) {
      setSession(data.sessionToken, data.expiresAt || null, data.sessionId || null);
    }
    var wardUser = Object.assign({}, data.member, {
      guardianSession: {
        id:        user.id,
        kennitala: user.kennitala,
        name:      user.name,
        role:      user.role,
      },
    });
    setUser(wardUser);
    window.location.href = '../member/';
  } catch (e) {
    err.textContent = s('login.wardSwitchError');
    err.style.display = 'block';
  }
}

function esc(t) {
  return String(t == null ? '' : t)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
