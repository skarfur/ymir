<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Guardian</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<style>
.guardian-hero { text-align:center; margin:24px 0 18px; }
.guardian-hero h1 { font-size:18px; font-weight:500; margin:0 0 4px; }
.guardian-hero .sub { font-size:12px; color:var(--muted); }

.ward-list { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.ward-btn {
  width:100%; padding:16px 18px; border-radius:var(--radius-md);
  border:1px solid var(--border); background:var(--surface); cursor:pointer;
  display:flex; align-items:center; gap:14px; transition:all .2s;
  text-align:left; box-shadow:var(--shadow-sm); font-family:inherit;
}
.ward-btn:hover { border-color:var(--moss-d); background:var(--card); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.ward-btn .ward-icon { width:22px; height:22px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:20px; }
.ward-btn .ward-name { color:var(--text); font-size:14px; font-weight:500; }
.ward-btn .ward-sub  { color:var(--muted); font-size:11px; margin-top:2px; }

.empty-wards { text-align:center; padding:24px 16px; color:var(--muted); font-size:13px; border:1px dashed var(--border); border-radius:var(--radius-md); }

.guardian-err { margin-top:10px; }
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<main class="container">
  <div class="guardian-hero">
    <h1 id="gHello"></h1>
    <div class="sub" id="gSub"></div>
  </div>

  <div id="wardList" class="ward-list"></div>
  <div id="gErr" class="msg msg-err guardian-err" style="display:none"></div>
</main>

<script src="guardian.js" defer></script>
</body>
</html>
