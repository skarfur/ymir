<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Captain's Quarters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="../shared/tripcard.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/certs.js"></script>
<script src="../shared/mcm.js"></script>
<script src="../shared/maintenance.js"></script>
<script>window._logbookSkipInit = true;</script>
<script src="../shared/logbook.js"></script>
<style>
/* ── Stats ── */
.cq-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.cq-stat { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 12px; text-align:center; }
.cq-stat .sn { font-size:24px; color:var(--brass); font-weight:500; }
.cq-stat .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Section headers ── */
.cq-section { margin-bottom:20px; }
.cq-section-hdr { font-size:9px; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.cq-section-hdr .badge { font-size:9px; padding:2px 8px; border-radius:10px; font-weight:500; }

/* ── Filter pills ── */
.cq-pills { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.cq-pill { padding:5px 12px; border-radius:16px; border:1px solid var(--border); background:var(--surface);
  font-size:10px; font-family:inherit; color:var(--muted); cursor:pointer; transition:all .15s; }
.cq-pill.active { border-color:var(--brass); color:var(--brass); background:var(--brass)11; }

/* ── Compact filter bar ── */
.cq-filter-bar { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px; margin-bottom:10px; align-items:center; }
.cq-filter-bar select, .cq-filter-bar input[type="text"] { background:var(--surface); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:inherit; font-size:10px; padding:4px 8px; height:26px; outline:none;
  transition:border-color .15s; min-width:0; width:100%; box-sizing:border-box; }
.cq-filter-bar select:focus, .cq-filter-bar input:focus { border-color:var(--brass); }
.cq-filter-search { display:flex; gap:6px; align-items:center; grid-column:1/-1; }
.cq-filter-search input { flex:1; min-width:0; }
.cq-filter-count { font-size:9px; color:var(--muted); white-space:nowrap; }

/* ── Cards ── */
.cq-card { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; }
.cq-card-title { font-size:12px; font-weight:500; color:var(--text); }
.cq-card-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.cq-card-meta { font-size:10px; color:var(--brass); margin-top:2px; }
.cq-card .conf-actions { display:flex; gap:6px; margin-top:8px; }
.cq-card .conf-actions button { font-size:11px; font-family:inherit; padding:5px 12px; border-radius:6px; cursor:pointer; border:1px solid; }
.cq-card .btn-confirm { background:var(--green)18; color:var(--green); border-color:var(--green)55; }
.cq-card .btn-confirm:hover { background:var(--green)33; }
.cq-card .btn-reject { background:var(--red)18; color:var(--red); border-color:var(--red)55; }
.cq-card .btn-reject:hover { background:var(--red)33; }

/* ── Maintenance severity ── */
.sev-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.sev-low      { background:var(--green); }
.sev-medium   { background:var(--yellow); }
.sev-high     { background:var(--orange); }
.sev-critical { background:var(--red); }


/* ── Show-more button ── */
.cq-show-more { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px; font-size:10px; color:var(--muted); cursor:pointer; font-family:inherit; margin-top:4px; text-align:center; }
.cq-show-more:hover { border-color:var(--brass); color:var(--text); }

/* ── Filter bar (logbook) ── */
.filter-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:12px; align-items:center; }
.filter-bar select, .filter-bar input { background:var(--surface); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:inherit; font-size:11px; padding:5px 9px; height:30px; outline:none;
  transition:border-color .15s; width:100%; box-sizing:border-box; }
.filter-bar select:focus, .filter-bar input:focus { border-color:var(--brass); }
.filter-bar .filter-search-row { grid-column:1/-1; display:flex; gap:6px; align-items:center; }
.filter-bar .filter-search-row input { flex:1; min-width:0; }
.filter-count { font-size:10px; color:var(--muted); white-space:nowrap; }

/* ── Bio section ── */
.cq-bio-area { width:100%; min-height:80px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:inherit; font-size:12px; padding:10px 12px;
  resize:vertical; box-sizing:border-box; }
.cq-headshot-preview { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--brass); }
.cq-headshot-placeholder { width:80px; height:80px; border-radius:50%; background:var(--surface);
  border:2px dashed var(--border); display:flex; align-items:center; justify-content:center;
  font-size:24px; color:var(--muted); }

/* ── Boat cards ── */
.cq-boat { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
.cq-boat-name { font-size:13px; font-weight:500; }
.cq-boat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.cq-boat-actions { margin-left:auto; display:flex; gap:6px; }
.cq-boat-actions button { font-size:10px; font-family:inherit; padding:4px 10px; border-radius:6px;
  cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); }
.cq-boat-actions button:hover { border-color:var(--brass); color:var(--brass); }

/* ── Responsive ── */
@media(max-width:600px){
  .cq-stats { grid-template-columns:1fr 1fr; }
  .cq-stat .sn { font-size:20px; }
  .cq-filter-bar { grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); }
  .filter-bar { grid-template-columns:1fr 1fr; }
}
@media(max-width:400px){
  .cq-filter-bar { grid-template-columns:1fr 1fr; gap:4px; }
  .cq-filter-bar select, .cq-filter-bar input[type="text"] { font-size:9px; padding:3px 6px; }
  .filter-bar { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="cqTitle"></div>
    <div class="text-sm text-muted" style="margin-top:2px" id="cqSubtitle"></div>
  </div>

  <!-- ══ YTD STATS ══ -->
  <div class="cq-stats" id="cqStats">
    <div class="cq-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cq.ytdTrips"></div></div>
    <div class="cq-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cq.ytdHours"></div></div>
    <div class="cq-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cq.ytdDistance"></div></div>
  </div>

  <!-- ══ MAINTENANCE ══ -->
  <div class="cq-section" id="sectMaint">
    <div class="cq-section-hdr" data-s="cq.maintTitle"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
      <div class="cq-pills" id="maintPills" style="margin-bottom:0"></div>
      <select id="mfBoat" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:10px;padding:4px 8px;height:26px;outline:none;max-width:140px"><option value="">All boats</option></select>
    </div>
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ VALIDATION REQUESTS ══ -->
  <div class="cq-section" id="sectValidation">
    <div class="cq-section-hdr" data-s="cq.validationTitle"></div>
    <div id="validationList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ CREW APPROVALS ══ -->
  <div class="cq-section" id="sectCrew">
    <div class="cq-section-hdr" data-s="cq.crewTitle"></div>
    <div id="crewList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ ASSIGN CREDENTIALS ══ -->
  <div class="cq-section" id="sectCredentials">
    <div class="cq-section-hdr" data-s="cq.assignCredTitle"></div>
    <div style="margin-bottom:10px">
      <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" onclick="openMemberCertModal()" data-s="cq.assignCred"></button>
    </div>
  </div>

  <!-- ══ MY BOATS ══ -->
  <div class="cq-section" id="sectBoats">
    <div class="cq-section-hdr" data-s="cq.boatsTitle"></div>
    <div id="boatList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ LOGBOOK ══ -->
  <div class="cq-section" id="sectLogbook">
    <div class="cq-section-hdr">LOGBOOK</div>
    <div class="filter-bar">
      <select id="fYear"><option value="">All years</option></select>
      <select id="fCat"><option value="">All categories</option></select>
      <select id="fBoatName"><option value="">All boats</option></select>
      <select id="fCaptain"><option value="">All captains</option></select>
      <select id="fMember"><option value="">All members</option></select>
      <select id="fWind">
        <option value="">Any wind</option>
        <option value="calm">Calm (Force 0–2)</option>
        <option value="light">Light (Force 3–4)</option>
        <option value="moderate">Moderate (Force 5–6)</option>
        <option value="strong">Strong (Force 7+)</option>
        <option value="gt4">Above Force 4</option>
        <option value="lte4">Force 4 or under</option>
      </select>
      <div class="filter-search-row">
        <input id="fText" type="text" placeholder="Search…">
        <span class="filter-count" id="filterCount"></span>
      </div>
    </div>
    <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ BIO & PROFILE ══ -->
  <div class="cq-section" id="sectBio">
    <div class="cq-section-hdr" data-s="cq.bioTitle"></div>
    <div class="cq-card">
      <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:12px">
        <div id="headshotWrap">
          <div class="cq-headshot-placeholder" id="headshotPlaceholder">+</div>
        </div>
        <div style="flex:1">
          <label style="font-size:9px;color:var(--muted);letter-spacing:.8px;display:block;margin-bottom:6px" data-s="cq.headshotLabel"></label>
          <input type="file" id="headshotFile" accept="image/*" style="font-size:11px;color:var(--text);width:100%">
        </div>
      </div>
      <textarea class="cq-bio-area" id="bioText" maxlength="500"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <a id="publicProfileLink" href="#" target="_blank" style="font-size:11px;color:var(--brass);text-decoration:none" data-s="cq.viewPublicProfile"></a>
        <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" onclick="saveBio()" data-s="btn.save"></button>
      </div>
    </div>
  </div>

</div>

<!-- ══ PORT CHANGE MODAL ══ -->
<div class="modal-overlay hidden" id="portModal" onclick="if(event.target===this)closeModal('portModal')">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <h3 id="portModalTitle"></h3>
      <button class="modal-close-x" onclick="closeModal('portModal')">×</button>
    </div>
    <div class="field">
      <label data-s="admin.homePort"></label>
      <select id="portSelect"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('portModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="savePort()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ RESERVATION MODAL ══ -->
<div class="modal-overlay hidden" id="resModal" onclick="if(event.target===this)closeModal('resModal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="boat.addReservation"></h3>
      <button class="modal-close-x" onclick="closeModal('resModal')">×</button>
    </div>
    <div class="field">
      <label data-s="cq.resMember">Member</label>
      <div style="position:relative">
        <input type="text" id="cqResMemberSearch" autocomplete="off" placeholder="" oninput="searchCqResMember(this.value)">
        <div id="cqResMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="cqResMemberKt">
        <div id="cqResMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label data-s="cq.resStartDate">Start</label><input type="date" id="cqResStart"></div>
      <div class="field"><label data-s="cq.resEndDate">End</label><input type="date" id="cqResEnd"></div>
    </div>
    <div class="field"><label data-s="cq.resNote">Note</label><input type="text" id="cqResNote"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('resModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="saveCqReservation()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
const user = requireAuth();
if (!user || !isCaptain(user)) { window.location.href = '../member/'; throw new Error('Not a captain'); }
const L = getLang();

let _boats = [], _locations = [], _allMaint = [], _allTrips = [], _myKeelboatTrips = [];
let _crewConfirmations = [], _verificationRequests = [];
let _maintFilter = 'open', _maintBoatFilter = '';
let _cqMembers = [], _cqCertDefs = [], _cqCertCategories = [];

// Globals required by shared/logbook.js
var allTrips = [], myTrips = [], allBoats = [], allMembers = [], allLocs = [];
const _windUnit = getPref('windUnit', 'bft');
// parseDateParts / bftLabel used by tripCard()
function parseDateParts(d) {
  if (!d) return {day:'—',mon:'',yr:''};
  var IS = getLang() === 'IS';
  return {day:d.slice(8,10)||'—', mon:new Date(d+'T12:00:00').toLocaleDateString(IS?'is-IS':'en-GB',{month:'short'}), yr:d.slice(0,4)};
}
function bftLabel(b) {
  var n = parseInt(b);
  return ['Calm','Light air','Light breeze','Gentle breeze','Moderate breeze','Fresh breeze','Strong breeze','Near gale','Gale','Severe gale'][n] || 'Force '+b;
}

// ══ INIT ═════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  buildHeader('captain');
  applyStrings();

  document.getElementById('cqTitle').textContent = s('cq.title');
  document.getElementById('cqSubtitle').textContent = user.name + ' — ' + s('cq.subtitle');
  document.getElementById('bioText').placeholder = s('cq.bioPlaceholder');

  // Load existing bio & headshot
  if (user.bio) document.getElementById('bioText').value = user.bio;
  if (user.headshotUrl) renderHeadshot(user.headshotUrl);

  // Public profile link
  document.getElementById('publicProfileLink').href = SCRIPT_URL + '?action=captain&id=' + user.id;

  // Headshot upload handler
  document.getElementById('headshotFile').addEventListener('change', uploadHeadshot);

  // Build filter pills
  buildMaintPills();

  // Fetch all data in parallel
  try {
    const [cfgRes, maintRes, tripsRes, confRes, verRes, membersRes] = await Promise.all([
      apiGet('getConfig'),
      apiGet('getMaintenance'),
      apiGet('getTrips', { limit: 500 }),
      apiGet('getConfirmations', { kennitala: user.kennitala }),
      apiGet('getVerificationRequests'),
      apiGet('getMembers'),
    ]);

    _boats     = (cfgRes.boats     || []);
    _locations = (cfgRes.locations || []).filter(l => l.active !== false && l.active !== 'false');
    _cqMembers = (membersRes.members || []).filter(m => m.active !== false && m.active !== 'false');
    _cqCertDefs = certDefsFromConfig(cfgRes.certDefs || []);
    _cqCertCategories = certCategoriesFromConfig(cfgRes.certCategories || []);
    _allMaint  = maintRes.items || maintRes.maintenance || [];
    _verificationRequests = verRes.requests || [];

    // All trips (logbook shows all, defaults to keelboat filter)
    var allTripsRaw = tripsRes.trips || [];
    _allTrips = allTripsRaw;
    _myKeelboatTrips  = _allTrips.filter(t => (t.boatCategory || '').toLowerCase() === 'keelboat')
                         .filter(t => String(t.kennitala) === String(user.kennitala));

    // Confirmations: pending ones where I'm the recipient
    _crewConfirmations = confRes.confirmations || confRes.items || [];

    // Populate logbook globals (myTrips = all trips, captain sees fleet-wide)
    allBoats   = _boats;
    allTrips   = _allTrips;
    myTrips    = _allTrips.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    allMembers = _cqMembers;

    renderStats();
    buildMaintBoatFilter();
    renderMaint();
    renderValidation();
    renderCrew();
    renderBoats();
    buildFilters();
    applyFilter();
  } catch (e) {
    console.error(e);
    showToast(s('toast.loadFailed') + ': ' + e.message, 'err');
  }

  warmContainer();
});

// ══ STATS ════════════════════════════════════════════════════════════════════
function renderStats() {
  var yearStart = new Date().getFullYear() + '-01-01';
  var ytd = _myKeelboatTrips.filter(t => (t.date || '') >= yearStart && (t.role === 'skipper' || t.role === 'captain'));
  var hours = 0, dist = 0;
  ytd.forEach(t => { hours += Number(t.hoursDecimal) || 0; dist += Number(t.distanceNm) || 0; });
  document.getElementById('statTrips').textContent = ytd.length;
  document.getElementById('statHours').textContent = hours.toFixed(1);
  document.getElementById('statDist').textContent  = dist.toFixed(1) + ' ' + s('cq.nm');
}

// ══ MAINTENANCE ══════════════════════════════════════════════════════════════
function buildMaintPills() {
  var el = document.getElementById('maintPills');
  el.innerHTML = '';
  [{k:'open',s:'cq.maintOpen'},{k:'closed',s:'cq.maintClosed'},{k:'all',s:'cq.maintAll'}].forEach(p => {
    var btn = document.createElement('button');
    btn.className = 'cq-pill' + (p.k === _maintFilter ? ' active' : '');
    btn.textContent = s(p.s);
    btn.onclick = () => { _maintFilter = p.k; buildMaintPills(); renderMaint(); };
    el.appendChild(btn);
  });
}

function buildMaintBoatFilter() {
  var sel = document.getElementById('mfBoat');
  // Collect unique keelboat names from maintenance items
  var boatNames = [...new Set(_allMaint
    .filter(m => { var cat = (m.boatCategory||'').toLowerCase(); if (!cat && m.boatId) { var b = _boats.find(x=>x.id===m.boatId); if(b) cat=(b.category||'').toLowerCase(); } return cat==='keelboat'; })
    .map(m => m.boatName || '')
    .filter(Boolean)
  )].sort();
  sel.innerHTML = '<option value="">All boats</option>' + boatNames.map(n => '<option value="'+esc(n)+'">'+esc(n)+'</option>').join('');
  sel.onchange = function() { _maintBoatFilter = this.value; renderMaint(); };
}

function renderMaint() {
  var el = document.getElementById('maintList');
  // Filter for keelboat-related maintenance
  var items = _allMaint.filter(m => {
    var cat = (m.boatCategory || '').toLowerCase();
    if (!cat && m.boatId) { var b = _boats.find(x => x.id === m.boatId); if (b) cat = (b.category || '').toLowerCase(); }
    return cat === 'keelboat';
  });
  if (_maintFilter === 'open') items = items.filter(m => !m.resolved && !boolVal(m.resolved));
  else if (_maintFilter === 'closed') items = items.filter(m => m.resolved || boolVal(m.resolved));
  if (_maintBoatFilter) items = items.filter(m => (m.boatName || '') === _maintBoatFilter);
  items.sort((a, b) => (b.createdAt || '') > (a.createdAt || '') ? 1 : -1);

  if (!items.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noMaint') + '</div>'; return; }
  el.innerHTML = items.slice(0, 50).map(m => {
    var sev = m.severity || 'low';
    var resolved = m.resolved || boolVal(m.resolved);
    return '<div class="cq-card">'
      + '<div class="cq-card-title"><span class="sev-dot sev-' + esc(sev) + '"></span>' + esc(m.boatName || m.itemName || 'Unknown') + '</div>'
      + '<div class="cq-card-sub">' + esc(m.description || '').slice(0, 120) + '</div>'
      + '<div class="cq-card-meta">' + esc(sev.toUpperCase()) + ' · '
        + (resolved ? '<span style="color:var(--green)">RESOLVED</span>' : '<span style="color:var(--yellow)">OPEN</span>')
        + ' · ' + esc((m.createdAt || '').slice(0, 10))
      + '</div>'
    + '</div>';
  }).join('');
}

// ══ VALIDATION REQUESTS ══════════════════════════════════════════════════════
function renderValidation() {
  var el = document.getElementById('validationList');
  if (!_verificationRequests.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noValidation') + '</div>'; return; }
  el.innerHTML = _verificationRequests.map(r => {
    return '<div class="cq-card">'
      + '<div class="cq-card-title">' + esc(r.fromName || '') + '</div>'
      + '<div class="cq-card-sub">' + esc(r.boatName || '') + ' · ' + esc(r.date || '') + '</div>'
      + '<div class="cq-card-meta">' + esc((r.hoursDecimal || 0) + ' ' + s('cq.hrs')) + (r.distanceNm ? ' · ' + r.distanceNm + ' ' + s('cq.nm') : '') + '</div>'
      + '<div class="conf-actions">'
        + '<button class="btn-confirm" onclick="respondValidation(\'' + esc(r.id) + '\',\'confirmed\')">' + s('btn.confirm') + '</button>'
        + '<button class="btn-reject" onclick="respondValidation(\'' + esc(r.id) + '\',\'rejected\')">' + s('btn.cancel') + '</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

async function respondValidation(id, status) {
  try {
    await apiPost('respondConfirmation', { id, status, responderName: user.name });
    _verificationRequests = _verificationRequests.filter(r => r.id !== id);
    renderValidation();
    showToast(s('toast.saved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ CREW APPROVALS ═══════════════════════════════════════════════════════════
function renderCrew() {
  var el = document.getElementById('crewList');
  // Pending crew confirmations where I'm asked to confirm (crew_assigned sent TO me, or crew_join sent BY someone to me as skipper)
  var pending = _crewConfirmations.filter(c =>
    c.status === 'pending' && !c.dismissed
    && (c.type === 'crew_assigned' || c.type === 'crew_join')
  );
  if (!pending.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noCrew') + '</div>'; return; }
  el.innerHTML = pending.map(c => {
    var who = c.type === 'crew_join' ? c.fromName : c.toName;
    return '<div class="cq-card">'
      + '<div class="cq-card-title">' + esc(who || '') + '</div>'
      + '<div class="cq-card-sub">' + esc(c.boatName || '') + ' · ' + esc(c.date || '') + '</div>'
      + '<div class="cq-card-meta">' + (c.type === 'crew_join' ? 'Requesting to join as crew' : 'Crew assignment pending') + '</div>'
      + '<div class="conf-actions">'
        + '<button class="btn-confirm" onclick="respondCrew(\'' + esc(c.id) + '\',\'confirmed\')">' + s('btn.confirm') + '</button>'
        + '<button class="btn-reject" onclick="respondCrew(\'' + esc(c.id) + '\',\'rejected\')">' + s('btn.cancel') + '</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

async function respondCrew(id, status) {
  try {
    await apiPost('respondConfirmation', { id, status, responderName: user.name });
    _crewConfirmations = _crewConfirmations.map(c => c.id === id ? Object.assign({}, c, { status }) : c);
    renderCrew();
    showToast(s('toast.saved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}


// ══ BIO & HEADSHOT ═══════════════════════════════════════════════════════════
function renderHeadshot(url) {
  if (!url) return;
  var wrap = document.getElementById('headshotWrap');
  // Convert Drive URL to thumbnail
  var displayUrl = url;
  var driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch) displayUrl = 'https://drive.google.com/thumbnail?id=' + driveMatch[1] + '&sz=w200';
  wrap.innerHTML = '<img src="' + esc(displayUrl) + '" class="cq-headshot-preview" alt="Headshot">';
}

async function uploadHeadshot() {
  var input = document.getElementById('headshotFile');
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.size > 5 * 1024 * 1024) { showToast('File too large (max 5 MB)', 'err'); return; }
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var res = await apiPost('uploadHeadshot', {
        kennitala: user.kennitala,
        fileData: e.target.result,
        fileName: file.name,
        mimeType: file.type,
      });
      if (res.headshotUrl) {
        renderHeadshot(res.headshotUrl);
        user.headshotUrl = res.headshotUrl;
        setUser(user);
        showToast(s('cq.headshotUploaded'), 'ok');
      }
    } catch (err) { showToast(err.message, 'err'); }
  };
  reader.readAsDataURL(file);
}

async function saveBio() {
  var bio = document.getElementById('bioText').value.trim();
  try {
    await apiPost('saveCaptainBio', { kennitala: user.kennitala, bio: bio });
    user.bio = bio;
    setUser(user);
    showToast(s('cq.bioSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ MY BOATS ═════════════════════════════════════════════════════════════════
function renderBoats() {
  var el = document.getElementById('boatList');
  // Find boats: owned, reserved for captain, or controlled-access with captain gate cert
  var myBoats = _boats.filter(b => {
    // Private boat owned by this captain
    if (b.ownership === 'private' && (String(b.ownerId || b.ownerKennitala || '') === String(user.kennitala))) return true;
    // Controlled-access boat with captain gate cert
    if (b.accessMode === 'controlled' && b.accessGateCert === 'captain') return true;
    // Boat with active reservation for this captain
    if (b.reservations && b.reservations.some(r => String(r.memberKennitala) === String(user.kennitala))) return true;
    // Legacy: chartered to this captain
    if (b.charter && String(b.charter.memberKennitala) === String(user.kennitala)) return true;
    return false;
  });

  if (!myBoats.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noBoats') + '</div>'; return; }
  el.innerHTML = myBoats.map(b => {
    var isOos = boolVal(b.oos);
    var portName = '';
    if (b.defaultPortId) { var loc = _locations.find(l => l.id === b.defaultPortId); if (loc) portName = loc.name; }
    var isOwner = b.ownership === 'private' && (String(b.ownerId || b.ownerKennitala || '') === String(user.kennitala));
    var isControlled = b.accessMode === 'controlled';

    // Reservation list
    var resHtml = '';
    if (b.reservations && b.reservations.length) {
      resHtml = '<div style="margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px">' + s('cq.reservations') + '</div>';
      resHtml += b.reservations.map(r => {
        return '<div style="font-size:11px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center">'
          + '<span>' + esc(r.memberName) + ' · ' + esc(r.startDate) + ' → ' + esc(r.endDate)
          + (r.note ? ' · <span style="color:var(--muted)">' + esc(r.note) + '</span>' : '') + '</span>'
          + '<button style="font-size:10px;background:none;border:none;color:var(--red);cursor:pointer" onclick="removeCqReservation(\'' + esc(b.id) + '\',\'' + esc(r.id) + '\')">&times;</button>'
          + '</div>';
      }).join('');
    }

    return '<div class="cq-boat">'
      + '<div>'
        + '<div class="cq-boat-name">' + esc(boatEmoji(b.category)) + ' ' + esc(b.name)
          + (isControlled ? ' <span style="font-size:8px;letter-spacing:.5px;padding:2px 6px;border-radius:10px;border:1px solid var(--brass)44;background:var(--brass)11;color:var(--brass)">' + esc(s('fleet.badgeControlled')) + '</span>' : '')
        + '</div>'
        + '<div class="cq-boat-sub">'
          + (isOos ? '<span style="color:var(--red)">OUT OF SERVICE</span>' : '<span style="color:var(--green)">AVAILABLE</span>')
          + (portName ? ' · ' + esc(portName) : '')
        + '</div>'
      + '</div>'
      + '<div class="cq-boat-actions">'
        + '<button onclick="toggleBoatOos(\'' + esc(b.id) + '\',' + !isOos + ')">' + s(isOos ? 'cq.makeAvailable' : 'cq.makeUnavailable') + '</button>'
        + '<button onclick="openPortModal(\'' + esc(b.id) + '\')">' + s('cq.changePort') + '</button>'
        + '<button onclick="openResModal(\'' + esc(b.id) + '\')">' + s('cq.addReservation') + '</button>'
      + '</div>'
      + resHtml
    + '</div>';
  }).join('');
}

var _portBoatId = null;
function openPortModal(boatId) {
  _portBoatId = boatId;
  var sel = document.getElementById('portSelect');
  var ports = _locations.filter(l => l.type === 'port');
  var boat = _boats.find(b => b.id === boatId);
  sel.innerHTML = '<option value="">' + s('lbl.selectDots') + '</option>'
    + ports.map(p => '<option value="' + esc(p.id) + '"' + (boat && boat.defaultPortId === p.id ? ' selected' : '') + '>' + esc(p.name) + '</option>').join('');
  document.getElementById('portModalTitle').textContent = s('cq.changePort');
  openModal('portModal');
}

async function savePort() {
  if (!_portBoatId) return;
  var portId = document.getElementById('portSelect').value;
  try {
    // Update boat config
    var cfgRes = await apiGet('getConfig', { _fresh: true });
    var boats = cfgRes.boats || [];
    var idx = boats.findIndex(b => b.id === _portBoatId);
    if (idx >= 0) {
      boats[idx].defaultPortId = portId || '';
      await apiPost('saveConfig', { boats: boats });
      _boats = boats;
      renderBoats();
      closeModal('portModal');
      showToast(s('toast.saved'), 'ok');
    }
  } catch (e) { showToast(e.message, 'err'); }
}

async function toggleBoatOos(boatId, oos) {
  try {
    var cfgRes = await apiGet('getConfig', { _fresh: true });
    var boats = cfgRes.boats || [];
    var idx = boats.findIndex(b => b.id === boatId);
    if (idx >= 0) {
      boats[idx].oos = oos;
      await apiPost('saveConfig', { boats: boats });
      _boats = boats;
      renderBoats();
      showToast(s('toast.saved'), 'ok');
    }
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ RESERVATION MANAGEMENT ═══════════════════════════════════════════════════
var _resBoatId = null;

function openResModal(boatId) {
  _resBoatId = boatId;
  document.getElementById('cqResMemberKt').value = '';
  document.getElementById('cqResMemberSearch').value = '';
  document.getElementById('cqResMemberName').textContent = '';
  document.getElementById('cqResMemberSuggestions').innerHTML = '';
  document.getElementById('cqResStart').value = '';
  document.getElementById('cqResEnd').value = '';
  document.getElementById('cqResNote').value = '';
  openModal('resModal');
}

function searchCqResMember(q) {
  var drop = document.getElementById('cqResMemberSuggestions');
  if (!q || q.length < 2) { drop.innerHTML=''; drop.style.display='none'; return; }
  var ql = q.toLowerCase();
  var hits = _cqMembers.filter(m => (m.name||'').toLowerCase().includes(ql)).slice(0, 8);
  if (!hits.length) { drop.innerHTML=''; drop.style.display='none'; return; }
  drop.innerHTML = hits.map(m => '<div class="suggest-item" style="padding:6px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" '
    + 'onclick="selectCqResMember(\'' + esc(m.kennitala) + '\',\'' + esc(m.name) + '\')">' + esc(m.name) + '</div>').join('');
  drop.style.display = 'block';
}

function selectCqResMember(kt, name) {
  document.getElementById('cqResMemberKt').value = kt;
  document.getElementById('cqResMemberSearch').value = '';
  document.getElementById('cqResMemberName').textContent = name;
  document.getElementById('cqResMemberSuggestions').innerHTML = '';
  document.getElementById('cqResMemberSuggestions').style.display = 'none';
}

async function saveCqReservation() {
  if (!_resBoatId) return;
  var kt = document.getElementById('cqResMemberKt').value;
  var name = document.getElementById('cqResMemberName').textContent;
  var start = document.getElementById('cqResStart').value;
  var end = document.getElementById('cqResEnd').value;
  var note = document.getElementById('cqResNote').value.trim();
  if (!kt || !name || !start || !end) { showToast('Member and dates required.', 'err'); return; }
  try {
    var res = await apiPost('saveReservation', { boatId: _resBoatId, memberKennitala: kt, memberName: name, startDate: start, endDate: end, note: note });
    var b = _boats.find(x => x.id === _resBoatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    closeModal('resModal');
    renderBoats();
    showToast(s('boat.reservationSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

async function removeCqReservation(boatId, resId) {
  if (!confirm(s('boat.removeReservation') + '?')) return;
  try {
    var res = await apiPost('removeReservation', { boatId: boatId, reservationId: resId });
    var b = _boats.find(x => x.id === boatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    renderBoats();
    showToast(s('boat.reservationRemoved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ CREDENTIAL ASSIGNMENT (Captain) — uses shared/mcm.js ═══════════════════
window.mcmGetMembers        = function() { return _cqMembers; };
window.mcmGetCertDefs       = function() { return _cqCertDefs; };
window.mcmGetCertCategories = function() { return _cqCertCategories; };

// ══ CAPTAIN LOGBOOK FILTERS (override shared/logbook.js) ════════════════════
var _captains = [];

function buildFilters() {
  // Year filter
  var years = [...new Set(myTrips.map(function(t) { return (t.date || '').slice(0, 4); }).filter(Boolean))].sort().reverse();
  var yrSel = document.getElementById('fYear');
  yrSel.innerHTML = '<option value="">All years</option>';
  years.forEach(function(y) { var o = document.createElement('option'); o.value = y; o.textContent = y; yrSel.appendChild(o); });
  var thisYear = String(new Date().getFullYear());
  if (years.includes(thisYear)) yrSel.value = thisYear;

  // Category filter (default to keelboat)
  var cats = [...new Set(myTrips.map(function(t) { return (allBoats.find(function(b) { return b.id === t.boatId; }) || {}).category || t.boatCategory || ''; }).filter(Boolean))].sort();
  var cSel = document.getElementById('fCat');
  cSel.innerHTML = '<option value="">All categories</option>';
  cats.forEach(function(c) { var o = document.createElement('option'); o.value = c; o.textContent = boatEmoji(c.toLowerCase()) + ' ' + c; cSel.appendChild(o); });
  if (cats.map(function(c) { return c.toLowerCase(); }).includes('keelboat')) cSel.value = 'Keelboat';

  // Boat name filter (keelboats only)
  var keelboatNames = [...new Set(myTrips
    .filter(function(t) { return ((allBoats.find(function(b) { return b.id === t.boatId; }) || {}).category || t.boatCategory || '').toLowerCase() === 'keelboat'; })
    .map(function(t) { return t.boatName || ''; }).filter(Boolean))].sort();
  var bSel = document.getElementById('fBoatName');
  bSel.innerHTML = '<option value="">All boats</option>';
  keelboatNames.forEach(function(n) { var o = document.createElement('option'); o.value = n; o.textContent = n; bSel.appendChild(o); });

  // Captain filter (members who isCaptain)
  _captains = _cqMembers.filter(function(m) { return isCaptain(m); }).sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
  var capSel = document.getElementById('fCaptain');
  capSel.innerHTML = '<option value="">All captains</option>';
  _captains.forEach(function(c) { var o = document.createElement('option'); o.value = c.kennitala; o.textContent = c.name; capSel.appendChild(o); });

  // Member filter (anyone with keelboat trips)
  var memberKts = [...new Set(myTrips
    .filter(function(t) { return ((allBoats.find(function(b) { return b.id === t.boatId; }) || {}).category || t.boatCategory || '').toLowerCase() === 'keelboat'; })
    .map(function(t) { return t.kennitala; }).filter(Boolean))];
  var members = memberKts.map(function(kt) { return _cqMembers.find(function(m) { return String(m.kennitala) === String(kt); }); })
    .filter(Boolean).sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
  var mSel = document.getElementById('fMember');
  mSel.innerHTML = '<option value="">All members</option>';
  members.forEach(function(m) { var o = document.createElement('option'); o.value = m.kennitala; o.textContent = m.name; mSel.appendChild(o); });

  ['fYear', 'fCat', 'fBoatName', 'fCaptain', 'fMember', 'fWind'].forEach(function(id) { document.getElementById(id).addEventListener('change', applyFilter); });
  document.getElementById('fText').addEventListener('input', applyFilter);
}

function applyFilter() {
  Object.keys(_thumbMaps).forEach(function(k) { try { _thumbMaps[k].remove(); } catch(e){} delete _thumbMaps[k]; });
  var yr       = document.getElementById('fYear').value;
  var cat      = document.getElementById('fCat').value;
  var boatName = document.getElementById('fBoatName').value;
  var captain  = document.getElementById('fCaptain').value;
  var member   = document.getElementById('fMember').value;
  var wind     = document.getElementById('fWind').value;
  var txt      = document.getElementById('fText').value.toLowerCase().trim();

  var filtered = myTrips.filter(function(t) {
    if (yr && !(t.date || '').startsWith(yr)) return false;
    if (cat) { var tCat = ((allBoats.find(function(b) { return b.id === t.boatId; }) || {}).category || t.boatCategory || '').toLowerCase(); if (tCat !== cat.toLowerCase()) return false; }
    if (boatName && (t.boatName || '') !== boatName) return false;
    if (captain && String(t.kennitala) !== String(captain)) return false;
    if (member && String(t.kennitala) !== String(member)) return false;
    if (wind) {
      var b = parseInt(t.beaufort) || 0;
      if (wind === 'gt4' && b <= 4) return false;
      if (wind === 'lte4' && b > 4) return false;
      if (['calm', 'light', 'moderate', 'strong'].includes(wind) && bftGroup(b) !== wind) return false;
    }
    if (txt) {
      var hay = [t.boatName, t.memberName, t.locationName, t.date, t.beaufort, t.windDir, t.notes, t.skipperNote, t.boatCategory].join(' ').toLowerCase();
      if (!hay.includes(txt)) return false;
    }
    return true;
  });
  document.getElementById('tripList').innerHTML = filtered.length
    ? filtered.map(tripCard).join('')
    : '<div class="empty-note">No trips match this filter.</div>';
  document.getElementById('filterCount').textContent = filtered.length + ' / ' + myTrips.length;
}
