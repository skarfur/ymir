<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Captain's Quarters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="../shared/tripcard.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/certs.js"></script>
<script src="../shared/maintenance.js"></script>
<style>
/* ── Stats ── */
.cq-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.cq-stat { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 12px; text-align:center; }
.cq-stat .sn { font-size:24px; color:var(--brass); font-weight:500; }
.cq-stat .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Section headers ── */
.cq-section { margin-bottom:20px; }
.cq-section-hdr { font-size:9px; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.cq-section-hdr .badge { font-size:9px; padding:2px 8px; border-radius:10px; font-weight:500; }

/* ── Filter pills ── */
.cq-pills { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.cq-pill { padding:5px 12px; border-radius:16px; border:1px solid var(--border); background:var(--surface);
  font-size:10px; font-family:inherit; color:var(--muted); cursor:pointer; transition:all .15s; }
.cq-pill.active { border-color:var(--brass); color:var(--brass); background:var(--brass)11; }

/* ── Compact filter bar ── */
.cq-filter-bar { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px; margin-bottom:10px; align-items:center; }
.cq-filter-bar select, .cq-filter-bar input[type="text"] { background:var(--surface); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:inherit; font-size:10px; padding:4px 8px; height:26px; outline:none;
  transition:border-color .15s; min-width:0; width:100%; box-sizing:border-box; }
.cq-filter-bar select:focus, .cq-filter-bar input:focus { border-color:var(--brass); }
.cq-filter-search { display:flex; gap:6px; align-items:center; grid-column:1/-1; }
.cq-filter-search input { flex:1; min-width:0; }
.cq-filter-count { font-size:9px; color:var(--muted); white-space:nowrap; }

/* ── Cards ── */
.cq-card { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; }
.cq-card-title { font-size:12px; font-weight:500; color:var(--text); }
.cq-card-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.cq-card-meta { font-size:10px; color:var(--brass); margin-top:2px; }
.cq-card .conf-actions { display:flex; gap:6px; margin-top:8px; }
.cq-card .conf-actions button { font-size:11px; font-family:inherit; padding:5px 12px; border-radius:6px; cursor:pointer; border:1px solid; }
.cq-card .btn-confirm { background:var(--green)18; color:var(--green); border-color:var(--green)55; }
.cq-card .btn-confirm:hover { background:var(--green)33; }
.cq-card .btn-reject { background:var(--red)18; color:var(--red); border-color:var(--red)55; }
.cq-card .btn-reject:hover { background:var(--red)33; }

/* ── Maintenance severity ── */
.sev-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.sev-low      { background:var(--green); }
.sev-medium   { background:var(--yellow); }
.sev-high     { background:var(--orange); }
.sev-critical { background:var(--red); }


/* ── Show-more button ── */
.cq-show-more { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px; font-size:10px; color:var(--muted); cursor:pointer; font-family:inherit; margin-top:4px; text-align:center; }
.cq-show-more:hover { border-color:var(--brass); color:var(--text); }

/* ── Bio section ── */
.cq-bio-area { width:100%; min-height:80px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:inherit; font-size:12px; padding:10px 12px;
  resize:vertical; box-sizing:border-box; }
.cq-headshot-preview { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--brass); }
.cq-headshot-placeholder { width:80px; height:80px; border-radius:50%; background:var(--surface);
  border:2px dashed var(--border); display:flex; align-items:center; justify-content:center;
  font-size:24px; color:var(--muted); }

/* ── Boat cards ── */
.cq-boat { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
.cq-boat-name { font-size:13px; font-weight:500; }
.cq-boat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.cq-boat-actions { margin-left:auto; display:flex; gap:6px; }
.cq-boat-actions button { font-size:10px; font-family:inherit; padding:4px 10px; border-radius:6px;
  cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); }
.cq-boat-actions button:hover { border-color:var(--brass); color:var(--brass); }

/* ── Responsive ── */
@media(max-width:600px){
  .cq-stats { grid-template-columns:1fr 1fr; }
  .cq-stat .sn { font-size:20px; }
  .cq-filter-bar { grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); }
}
@media(max-width:400px){
  .cq-filter-bar { grid-template-columns:1fr 1fr; gap:4px; }
  .cq-filter-bar select, .cq-filter-bar input[type="text"] { font-size:9px; padding:3px 6px; }
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="cqTitle"></div>
    <div class="text-sm text-muted" style="margin-top:2px" id="cqSubtitle"></div>
  </div>

  <!-- ══ YTD STATS ══ -->
  <div class="cq-stats" id="cqStats">
    <div class="cq-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cq.ytdTrips"></div></div>
    <div class="cq-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cq.ytdHours"></div></div>
    <div class="cq-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cq.ytdDistance"></div></div>
  </div>

  <!-- ══ MAINTENANCE ══ -->
  <div class="cq-section" id="sectMaint">
    <div class="cq-section-hdr" data-s="cq.maintTitle"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
      <div class="cq-pills" id="maintPills" style="margin-bottom:0"></div>
      <select id="mfBoat" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:10px;padding:4px 8px;height:26px;outline:none;max-width:140px"><option value="">All boats</option></select>
    </div>
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ VALIDATION REQUESTS ══ -->
  <div class="cq-section" id="sectValidation">
    <div class="cq-section-hdr" data-s="cq.validationTitle"></div>
    <div id="validationList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ CREW APPROVALS ══ -->
  <div class="cq-section" id="sectCrew">
    <div class="cq-section-hdr" data-s="cq.crewTitle"></div>
    <div id="crewList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ TRIPS ══ -->
  <div class="cq-section" id="sectTrips">
    <div class="cq-section-hdr" data-s="cq.tripsTitle"></div>
    <div class="cq-pills" id="tripPills"></div>
    <div class="cq-filter-bar" id="tripFilterBar">
      <select id="tfYear"><option value="">All years</option></select>
      <select id="tfBoat"><option value="">All boats</option></select>
      <select id="tfCaptain"><option value="">All captains</option></select>
      <select id="tfRole"><option value="">Any role</option><option value="skipper">Skipper</option><option value="crew">Crew</option></select>
      <select id="tfFlag"><option value="">All flags</option></select>
      <select id="tfWind"><option value="">All wind</option><option value="calm">Calm (0–2)</option><option value="light">Light (3–4)</option><option value="moderate">Moderate (5–6)</option><option value="strong">Strong (7+)</option></select>
      <select id="tfArea"><option value="">All areas</option></select>
      <div class="cq-filter-search">
        <input id="tfText" type="text" placeholder="Search trips…">
        <span class="cq-filter-count" id="tripFilterCount"></span>
      </div>
    </div>
    <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ BIO & PROFILE ══ -->
  <div class="cq-section" id="sectBio">
    <div class="cq-section-hdr" data-s="cq.bioTitle"></div>
    <div class="cq-card">
      <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:12px">
        <div id="headshotWrap">
          <div class="cq-headshot-placeholder" id="headshotPlaceholder">+</div>
        </div>
        <div style="flex:1">
          <label style="font-size:9px;color:var(--muted);letter-spacing:.8px;display:block;margin-bottom:6px" data-s="cq.headshotLabel"></label>
          <input type="file" id="headshotFile" accept="image/*" style="font-size:11px;color:var(--text);width:100%">
        </div>
      </div>
      <textarea class="cq-bio-area" id="bioText" maxlength="500"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <a id="publicProfileLink" href="#" target="_blank" style="font-size:11px;color:var(--brass);text-decoration:none" data-s="cq.viewPublicProfile"></a>
        <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" onclick="saveBio()" data-s="btn.save"></button>
      </div>
    </div>
  </div>

  <!-- ══ ASSIGN CREDENTIALS ══ -->
  <div class="cq-section" id="sectCredentials">
    <div class="cq-section-hdr" data-s="cq.assignCredTitle"></div>
    <div style="margin-bottom:10px">
      <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" onclick="openCqCredModal()" data-s="cq.assignCred"></button>
    </div>
  </div>

  <!-- ══ MY BOATS ══ -->
  <div class="cq-section" id="sectBoats">
    <div class="cq-section-hdr" data-s="cq.boatsTitle"></div>
    <div id="boatList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

</div>

<!-- ══ CREDENTIAL ASSIGNMENT MODAL ══ -->
<div class="modal-overlay hidden" id="cqCredModal" onclick="if(event.target===this)closeModal('cqCredModal')">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 data-s="cq.assignCred"></h3>
      <button class="modal-close-x" onclick="closeModal('cqCredModal')">&times;</button>
    </div>

    <!-- Member search -->
    <div class="field">
      <label data-s="cq.selectMember"></label>
      <input type="text" id="cqCredMemberSearch" oninput="filterCqCredMembers()" placeholder="">
      <div id="cqCredMemberResults" style="max-height:120px;overflow-y:auto;margin-top:4px"></div>
      <div id="cqCredSelectedMember" style="margin-top:6px;font-size:12px;font-weight:500;color:var(--brass);display:none"></div>
    </div>

    <!-- Category -->
    <div class="field">
      <label data-s="admin.certCategory"></label>
      <select id="cqCredCategory" onchange="onCqCredCategoryChange()"></select>
    </div>

    <!-- Type -->
    <div class="field">
      <label data-s="lbl.type"></label>
      <select id="cqCredType" onchange="updateCqCredSubcats()">
        <option value="">Select…</option>
      </select>
    </div>
    <div class="field" id="cqCredSubcatField" style="display:none">
      <label data-s="cert.level"></label>
      <select id="cqCredSubcat"><option value="">Select…</option></select>
    </div>
    <div class="field" id="cqCredCustomTitleField" style="display:none">
      <label data-s="admin.certTitle"></label>
      <input type="text" id="cqCredCustomTitle" placeholder="e.g. RYA Day Skipper">
    </div>

    <!-- Fields -->
    <div class="field">
      <label><span data-s="admin.certIdNumber"></span> <span style="color:var(--muted);font-weight:normal" data-s="admin.certDescOptional"></span></label>
      <input type="text" id="cqCredIdNumber" placeholder="e.g. IS-12345">
    </div>
    <div class="field">
      <label data-s="admin.certIssuingAuth"></label>
      <input type="text" id="cqCredIssuingAuthority">
    </div>
    <div class="field">
      <label><span data-s="admin.certIssueDate"></span> <span style="color:var(--muted);font-weight:normal" data-s="admin.certDescOptional"></span></label>
      <input type="date" id="cqCredIssueDate">
    </div>
    <div class="field" style="display:flex;align-items:center;gap:16px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="cqCredExpires" onchange="document.getElementById('cqCredExpiryWrap').style.display=this.checked?'':'none'">
        <span data-s="admin.certExpires2"></span>
      </label>
    </div>
    <div class="field" id="cqCredExpiryWrap" style="display:none">
      <label data-s="admin.certExpiryDate2"></label>
      <input type="date" id="cqCredExpiresAt">
    </div>
    <div class="field">
      <label><span data-s="admin.certDescription"></span> <span style="color:var(--muted);font-weight:normal" data-s="admin.certDescOptional"></span></label>
      <textarea id="cqCredDescription" rows="2" style="width:100%;resize:vertical;font-size:13px"></textarea>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-secondary" onclick="closeModal('cqCredModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" style="flex:1" onclick="assignCqCred()" data-s="cert.assign"></button>
    </div>
  </div>
</div>

<!-- ══ PORT CHANGE MODAL ══ -->
<div class="modal-overlay hidden" id="portModal" onclick="if(event.target===this)closeModal('portModal')">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <h3 id="portModalTitle"></h3>
      <button class="modal-close-x" onclick="closeModal('portModal')">×</button>
    </div>
    <div class="field">
      <label data-s="admin.homePort"></label>
      <select id="portSelect"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('portModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="savePort()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ RESERVATION MODAL ══ -->
<div class="modal-overlay hidden" id="resModal" onclick="if(event.target===this)closeModal('resModal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="boat.addReservation"></h3>
      <button class="modal-close-x" onclick="closeModal('resModal')">×</button>
    </div>
    <div class="field">
      <label data-s="cq.resMember">Member</label>
      <div style="position:relative">
        <input type="text" id="cqResMemberSearch" autocomplete="off" placeholder="" oninput="searchCqResMember(this.value)">
        <div id="cqResMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="cqResMemberKt">
        <div id="cqResMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label data-s="cq.resStartDate">Start</label><input type="date" id="cqResStart"></div>
      <div class="field"><label data-s="cq.resEndDate">End</label><input type="date" id="cqResEnd"></div>
    </div>
    <div class="field"><label data-s="cq.resNote">Note</label><input type="text" id="cqResNote"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('resModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="saveCqReservation()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
const user = requireAuth();
if (!user || !isCaptain(user)) { window.location.href = '../member/'; throw new Error('Not a captain'); }
const L = getLang();

let _boats = [], _locations = [], _allMaint = [], _allTrips = [], _myTrips = [];
let _confirmations = [], _verificationRequests = [];
let _maintFilter = 'open', _tripFilter = 'my', _maintBoatFilter = '';
let _cqMembers = [], _cqCertDefs = [], _cqCertCategories = [];
let _cqSelectedMemberId = null;
let _tripShowAll = false;

// ══ INIT ═════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  buildHeader('captain');
  applyStrings();

  document.getElementById('cqTitle').textContent = s('cq.title');
  document.getElementById('cqSubtitle').textContent = user.name + ' — ' + s('cq.subtitle');
  document.getElementById('bioText').placeholder = s('cq.bioPlaceholder');

  // Load existing bio & headshot
  if (user.bio) document.getElementById('bioText').value = user.bio;
  if (user.headshotUrl) renderHeadshot(user.headshotUrl);

  // Public profile link
  document.getElementById('publicProfileLink').href = SCRIPT_URL + '?action=captain&id=' + user.id;

  // Headshot upload handler
  document.getElementById('headshotFile').addEventListener('change', uploadHeadshot);

  // Build filter pills
  buildMaintPills();
  buildTripPills();

  // Fetch all data in parallel
  try {
    const [cfgRes, maintRes, tripsRes, confRes, verRes, membersRes] = await Promise.all([
      apiGet('getConfig'),
      apiGet('getMaintenance'),
      apiGet('getTrips', { limit: 500 }),
      apiGet('getConfirmations', { kennitala: user.kennitala }),
      apiGet('getVerificationRequests'),
      apiGet('getMembers'),
    ]);

    _boats     = (cfgRes.boats     || []);
    _locations = (cfgRes.locations || []).filter(l => l.active !== false && l.active !== 'false');
    _cqMembers = (membersRes.members || []).filter(m => m.active !== false && m.active !== 'false');
    _cqCertDefs = certDefsFromConfig(cfgRes.certDefs || []);
    _cqCertCategories = certCategoriesFromConfig(cfgRes.certCategories || []);
    _allMaint  = maintRes.items || maintRes.maintenance || [];
    _verificationRequests = verRes.requests || [];

    // All keelboat trips
    var allTripsRaw = tripsRes.trips || [];
    _allTrips = allTripsRaw.filter(t => (t.boatCategory || '').toLowerCase() === 'keelboat');
    _myTrips  = _allTrips.filter(t => String(t.kennitala) === String(user.kennitala));

    // Confirmations: pending ones where I'm the recipient
    _confirmations = confRes.confirmations || confRes.items || [];

    renderStats();
    buildMaintBoatFilter();
    renderMaint();
    renderValidation();
    renderCrew();
    buildTripFilters();
    renderTrips();
    renderBoats();

    // Wire up trip filter dropdowns (once)
    ['tfYear','tfBoat','tfCaptain','tfRole','tfFlag','tfWind','tfArea'].forEach(id => {
      document.getElementById(id).addEventListener('change', function() { _tripShowAll = false; renderTrips(); });
    });
    document.getElementById('tfText').addEventListener('input', function() { _tripShowAll = false; renderTrips(); });
  } catch (e) {
    console.error(e);
    showToast(s('toast.loadFailed') + ': ' + e.message, 'err');
  }

  warmContainer();
});

// ══ STATS ════════════════════════════════════════════════════════════════════
function renderStats() {
  var yearStart = new Date().getFullYear() + '-01-01';
  var ytd = _myTrips.filter(t => (t.date || '') >= yearStart && (t.role === 'skipper' || t.role === 'captain'));
  var hours = 0, dist = 0;
  ytd.forEach(t => { hours += Number(t.hoursDecimal) || 0; dist += Number(t.distanceNm) || 0; });
  document.getElementById('statTrips').textContent = ytd.length;
  document.getElementById('statHours').textContent = hours.toFixed(1);
  document.getElementById('statDist').textContent  = dist.toFixed(1) + ' ' + s('cq.nm');
}

// ══ MAINTENANCE ══════════════════════════════════════════════════════════════
function buildMaintPills() {
  var el = document.getElementById('maintPills');
  el.innerHTML = '';
  [{k:'open',s:'cq.maintOpen'},{k:'closed',s:'cq.maintClosed'},{k:'all',s:'cq.maintAll'}].forEach(p => {
    var btn = document.createElement('button');
    btn.className = 'cq-pill' + (p.k === _maintFilter ? ' active' : '');
    btn.textContent = s(p.s);
    btn.onclick = () => { _maintFilter = p.k; buildMaintPills(); renderMaint(); };
    el.appendChild(btn);
  });
}

function buildMaintBoatFilter() {
  var sel = document.getElementById('mfBoat');
  // Collect unique keelboat names from maintenance items
  var boatNames = [...new Set(_allMaint
    .filter(m => { var cat = (m.boatCategory||'').toLowerCase(); if (!cat && m.boatId) { var b = _boats.find(x=>x.id===m.boatId); if(b) cat=(b.category||'').toLowerCase(); } return cat==='keelboat'; })
    .map(m => m.boatName || '')
    .filter(Boolean)
  )].sort();
  sel.innerHTML = '<option value="">All boats</option>' + boatNames.map(n => '<option value="'+esc(n)+'">'+esc(n)+'</option>').join('');
  sel.onchange = function() { _maintBoatFilter = this.value; renderMaint(); };
}

function renderMaint() {
  var el = document.getElementById('maintList');
  // Filter for keelboat-related maintenance
  var items = _allMaint.filter(m => {
    var cat = (m.boatCategory || '').toLowerCase();
    if (!cat && m.boatId) { var b = _boats.find(x => x.id === m.boatId); if (b) cat = (b.category || '').toLowerCase(); }
    return cat === 'keelboat';
  });
  if (_maintFilter === 'open') items = items.filter(m => !m.resolved && !boolVal(m.resolved));
  else if (_maintFilter === 'closed') items = items.filter(m => m.resolved || boolVal(m.resolved));
  if (_maintBoatFilter) items = items.filter(m => (m.boatName || '') === _maintBoatFilter);
  items.sort((a, b) => (b.createdAt || '') > (a.createdAt || '') ? 1 : -1);

  if (!items.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noMaint') + '</div>'; return; }
  el.innerHTML = items.slice(0, 50).map(m => {
    var sev = m.severity || 'low';
    var resolved = m.resolved || boolVal(m.resolved);
    return '<div class="cq-card">'
      + '<div class="cq-card-title"><span class="sev-dot sev-' + esc(sev) + '"></span>' + esc(m.boatName || m.itemName || 'Unknown') + '</div>'
      + '<div class="cq-card-sub">' + esc(m.description || '').slice(0, 120) + '</div>'
      + '<div class="cq-card-meta">' + esc(sev.toUpperCase()) + ' · '
        + (resolved ? '<span style="color:var(--green)">RESOLVED</span>' : '<span style="color:var(--yellow)">OPEN</span>')
        + ' · ' + esc((m.createdAt || '').slice(0, 10))
      + '</div>'
    + '</div>';
  }).join('');
}

// ══ VALIDATION REQUESTS ══════════════════════════════════════════════════════
function renderValidation() {
  var el = document.getElementById('validationList');
  if (!_verificationRequests.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noValidation') + '</div>'; return; }
  el.innerHTML = _verificationRequests.map(r => {
    return '<div class="cq-card">'
      + '<div class="cq-card-title">' + esc(r.fromName || '') + '</div>'
      + '<div class="cq-card-sub">' + esc(r.boatName || '') + ' · ' + esc(r.date || '') + '</div>'
      + '<div class="cq-card-meta">' + esc((r.hoursDecimal || 0) + ' ' + s('cq.hrs')) + (r.distanceNm ? ' · ' + r.distanceNm + ' ' + s('cq.nm') : '') + '</div>'
      + '<div class="conf-actions">'
        + '<button class="btn-confirm" onclick="respondValidation(\'' + esc(r.id) + '\',\'confirmed\')">' + s('btn.confirm') + '</button>'
        + '<button class="btn-reject" onclick="respondValidation(\'' + esc(r.id) + '\',\'rejected\')">' + s('btn.cancel') + '</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

async function respondValidation(id, status) {
  try {
    await apiPost('respondConfirmation', { id, status, responderName: user.name });
    _verificationRequests = _verificationRequests.filter(r => r.id !== id);
    renderValidation();
    showToast(s('toast.saved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ CREW APPROVALS ═══════════════════════════════════════════════════════════
function renderCrew() {
  var el = document.getElementById('crewList');
  // Pending crew confirmations where I'm asked to confirm (crew_assigned sent TO me, or crew_join sent BY someone to me as skipper)
  var pending = _confirmations.filter(c =>
    c.status === 'pending' && !c.dismissed
    && (c.type === 'crew_assigned' || c.type === 'crew_join')
  );
  if (!pending.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noCrew') + '</div>'; return; }
  el.innerHTML = pending.map(c => {
    var who = c.type === 'crew_join' ? c.fromName : c.toName;
    return '<div class="cq-card">'
      + '<div class="cq-card-title">' + esc(who || '') + '</div>'
      + '<div class="cq-card-sub">' + esc(c.boatName || '') + ' · ' + esc(c.date || '') + '</div>'
      + '<div class="cq-card-meta">' + (c.type === 'crew_join' ? 'Requesting to join as crew' : 'Crew assignment pending') + '</div>'
      + '<div class="conf-actions">'
        + '<button class="btn-confirm" onclick="respondCrew(\'' + esc(c.id) + '\',\'confirmed\')">' + s('btn.confirm') + '</button>'
        + '<button class="btn-reject" onclick="respondCrew(\'' + esc(c.id) + '\',\'rejected\')">' + s('btn.cancel') + '</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

async function respondCrew(id, status) {
  try {
    await apiPost('respondConfirmation', { id, status, responderName: user.name });
    _confirmations = _confirmations.map(c => c.id === id ? Object.assign({}, c, { status }) : c);
    renderCrew();
    showToast(s('toast.saved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ TRIPS ════════════════════════════════════════════════════════════════════
function buildTripPills() {
  var el = document.getElementById('tripPills');
  el.innerHTML = '';
  [{k:'my',s:'cq.myTrips'},{k:'all',s:'cq.allTrips'}].forEach(p => {
    var btn = document.createElement('button');
    btn.className = 'cq-pill' + (p.k === _tripFilter ? ' active' : '');
    btn.textContent = s(p.s);
    btn.onclick = () => { _tripFilter = p.k; _tripShowAll = false; buildTripFilters(); renderTrips(); buildTripPills(); };
    el.appendChild(btn);
  });
}

function _bftGroup(b) { var n=parseInt(b)||0; if(n<=2)return'calm'; if(n<=4)return'light'; if(n<=6)return'moderate'; return'strong'; }
function _bftFromMs(ms) { var v=parseFloat(ms)||0; if(v<0.3)return 0;if(v<1.6)return 1;if(v<3.4)return 2;if(v<5.5)return 3;if(v<8)return 4;if(v<10.8)return 5;if(v<13.9)return 6;if(v<17.2)return 7;if(v<20.8)return 8;if(v<24.5)return 9;if(v<28.5)return 10;if(v<32.7)return 11;return 12; }

function _parseDateParts(d) {
  if (!d) return {day:'—',mon:'',yr:''};
  var p = String(d).split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return { day: parseInt(p[2])||'?', mon: months[(parseInt(p[1])||1)-1]||'', yr: p[0]||'' };
}

var _dirArrows = {N:'↓',NNE:'↓',NE:'↙',ENE:'↙',E:'←',ESE:'←',SE:'↖',SSE:'↖',S:'↑',SSW:'↑',SW:'↗',WSW:'↗',W:'→',WNW:'→',NW:'↘',NNW:'↘'};
function _dirArrow(dir) { return _dirArrows[(dir||'').toUpperCase()] || ''; }

function buildTripFilters() {
  var pool = _tripFilter === 'my' ? _myTrips : _allTrips;
  // Years
  var years = [...new Set(pool.map(t => (t.date||'').slice(0,4)).filter(Boolean))].sort().reverse();
  var ySel = document.getElementById('tfYear');
  ySel.innerHTML = '<option value="">All years</option>' + years.map(y => '<option value="'+esc(y)+'">'+esc(y)+'</option>').join('');
  // Boat names
  var boats = [...new Set(pool.map(t => t.boatName||'').filter(Boolean))].sort();
  var bSel = document.getElementById('tfBoat');
  bSel.innerHTML = '<option value="">All boats</option>' + boats.map(n => '<option value="'+esc(n)+'">'+esc(n)+'</option>').join('');
  // Captains (only in "all" view)
  var cSel = document.getElementById('tfCaptain');
  if (_tripFilter === 'all') {
    var captains = [...new Set(pool.map(t => t.memberName||'').filter(Boolean))].sort();
    cSel.innerHTML = '<option value="">All captains</option>' + captains.map(n => '<option value="'+esc(n)+'">'+esc(n)+'</option>').join('');
    cSel.style.display = '';
  } else {
    cSel.style.display = 'none';
    cSel.value = '';
  }
  // Weather flags
  var flags = [...new Set(pool.map(t => { try { var wx = t.wxSnapshot ? JSON.parse(t.wxSnapshot) : null; return wx?.flag||''; } catch(e){return '';} }).filter(Boolean))].sort();
  var fSel = document.getElementById('tfFlag');
  var flagIcons = {green:'🟢',yellow:'🟡',orange:'🟠',red:'🔴',black:'⚫'};
  var flagLabels = {green:'Green',yellow:'Yellow',orange:'Orange',red:'Red',black:'Closed'};
  fSel.innerHTML = '<option value="">All flags</option>' + flags.map(f => '<option value="'+esc(f)+'">'+(flagIcons[f]||'')+' '+(flagLabels[f]||f)+'</option>').join('');
  // Areas
  var areas = [...new Set(pool.map(t => t.locationName||'').filter(Boolean))].sort();
  var aSel = document.getElementById('tfArea');
  aSel.innerHTML = '<option value="">All areas</option>' + areas.map(a => '<option value="'+esc(a)+'">'+esc(a)+'</option>').join('');
}

function _getFilteredTrips() {
  var pool = _tripFilter === 'my' ? _myTrips : _allTrips;
  var fYear = document.getElementById('tfYear').value;
  var fBoat = document.getElementById('tfBoat').value;
  var fCaptain = document.getElementById('tfCaptain').value;
  var fRole = document.getElementById('tfRole').value;
  var fFlag = document.getElementById('tfFlag').value;
  var fWind = document.getElementById('tfWind').value;
  var fArea = document.getElementById('tfArea').value;
  var fText = (document.getElementById('tfText').value||'').toLowerCase().trim();
  return pool.filter(t => {
    if (fYear && !(t.date||'').startsWith(fYear)) return false;
    if (fBoat && (t.boatName||'') !== fBoat) return false;
    if (fCaptain && (t.memberName||'') !== fCaptain) return false;
    if (fRole === 'skipper' && t.role === 'crew') return false;
    if (fRole === 'crew' && t.role !== 'crew') return false;
    if (fWind) { var b = parseInt(t.beaufort)||0; if (_bftGroup(b) !== fWind) return false; }
    if (fFlag) {
      try { var wx = t.wxSnapshot ? JSON.parse(t.wxSnapshot) : null; if ((wx?.flag||'') !== fFlag) return false; }
      catch(e) { return false; }
    }
    if (fArea && (t.locationName||'') !== fArea) return false;
    if (fText) {
      var hay = [t.boatName,t.locationName,t.date,t.beaufort,t.windDir,t.notes,t.skipperNote,t.memberName,t.departurePort,t.arrivalPort].join(' ').toLowerCase();
      if (!hay.includes(fText)) return false;
    }
    return true;
  });
}

// ── Trip card (logbook-style with expandable sections) ────────────────────────
function _cqTripCard(t, showCaptain) {
  var p = _parseDateParts(t.date);
  var dur = t.hoursDecimal ? (parseFloat(t.hoursDecimal)||0).toFixed(1)+'h' : '—';
  var isSki = !t.role || t.role==='skipper';
  var isVer = t.verified && t.verified!=='false';
  var isOwner = String(t.kennitala) === String(user.kennitala);
  var catCol = BOAT_CAT_COLORS['keelboat'] || BOAT_CAT_COLORS.other;

  // Parse weather
  var wx = null;
  try { wx = t.wxSnapshot ? JSON.parse(t.wxSnapshot) : null; } catch(e){}
  var flagIcons = {green:'🟢',yellow:'🟡',orange:'🟠',red:'🔴',black:'⚫'};
  var flagLabels = {green:'Green',yellow:'Yellow',orange:'Orange',red:'Red',black:'Black'};

  // Wind on card face
  var cardWs = formatWindValue(wx?.ws, t.beaufort, 'bft');
  var cardDir = wx?.dir || t.windDir || '';
  var arrow = _dirArrow(cardDir);
  var windBit = '';
  if (arrow || cardWs || cardDir) {
    windBit = '<span style="display:inline-flex;align-items:center;gap:3px">'
      + (arrow ? '<span style="font-size:16px;line-height:1">'+arrow+'</span>' : '')
      + (cardWs ? '<span>'+esc(cardWs)+'</span>' : '')
      + (cardDir ? '<span style="opacity:.7">'+esc(cardDir)+'</span>' : '')
      + '</span>';
  }

  // Port display
  var dep = t.departurePort||'', arr = t.arrivalPort||'';
  var portBit = (dep||arr) ? '<span>⚓️ '+esc(dep&&arr&&dep!==arr ? dep+' → '+arr : dep||arr)+'</span>' : '';

  // Flag icon on card face
  var flagBit = wx?.flag ? '<span>'+flagIcons[wx.flag]+'</span>' : '';
  var captainTag = showCaptain && t.memberName ? '<span class="cq-trip-captain">'+esc(t.memberName)+'</span>' : '';

  // ── Boat details section ──
  var kboat = _boats.find(b => b.id === t.boatId);
  var boatRegRow = kboat?.registrationNo ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Registration</span><span class="trip-exp-val">'+esc(kboat.registrationNo)+'</span></div>' : '';
  var boatModelRow = kboat?.typeModel ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Type / model</span><span class="trip-exp-val">'+esc(kboat.typeModel)+'</span></div>' : '';
  var boatLoaRow = kboat?.loa ? '<div class="trip-exp-row"><span class="trip-exp-lbl">LOA</span><span class="trip-exp-val">'+kboat.loa+' ft</span></div>' : '';
  var hasBoatDetails = !!(boatRegRow||boatModelRow||boatLoaRow);

  // ── Trip logistics section ──
  var portRow = '';
  if (dep) portRow += '<div class="trip-exp-row"><span class="trip-exp-lbl">Departure port</span><span class="trip-exp-val">'+esc(dep)+'</span></div>';
  if (arr && arr !== dep) portRow += '<div class="trip-exp-row"><span class="trip-exp-lbl">Arrival port</span><span class="trip-exp-val">'+esc(arr)+'</span></div>';
  var distRow = t.distanceNm ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Distance</span><span class="trip-exp-val">'+esc(t.distanceNm)+' nm</span></div>' : '';

  // Crew names from stored data
  var crewNames = [];
  try { if (t.crewNames) crewNames = typeof t.crewNames === 'string' ? JSON.parse(t.crewNames) : t.crewNames; } catch(e){}
  var crewDisplay = crewNames.length ? crewNames.map(function(c) { return esc(typeof c === 'string' ? c : c.name||''); }).filter(Boolean).join(', ') : esc(t.crew||1);
  var crewNamesRow = '<div class="trip-exp-row" style="grid-column:1/-1"><span class="trip-exp-lbl">Crew</span><span class="trip-exp-val">'+crewDisplay+'</span></div>';

  var toplineTrip = (t.timeOut ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Departed</span><span class="trip-exp-val">'+esc(t.timeOut)+'</span></div>' : '')
    + (t.timeIn ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Returned</span><span class="trip-exp-val">'+esc(t.timeIn)+'</span></div>' : '')
    + portRow + crewNamesRow;
  var detailTrip = (t.locationName ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Sailing area</span><span class="trip-exp-val">'+esc(t.locationName)+'</span></div>' : '')
    + (t.hoursDecimal ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Duration</span><span class="trip-exp-val">'+dur+'</span></div>' : '')
    + distRow
    + (showCaptain && t.memberName ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Skipper</span><span class="trip-exp-val">'+esc(t.memberName)+'</span></div>' : '')
    + '<div class="trip-exp-row"><span class="trip-exp-lbl">Crew aboard</span><span class="trip-exp-val">'+esc(t.crew||1)+'</span></div>';
  var hasDetailTrip = !!(t.locationName || distRow || t.hoursDecimal);
  var hasTrip = !!(toplineTrip || detailTrip);

  // ── Weather section ──
  var eWs = cardWs ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Wind speed</span><span class="trip-exp-val">'+esc(cardWs)+'</span></div>' : '';
  var eDir = (wx?.dir||t.windDir) ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Direction</span><span class="trip-exp-val">'+_dirArrow(wx?.dir||t.windDir)+' '+esc(wx?.dir||t.windDir)+'</span></div>' : '';
  var eGust = wx?.wg!=null ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Gusts</span><span class="trip-exp-val">Force '+_bftFromMs(wx.wg)+'</span></div>' : '';
  var eCond = wx?.cond?.desc ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Conditions</span><span class="trip-exp-val">'+(wx.cond.icon||'')+' '+esc(wx.cond.desc)+'</span></div>' : '';
  var eWv = wx?.wv!=null ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Wave height</span><span class="trip-exp-val">'+wx.wv.toFixed(1)+' m</span></div>' : '';
  var eAir = wx?.tc!=null ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Air temp</span><span class="trip-exp-val">'+Math.round(wx.tc)+'°C</span></div>' : '';
  var eSst = wx?.sst!=null ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Sea temp</span><span class="trip-exp-val">'+wx.sst.toFixed(1)+'°C</span></div>' : '';
  var ePres = wx?.pres!=null ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Pressure</span><span class="trip-exp-val">'+Math.round(wx.pres)+' hPa</span></div>' : '';
  var eFlag = wx?.flag ? '<div class="trip-exp-row"><span class="trip-exp-lbl">Weather flag</span><span class="trip-exp-val">'+flagIcons[wx.flag]+' '+(flagLabels[wx.flag]||esc(wx.flag))+'</span></div>' : '';
  var toplineWx = eWs + eWv + eCond;
  var detailWx = eDir + eGust + eAir + eSst + ePres + eFlag;
  var hasWeather = !!(eWs||eDir||eWv||eAir||eSst||ePres||eFlag||eGust||eCond);
  var hasDetailWx = !!(eDir||eGust||eAir||eSst||ePres||eFlag);

  // ── Notes & actions section ──
  var canEditSkipperNote = isSki && isOwner;
  var canEditNote = isOwner;
  var skipperNoteRow = (t.skipperNote || canEditSkipperNote) ?
    '<div class="trip-exp-row" style="grid-column:1/-1"><span class="trip-exp-lbl" style="color:var(--brass)">Skipper note <span style="font-weight:400;opacity:.6;font-size:8px;text-transform:none">'+(isSki?'visible to crew':'from skipper')+'</span></span><span class="trip-exp-val">'+(t.skipperNote?esc(t.skipperNote):'<span style="color:var(--muted);font-style:italic">No note yet</span>')+(canEditSkipperNote?' <button class="trip-more-btn" onclick="event.stopPropagation();_cqEditNote(\''+esc(t.id)+'\',\'skipperNote\')">Edit</button>':'')+'</span></div>' : '';
  var notesRow = (t.notes || canEditNote) ?
    '<div class="trip-exp-row" style="grid-column:1/-1"><span class="trip-exp-lbl">Private note <span style="font-weight:400;opacity:.6;font-size:8px;text-transform:none">only you</span></span><span class="trip-exp-val">'+(t.notes?esc(t.notes):'<span style="color:var(--muted);font-style:italic">No note yet</span>')+(canEditNote?' <button class="trip-more-btn" onclick="event.stopPropagation();_cqEditNote(\''+esc(t.id)+'\',\'notes\')">Edit</button>':'')+'</span></div>' : '';

  // Photos display
  var photosRow = '';
  try {
    var urls = t.photoUrls ? JSON.parse(t.photoUrls) : [];
    if (urls.length) {
      var thumbs = urls.slice(0,6).map(function(u) { return '<img src="'+esc(u)+'" style="width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border)" loading="lazy" onerror="this.style.display=\'none\'">'; }).join('');
      if (urls.length > 6) thumbs += '<span style="font-size:10px;color:var(--muted);align-self:center">+' + (urls.length-6) + ' more</span>';
      photosRow = '<div class="trip-exp-row" style="grid-column:1/-1"><span class="trip-exp-lbl">Photos</span><span class="trip-exp-val"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">'+thumbs+'</div></span></div>';
    }
  } catch(e){}

  // Action buttons
  var canEditTrip = isSki && isOwner;
  var actionsRow = isOwner ? '<div class="trip-actions" style="grid-column:1/-1">'
    + (canEditTrip ? '<button class="trip-action-btn primary" onclick="event.stopPropagation();window.open(\'../logbook/#trip-'+esc(t.id)+'\',\'_blank\')">✏️ Edit trip</button>' : '')
    + '<button class="trip-action-btn" onclick="event.stopPropagation();_cqUploadTrack(\''+esc(t.id)+'\')">📍 Add GPS</button>'
    + '<button class="trip-action-btn" onclick="event.stopPropagation();_cqUploadPhotos(\''+esc(t.id)+'\')">📷 Add photos</button>'
    + '</div>' : '';
  var hasNotes = !!(skipperNoteRow||notesRow||photosRow||isOwner);

  // ── Build card ──
  return '<div class="trip-card" style="border-left:3px solid '+catCol.color+'" onclick="_cqToggleCard(this)">'
    + '<div class="trip-card-main">'
      + '<div class="trip-date-col">'
        + '<div class="trip-date-day">'+esc(p.day)+'</div>'
        + '<div class="trip-date-mon">'+esc(p.mon)+'</div>'
        + '<div class="trip-date-yr">'+esc(p.yr)+'</div>'
      + '</div>'
      + '<div class="trip-body">'
        + '<div class="trip-boat">'+esc(t.boatName||'—')+captainTag+'</div>'
        + '<div class="trip-meta">'
          + '<span class="trip-badge '+(isSki?'badge-skipper':'badge-crew')+'">'+(isSki?'Skipper':'Crew')+'</span>'
          + (isVer ? '<span class="trip-badge badge-verified">✓</span>' : '')
          + '<span>'+esc(dur)+'</span>'
          + (t.distanceNm ? '<span>'+esc(t.distanceNm)+' nm</span>' : '')
          + windBit + portBit + flagBit
        + '</div>'
      + '</div>'
      + '<div class="trip-arrow">▾</div>'
    + '</div>'
    + '<div class="trip-expand">'
      + (hasBoatDetails ? '<div class="exp-section exp-boat"><div class="exp-section-hdr">Boat Details</div><div class="trip-expand-grid">'+boatRegRow+boatModelRow+boatLoaRow+'</div></div>' : '')
      + (hasTrip ? '<div class="exp-section exp-logistics">'
        + (hasDetailTrip
          ? '<div class="exp-section-hdr expandable" onclick="event.stopPropagation();_cqToggleSection(this)">Trip Details <span class="exp-chevron">▾</span></div>'
            + (toplineTrip ? '<div class="trip-expand-grid">'+toplineTrip+'</div>' : '')
            + '<div class="exp-section-detail"><div class="trip-expand-grid">'+detailTrip+'</div></div>'
          : '<div class="exp-section-hdr">Trip Details</div><div class="trip-expand-grid">'+toplineTrip+'</div>')
        + '</div>' : '')
      + (hasWeather ? '<div class="exp-section exp-weather">'
        + (hasDetailWx
          ? '<div class="exp-section-hdr expandable" onclick="event.stopPropagation();_cqToggleSection(this)">Weather <span class="exp-chevron">▾</span></div>'
            + (toplineWx ? '<div class="trip-expand-grid">'+toplineWx+'</div>' : '')
            + '<div class="exp-section-detail"><div class="trip-expand-grid">'+detailWx+'</div></div>'
          : '<div class="exp-section-hdr">Weather</div><div class="trip-expand-grid">'+toplineWx+'</div>')
        + '</div>' : '')
      + (hasNotes ? '<div class="exp-section exp-notes"><div class="exp-section-hdr">Notes & Actions</div><div class="trip-expand-grid">'+skipperNoteRow+notesRow+photosRow+actionsRow+'</div></div>' : '')
    + '</div>'
  + '</div>';
}

// ── Trip card interactions ────────────────────────────────────────────────────
function _cqToggleCard(card) { card.classList.toggle('open'); }

function _cqToggleSection(hdr) {
  var detail = hdr.parentElement.querySelector('.exp-section-detail');
  if (!detail) return;
  detail.classList.toggle('open');
  hdr.classList.toggle('expanded');
}

async function _cqEditNote(tripId, field) {
  var t = _myTrips.find(x => x.id === tripId) || _allTrips.find(x => x.id === tripId);
  if (!t) return;
  var current = field === 'skipperNote' ? (t.skipperNote||'') : (t.notes||'');
  var label = field === 'skipperNote' ? 'Skipper note (visible to crew):' : 'Private note (only you):';
  var val = await ymPrompt(label, current);
  if (val === null) return;
  try {
    await apiPost('saveTrip', { id: tripId, [field]: val });
    t[field] = val;
    // Also update in the other array
    var other = field === 'skipperNote' ? _allTrips : _myTrips;
    var t2 = other.find(x => x.id === tripId);
    if (t2 && t2 !== t) t2[field] = val;
    renderTrips();
    showToast('Note saved', 'ok');
  } catch(e) { showToast('Error: ' + e.message, 'err'); }
}

function _cqUploadTrack(tripId) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.gpx,.kml,.kmz';
  input.onchange = async function() {
    var file = input.files[0];
    if (!file) return;
    showToast('Uploading GPS track…');
    try {
      var fileData = await new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() { resolve(reader.result); };
        reader.onerror = function() { reject(new Error('Read error')); };
        reader.readAsDataURL(file);
      });
      var res = await apiPost('uploadTripFile', { fileType: 'track', fileName: file.name, fileData: fileData, mimeType: file.type });
      if (!res.ok) { showToast('Upload failed', 'err'); return; }
      var updates = { trackFileUrl: res.trackFileUrl || '', trackSimplified: res.trackSimplified || '', trackSource: res.trackSource || '' };
      if (res.distanceNm) updates.distanceNm = res.distanceNm;
      await apiPost('saveTrip', Object.assign({ id: tripId }, updates));
      var t = _myTrips.find(x => x.id === tripId) || _allTrips.find(x => x.id === tripId);
      if (t) Object.assign(t, updates);
      renderTrips();
      showToast('GPS track added', 'ok');
    } catch(e) { showToast('Error: ' + e.message, 'err'); }
  };
  input.click();
}

function _cqUploadPhotos(tripId) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = async function() {
    if (!input.files || !input.files.length) return;
    showToast('Uploading photos…');
    try {
      for (var i = 0; i < input.files.length; i++) {
        var file = input.files[i];
        if (file.size > 10 * 1024 * 1024) { showToast('File too large (max 10 MB): ' + file.name, 'err'); continue; }
        var fileData = await new Promise(function(resolve, reject) {
          var reader = new FileReader();
          reader.onload = function() { resolve(reader.result); };
          reader.onerror = function() { reject(new Error('Read error')); };
          reader.readAsDataURL(file);
        });
        var res = await apiPost('uploadTripFile', { fileType: 'photo', fileName: file.name, fileData: fileData, mimeType: file.type });
        if (!res.ok || !res.photoUrl) { showToast('Upload failed for ' + file.name, 'err'); continue; }
        var t = _myTrips.find(x => x.id === tripId) || _allTrips.find(x => x.id === tripId);
        if (t) {
          var urls = []; try { urls = t.photoUrls ? JSON.parse(t.photoUrls) : []; } catch(e){}
          urls.push(res.photoUrl);
          var meta = {}; try { meta = t.photoMeta ? JSON.parse(t.photoMeta) : {}; } catch(e){}
          meta[res.photoUrl] = { shared: true, clubUse: false };
          await apiPost('saveTrip', { id: tripId, photoUrls: JSON.stringify(urls), photoMeta: JSON.stringify(meta) });
          t.photoUrls = JSON.stringify(urls);
          t.photoMeta = JSON.stringify(meta);
        }
      }
      renderTrips();
      showToast('Photos added', 'ok');
    } catch(e) { showToast('Error: ' + e.message, 'err'); }
  };
  input.click();
}

function renderTrips() {
  var el = document.getElementById('tripList');
  var filtered = _getFilteredTrips();
  filtered.sort((a, b) => (b.date || '') > (a.date || '') ? 1 : -1);

  var total = (_tripFilter === 'my' ? _myTrips : _allTrips).length;
  document.getElementById('tripFilterCount').textContent = filtered.length + ' / ' + total;

  if (!filtered.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noTrips') + '</div>'; return; }

  var showCaptain = _tripFilter === 'all';
  var INITIAL = 5;
  var visible = _tripShowAll ? filtered : filtered.slice(0, INITIAL);
  var html = visible.map(t => _cqTripCard(t, showCaptain)).join('');

  if (!_tripShowAll && filtered.length > INITIAL) {
    html += '<button class="cq-show-more" onclick="_tripShowAll=true;renderTrips()">'
      + 'Show all ' + filtered.length + ' trips ▾'
    + '</button>';
  } else if (_tripShowAll && filtered.length > INITIAL) {
    html += '<button class="cq-show-more" onclick="_tripShowAll=false;renderTrips();document.getElementById(\'sectTrips\').scrollIntoView({behavior:\'smooth\'})">'
      + 'Show fewer ▴'
    + '</button>';
  }
  el.innerHTML = html;
}

// ══ BIO & HEADSHOT ═══════════════════════════════════════════════════════════
function renderHeadshot(url) {
  if (!url) return;
  var wrap = document.getElementById('headshotWrap');
  // Convert Drive URL to thumbnail
  var displayUrl = url;
  var driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch) displayUrl = 'https://drive.google.com/thumbnail?id=' + driveMatch[1] + '&sz=w200';
  wrap.innerHTML = '<img src="' + esc(displayUrl) + '" class="cq-headshot-preview" alt="Headshot">';
}

async function uploadHeadshot() {
  var input = document.getElementById('headshotFile');
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.size > 5 * 1024 * 1024) { showToast('File too large (max 5 MB)', 'err'); return; }
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var res = await apiPost('uploadHeadshot', {
        kennitala: user.kennitala,
        fileData: e.target.result,
        fileName: file.name,
        mimeType: file.type,
      });
      if (res.headshotUrl) {
        renderHeadshot(res.headshotUrl);
        user.headshotUrl = res.headshotUrl;
        setUser(user);
        showToast(s('cq.headshotUploaded'), 'ok');
      }
    } catch (err) { showToast(err.message, 'err'); }
  };
  reader.readAsDataURL(file);
}

async function saveBio() {
  var bio = document.getElementById('bioText').value.trim();
  try {
    await apiPost('saveCaptainBio', { kennitala: user.kennitala, bio: bio });
    user.bio = bio;
    setUser(user);
    showToast(s('cq.bioSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ MY BOATS ═════════════════════════════════════════════════════════════════
function renderBoats() {
  var el = document.getElementById('boatList');
  // Find boats: owned, reserved for captain, or controlled-access with captain gate cert
  var myBoats = _boats.filter(b => {
    // Private boat owned by this captain
    if (b.ownership === 'private' && (String(b.ownerId || b.ownerKennitala || '') === String(user.kennitala))) return true;
    // Controlled-access boat with captain gate cert
    if (b.accessMode === 'controlled' && b.accessGateCert === 'captain') return true;
    // Boat with active reservation for this captain
    if (b.reservations && b.reservations.some(r => String(r.memberKennitala) === String(user.kennitala))) return true;
    // Legacy: chartered to this captain
    if (b.charter && String(b.charter.memberKennitala) === String(user.kennitala)) return true;
    return false;
  });

  if (!myBoats.length) { el.innerHTML = '<div class="empty-note">' + s('cq.noBoats') + '</div>'; return; }
  el.innerHTML = myBoats.map(b => {
    var isOos = boolVal(b.oos);
    var portName = '';
    if (b.defaultPortId) { var loc = _locations.find(l => l.id === b.defaultPortId); if (loc) portName = loc.name; }
    var isOwner = b.ownership === 'private' && (String(b.ownerId || b.ownerKennitala || '') === String(user.kennitala));
    var isControlled = b.accessMode === 'controlled';

    // Reservation list
    var resHtml = '';
    if (b.reservations && b.reservations.length) {
      resHtml = '<div style="margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px">' + s('cq.reservations') + '</div>';
      resHtml += b.reservations.map(r => {
        return '<div style="font-size:11px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center">'
          + '<span>' + esc(r.memberName) + ' · ' + esc(r.startDate) + ' → ' + esc(r.endDate)
          + (r.note ? ' · <span style="color:var(--muted)">' + esc(r.note) + '</span>' : '') + '</span>'
          + '<button style="font-size:10px;background:none;border:none;color:var(--red);cursor:pointer" onclick="removeCqReservation(\'' + esc(b.id) + '\',\'' + esc(r.id) + '\')">&times;</button>'
          + '</div>';
      }).join('');
    }

    return '<div class="cq-boat">'
      + '<div>'
        + '<div class="cq-boat-name">' + esc(boatEmoji(b.category)) + ' ' + esc(b.name)
          + (isControlled ? ' <span style="font-size:8px;letter-spacing:.5px;padding:2px 6px;border-radius:10px;border:1px solid var(--brass)44;background:var(--brass)11;color:var(--brass)">' + esc(s('fleet.badgeControlled')) + '</span>' : '')
        + '</div>'
        + '<div class="cq-boat-sub">'
          + (isOos ? '<span style="color:var(--red)">OUT OF SERVICE</span>' : '<span style="color:var(--green)">AVAILABLE</span>')
          + (portName ? ' · ' + esc(portName) : '')
        + '</div>'
      + '</div>'
      + '<div class="cq-boat-actions">'
        + '<button onclick="toggleBoatOos(\'' + esc(b.id) + '\',' + !isOos + ')">' + s(isOos ? 'cq.makeAvailable' : 'cq.makeUnavailable') + '</button>'
        + '<button onclick="openPortModal(\'' + esc(b.id) + '\')">' + s('cq.changePort') + '</button>'
        + '<button onclick="openResModal(\'' + esc(b.id) + '\')">' + s('cq.addReservation') + '</button>'
      + '</div>'
      + resHtml
    + '</div>';
  }).join('');
}

var _portBoatId = null;
function openPortModal(boatId) {
  _portBoatId = boatId;
  var sel = document.getElementById('portSelect');
  var ports = _locations.filter(l => l.type === 'port');
  var boat = _boats.find(b => b.id === boatId);
  sel.innerHTML = '<option value="">' + s('lbl.selectDots') + '</option>'
    + ports.map(p => '<option value="' + esc(p.id) + '"' + (boat && boat.defaultPortId === p.id ? ' selected' : '') + '>' + esc(p.name) + '</option>').join('');
  document.getElementById('portModalTitle').textContent = s('cq.changePort');
  openModal('portModal');
}

async function savePort() {
  if (!_portBoatId) return;
  var portId = document.getElementById('portSelect').value;
  try {
    // Update boat config
    var cfgRes = await apiGet('getConfig', { _fresh: true });
    var boats = cfgRes.boats || [];
    var idx = boats.findIndex(b => b.id === _portBoatId);
    if (idx >= 0) {
      boats[idx].defaultPortId = portId || '';
      await apiPost('saveConfig', { boats: boats });
      _boats = boats;
      renderBoats();
      closeModal('portModal');
      showToast(s('toast.saved'), 'ok');
    }
  } catch (e) { showToast(e.message, 'err'); }
}

async function toggleBoatOos(boatId, oos) {
  try {
    var cfgRes = await apiGet('getConfig', { _fresh: true });
    var boats = cfgRes.boats || [];
    var idx = boats.findIndex(b => b.id === boatId);
    if (idx >= 0) {
      boats[idx].oos = oos;
      await apiPost('saveConfig', { boats: boats });
      _boats = boats;
      renderBoats();
      showToast(s('toast.saved'), 'ok');
    }
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ RESERVATION MANAGEMENT ═══════════════════════════════════════════════════
var _resBoatId = null;

function openResModal(boatId) {
  _resBoatId = boatId;
  document.getElementById('cqResMemberKt').value = '';
  document.getElementById('cqResMemberSearch').value = '';
  document.getElementById('cqResMemberName').textContent = '';
  document.getElementById('cqResMemberSuggestions').innerHTML = '';
  document.getElementById('cqResStart').value = '';
  document.getElementById('cqResEnd').value = '';
  document.getElementById('cqResNote').value = '';
  openModal('resModal');
}

function searchCqResMember(q) {
  var drop = document.getElementById('cqResMemberSuggestions');
  if (!q || q.length < 2) { drop.innerHTML=''; drop.style.display='none'; return; }
  var ql = q.toLowerCase();
  var hits = _cqMembers.filter(m => (m.name||'').toLowerCase().includes(ql)).slice(0, 8);
  if (!hits.length) { drop.innerHTML=''; drop.style.display='none'; return; }
  drop.innerHTML = hits.map(m => '<div class="suggest-item" style="padding:6px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" '
    + 'onclick="selectCqResMember(\'' + esc(m.kennitala) + '\',\'' + esc(m.name) + '\')">' + esc(m.name) + '</div>').join('');
  drop.style.display = 'block';
}

function selectCqResMember(kt, name) {
  document.getElementById('cqResMemberKt').value = kt;
  document.getElementById('cqResMemberSearch').value = '';
  document.getElementById('cqResMemberName').textContent = name;
  document.getElementById('cqResMemberSuggestions').innerHTML = '';
  document.getElementById('cqResMemberSuggestions').style.display = 'none';
}

async function saveCqReservation() {
  if (!_resBoatId) return;
  var kt = document.getElementById('cqResMemberKt').value;
  var name = document.getElementById('cqResMemberName').textContent;
  var start = document.getElementById('cqResStart').value;
  var end = document.getElementById('cqResEnd').value;
  var note = document.getElementById('cqResNote').value.trim();
  if (!kt || !name || !start || !end) { showToast('Member and dates required.', 'err'); return; }
  try {
    var res = await apiPost('saveReservation', { boatId: _resBoatId, memberKennitala: kt, memberName: name, startDate: start, endDate: end, note: note });
    var b = _boats.find(x => x.id === _resBoatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    closeModal('resModal');
    renderBoats();
    showToast(s('boat.reservationSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

async function removeCqReservation(boatId, resId) {
  if (!confirm(s('boat.removeReservation') + '?')) return;
  try {
    var res = await apiPost('removeReservation', { boatId: boatId, reservationId: resId });
    var b = _boats.find(x => x.id === boatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    renderBoats();
    showToast(s('boat.reservationRemoved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ CREDENTIAL ASSIGNMENT (Captain) ═════════════════════════════════════════

function openCqCredModal() {
  _cqSelectedMemberId = null;
  document.getElementById('cqCredMemberSearch').value = '';
  document.getElementById('cqCredMemberResults').innerHTML = '';
  document.getElementById('cqCredSelectedMember').style.display = 'none';
  document.getElementById('cqCredCustomTitleField').style.display = 'none';
  document.getElementById('cqCredCustomTitle').value = '';
  document.getElementById('cqCredIdNumber').value = '';
  document.getElementById('cqCredIssuingAuthority').value = '';
  document.getElementById('cqCredIssueDate').value = '';
  document.getElementById('cqCredExpires').checked = false;
  document.getElementById('cqCredExpiryWrap').style.display = 'none';
  document.getElementById('cqCredExpiresAt').value = '';
  document.getElementById('cqCredDescription').value = '';
  document.getElementById('cqCredSubcatField').style.display = 'none';
  // Populate categories
  var catSel = document.getElementById('cqCredCategory');
  catSel.innerHTML = '<option value="">' + s('admin.certCategorySelect') + '</option>';
  _cqCertCategories.forEach(function(c) {
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    catSel.appendChild(o);
  });
  var addOpt = document.createElement('option');
  addOpt.value = '__add__'; addOpt.textContent = s('admin.certAddCategory');
  catSel.appendChild(addOpt);
  // Populate type
  var typeSel = document.getElementById('cqCredType');
  typeSel.innerHTML = '<option value="">Select…</option>';
  _cqCertDefs.forEach(function(d) {
    var o = document.createElement('option');
    o.value = d.id; o.textContent = d.name;
    typeSel.appendChild(o);
  });
  var customOpt = document.createElement('option');
  customOpt.value = '__custom__'; customOpt.textContent = s('admin.certCustomType');
  typeSel.appendChild(customOpt);
  // Search placeholder
  document.getElementById('cqCredMemberSearch').placeholder = s('cq.searchMember');
  openModal('cqCredModal');
}

function filterCqCredMembers() {
  var q = document.getElementById('cqCredMemberSearch').value.toLowerCase();
  var el = document.getElementById('cqCredMemberResults');
  if (!q || q.length < 2) { el.innerHTML = ''; return; }
  var matches = _cqMembers.filter(function(m) {
    return (m.name || '').toLowerCase().includes(q) || (m.kennitala || '').includes(q);
  }).slice(0, 8);
  el.innerHTML = matches.map(function(m) {
    return '<div class="list-row" style="cursor:pointer;padding:6px 8px;font-size:12px" onclick="selectCqCredMember(\'' + m.id + '\')">' +
      '<div>' + esc(m.name || '—') + '</div><div style="font-size:10px;color:var(--muted);margin-left:8px">' + esc(m.kennitala || '') + '</div></div>';
  }).join('');
}

function selectCqCredMember(id) {
  _cqSelectedMemberId = id;
  var m = _cqMembers.find(function(x) { return String(x.id) === String(id); });
  document.getElementById('cqCredMemberResults').innerHTML = '';
  document.getElementById('cqCredMemberSearch').value = '';
  var sel = document.getElementById('cqCredSelectedMember');
  sel.textContent = m ? m.name : id;
  sel.style.display = '';
}

async function onCqCredCategoryChange() {
  var sel = document.getElementById('cqCredCategory');
  if (sel.value === '__add__') {
    var name = await ymPrompt('Enter new category name:');
    if (name && name.trim()) {
      var cat = name.trim();
      if (_cqCertCategories.indexOf(cat) === -1) {
        _cqCertCategories.push(cat);
        apiPost('saveCertCategories', { categories: _cqCertCategories }).catch(function(e) { console.warn(e); });
      }
      // Re-populate and select
      openCqCredModal();
      sel = document.getElementById('cqCredCategory');
      sel.value = cat;
    } else {
      sel.value = '';
    }
  }
}

function updateCqCredSubcats() {
  var certId = document.getElementById('cqCredType').value;
  var isCustom = certId === '__custom__';
  document.getElementById('cqCredCustomTitleField').style.display = isCustom ? '' : 'none';
  var def = isCustom ? null : _cqCertDefs.find(function(d) { return d.id === certId; });
  var sf = document.getElementById('cqCredSubcatField');
  if (def && def.subcats && def.subcats.length) {
    var sel = document.getElementById('cqCredSubcat');
    sel.innerHTML = '<option value="">Select…</option>';
    def.subcats.forEach(function(sc) {
      var o = document.createElement('option');
      o.value = sc.key; o.textContent = sc.label;
      sel.appendChild(o);
    });
    sf.style.display = '';
  } else {
    sf.style.display = 'none';
  }
  if (def && def.issuingAuthority && !document.getElementById('cqCredIssuingAuthority').value) {
    document.getElementById('cqCredIssuingAuthority').value = def.issuingAuthority;
  }
  if (def && def.expires) {
    document.getElementById('cqCredExpires').checked = true;
    document.getElementById('cqCredExpiryWrap').style.display = '';
  }
}

async function assignCqCred() {
  if (!_cqSelectedMemberId) { showToast(s('cq.selectMember'), 'err'); return; }
  var m = _cqMembers.find(function(x) { return String(x.id) === String(_cqSelectedMemberId); });
  if (!m) { showToast('Member not found.', 'err'); return; }

  var category = document.getElementById('cqCredCategory').value;
  var certId   = document.getElementById('cqCredType').value;
  var isCustom = certId === '__custom__';

  if (!certId) { showToast(s('cert.typeRequired'), 'err'); return; }
  if (!category || category === '__add__') { showToast(s('admin.certCategoryReq'), 'err'); return; }

  var def = isCustom ? null : _cqCertDefs.find(function(d) { return d.id === certId; });
  var sub = (def && def.subcats && def.subcats.length) ? document.getElementById('cqCredSubcat').value : null;
  if (def && def.subcats && def.subcats.length && !sub) { showToast(s('cert.levelRequired'), 'err'); return; }

  var title = isCustom
    ? document.getElementById('cqCredCustomTitle').value.trim()
    : (def ? def.name : certId);
  if (!title) { showToast(s('admin.certTitleRequired'), 'err'); return; }

  var issuingAuthority = document.getElementById('cqCredIssuingAuthority').value.trim();
  if (!issuingAuthority) { showToast(s('admin.certAuthorityReq'), 'err'); return; }

  var expires   = document.getElementById('cqCredExpires').checked;
  var expiresAt = expires ? document.getElementById('cqCredExpiresAt').value : '';
  if (expires && !expiresAt) { showToast(s('admin.certExpiryReq'), 'err'); return; }

  var userName = user.name || 'Captain';
  var now      = todayISO();

  var newCert = {
    certId:           isCustom ? null : certId,
    sub:              sub || null,
    category:         category,
    title:            title,
    idNumber:         document.getElementById('cqCredIdNumber').value.trim() || '',
    issuingAuthority: issuingAuthority,
    issueDate:        document.getElementById('cqCredIssueDate').value || '',
    expires:          expires,
    expiresAt:        expiresAt || '',
    description:      document.getElementById('cqCredDescription').value.trim() || '',
    assignedBy:       userName,
    assignedAt:       now,
    verifiedBy:       userName,
    verifiedAt:       now,
  };

  var existing = parseJson(m.certifications, []);
  if (!isCustom) {
    existing = applyRankRule(existing, newCert, _cqCertDefs);
    existing = existing.filter(function(c) { return !(c.certId === certId && (c.sub || null) === (sub || null)); });
  }
  var updated = existing.concat([newCert]);

  try {
    await apiPost('saveMemberCert', { memberId: _cqSelectedMemberId, certifications: updated });
    var mIdx = _cqMembers.findIndex(function(x) { return String(x.id) === String(_cqSelectedMemberId); });
    _cqMembers[mIdx] = Object.assign({}, m, { certifications: JSON.stringify(updated) });
    closeModal('cqCredModal');
    showToast(s('cert.assigned'), 'ok');
  } catch (e) { showToast('Error: ' + e.message, 'err'); }
}
