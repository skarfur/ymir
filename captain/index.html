<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://unpkg.com https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Captain's Quarters</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<script src="../shared/theme-init.js"></script>
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="../shared/tripcard.css">
<script src="../shared/api.js" defer></script>
<script src="../shared/ui.js" defer></script>
<script src="../shared/layout.js" defer></script>
<script src="../shared/strings.js"></script>
<script src="../shared/list-filter.js" defer></script>
<script src="../shared/calendar.js" defer></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/mcm.js" defer></script>
<script src="../shared/maintenance.js" defer></script>
<script src="../shared/boat-modal.js" defer></script>
<script src="../shared/slot-modal.js" defer></script>
<script src="../shared/trip-form.js" defer></script>
<script src="../shared/tripcard.js" defer></script>
<!-- captain.js must run before shared/logbook.js so its top-level
     `window._logbookSkipInit = true` is set before logbook.js's auto-init IIFE
     reads the flag — otherwise the IIFE proceeds, calls renderCerts() (which
     only exists in /logbook), and the failure briefly flashes as a toast. -->
<script src="captain.js" defer></script>
<script src="../shared/logbook-confirm.js" defer></script>
<script src="../shared/logbook.js" defer></script>
<script src="../shared/logbook-form.js" defer></script>
<script src="../shared/logbook-share.js" defer></script>
<script src="../shared/logbook-edit.js" defer></script>
<link rel="stylesheet" href="captain.css">
</head>
<body>
<ymir-header></ymir-header>

<div class="page-content">

  <div class="mb-14">
    <div class="fw-500" style="font-size:16px;color:var(--text)" id="cqTitle"></div>
    <div class="text-sm text-muted mt-2" id="cqSubtitle"></div>
  </div>

  <!-- ══ YTD STATS ══ -->
  <div class="cq-stats no-orphans-3 no-orphans-sm-2" id="cqStats">
    <div class="cq-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cq.ytdTrips"></div></div>
    <div class="cq-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cq.ytdHours"></div></div>
    <div class="cq-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cq.ytdDistance"></div></div>
  </div>

  <!-- ══ MAINTENANCE ══ -->
  <div class="cq-section" id="sectMaint">
    <div class="cq-section-hdr" data-s="cq.maintTitle"></div>
    <div class="d-flex gap-8 items-center flex-wrap mb-10">
      <div class="cq-pills" id="maintPills" style="margin-bottom:0"></div>
      <select id="mfBoat" class="filter-select" style="max-width:140px"><option value="" data-s="cq.allBoats">All boats</option></select>
    </div>
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ VALIDATION REQUESTS ══ -->
  <div class="cq-section" id="sectValidation">
    <div class="cq-section-hdr" data-s="cq.validationTitle"></div>
    <div id="validationList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ CREW APPROVALS ══ -->
  <div class="cq-section" id="sectCrew">
    <div class="cq-section-hdr" data-s="cq.crewTitle"></div>
    <div id="crewList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ ASSIGN CREDENTIALS ══ -->
  <div class="cq-section" id="sectCredentials">
    <div class="mb-10">
      <button class="btn btn-primary btn-sm" data-cq-click="openMemberCertModal" data-s="cq.assignCred"></button>
    </div>
  </div>

  <!-- ══ RESERVATIONS ══ -->
  <div class="cq-section" id="sectReservations">
    <div class="cq-section-hdr" data-s="cq.reservationsTitle">RESERVATIONS</div>
    <div class="d-flex items-center gap-8 mb-8 flex-wrap">
      <label data-s="slot.filterBoat" class="text-10 text-muted" style="text-transform:uppercase;letter-spacing:.5px" for="cqResBoat">Boat</label>
      <select id="cqResBoat" data-cq-change="loadCqSlots" class="filter-select"></select>
      <div class="d-flex items-center gap-6 ml-auto pos-relative">
        <label class="text-10 text-muted" style="text-transform:uppercase;letter-spacing:.5px" data-s="cq.bookingColor">My booking color</label>
        <button type="button" id="cqBookingColorBtn" data-cq-click="toggleCqBookingColorPop" aria-haspopup="dialog" aria-expanded="false" class="border-muted rounded-4 cursor-pointer" style="width:36px;height:26px;padding:0;border:1px solid var(--border);background:#2e7d32"></button>
        <div id="cqBookingColorPop" class="hidden" style="position:absolute;top:calc(100% + 6px);right:0;z-index:500;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;box-shadow:var(--shadow-md);min-width:200px">
          <div class="d-flex items-center gap-8 mb-8">
            <input type="color" id="cqBookingColor" data-cq-change="saveCqBookingColor" class="border-muted rounded-4 bg-surface cursor-pointer" style="width:36px;height:26px;padding:2px">
            <span class="text-10 text-muted" data-s="lbl.custom">Custom</span>
          </div>
          <div id="cqBookingColorSwatches"></div>
        </div>
      </div>
    </div>
    <div class="d-flex items-center gap-8 mb-10 flex-wrap">
      <div class="slot-week-nav">
        <button class="btn btn-secondary btn-sm" data-cq-click="shiftCqWeek" data-cq-arg="-1">&larr;</button>
        <span id="cqWeekLabel" class="week-label"></span>
        <button class="btn btn-secondary btn-sm" data-cq-click="shiftCqWeek" data-cq-arg="1">&rarr;</button>
        <button class="btn btn-secondary btn-sm" data-cq-click="cqWeekToday" data-s="slot.today">Today</button>
        <button class="btn btn-primary btn-sm" id="cqCreateSlotBtn" data-s="slot.createAndBook" data-s-attr="title" data-cq-click="openCreateSlotModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="12" cy="15.5" r="1.8" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.createAndBook">+ New Booking</span></button>
        <button class="btn btn-primary btn-sm" data-s="slot.bulkBook" data-s-attr="title" data-cq-click="openBulkSlotModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="18" r="1" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.bulkBook">Bulk Book</span></button>
      </div>
    </div>
    <div id="cqSlotGrid" style="overflow-x:auto"></div>
    <div class="mt-8 d-flex gap-12 text-10 text-muted flex-wrap">
      <span><span class="d-inline-block bg-surface border-muted" style="width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendOpen">Open</span></span>
      <span><span class="d-inline-block" style="width:10px;height:10px;background:var(--accent);border-radius:2px;margin-right:4px;vertical-align:middle;box-shadow:inset 0 0 0 2px var(--bg)"></span> <span data-s="slot.legendYours">Yours</span></span>
      <span><span class="d-inline-block" style="width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendBooked">Booked</span></span>
    </div>
  </div>

  <!-- ══ MY BOATS ══ -->
  <div class="cq-section" id="sectBoats">
    <div class="cq-section-hdr" data-s="cq.boatsTitle"></div>
    <div id="boatList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ LOGBOOK ══ -->
  <div class="cq-section" id="sectLogbook">
    <div class="cq-section-hdr" data-s="captain.logbookHdr"></div>
    <div class="filter-sheet" id="filterSheet">
      <div class="filter-sheet-top">
        <svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="fText" type="text" data-s="logbook.searchPh" data-s-attr="placeholder">
        <button type="button" class="fs-toggle" id="fsToggle" data-cq-click="toggleFilterSheet" aria-expanded="false" aria-controls="fsBody">
          <span data-s="logbook.filtersBtn">Filters</span>
          <span class="fs-count" id="fsCount" style="display:none">0</span>
        </button>
      </div>
      <div class="filter-sheet-chips" id="fsChips">
        <span class="filter-count" id="filterCount"></span>
      </div>
      <div class="filter-sheet-body" id="fsBody">
        <div class="fs-grid">
          <div class="fs-pill-row">
            <span class="filter-label" data-s="logbook.filterVerifiedLabel">Verification</span>
            <button type="button" class="filter-btn active" data-fs-pill="verified" data-fs-val="" data-cq-click="setFilterPill" data-cq-arg="verified" data-cq-arg2="" data-s="logbook.filterVerifiedAny">Any</button>
            <button type="button" class="filter-btn" data-fs-pill="verified" data-fs-val="yes" data-cq-click="setFilterPill" data-cq-arg="verified" data-cq-arg2="yes" data-s="logbook.filterVerifiedYes">Verified</button>
            <button type="button" class="filter-btn" data-fs-pill="verified" data-fs-val="no" data-cq-click="setFilterPill" data-cq-arg="verified" data-cq-arg2="no" data-s="logbook.filterVerifiedNo">Unverified</button>
          </div>
          <select id="fYear"><option value="" data-s="logbook.filterAllYears"></option></select>
          <select id="fCat"><option value="" data-s="cq.allCategories"></option></select>
          <select id="fBoatName"><option value="" data-s="logbook.filterAllBoats"></option></select>
          <select id="fCaptain"><option value="" data-s="cq.allCaptains"></option></select>
          <select id="fMember"><option value="" data-s="cq.allMembers"></option></select>
          <select id="fWind">
            <option value="" data-s="logbook.filterAnyWind"></option>
            <option value="calm" data-s="logbook.filterWindCalm"></option>
            <option value="light" data-s="logbook.filterWindLight"></option>
            <option value="moderate" data-s="logbook.filterWindModerate"></option>
            <option value="strong" data-s="logbook.filterWindStrong"></option>
            <option value="gt4" data-s="logbook.filterWindGt4"></option>
            <option value="lte4" data-s="logbook.filterWindLte4"></option>
          </select>
        </div>
      </div>
    </div>
    <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ BIO & PROFILE ══ -->
  <div class="cq-section" id="sectBio">
    <div class="cq-section-hdr" data-s="cq.bioTitle"></div>
    <div class="cq-card">
      <div class="d-flex items-start mb-12" style="gap:16px">
        <div id="headshotWrap">
          <div class="cq-headshot-placeholder" id="headshotPlaceholder">+</div>
        </div>
        <div class="flex-1">
          <label class="text-9 text-muted mb-6" style="letter-spacing:.8px;display:block" data-s="cq.headshotLabel" for="headshotFile"></label>
          <input type="file" id="headshotFile" accept="image/*" class="text-xs w-full">
        </div>
      </div>
      <textarea class="cq-bio-area" id="bioText" maxlength="500"></textarea>
      <div class="d-flex items-center mt-8" style="justify-content:flex-end">
        <button class="btn btn-primary btn-sm" data-cq-click="saveBio" data-s="btn.save"></button>
      </div>
    </div>
  </div>

</div>

<!-- Slot modals (recurring + single create-and-book) — markup injected by shared/slot-modal.js -->

<!-- ══ PORT CHANGE MODAL ══ -->
<div class="modal-overlay hidden" id="portModal" data-cq-close-self>
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <h3 id="portModalTitle"></h3>
      <button class="modal-close-x" data-cq-close="portModal">×</button>
    </div>
    <div class="field">
      <label data-s="admin.homePort" for="portSelect"></label>
      <select id="portSelect"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cq-close="portModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cq-click="savePort" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ RESERVATION MODAL ══ -->
<div class="modal-overlay hidden" id="resModal" data-cq-close-self>
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="boat.addReservation"></h3>
      <button class="modal-close-x" data-cq-close="resModal">×</button>
    </div>
    <div class="field">
      <label data-s="cq.resMember" for="cqResStart">Member</label>
      <div class="pos-relative">
        <input type="text" id="cqResMemberSearch" autocomplete="off" placeholder="" data-cq-input-val="searchCqResMember">
        <div id="cqResMemberSuggestions" class="suggest-drop pos-relative"></div>
        <input type="hidden" id="cqResMemberKt">
        <div id="cqResMemberName" class="text-10 text-muted mt-3"></div>
      </div>
    </div>
    <div class="grid2 gap-8" style="display:grid;grid-template-columns:1fr 1fr">
      <div class="field"><label data-s="cq.resStartDate">Start</label><input type="date" id="cqResStart"></div>
      <div class="field"><label data-s="cq.resEndDate" for="cqResEnd">End</label><input type="date" id="cqResEnd"></div>
    </div>
    <div class="field"><label data-s="cq.resNote" for="cqResNote">Note</label><input type="text" id="cqResNote"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cq-close="resModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cq-click="saveCqReservation" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- Boat modal — markup injected by shared/boat-modal.js (injectBoatModalHtml()). -->

</body>
</html>
