<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Captain's Quarters</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="../shared/tripcard.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/list-filter.js"></script>
<script src="../shared/calendar.js" defer></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/mcm.js" defer></script>
<script src="../shared/maintenance.js" defer></script>
<script src="../shared/boat-modal.js"></script>
<script src="../shared/slot-modal.js"></script>
<script src="../shared/logbook.js" defer></script>
<style>
/* ── Stats ── */
.cq-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.cq-stat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px 12px; text-align:center; box-shadow:var(--shadow-sm); }
.cq-stat .sn { font-size:24px; color:var(--brass-fg); font-weight:500; }
.cq-stat .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Section headers ── */
.cq-section { margin-bottom:20px; }
.cq-section-hdr { font-size:9px; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.cq-section-hdr .badge { font-size:9px; padding:2px 8px; border-radius:10px; font-weight:500; }

/* ── Filter pills ── */
.cq-pills { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.cq-pill { padding:5px 12px; border-radius:16px; border:1px solid var(--border); background:var(--surface);
  font-size:10px; font-family:inherit; color:var(--muted); cursor:pointer; transition:all .2s; }
.cq-pill.active { border-color:var(--brass); color:var(--brass-fg); background:var(--brass)11; }

/* ── Compact filter bar ── */
.cq-filter-bar { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px; margin-bottom:10px; align-items:center; }
.cq-filter-bar select, .cq-filter-bar input[type="text"] { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text); font-family:inherit; font-size:10px; padding:4px 8px; height:26px; outline:none;
  transition:border-color .2s,box-shadow .2s; min-width:0; width:100%; box-sizing:border-box; }
.cq-filter-bar select:focus, .cq-filter-bar input:focus { border-color:var(--brass); box-shadow:var(--focus-ring); }
.cq-filter-search { display:flex; gap:6px; align-items:center; grid-column:1/-1; }
.cq-filter-search input { flex:1; min-width:0; }
.cq-filter-count { font-size:9px; color:var(--muted); white-space:nowrap; }

/* ── Cards ── */
.cq-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:12px 14px; margin-bottom:8px; box-shadow:var(--shadow-sm); }
.cq-card-title { font-size:12px; font-weight:500; color:var(--text); }
.cq-card-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.cq-card-meta { font-size:10px; color:var(--brass-fg); margin-top:2px; }
.cq-card .conf-actions { display:flex; gap:6px; margin-top:8px; }
.cq-card .conf-actions button { font-size:11px; font-family:inherit; padding:5px 12px; border-radius:var(--radius-sm); cursor:pointer; border:1px solid; }
.cq-card .btn-confirm { background:var(--green)18; color:var(--green); border-color:var(--green)55; }
.cq-card .btn-confirm:hover { background:var(--green)33; }
.cq-card .btn-reject { background:var(--red)18; color:var(--red); border-color:var(--red)55; }
.cq-card .btn-reject:hover { background:var(--red)33; }

/* ── Maintenance severity ── */
.sev-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.sev-low      { background:var(--green); }
.sev-medium   { background:var(--yellow); }
.sev-high     { background:var(--orange); }
.sev-critical { background:var(--red); }


/* ── Show-more button ── */
.cq-show-more { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:8px; font-size:10px; color:var(--muted); cursor:pointer; font-family:inherit; margin-top:4px; text-align:center; transition:border-color .2s,color .2s; }
.cq-show-more:hover { border-color:var(--brass); color:var(--text); }

/* .filter-bar styles moved to shared/style.css */

/* ── Bio section ── */
.cq-bio-area { width:100%; min-height:80px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-md); color:var(--text); font-family:inherit; font-size:12px; padding:10px 12px;
  resize:vertical; box-sizing:border-box; transition:border-color .2s,box-shadow .2s; outline:none; }
.cq-bio-area:focus { border-color:var(--brass); box-shadow:var(--focus-ring); }
.cq-headshot-preview { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--brass); }
.cq-headshot-placeholder { width:80px; height:80px; border-radius:50%; background:var(--surface);
  border:2px dashed var(--border); display:flex; align-items:center; justify-content:center;
  font-size:24px; color:var(--muted); }

/* ── Boat cards ── */
.cq-boat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow-sm); }
.cq-boat-name { font-size:13px; font-weight:500; }
.cq-boat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.cq-boat-actions { margin-left:auto; display:flex; gap:6px; }
.cq-boat-actions button { font-size:10px; font-family:inherit; padding:4px 10px; border-radius:var(--radius-sm);
  cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); transition:color .2s,border-color .2s,background .2s; }
.cq-boat-actions button:hover { border-color:var(--brass); color:var(--brass-fg); background:var(--brass)08; }

/* ── Responsive ── */
/* Page-specific responsive; .filter-bar collapse is in shared/style.css */
@media(max-width:600px){
  .cq-stats { grid-template-columns:1fr 1fr; }
  .cq-stat .sn { font-size:20px; }
  .cq-filter-bar { grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); }
}
@media(max-width:400px){
  .cq-filter-bar { grid-template-columns:1fr 1fr; gap:4px; }
  .cq-filter-bar select, .cq-filter-bar input[type="text"] { font-size:9px; padding:3px 6px; }
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="cqTitle"></div>
    <div class="text-sm text-muted" style="margin-top:2px" id="cqSubtitle"></div>
  </div>

  <!-- ══ YTD STATS ══ -->
  <div class="cq-stats" id="cqStats">
    <div class="cq-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cq.ytdTrips"></div></div>
    <div class="cq-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cq.ytdHours"></div></div>
    <div class="cq-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cq.ytdDistance"></div></div>
  </div>

  <!-- ══ MAINTENANCE ══ -->
  <div class="cq-section" id="sectMaint">
    <div class="cq-section-hdr" data-s="cq.maintTitle"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
      <div class="cq-pills" id="maintPills" style="margin-bottom:0"></div>
      <select id="mfBoat" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:10px;padding:4px 8px;height:26px;outline:none;max-width:140px"><option value="" data-s="cq.allBoats">All boats</option></select>
    </div>
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ VALIDATION REQUESTS ══ -->
  <div class="cq-section" id="sectValidation">
    <div class="cq-section-hdr" data-s="cq.validationTitle"></div>
    <div id="validationList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ CREW APPROVALS ══ -->
  <div class="cq-section" id="sectCrew">
    <div class="cq-section-hdr" data-s="cq.crewTitle"></div>
    <div id="crewList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ ASSIGN CREDENTIALS ══ -->
  <div class="cq-section" id="sectCredentials">
    <div class="cq-section-hdr" data-s="cq.assignCredTitle"></div>
    <div style="margin-bottom:10px">
      <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" data-cq-click="openMemberCertModal" data-s="cq.assignCred"></button>
    </div>
  </div>

  <!-- ══ RESERVATIONS ══ -->
  <div class="cq-section" id="sectReservations">
    <div class="cq-section-hdr" data-s="cq.reservationsTitle">RESERVATIONS</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <label data-s="slot.filterBoat" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Boat</label>
      <select id="cqResBoat" data-cq-change="loadCqSlots" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:4px 8px"></select>
      <div class="slot-week-nav">
        <button class="btn btn-secondary" data-cq-click="shiftCqWeek" data-cq-arg="-1">&larr;</button>
        <span id="cqWeekLabel" class="week-label"></span>
        <button class="btn btn-secondary" data-cq-click="shiftCqWeek" data-cq-arg="1">&rarr;</button>
        <button class="btn btn-secondary" data-cq-click="cqWeekToday" data-s="slot.today">Today</button>
        <button class="btn btn-primary" id="cqCreateSlotBtn" data-s="slot.createAndBook" data-s-attr="title" data-cq-click="openCreateSlotModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="12" cy="15.5" r="1.8" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.createAndBook">+ New Booking</span></button>
        <button class="btn btn-primary" data-s="slot.bulkBook" data-s-attr="title" data-cq-click="openBulkSlotModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="18" r="1" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.bulkBook">Bulk Book</span></button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
        <label for="cqBookingColor" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px" data-s="cq.bookingColor">My booking color</label>
        <input type="color" id="cqBookingColor" data-cq-change="saveCqBookingColor" style="width:36px;height:26px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer">
      </div>
    </div>
    <div id="cqSlotGrid" style="overflow-x:auto"></div>
    <div style="margin-top:8px;display:flex;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--surface);border:1px solid var(--border);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendOpen">Open</span></span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--brass);border-radius:2px;margin-right:4px;vertical-align:middle;box-shadow:inset 0 0 0 2px var(--bg)"></span> <span data-s="slot.legendYours">Yours</span></span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendBooked">Booked</span></span>
    </div>
  </div>

  <!-- ══ MY BOATS ══ -->
  <div class="cq-section" id="sectBoats">
    <div class="cq-section-hdr" data-s="cq.boatsTitle"></div>
    <div id="boatList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ LOGBOOK ══ -->
  <div class="cq-section" id="sectLogbook">
    <div class="cq-section-hdr">LOGBOOK</div>
    <div class="filter-bar">
      <select id="fYear"><option value="" data-s="logbook.filterAllYears"></option></select>
      <select id="fCat"><option value="" data-s="cq.allCategories"></option></select>
      <select id="fBoatName"><option value="" data-s="logbook.filterAllBoats"></option></select>
      <select id="fCaptain"><option value="" data-s="cq.allCaptains"></option></select>
      <select id="fMember"><option value="" data-s="cq.allMembers"></option></select>
      <select id="fWind">
        <option value="" data-s="logbook.filterAnyWind"></option>
        <option value="calm" data-s="logbook.filterWindCalm"></option>
        <option value="light" data-s="logbook.filterWindLight"></option>
        <option value="moderate" data-s="logbook.filterWindModerate"></option>
        <option value="strong" data-s="logbook.filterWindStrong"></option>
        <option value="gt4" data-s="logbook.filterWindGt4"></option>
        <option value="lte4" data-s="logbook.filterWindLte4"></option>
      </select>
      <div class="filter-search-row">
        <input id="fText" type="text" data-s="logbook.searchPh" data-s-attr="placeholder">
        <span class="filter-count" id="filterCount"></span>
      </div>
    </div>
    <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ BIO & PROFILE ══ -->
  <div class="cq-section" id="sectBio">
    <div class="cq-section-hdr" data-s="cq.bioTitle"></div>
    <div class="cq-card">
      <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:12px">
        <div id="headshotWrap">
          <div class="cq-headshot-placeholder" id="headshotPlaceholder">+</div>
        </div>
        <div style="flex:1">
          <label style="font-size:9px;color:var(--muted);letter-spacing:.8px;display:block;margin-bottom:6px" data-s="cq.headshotLabel"></label>
          <input type="file" id="headshotFile" accept="image/*" style="font-size:11px;color:var(--text);width:100%">
        </div>
      </div>
      <textarea class="cq-bio-area" id="bioText" maxlength="500"></textarea>
      <div style="display:flex;justify-content:flex-end;align-items:center;margin-top:8px">
        <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" data-cq-click="saveBio" data-s="btn.save"></button>
      </div>
    </div>
  </div>

</div>

<!-- Slot modals (recurring + single create-and-book) — markup injected by shared/slot-modal.js -->

<!-- ══ PORT CHANGE MODAL ══ -->
<div class="modal-overlay hidden" id="portModal" data-cq-close-self>
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <h3 id="portModalTitle"></h3>
      <button class="modal-close-x" data-cq-close="portModal">×</button>
    </div>
    <div class="field">
      <label data-s="admin.homePort"></label>
      <select id="portSelect"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cq-close="portModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cq-click="savePort" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ RESERVATION MODAL ══ -->
<div class="modal-overlay hidden" id="resModal" data-cq-close-self>
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="boat.addReservation"></h3>
      <button class="modal-close-x" data-cq-close="resModal">×</button>
    </div>
    <div class="field">
      <label data-s="cq.resMember">Member</label>
      <div style="position:relative">
        <input type="text" id="cqResMemberSearch" autocomplete="off" placeholder="" data-cq-input-val="searchCqResMember">
        <div id="cqResMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="cqResMemberKt">
        <div id="cqResMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label data-s="cq.resStartDate">Start</label><input type="date" id="cqResStart"></div>
      <div class="field"><label data-s="cq.resEndDate">End</label><input type="date" id="cqResEnd"></div>
    </div>
    <div class="field"><label data-s="cq.resNote">Note</label><input type="text" id="cqResNote"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cq-close="resModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cq-click="saveCqReservation" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- Boat modal — markup injected by shared/boat-modal.js (injectBoatModalHtml()). -->

<script src="captain.js" defer></script>
</body>
</html>
