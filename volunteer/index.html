<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Volunteer</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<script src="../shared/theme-init.js"></script>
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js" defer></script>
<script src="../shared/ui.js" defer></script>
<script src="../shared/layout.js" defer></script>
<script src="../shared/strings.js"></script>
<script src="../shared/dateutil.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/volunteer.js" defer></script>
<link rel="stylesheet" href="volunteer.css">
</head>
<body>
<ymir-header></ymir-header>

<div class="page-content">

  <div class="mb-14">
    <div class="fw-500" style="font-size:16px;color:var(--text)" data-s="volunteer.title"></div>
    <div class="text-sm text-muted mt-2" data-s="volunteer.subtitle"></div>
  </div>

  <!-- ══ TAB BAR ══ -->
  <div class="vp-tab-bar">
    <button class="vp-tab-btn active" data-tab="list"         data-s="volunteer.tabList"></button>
    <button class="vp-tab-btn"        data-tab="calendar" data-s="volunteer.tabCalendar"></button>
  </div>

  <!-- ══ LIST VIEW ══ -->
  <div id="vpTab-list">
    <div class="d-flex items-center justify-between mb-10 gap-10 flex-wrap">
      <div class="vp-section-hdr" style="margin-bottom:0" data-s="volunteer.upcoming"></div>
      <div class="d-flex gap-4">
        <button id="vpFilterAll"   class="vp-btn vp-filter-btn active"  data-s="volunteer.filterAll"></button>
        <button id="vpFilterMine"  class="vp-btn vp-filter-btn"        data-s="volunteer.filterMine"></button>
      </div>
    </div>
    <div id="vpListContainer"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ CALENDAR VIEW ══ -->
  <div id="vpTab-calendar" class="hidden">
    <div class="vp-cal" id="vpCalendar">
      <div class="vp-cal-hdr">
        <div class="vp-cal-title" id="vpCalTitle">—</div>
        <div class="vp-cal-nav">
          <button data-vp-nav="prev">‹</button>
          <button data-vp-nav="today" data-s="slot.today">Today</button>
          <button data-vp-nav="next">›</button>
        </div>
      </div>
      <div class="vp-cal-grid" id="vpCalGrid"></div>
    </div>
  </div>

</div>

<!-- ══ DAY DETAIL MODAL ══ -->
<div class="modal-overlay hidden" id="vpDayModal">
  <div class="modal" style="max-width:560px;width:95vw;max-height:92vh;overflow-y:auto">
    <div class="modal-header">
      <h3 id="vpDayModalTitle">—</h3>
      <button class="modal-close-x">&times;</button>
    </div>
    <div id="vpDayModalBody" class="vp-day-list"></div>
  </div>
</div>

<script src="volunteer.js" defer></script>
</body>
</html>
