<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Incident Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/strings.js"></script>
  <style>
    .mode-btns { display:flex; gap:8px; margin-bottom:20px; }
    .mode-btn { flex:1; padding:12px; background:var(--card); border:1px solid var(--border);
      border-radius:8px; font-family:inherit; font-size:13px; color:var(--muted); cursor:pointer;
      transition:all .15s; text-align:center; }
    .mode-btn.active { background:var(--brass)18; border-color:var(--brass); color:var(--text); }
    .mode-btn .icon { font-size:22px; display:block; margin-bottom:4px; }

    .type-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
    .type-toggle { padding:6px 12px; background:var(--faint); border:1px solid var(--border);
      border-radius:4px; font-size:12px; font-family:inherit; color:var(--text); cursor:pointer; transition:all .15s; }
    .type-toggle.on { background:var(--red)22; border-color:var(--red)88; color:var(--red); }

    .sev-btns { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
    .sev-btn { padding:7px 14px; background:var(--faint); border:1px solid var(--border);
      border-radius:4px; font-size:12px; font-family:inherit; cursor:pointer; transition:all .15s; color:var(--text); }
    .sev-btn[data-v="low"].on    { background:#27ae6022; border-color:#27ae6088; color:var(--green); }
    .sev-btn[data-v="medium"].on { background:#f1c40f22; border-color:#f1c40f88; color:#c9a800; }
    .sev-btn[data-v="high"].on   { background:#e67e2222; border-color:#e67e2288; color:var(--orange); }
    .sev-btn[data-v="critical"].on { background:#e74c3c22; border-color:#e74c3c88; color:var(--red); }

    .incident-row { padding:12px 0; border-bottom:1px solid var(--faint); font-size:13px; cursor:pointer; }
    .incident-row:last-child { border-bottom:none; }
    .incident-row:hover { background:var(--faint); margin:0 -12px; padding:12px; border-radius:4px; }
    .incident-header { display:flex; align-items:center; gap:10px; }
    .incident-desc { color:var(--muted); font-size:12px; margin-top:4px; }
    .incident-meta { font-size:11px; color:var(--muted); margin-top:3px; }

    .notes-list { margin-top:8px; }
    .note-item { background:var(--faint); border-radius:6px; padding:8px 12px; margin-bottom:6px; font-size:12px; }
    .note-meta  { color:var(--muted); font-size:11px; margin-top:3px; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="header-left">
      <a href="../" class="logo">ÝMIR</a>
      <span class="page-title">Incidents</span>
    </div>
    <div class="header-right">
      <a href="../staff/" class="hbtn">⚓ Staff Hub</a>
      <a href="../weather/" class="hbtn">⛅ Weather</a>
        <button class="hbtn" onclick="toggleLang()">IS</button>
        <button class="hbtn" onclick="signOut()">Sign out</button>
</div>
  </header>

  <main>
    <!-- MODE: list or new -->
    <div class="mode-btns">
      <button class="mode-btn active" id="modeListBtn" onclick="setMode('list')">
        <span class="icon">📋</span>View incidents
      </button>
      <button class="mode-btn" id="modeNewBtn" onclick="setMode('new')">
        <span class="icon">⚠</span>File new report
      </button>
    </div>

    <!-- LIST MODE -->
    <div id="listMode">
      <div class="card" id="incidentsList">
        <div class="loading-state"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- NEW REPORT MODE -->
    <div id="newMode" class="hidden">
      <div class="card">

        <!-- Incident types -->
        <div class="field">
          <label>Incident type(s)</label>
          <div class="type-grid" id="typeGrid">
            <button class="type-toggle" data-v="injury"       onclick="toggleType(this)">🩹 Injury</button>
            <button class="type-toggle" data-v="capsize"      onclick="toggleType(this)">⛵ Capsize</button>
            <button class="type-toggle" data-v="collision"    onclick="toggleType(this)">💥 Collision</button>
            <button class="type-toggle" data-v="equipment"    onclick="toggleType(this)">🔧 Equipment failure</button>
            <button class="type-toggle" data-v="medical"      onclick="toggleType(this)">🏥 Medical</button>
            <button class="type-toggle" data-v="nearMiss"     onclick="toggleType(this)">⚡ Near miss</button>
            <button class="type-toggle" data-v="missing"      onclick="toggleType(this)">🔍 Missing person</button>
            <button class="type-toggle" data-v="propertyDmg"  onclick="toggleType(this)">🏗 Property damage</button>
            <button class="type-toggle" data-v="other"        onclick="toggleType(this)">📌 Other</button>
          </div>
        </div>

        <!-- Severity -->
        <div class="field">
          <label>Severity</label>
          <div class="sev-btns">
            <button class="sev-btn" data-v="low"      onclick="setSev(this)">Low</button>
            <button class="sev-btn" data-v="medium"   onclick="setSev(this)">Medium</button>
            <button class="sev-btn" data-v="high"     onclick="setSev(this)">High</button>
            <button class="sev-btn" data-v="critical" onclick="setSev(this)">Critical</button>
          </div>
        </div>

        <!-- Date / time -->
        <div class="grid2">
          <div class="field"><label>Date</label><input type="date" id="iDate"></div>
          <div class="field"><label>Time</label><input type="time" id="iTime"></div>
        </div>

        <!-- Location / boat -->
        <div class="grid2">
          <div class="field">
            <label>Location</label>
            <select id="iLocation"><option value="">— select —</option></select>
          </div>
          <div class="field">
            <label>Boat (if applicable)</label>
            <select id="iBoat"><option value="">— none —</option></select>
          </div>
        </div>

        <!-- Description -->
        <div class="field">
          <label>Description <span style="color:var(--red)">*</span></label>
          <textarea id="iDesc" rows="4" placeholder="Describe what happened…"></textarea>
        </div>

        <!-- Involved persons -->
        <div class="field">
          <label>Persons involved</label>
          <textarea id="iInvolved" rows="2" placeholder="Names, kennitölur, roles…"></textarea>
        </div>

        <!-- Witnesses -->
        <div class="field">
          <label>Witnesses</label>
          <textarea id="iWitnesses" rows="2" placeholder="Names / contact info…"></textarea>
        </div>

        <!-- Immediate action -->
        <div class="field">
          <label>Immediate action taken</label>
          <textarea id="iAction" rows="3" placeholder="First aid, evacuation, coastguard called…"></textarea>
        </div>

        <!-- Follow-up -->
        <div class="field">
          <label>Follow-up required</label>
          <textarea id="iFollowUp" rows="2" placeholder="Referral, repair, investigation…"></textarea>
        </div>

        <!-- Hand off -->
        <div style="background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:12px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Hand-off</div>
          <div class="grid2">
            <div class="field">
              <label>Handed off to</label>
              <select id="iHandOffTo">
                <option value="">— none —</option>
                <option value="emergency">Emergency services</option>
                <option value="hospital">Hospital</option>
                <option value="coastguard">Coastguard</option>
                <option value="police">Police</option>
                <option value="parent">Parent / guardian</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="field">
              <label>Name / reference</label>
              <input type="text" id="iHandOffName" placeholder="Contact name or case number">
            </div>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Hand-off notes</label>
            <textarea id="iHandOffNotes" rows="2" placeholder="Details…"></textarea>
          </div>
        </div>

        <!-- Staff notes -->
        <div class="field">
          <label>Internal staff notes</label>
          <textarea id="iStaffNotes" rows="2" placeholder="Not shared externally…"></textarea>
        </div>

        <div id="saveMsg" style="font-size:12px;min-height:18px;margin-bottom:8px"></div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="setMode('list')">Cancel</button>
          <button class="btn btn-primary" onclick="fileReport()" id="fileBtn">File report</button>
        </div>
      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailMode" class="hidden">
      <div style="margin-bottom:12px">
        <button class="btn-ghost" onclick="setMode('list')">← All incidents</button>
      </div>
      <div class="card" id="detailCard"></div>

      <!-- Add note -->
      <div class="section-heading" style="margin-top:20px">Add note</div>
      <div class="card">
        <div class="field">
          <textarea id="noteText" rows="3" placeholder="Follow-up note…"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addNote()" id="noteBtn">Add note</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     ÝMIR — incidents/index.html  (refactored <script> block)

     Changes vs. original
     ────────────────────
     1. Removed local bool() / esc() / sjson() — all come from shared/api.js.
        sjson was identical to parseJson; all calls replaced with parseJson().
     2. All alert("…") replaced with toast("…","err").
     3. Minor: loadData() populates selects via the shared populateSelect()
        helper instead of innerHTML concatenation loops.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
const user  = requireAuth(isStaff);
const L     = getLang();

let incidents = [], boats = [], locations = [];
let selectedTypes = new Set(), selectedSev = "";
let viewingId = null;

document.addEventListener("DOMContentLoaded", async () => {
  const now = new Date();
  document.getElementById("iDate").value = now.toISOString().slice(0, 10);
  document.getElementById("iTime").value = now.toTimeString().slice(0, 5);
  await loadData();
});

async function loadData() {
  try {
    const [iRes, bRes, lRes] = await Promise.all([
      apiGet("getIncidents"),
      apiGet("getBoats").catch(() => ({ boats: [] })),
      apiGet("getLocations").catch(() => ({ locations: [] })),
    ]);
    incidents = iRes.incidents || [];
    boats     = bRes.boats     || [];
    locations = lRes.locations || [];
  } catch(e) {
    incidents = []; boats = []; locations = [];
    console.error("loadData:", e);
  }
  populateSelects();
  renderList();
}

function populateSelects() {
  // Use shared populateSelect() helper — no manual innerHTML loops
  populateSelect("iBoat",     boats,     b => b.name, b => b.id, b => bool(b.active));
  populateSelect("iLocation", locations, l => l.name, l => l.id, l => bool(l.active));
}

// ── Modes ──────────────────────────────────────────────────────────────────────
function setMode(mode) {
  document.getElementById("listMode").classList.toggle("hidden",   mode !== "list");
  document.getElementById("newMode").classList.toggle("hidden",    mode !== "new");
  document.getElementById("detailMode").classList.toggle("hidden", mode !== "detail");
  document.getElementById("modeListBtn").classList.toggle("active", mode === "list" || mode === "detail");
  document.getElementById("modeNewBtn").classList.toggle("active",  mode === "new");
  if (mode === "list") renderList();
}

// ── List ───────────────────────────────────────────────────────────────────────
function renderList() {
  const card   = document.getElementById("incidentsList");
  const sorted = [...incidents].sort((a, b) => new Date(b.filedAt || b.date) - new Date(a.filedAt || a.date));
  if (!sorted.length) { card.innerHTML = `<div class="empty-state">No incidents on record.</div>`; return; }

  const sevColor = { low:"badge-green", medium:"badge-yellow", high:"badge-orange", critical:"badge-red" };
  card.innerHTML = sorted.map(i => {
    const types   = parseJson(i.types, []);
    const typeStr = Array.isArray(types) ? types.join(", ") : String(types);
    const date    = i.date
      ? new Date(i.date).toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" })
      : "—";
    return `<div class="incident-row" onclick="viewIncident('${i.id}')">
      <div class="incident-header">
        <span class="badge ${sevColor[i.severity] || "badge-muted"}">${i.severity || "—"}</span>
        <span style="font-weight:bold;flex:1">${esc(typeStr || "Incident")}</span>
        <span style="font-size:11px;color:var(--muted)">${date}</span>
        ${bool(i.resolved) ? `<span class="badge badge-green">resolved</span>` : ""}
      </div>
      <div class="incident-desc">${esc((i.description || "").slice(0, 120))}${(i.description || "").length > 120 ? "…" : ""}</div>
      <div class="incident-meta">Filed by ${esc(i.filedBy || "—")} · ${esc(i.locationName || "—")}</div>
    </div>`;
  }).join("");
}

function viewIncident(id) {
  viewingId = id;
  const i   = incidents.find(x => x.id === id);
  if (!i) return;

  const sevColor = { low:"badge-green", medium:"badge-yellow", high:"badge-orange", critical:"badge-red" };
  const types    = parseJson(i.types, []);
  const notes    = parseJson(i.staffNotes, []);

  document.getElementById("detailCard").innerHTML = `
    <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px">
      <span class="badge ${sevColor[i.severity] || "badge-muted"} badge-lg">${i.severity || "—"}</span>
      ${(Array.isArray(types) ? types : [types]).map(t => `<span class="badge badge-muted">${esc(t)}</span>`).join("")}
      ${bool(i.resolved) ? `<span class="badge badge-green">resolved</span>` : ""}
      <span style="flex:1"></span>
      <button class="btn btn-secondary" style="font-size:11px" onclick="resolveIncident('${i.id}')">
        ${bool(i.resolved) ? "Reopen" : "Mark resolved"}
      </button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:16px">
      ${esc(i.date || "")} ${esc(i.time || "")} · ${esc(i.locationName || "—")}
      ${i.boatName ? ` · ${esc(i.boatName)}` : ""}
    </div>
    ${field("Description", i.description)}
    ${field("Persons involved", i.involved)}
    ${field("Witnesses", i.witnesses)}
    ${field("Immediate action", i.immediateAction)}
    ${field("Follow-up", i.followUp)}
    ${i.handOffTo ? field("Handed off to", `${i.handOffTo}${i.handOffName ? " — " + i.handOffName : ""} ${i.handOffNotes || ""}`) : ""}
    ${field("Filed by", i.filedBy + " at " + (i.filedAt ? new Date(i.filedAt).toLocaleString("en-GB") : ""))}
    ${notes.length ? `
      <div style="margin-top:16px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">Notes</div>
        ${notes.map(n => `
          <div class="note-item">${esc(n.text)}
            <div class="note-meta">${esc(n.by)} · ${esc(n.at)}</div>
          </div>`).join("")}
      </div>` : ""}
  `;
  setMode("detail");
}

function field(label, val) {
  if (!val || String(val).trim() === "" || val === "—") return "";
  return `<div style="margin-bottom:12px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px">${esc(label)}</div>
    <div style="font-size:13px;white-space:pre-wrap">${esc(val)}</div>
  </div>`;
}

// ── Type / severity toggles ───────────────────────────────────────────────────
function toggleType(btn) {
  const v = btn.dataset.v;
  if (selectedTypes.has(v)) { selectedTypes.delete(v); btn.classList.remove("on"); }
  else                      { selectedTypes.add(v);    btn.classList.add("on"); }
}

function setSev(btn) {
  document.querySelectorAll(".sev-btn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  selectedSev = btn.dataset.v;
}

// ── File report ───────────────────────────────────────────────────────────────
async function fileReport() {
  const desc = document.getElementById("iDesc").value.trim();
  if (!desc)               { toast("Description is required.", "err"); return; }
  if (!selectedTypes.size) { toast("Select at least one incident type.", "err"); return; }
  if (!selectedSev)        { toast("Select severity.", "err"); return; }

  const btn = document.getElementById("fileBtn");
  const msg = document.getElementById("saveMsg");
  btn.disabled = true; msg.textContent = "";

  const boatSel = document.getElementById("iBoat");
  const locSel  = document.getElementById("iLocation");
  const boatOpt = boatSel.options[boatSel.selectedIndex];
  const locOpt  = locSel.options[locSel.selectedIndex];

  try {
    const payload = {
      types:          JSON.stringify([...selectedTypes]),
      severity:       selectedSev,
      date:           document.getElementById("iDate").value,
      time:           document.getElementById("iTime").value,
      locationId:     locSel.value,
      locationName:   locOpt.text !== "— select —" ? locOpt.text : "",
      boatId:         boatSel.value,
      boatName:       boatOpt.text !== "— none —" ? boatOpt.text : "",
      description:    desc,
      involved:       document.getElementById("iInvolved").value.trim(),
      witnesses:      document.getElementById("iWitnesses").value.trim(),
      immediateAction: document.getElementById("iAction").value.trim(),
      followUp:       document.getElementById("iFollowUp").value.trim(),
      handOffTo:      document.getElementById("iHandOffTo").value,
      handOffName:    document.getElementById("iHandOffName").value.trim(),
      handOffNotes:   document.getElementById("iHandOffNotes").value.trim(),
      staffNotes:     JSON.stringify([]),
      filedBy:        user.name,
      filedAt:        new Date().toISOString(),
    };
    const res = await apiPost("createIncident", payload);
    if (res.id) {
      incidents.unshift({ ...payload, id: res.id });
      viewIncident(res.id);
    }
  } catch(e) {
    msg.textContent = "Error: " + e.message;
    msg.style.color = "var(--red)";
    btn.disabled = false;
  }
}

async function resolveIncident(id) {
  const i = incidents.find(x => x.id === id);
  if (!i) return;
  const nowResolved = !bool(i.resolved);
  try {
    await apiPost("resolveIncident", { id, resolved: nowResolved, resolvedAt: new Date().toISOString() });
    i.resolved = nowResolved;
    if (nowResolved) i.resolvedAt = new Date().toISOString();
    viewIncident(id);
  } catch(e) { toast("Error: " + e.message, "err"); }
}

async function addNote() {
  const text = document.getElementById("noteText").value.trim();
  if (!text || !viewingId) return;
  const btn = document.getElementById("noteBtn");
  btn.disabled = true;
  try {
    const note = { text, by: user.name, at: new Date().toLocaleString("en-GB") };
    await apiPost("addIncidentNote", { id: viewingId, note: JSON.stringify(note) });
    const i = incidents.find(x => x.id === viewingId);
    if (i) {
      const notes = parseJson(i.staffNotes, []);   // ← was sjson()
      notes.push(note);
      i.staffNotes = JSON.stringify(notes);
    }
    document.getElementById("noteText").value = "";
    viewIncident(viewingId);
  } catch(e) { toast("Error: " + e.message, "err"); }
  finally { btn.disabled = false; }
}

// bool, esc, parseJson, toast, populateSelect — all from shared/api.js.
// sjson was a local duplicate of parseJson and has been removed.
</script>
</body>
</html>
