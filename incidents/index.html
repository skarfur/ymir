<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Incident Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/strings.js"></script>
  <style>
    .mode-btns { display:flex; gap:8px; margin-bottom:20px; }
    .mode-btn { flex:1; padding:12px; background:var(--card); border:1px solid var(--border);
      border-radius:8px; font-family:inherit; font-size:13px; color:var(--muted); cursor:pointer;
      transition:all .15s; text-align:center; }
    .mode-btn.active { background:var(--brass)18; border-color:var(--brass); color:var(--text); }
    .mode-btn .icon { font-size:22px; display:block; margin-bottom:4px; }

    .type-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
    .type-toggle { padding:6px 12px; background:var(--faint); border:1px solid var(--border);
      border-radius:4px; font-size:12px; font-family:inherit; color:var(--text); cursor:pointer; transition:all .15s; }
    .type-toggle.on { background:var(--red)22; border-color:var(--red)88; color:var(--red); }

    .sev-btns { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
    .sev-btn { padding:7px 14px; background:var(--faint); border:1px solid var(--border);
      border-radius:4px; font-size:12px; font-family:inherit; cursor:pointer; transition:all .15s; color:var(--text); }
    .sev-btn[data-v="low"].on    { background:#27ae6022; border-color:#27ae6088; color:var(--green); }
    .sev-btn[data-v="medium"].on { background:#f1c40f22; border-color:#f1c40f88; color:#c9a800; }
    .sev-btn[data-v="high"].on   { background:#e67e2222; border-color:#e67e2288; color:var(--orange); }
    .sev-btn[data-v="critical"].on { background:#e74c3c22; border-color:#e74c3c88; color:var(--red); }

    .incident-row { padding:12px 0; border-bottom:1px solid var(--faint); font-size:13px; cursor:pointer; }
    .incident-row:last-child { border-bottom:none; }
    .incident-row:hover { background:var(--faint); margin:0 -12px; padding:12px; border-radius:4px; }
    .incident-header { display:flex; align-items:center; gap:10px; }
    .incident-desc { color:var(--muted); font-size:12px; margin-top:4px; }
    .incident-meta { font-size:11px; color:var(--muted); margin-top:3px; }

    .notes-list { margin-top:8px; }
    .note-item { background:var(--faint); border-radius:6px; padding:8px 12px; margin-bottom:6px; font-size:12px; }
    .note-meta  { color:var(--muted); font-size:11px; margin-top:3px; }

    .page { max-width:720px; margin:0 auto; padding:16px 16px 60px; }
  </style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page">
  <main>
    <!-- MODE: list, new, or detail -->
    <div class="mode-btns">
      <button class="mode-btn active" id="modeListBtn" onclick="setMode('list')">
        <span class="icon">📋</span><span id="modeListLabel"></span>
      </button>
      <button class="mode-btn" id="modeNewBtn" onclick="setMode('new')">
        <span class="icon">⚠️</span><span id="modeNewLabel"></span>
      </button>
    </div>

    <!-- LIST MODE -->
    <div id="listMode">
      <div class="card" id="incidentsList">
        <div class="loading-state"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- NEW REPORT MODE -->
    <div id="newMode" class="hidden">
      <div class="card">

        <!-- Incident types -->
        <div class="field">
          <label id="typeLabel"></label>
          <div class="type-grid" id="typeGrid"></div>
        </div>

        <!-- Severity -->
        <div class="field">
          <label data-s="lbl.severity"></label>
          <div class="sev-btns" id="sevBtns"></div>
        </div>

        <!-- Date / time -->
        <div class="grid2">
          <div class="field"><label data-s="lbl.date"></label><input type="date" id="iDate"></div>
          <div class="field"><label data-s="lbl.time"></label><input type="time" id="iTime"></div>
        </div>

        <!-- Location / boat -->
        <div class="grid2">
          <div class="field">
            <label data-s="lbl.location"></label>
            <select id="iLocation"><option value="" id="iLocNone"></option></select>
          </div>
          <div class="field">
            <label id="boatLabel"></label>
            <select id="iBoat"><option value="" id="iBoatNone"></option></select>
          </div>
        </div>

        <!-- Description -->
        <div class="field">
          <label><span data-s="incident.description"></span> <span class="required">*</span></label>
          <textarea id="iDesc" rows="4"></textarea>
        </div>

        <!-- Involved persons -->
        <div class="field">
          <label data-s="incident.personsInvolved"></label>
          <textarea id="iInvolved" rows="2"></textarea>
        </div>

        <!-- Witnesses -->
        <div class="field">
          <label data-s="incident.witnesses"></label>
          <textarea id="iWitnesses" rows="2"></textarea>
        </div>

        <!-- Immediate action -->
        <div class="field">
          <label data-s="incident.immediateAction"></label>
          <textarea id="iAction" rows="3"></textarea>
        </div>

        <!-- Follow-up -->
        <div class="field">
          <label data-s="incident.followUp"></label>
          <textarea id="iFollowUp" rows="2"></textarea>
        </div>

        <!-- Hand-off -->
        <div class="callout-panel mb-12">
          <div class="section-label mb-10" data-s="incident.handoffSection"></div>
          <div class="grid2">
            <div class="field">
              <label data-s="incident.handoffTo"></label>
              <select id="iHandOffTo">
                <option value="" id="iHandNone"></option>
                <option value="emergency" id="iHandEmergency"></option>
                <option value="hospital"  id="iHandHospital"></option>
                <option value="coastguard" id="iHandCoastguard"></option>
                <option value="police"    id="iHandPolice"></option>
                <option value="other"     id="iHandOther"></option>
              </select>
            </div>
            <div class="field">
              <label data-s="incident.handoffName"></label>
              <input type="text" id="iHandOffName">
            </div>
          </div>
          <div class="field">
            <label data-s="incident.handoffNotes"></label>
            <input type="text" id="iHandOffNotes">
          </div>
        </div>

        <div class="flex-center gap-10">
          <button class="btn btn-primary" id="fileBtn"></button>
          <span id="saveMsg" class="text-md text-muted"></span>
        </div>
      </div>
    </div>

    <!-- DETAIL MODE -->
    <div id="detailMode" class="hidden">
      <div class="card">
        <div class="flex-center gap-10 mb-14">
          <button class="btn-ghost" onclick="setMode('list')" id="backToListBtn"></button>
          <div id="detailStatus" class="ml-auto"></div>
        </div>
        <div id="detailBody"></div>

        <!-- Staff notes -->
        <div class="section-divider">
          <div class="section-label mb-8" data-s="incident.staffNotes"></div>
          <div class="notes-list" id="notesList"></div>
          <div class="input-row mt-8">
            <input type="text" id="noteInput">
            <button class="btn btn-secondary" id="addNoteBtn"></button>
          </div>
        </div>

        <!-- Resolve / reopen -->
        <div class="flex-center mt-14 gap-8 flex-wrap">
          <button class="btn btn-primary" id="resolveBtn" onclick="toggleResolve()"></button>
          <button class="btn-ghost" onclick="setMode('list')" id="backBtn2"></button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const user = requireAuth(isStaff);
const L    = getLang();

let incidents    = [];
let selectedTypes = new Set();
let selectedSev   = '';
let boats         = [], locations = [];
let detailId      = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  buildHeader('incidents');
  applyStrings();

  // Wire labels that depend on runtime values
  document.getElementById('modeListLabel').textContent  = s('incident.viewList');
  document.getElementById('modeNewLabel').textContent   = s('incident.fileNew');
  document.getElementById('typeLabel').textContent      = s('incident.typeLabel');
  document.getElementById('boatLabel').textContent      = s('incident.boatLabel');
  document.getElementById('fileBtn').textContent        = s('incident.fileBtn');
  document.getElementById('backToListBtn').textContent  = '← ' + s('incident.viewList');
  document.getElementById('addNoteBtn').textContent     = s('incident.addNoteBtn');
  document.getElementById('backBtn2').textContent       = '← ' + s('incident.viewList');

  // Placeholder text
  document.getElementById('iDesc').placeholder       = s('lbl.description') + '…';
  document.getElementById('iInvolved').placeholder   = s('incident.personsInvolved') + '…';
  document.getElementById('iWitnesses').placeholder  = s('incident.witnessHint');
  document.getElementById('iAction').placeholder     = s('incident.actionHint');
  document.getElementById('iFollowUp').placeholder   = s('incident.followUpHint');
  document.getElementById('noteInput').placeholder   = s('incident.notePlaceholder');

  // Hand-off options
  document.getElementById('iHandNone').textContent       = s('lbl.noneDash');
  document.getElementById('iHandEmergency').textContent  = 'Emergency services';
  document.getElementById('iHandHospital').textContent   = 'Hospital';
  document.getElementById('iHandCoastguard').textContent = 'Coastguard';
  document.getElementById('iHandPolice').textContent     = 'Police';
  document.getElementById('iHandOther').textContent      = s('incident.type.other').replace('📌 ','');

  // Location/boat selects
  document.getElementById('iLocNone').textContent  = '— ' + s('lbl.selectDots').replace('…','') + ' —';
  document.getElementById('iBoatNone').textContent = s('lbl.noneDash');

  // Set defaults
  document.getElementById('iDate').value = fmtDateNow();
  document.getElementById('iTime').value = fmtTimeNow();

  // Build type grid
  buildTypeGrid();
  buildSevBtns();

  // Load data
  try {
    const [iRes, cfgRes] = await Promise.all([
      apiGet('getIncidents'),
      apiGet('getConfig'),
    ]);
    incidents = iRes.incidents || [];
    boats     = (cfgRes.boats     || []).filter(b => b.active !== false && b.active !== 'false');
    locations = (cfgRes.locations || []).filter(l => l.active !== false && l.active !== 'false');
    populateBoatsLocs();
    renderList();
  } catch(e) {
    document.getElementById('incidentsList').innerHTML =
      `<div class="empty-note text-red">${s('toast.loadFailed')}: ${esc(e.message)}</div>`;
  }

  // Handle hash → jump to detail
  if (window.location.hash) {
    const id = window.location.hash.slice(1);
    const inc = incidents.find(i => i.id === id);
    if (inc) openDetail(inc);
  }

  warmContainer();
});

// ── TYPE GRID ─────────────────────────────────────────────────────────────────
const INCIDENT_TYPES = [
  { v:'injury',      key:'incident.type.injury' },
  { v:'capsize',     key:'incident.type.capsize' },
  { v:'collision',   key:'incident.type.collision' },
  { v:'equipment',   key:'incident.type.equipment' },
  { v:'medical',     key:'incident.type.medical' },
  { v:'nearMiss',    key:'incident.type.nearMiss' },
  { v:'missing',     key:'incident.type.missing' },
  { v:'propertyDmg', key:'incident.type.propertyDmg' },
  { v:'other',       key:'incident.type.other' },
];

const SEV_LIST = [
  { v:'low',      key:'incident.sev.low' },
  { v:'medium',   key:'incident.sev.medium' },
  { v:'high',     key:'incident.sev.high' },
  { v:'critical', key:'incident.sev.critical' },
];

function buildTypeGrid() {
  const grid = document.getElementById('typeGrid');
  grid.innerHTML = INCIDENT_TYPES.map(t =>
    `<button class="type-toggle" data-v="${t.v}" onclick="toggleType(this)">${s(t.key)}</button>`
  ).join('');
}

function buildSevBtns() {
  const div = document.getElementById('sevBtns');
  div.innerHTML = SEV_LIST.map(sv =>
    `<button class="sev-btn" data-v="${sv.v}" onclick="setSev(this)">${s(sv.key)}</button>`
  ).join('');
}

function populateBoatsLocs() {
  const bSel = document.getElementById('iBoat');
  boats.forEach(b => {
    const o = document.createElement('option'); o.value=b.id; o.textContent=b.name; bSel.appendChild(o);
  });
  const lSel = document.getElementById('iLocation');
  locations.forEach(l => {
    const o = document.createElement('option'); o.value=l.id; o.textContent=l.name; lSel.appendChild(o);
  });
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('incidentsList');
  if (!incidents.length) {
    el.innerHTML = `<div class="empty-note">${s('incident.noIncidents')}</div>`;
    return;
  }
  const sevBadge = { low:'badge-green', medium:'badge-yellow', high:'badge-orange', critical:'badge-red' };
  el.innerHTML = incidents.map(i => {
    const types = parseJson(i.types, []);
    const notes = parseJson(i.staffNotes, []);
    return `<div class="incident-row" onclick="openDetail(incidentById('${i.id}'))">
      <div class="incident-header">
        <span class="badge ${sevBadge[i.severity]||'badge-muted'}">${esc(s('incident.sev.'+i.severity)||i.severity||'')}</span>
        <span class="fw-500 flex-1">${esc(i.title||s('incident.title'))}</span>
        <span class="badge ${i.resolved&&i.resolved!=='false' ? 'badge-green':'badge-yellow'}">${i.resolved&&i.resolved!=='false' ? s('incident.resolved') : s('incident.open')}</span>
      </div>
      <div class="incident-desc">${esc(i.description||'').slice(0,120)}${(i.description||'').length>120?'…':''}</div>
      <div class="incident-meta">
        ${esc((i.filedAt||'').slice(0,16).replace('T',' '))}
        ${i.boatName ? ' · '+esc(i.boatName) : ''}
        ${notes.length ? ` · ${notes.length} note${notes.length===1?'':'s'}` : ''}
      </div>
    </div>`;
  }).join('');
}

function incidentById(id) { return incidents.find(i => i.id === id); }

// ── OPEN DETAIL ───────────────────────────────────────────────────────────────
function openDetail(i) {
  if (!i) return;
  detailId = i.id;
  const notes    = parseJson(i.staffNotes, []);
  const types    = parseJson(i.types, []);
  const resolved = i.resolved && i.resolved !== 'false';

  document.getElementById('detailStatus').innerHTML =
    `<span class="badge ${resolved ? 'badge-green' : 'badge-yellow'}">${resolved ? s('incident.resolved') : s('incident.open')}</span>`;

  document.getElementById('resolveBtn').textContent = resolved ? s('incident.markOpen') : s('incident.markResolved');

  const typeLabels = types.map(t => {
    const def = INCIDENT_TYPES.find(x => x.v === t);
    return def ? s(def.key) : t;
  }).join(', ');

  document.getElementById('detailBody').innerHTML = `
    <div class="mb-12">
      <div class="fw-500 text-lg mb-6">${esc(i.title||s('incident.title'))}</div>
      <div class="text-sm text-muted">${typeLabels}</div>
    </div>
    ${field(s('lbl.date')+' / '+s('lbl.time'), (i.date||'') + (i.time?' '+i.time:''))}
    ${field(s('lbl.location'), i.locationName)}
    ${field(s('incident.boatLabel').replace(' (if applicable)',''), i.boatName)}
    ${field(s('incident.description'), i.description)}
    ${field(s('incident.personsInvolved'), i.involved)}
    ${field(s('incident.witnesses'), i.witnesses)}
    ${field(s('incident.immediateAction'), i.immediateAction)}
    ${field(s('incident.followUp'), i.followUp)}
    ${i.handOffTo ? field(s('incident.handoffTo'), `${i.handOffTo}${i.handOffName ? ' — '+i.handOffName : ''} ${i.handOffNotes||''}`) : ''}
    ${field(s('incident.filedBy'), i.filedBy + ' at ' + (i.filedAt ? new Date(i.filedAt).toLocaleString(L==='IS'?'is-IS':'en-GB') : ''))}
  `;

  document.getElementById('notesList').innerHTML = notes.map(n => `
    <div class="note-item">${esc(n.text)}
      <div class="note-meta">${esc(n.by)} · ${esc(n.at)}</div>
    </div>`).join('');

  setMode('detail');
}

function field(label, val) {
  if (!val || String(val).trim() === '' || val === '—') return '';
  return `<div class="detail-field">
    <div class="detail-field-label">${esc(label)}</div>
    <div class="detail-field-value">${esc(val)}</div>
  </div>`;
}

// ── TYPE / SEVERITY TOGGLES ───────────────────────────────────────────────────
function toggleType(btn) {
  const v = btn.dataset.v;
  if (selectedTypes.has(v)) { selectedTypes.delete(v); btn.classList.remove('on'); }
  else                      { selectedTypes.add(v);    btn.classList.add('on'); }
}

function setSev(btn) {
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  selectedSev = btn.dataset.v;
}

// ── FILE REPORT ───────────────────────────────────────────────────────────────
async function fileReport() {
  const desc = document.getElementById('iDesc').value.trim();
  if (!desc)               { showToast(s('incident.descRequired'), 'err'); return; }
  if (!selectedTypes.size) { showToast(s('incident.typeRequired'), 'err'); return; }
  if (!selectedSev)        { showToast(s('incident.sevRequired'),  'err'); return; }

  const btn = document.getElementById('fileBtn');
  const msg = document.getElementById('saveMsg');
  btn.disabled = true; msg.textContent = '';

  const boatSel = document.getElementById('iBoat');
  const locSel  = document.getElementById('iLocation');
  const boatOpt = boatSel.options[boatSel.selectedIndex];
  const locOpt  = locSel.options[locSel.selectedIndex];
  const handTo  = document.getElementById('iHandOffTo').value;

  const typeLabels = [...selectedTypes].map(t => {
    const def = INCIDENT_TYPES.find(x => x.v === t);
    return def ? s(def.key) : t;
  }).join(', ');

  try {
    const res = await apiPost('createIncident', {
      types:         JSON.stringify([...selectedTypes]),
      typeLabels,
      severity:      selectedSev,
      date:          document.getElementById('iDate').value,
      time:          document.getElementById('iTime').value,
      locationId:    locSel.value,
      locationName:  locOpt.value ? locOpt.textContent : '',
      boatId:        boatSel.value,
      boatName:      boatSel.value ? boatOpt.textContent : '',
      description:   desc,
      involved:      document.getElementById('iInvolved').value.trim(),
      witnesses:     document.getElementById('iWitnesses').value.trim(),
      immediateAction: document.getElementById('iAction').value.trim(),
      followUp:      document.getElementById('iFollowUp').value.trim(),
      handOffTo:     handTo,
      handOffName:   document.getElementById('iHandOffName').value.trim(),
      handOffNotes:  document.getElementById('iHandOffNotes').value.trim(),
      filedBy:       user.name,
      filedAt:       new Date().toISOString(),
      title:         typeLabels,
    });
    const newInc = { ...res, types: JSON.stringify([...selectedTypes]),
      description: desc, severity: selectedSev, filedBy: user.name,
      filedAt: new Date().toISOString(), title: typeLabels };
    incidents.unshift(newInc);
    showToast(s('incident.filed'));
    setMode('list');
    renderList();
    resetForm();
  } catch(e) {
    msg.textContent = s('toast.error') + ': ' + e.message;
    showToast(s('toast.saveFailed'), 'err');
  } finally {
    btn.disabled = false;
  }
}

function resetForm() {
  selectedTypes.clear();
  selectedSev = '';
  document.querySelectorAll('.type-toggle').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('on'));
  ['iDesc','iInvolved','iWitnesses','iAction','iFollowUp','iHandOffName','iHandOffNotes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('iHandOffTo').value = '';
  document.getElementById('iDate').value = fmtDateNow();
  document.getElementById('iTime').value = fmtTimeNow();
}

// ── ADD NOTE ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('addNoteBtn').addEventListener('click', addNote);
  document.getElementById('fileBtn').addEventListener('click', fileReport);
  document.getElementById('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addNote();
  });
});

async function addNote() {
  const input = document.getElementById('noteInput');
  const text  = input.value.trim();
  if (!text || !detailId) return;
  try {
    await apiPost('addIncidentNote', { id: detailId, by: user.name, text, at: new Date().toISOString() });
    const i = incidents.find(x => x.id === detailId);
    if (i) {
      const notes = parseJson(i.staffNotes, []);
      const timeStr = new Date().toLocaleString(L === 'IS' ? 'is-IS' : 'en-GB');
      notes.push({ by: user.name, at: timeStr, text });
      i.staffNotes = JSON.stringify(notes);
      document.getElementById('notesList').innerHTML += `
        <div class="note-item">${esc(text)}
          <div class="note-meta">${esc(user.name)} · ${esc(timeStr)}</div>
        </div>`;
    }
    input.value = '';
    showToast(s('toast.saved'));
  } catch(e) { showToast(s('toast.error'), 'err'); }
}

// ── RESOLVE / REOPEN ──────────────────────────────────────────────────────────
async function toggleResolve() {
  const i = incidents.find(x => x.id === detailId);
  if (!i) return;
  const resolved = !(i.resolved && i.resolved !== 'false');
  try {
    await apiPost('resolveIncident', { id: detailId, resolved, resolvedAt: resolved ? new Date().toISOString() : '' });
    i.resolved = resolved;
    document.getElementById('resolveBtn').textContent = resolved ? s('incident.markOpen') : s('incident.markResolved');
    document.getElementById('detailStatus').innerHTML =
      `<span class="badge ${resolved ? 'badge-green' : 'badge-yellow'}">${resolved ? s('incident.resolved') : s('incident.open')}</span>`;
    showToast(s('toast.saved'));
  } catch(e) { showToast(s('toast.error'), 'err'); }
}

// ── MODE SWITCHING ────────────────────────────────────────────────────────────
function setMode(mode) {
  document.getElementById('listMode').classList.toggle('hidden',   mode !== 'list');
  document.getElementById('newMode').classList.toggle('hidden',    mode !== 'new');
  document.getElementById('detailMode').classList.toggle('hidden', mode !== 'detail');
  document.getElementById('modeListBtn').classList.toggle('active', mode === 'list');
  document.getElementById('modeNewBtn').classList.toggle('active',  mode === 'new');
}

function parseJson(v, fallback) {
  if (!v) return fallback;
  try { return typeof v === 'string' ? JSON.parse(v) : v; } catch(e) { return fallback; }
}
</script>
</body>
</html>
