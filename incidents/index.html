<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Incident Report</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/qr.js" defer></script>
  <link rel="stylesheet" href="incidents.css">
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page">
  <main>
    <!-- MODE: list, new, or detail -->
    <div class="mode-btns">
      <button class="mode-btn mode-btn--list active" id="modeListBtn" data-inc-click="setMode" data-inc-arg="list">
        <span id="modeListLabel"></span>
      </button>
      <button class="mode-btn mode-btn--new" id="modeNewBtn" data-inc-click="setMode" data-inc-arg="new">
        <span id="modeNewLabel"></span>
      </button>
    </div>

    <!-- Needs-review alert -->
    <div id="reviewAlert" class="hidden" style="background:color-mix(in srgb, var(--orange) 10%, transparent);border:1px solid color-mix(in srgb, var(--orange) 33%, transparent);color:var(--orange);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:14px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-sm)">
      <span style="font-size:16px">⚠️</span>
      <span id="reviewAlertText"></span>
    </div>

    <!-- LIST MODE -->
    <div id="listMode">
      <div class="incident-filters" id="incidentFilters">
        <div class="filter-row">
          <span class="filter-label" data-s="incident.filterStatusLbl"></span>
          <button class="filt-btn active" data-group="status" data-v="all"      data-inc-click-el="incSetFilter" data-s="incident.filterAll"></button>
          <button class="filt-btn"        data-group="status" data-v="open"     data-inc-click-el="incSetFilter" data-s="incident.open"></button>
          <button class="filt-btn"        data-group="status" data-v="review"   data-inc-click-el="incSetFilter" data-s="incident.filterReview"></button>
          <button class="filt-btn"        data-group="status" data-v="resolved" data-inc-click-el="incSetFilter" data-s="incident.resolved"></button>
        </div>
        <div class="filter-row">
          <span class="filter-label" data-s="lbl.severity"></span>
          <button class="filt-btn active" data-group="sev" data-v="all"      data-inc-click-el="incSetFilter" data-s="incident.filterAll"></button>
          <button class="filt-btn"        data-group="sev" data-v="low"      data-inc-click-el="incSetFilter" data-s="incident.sev.low"></button>
          <button class="filt-btn"        data-group="sev" data-v="medium"   data-inc-click-el="incSetFilter" data-s="incident.sev.medium"></button>
          <button class="filt-btn"        data-group="sev" data-v="high"     data-inc-click-el="incSetFilter" data-s="incident.sev.high"></button>
          <button class="filt-btn"        data-group="sev" data-v="critical" data-inc-click-el="incSetFilter" data-s="incident.sev.critical"></button>
        </div>
      </div>
      <div class="card" id="incidentsList">
        <div class="loading-state"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- NEW REPORT MODE -->
    <div id="newMode" class="hidden">
      <div class="card">

        <!-- Incident types -->
        <div class="field">
          <label id="typeLabel"></label>
          <div class="type-grid" id="typeGrid"></div>
        </div>

        <!-- Severity -->
        <div class="field">
          <label data-s="lbl.severity"></label>
          <div class="sev-btns" id="sevBtns"></div>
        </div>

        <!-- Date / time -->
        <div class="grid2">
          <div class="field"><label data-s="lbl.date"></label><input type="date" id="iDate"></div>
          <div class="field"><label data-s="lbl.time"></label><input type="time" id="iTime"></div>
        </div>

        <!-- Location / boat -->
        <div class="grid2">
          <div class="field">
            <label data-s="lbl.location"></label>
            <select id="iLocation"><option value="" id="iLocNone"></option></select>
          </div>
          <div class="field">
            <label id="boatLabel"></label>
            <div style="display:flex;gap:6px;align-items:center">
              <select id="iBoat" style="flex:1;min-width:0"><option value="" id="iBoatNone"></option></select>
              <button type="button" class="btn btn-secondary" id="iBoatScanBtn" data-inc-click="scanBoatForIncident" style="white-space:nowrap;font-size:10px;padding:6px 10px" data-s="qr.scanBtn"></button>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="field">
          <label><span data-s="incident.description"></span> <span class="required">*</span></label>
          <textarea id="iDesc" rows="4"></textarea>
        </div>

        <!-- Involved persons -->
        <div class="field">
          <label data-s="incident.personsInvolved"></label>
          <textarea id="iInvolved" rows="2"></textarea>
        </div>

        <!-- Witnesses -->
        <div class="field">
          <label data-s="incident.witnesses"></label>
          <textarea id="iWitnesses" rows="2"></textarea>
        </div>

        <!-- Immediate action -->
        <div class="field">
          <label data-s="incident.immediateAction"></label>
          <textarea id="iAction" rows="3"></textarea>
        </div>

        <!-- Follow-up -->
        <div class="field">
          <label data-s="incident.followUp"></label>
          <textarea id="iFollowUp" rows="2"></textarea>
        </div>

        <!-- Hand-off -->
        <div class="callout-panel mb-12">
          <div class="section-label mb-10" data-s="incident.handoffSection"></div>
          <div class="grid2">
            <div class="field">
              <label data-s="incident.handoffTo"></label>
              <select id="iHandOffTo">
                <option value="" id="iHandNone"></option>
                <option value="emergency" id="iHandEmergency"></option>
                <option value="hospital"  id="iHandHospital"></option>
                <option value="coastguard" id="iHandCoastguard"></option>
                <option value="police"    id="iHandPolice"></option>
                <option value="guardian"  id="iHandGuardian"></option>
                <option value="self"      id="iHandSelf"></option>
                <option value="other"     id="iHandOther"></option>
              </select>
            </div>
            <div class="field">
              <label data-s="incident.handoffName"></label>
              <input type="text" id="iHandOffName">
            </div>
          </div>
          <div class="field">
            <label data-s="incident.handoffNotes"></label>
            <input type="text" id="iHandOffNotes">
          </div>
        </div>

        <div class="flex-center gap-10 flex-wrap">
          <button class="btn btn-primary" id="fileBtn"></button>
          <button class="btn btn-secondary" id="fileReviewBtn"></button>
          <span id="saveMsg" class="text-md text-muted"></span>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="modal-overlay hidden" data-inc-close-self>
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 id="detailTitle"></h3>
      <button class="modal-close-x" data-inc-click="closeDetail">&times;</button>
    </div>
    <div id="detailStatus" class="mb-10"></div>
    <div id="detailBody"></div>

    <!-- Reviewer comments -->
    <div class="section-divider">
      <div class="section-label mb-8" data-s="incident.reviewerNotes"></div>
      <div class="notes-list" id="reviewerNotesList"></div>
      <div class="input-row mt-8">
        <input type="text" id="reviewerNoteInput">
        <button class="btn btn-secondary" id="addReviewerNoteBtn"></button>
      </div>
    </div>

    <!-- Resolve / reopen -->
    <div class="flex-center mt-14 gap-8 flex-wrap">
      <button class="btn btn-primary" id="resolveBtn" data-inc-click="toggleResolve"></button>
      <button class="btn-ghost" data-inc-click="closeDetail" id="backBtn2"></button>
    </div>
  </div>
</div>

<script src="incidents.js" defer></script>
</body>
</html>
