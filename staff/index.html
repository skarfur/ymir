<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Staff</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<script src="../shared/theme-init.js"></script>
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js" defer></script>
<script src="../shared/ui.js" defer></script>
<script src="../shared/layout.js" defer></script>
<script src="../shared/strings.js"></script>
<script src="../shared/guests.js" defer></script>
<script src="../shared/weather.js" defer></script>
<script src="../shared/tides.js" defer></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/maintenance.js" defer></script>
<script src="../shared/payroll.js" defer></script>
<script src="../shared/certs.js" defer></script>
<link rel="stylesheet" href="staff.css">
</head>
<body>
<div id="overdue-banner"></div>
<ymir-header></ymir-header>

<div class="page-content">

  <div class="mb-16">
    <div class="fw-500" style="font-size:16px;color:var(--text)" data-s="staff.dashTitle">Staff Dashboard</div>
    <div class="text-sm text-muted mt-2" id="userBadge"></div>
  </div>

  <!-- ══ WEATHER WIDGET ══ -->
  <div class="wx-widget mb-14" id="wxWidget">
    <div class="text-muted text-sm" style="padding:6px 0" data-s="lbl.loading"></div>
  </div>

  <!-- ══ STAFF STATUS ══ -->

    <!-- ══ TIDES ══ -->
  <div id="tideWidget" class="mb-14"></div>

  <div id="staffStatusStrip" class="mb-12">
    <div class="section-label mb-8" data-s="staff.dutyStatusHdr"></div>
    <div class="flex-center flex-wrap gap-8">
      <button id="btnStaffOnDuty" data-staff-click="toggleStaffStatus" data-staff-arg="onDuty" class="items-center gap-6 border-none text-md fw-600 text-nowrap cursor-pointer font-inherit" style="display:inline-flex;padding:6px 14px;border-radius:20px;transition:opacity .15s;background:var(--orange);color:#fff">No staff on duty</button>
      <button id="btnSupportBoat" data-staff-click="toggleStaffStatus" data-staff-arg="supportBoat" class="items-center gap-6 border-none text-md fw-600 text-nowrap cursor-pointer font-inherit" style="display:inline-flex;padding:6px 14px;border-radius:20px;transition:opacity .15s;background:var(--orange);color:#fff">No support boat</button>
      <span id="staffStatusUpdated" class="text-xs text-muted"></span>
    </div>
  </div>

  <!-- ══ WEATHER FLAG OVERRIDE ══════════════════════════════════════════════ -->
  <div id="flagOverrideCard" class="mb-12 border-muted" style="background:var(--card);border-radius:10px;padding:12px 14px">
    <button type="button" id="foToggle" class="section-label mb-8 d-flex items-center gap-6 cursor-pointer w-full" data-staff-click="toggleFlagOverrideForm" aria-expanded="false" aria-controls="foForm" style="background:none;border:0;color:var(--muted);font:inherit;text-align:left;padding:0;letter-spacing:.8px;text-transform:uppercase;font-size:10px">
      <span data-s="staff.flagOverrideLabel">WEATHER FLAG OVERRIDE</span>
      <span id="foCaret" aria-hidden="true">▸</span>
    </button>
    <div id="foActiveRow" class="hidden d-flex flex-wrap items-center gap-10">
      <span id="foActiveBadge" class="items-center gap-6 text-md fw-500" style="display:inline-flex;padding:4px 10px;border-radius:20px;border:1px solid"></span>
      <span id="foActiveNotes" class="text-md flex-1 text-pre-wrap" style="color:var(--text);min-width:160px"></span>
      <span id="foActiveMeta" class="text-xs text-muted"></span>
      <button class="btn btn-secondary btn-sm" data-staff-click="clearFlagOverride"><span data-s="staff.flagOverrideClear">Clear override</span></button>
    </div>
    <div id="foForm" class="hidden mt-10" style="border-top:1px solid var(--border);padding-top:10px">
      <div class="flex-center flex-wrap gap-6 mb-8" id="foFlagBtns"></div>
      <label class="field mb-6" style="display:block" for="coBoat">
        <div class="text-xs text-muted mb-4" data-s="staff.flagOverrideNotes">Notes (shown to members)</div>
        <textarea id="foNotes" rows="2" class="w-full font-inherit text-base border-muted rounded-6 bg-surface" style="padding:6px;color:var(--text);resize:vertical" placeholder=""></textarea>
      </label>
      <label class="field mb-8" style="display:block">
        <div class="text-xs text-muted mb-4" data-s="staff.flagOverrideNotesIS">Notes (Icelandic)</div>
        <textarea id="foNotesIS" rows="2" class="w-full font-inherit text-base border-muted rounded-6 bg-surface" style="padding:6px;color:var(--text);resize:vertical" placeholder=""></textarea>
      </label>
      <div class="flex-center gap-8">
        <span class="text-xs text-muted" data-s="staff.flagOverrideMidnight">Auto-reverts to live data at midnight UTC.</span>
        <button class="btn btn-secondary btn-sm ml-auto" data-staff-click="toggleFlagOverrideForm" data-staff-arg="false"><span data-s="btn.cancel">Cancel</span></button>
        <button class="btn btn-primary btn-sm" data-staff-click="saveFlagOverride"><span data-s="btn.save">Save</span></button>
      </div>
    </div>
  </div>

  <!-- ══ ACTIVE CHECKOUTS ══ -->
  <div class="section-label mt-16" data-s="staff.activeCheckouts">ACTIVE CHECKOUTS</div>

  <!-- Stats strip -->
  <div class="stat-row no-orphans-3 no-orphans-sm-2">
    <div class="stat-cell"><div class="stat-n" id="statBoats">0</div><div class="stat-l" data-s="staff.statBoats">BOATS OUT</div></div>
    <div class="stat-cell"><div class="stat-n" id="statPeople">0</div><div class="stat-l" data-s="staff.statPeople">PEOPLE OUT</div></div>
    <div class="stat-cell"><div class="stat-n text-muted" id="statOverdue">0</div><div class="stat-l" data-s="staff.statOverdue">OVERDUE</div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <h3 id="boatsOutNowLabel"></h3>
      <div class="flex-center gap-6">
        <button class="btn btn-primary btn-sm" data-staff-click="toggleCheckoutForm" id="checkOutBtn" data-s="staff.checkOutBtn"></button>
        <button class="btn btn-secondary btn-sm" data-staff-click="openGroupModal" id="groupCheckOutBtn" data-s="staff.groupCheckout"></button>
      </div>
    </div>

    <!-- Checkout form -->
    <div class="checkout-form hidden" id="coForm">
      <h4 id="newCheckoutLabel"></h4>
      <div class="field">
        <label id="memberLabel"></label>
        <div class="pos-relative">
          <input type="text" id="coMember" autocomplete="off" data-staff-input="searchMember">
          <div id="coMemberSuggestions" class="pos-relative"></div>
          <div id="coMemberName" class="text-10 text-muted mt-3"></div>
        </div>
      </div>
      <div class="inline-fields">
        <div class="field"><label id="boatLabel"></label>
          <select id="coBoat" data-staff-change="onCoBoatChange"><option value="" id="selectBoatOpt"></option></select></div>
        <div class="field"><label id="locationLabel" for="coLocation"></label>
          <select id="coLocation"><option value="" id="selectLocOpt"></option></select></div>
      </div>
      <div class="inline-fields">
        <div class="field"><label id="departureLabel" for="coTimeOut"></label>
          <input type="time" id="coTimeOut"></div>
        <div class="field">
          <label id="estReturnLabel" for="coDeparturePort"></label>
          <div class="d-flex items-center flex-wrap" style="gap:5px">
            <input type="time" id="coReturnBy" class="flex-1">
            <div class="d-flex gap-3">
              <button type="button" class="ret-btn" data-staff-click="setCoReturnIn" data-staff-arg="60">+1h</button>
              <button type="button" class="ret-btn" data-staff-click="setCoReturnIn" data-staff-arg="90">+1.5h</button>
              <button type="button" class="ret-btn" data-staff-click="setCoReturnIn" data-staff-arg="120">+2h</button>
              <button type="button" class="ret-btn" data-staff-click="setCoReturnIn" data-staff-arg="180">+3h</button>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <label id="crewLabel"></label>
        <div class="crew-field">
          <button class="crew-btn" data-staff-click="adjustCrew" data-staff-arg="-1">−</button>
          <span class="crew-num" id="crewNum">1</span>
          <button class="crew-btn" data-staff-click="adjustCrew" data-staff-arg="1">+</button>
        </div>
      </div>
      <div id="coCrewSection" class="mt-10 d-none">
        <label class="detail-field-label mb-6" style="display:block">Crew members <span class="fw-400" style="opacity:.6" data-s="staff.optSearchName"></span></label>
        <div id="coCrewInputs"></div>
        <div class="text-xs text-muted mt-4" data-s="staff.namedCrewNote"></div>
      </div>
      <!-- Departure port — shown for keelboats only -->
      <div id="coPortRow" class="field d-none">
        <label class="text-accent">⚓️ <span data-s="staff.departurePort"></span></label>
        <input type="text" list="coPortsList" id="coDeparturePort" autocomplete="off">
        <datalist id="coPortsList"></datalist>
      </div>
      <div class="field">
        <label id="notesLabel" for="coNotes"></label>
        <input type="text" id="coNotes">
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" data-staff-click="toggleCheckoutForm" id="cancelCoBtn"></button>
        <button class="btn btn-primary" data-staff-click="submitCheckout" id="submitCoBtn"></button>
      </div>
      <div id="coErr" class="msg msg-err mt-8 d-none"></div>
    </div>

    <div id="activeCheckouts"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ TOOLS ══ -->
  <div class="section-label mt-16" data-s="staff.toolsLabel">TOOLS</div>
  <div class="nav-grid">
    <a href="../dailylog/" class="nav-card">
      <span class="nc-icon nc-icon--dailylog" aria-hidden="true"></span>
      <span class="nc-label" data-s="staff.dailyLog"></span>
      <span class="nc-desc" data-s="staff.dailyLogDesc"></span>
    </a>
    <a href="staff_logbook-review.html" class="nav-card">
      <span class="nc-icon nc-icon--review" aria-hidden="true"></span>
      <span class="nc-label" data-s="staff.logbook"></span>
      <span class="nc-desc" data-s="staff.logbookDesc"></span>
    </a>
    <a href="../incidents/" class="nav-card pos-relative" id="incidentsNavCard">
      <span class="nc-icon nc-icon--incidents" aria-hidden="true"></span>
      <span class="nc-label" data-s="staff.incidents"></span>
      <span class="nc-desc" data-s="staff.incidentsDesc"></span>
      <span id="incidentsNavBadge" class="badge badge-orange hidden text-10" style="position:absolute;top:8px;right:8px"></span>
    </a>
    <a href="../maintenance/" class="nav-card">
      <span class="nc-icon nc-icon--maint" aria-hidden="true"></span>
      <span class="nc-label" data-s="staff.maintAndSauma"></span>
      <span class="nc-desc" data-s="staff.maintAndSaumaDesc"></span>
    </a>
    <a href="../handbook/" class="nav-card">
      <span class="nc-icon nc-icon--handbook" aria-hidden="true"></span>
      <span class="nc-label" data-s="nav.handbook"></span>
      <span class="nc-desc" data-s="handbook.subtitle"></span>
    </a>
  </div>
  
  <!-- ══ PUNCH CLOCK ══ -->
  <div class="section-label mt-16" data-s="payroll.section"></div>
  <div id="punchClockCard" class="info-panel mb-16">
    <div id="punchClockWidget">
      <div class="empty-note" data-s="lbl.loading"></div>
    </div>
  </div>

  <!-- ══ OPEN MAINTENANCE ══ -->
  <div class="section-label mt-16" data-s="staff.maintenance">OPEN MAINTENANCE</div>
  <div class="info-panel mb-16">
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
    <div class="mt-10" style="padding-top:10px;border-top:1px solid var(--border)44">
      <a href="../maintenance/" class="text-md text-accent" style="text-decoration:none" id="viewAllMaintLink"></a>
      
    </div>
  </div>

  <!-- ══ FLEET STATUS ══ -->
  <div class="section-label mt-16 flex-between">
    <span data-s="staff.fleet"></span>

  </div>

  <!-- Fleet status (bars + expandable boat cards) -->
  <div id="fleetStatus"><div class="empty-note" data-s="lbl.loading"></div></div>
  <div class="section-label mt-16"><span data-s="staff.recentCheckins"></span></div>
    <div id="recentCheckins"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

</div><!-- /container -->
<!-- ══ CHECKOUT DETAIL MODAL ══ -->
<div class="modal-overlay hidden" id="coDetailModal" data-staff-close-self="coDetail">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 id="cdTitle"></h3>
      <button class="modal-close-x" data-staff-click="closeCoDetail">×</button>
    </div>
    <div class="info-panel mb-10">
      <div class="section-label text-accent mb-10" data-s="staff.coDetail.tripLabel">TRIP</div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.boat"></span><span class="dl-dval" id="cdBoat"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.location"></span><span class="dl-dval" id="cdLocation"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="staff.coDetail.out"></span><span class="dl-dval" id="cdOut"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="staff.coDetail.return"></span><span class="dl-dval" id="cdReturn"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.crew"></span><span class="dl-dval" id="cdCrew"></span></div>
      <div class="dl-drow" id="cdActivityRow"><span class="dl-dlbl" data-s="lbl.activity"></span><span class="dl-dval" id="cdActivity"></span></div>
      <div class="dl-drow" id="cdNotesRow"><span class="dl-dlbl" data-s="lbl.notes"></span><span class="dl-dval" id="cdNotes"></span></div>
    </div>
    <div class="info-panel mb-10">
      <div class="section-label text-accent mb-10" data-s="lbl.member"></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.name"></span><span class="dl-dval" id="cdMember"></span></div>
      <div class="dl-drow" id="cdPhoneRow"><span class="dl-dlbl" data-s="lbl.phone"></span><span class="dl-dval" id="cdPhone"></span></div>
      <div class="dl-drow" id="cdGuardianRow"><span class="dl-dlbl" data-s="lbl.guardian"></span><span class="dl-dval" id="cdGuardian"></span></div>
    </div>
    <div class="d-flex gap-8 flex-wrap">
      <button class="btn btn-primary flex-1" data-staff-click="doDetailCheckIn"
        style="min-width:120px" data-s="staff.checkIn"></button>
      <button class="btn btn-secondary flex-1" data-staff-click="doDetailDelete"
        style="min-width:120px" data-s="btn.delete"></button>
    </div>
  </div>
</div>

<script src="staff.js" defer></script>

<!-- ══ GROUP CHECKOUT MODAL ══════════════════════════════════════════════ -->
<div class="group-modal-overlay hidden" id="groupModal" data-staff-close-self="groupModal">
  <div class="group-modal-sheet">
    <div class="group-modal-title">
      <span id="groupModalTitle" data-s="staff.groupCheckout"></span>
      <button class="gm-close" data-staff-click="closeGroupModal">✕</button>
    </div>

    <!-- Boats -->
    <div class="gm-section">
      <div class="gm-section-label" id="gmBoatsLabel" data-s="staff.selectBoats"></div>
      <div class="gm-boat-grid" id="gmBoatGrid"></div>
    </div>

    <!-- Location + Times -->
    <div class="gm-row mb-16">
      <div class="gm-field">
        <label id="gmLocLabel" for="gmLocation" data-s="lbl.location"></label>
        <select id="gmLocation"><option value="">—</option></select>
      </div>
      <div class="gm-field">
        <label id="gmActivityLabel" for="gmActivity" data-s="staff.activity"></label>
        <select id="gmActivity" data-staff-change="onGmActivityChange"><option value="" data-s="staff.noneDash"></option></select>
      </div>
    </div>
    <!-- Inline new-activity form, revealed when "+ Create activity for today" is picked. -->
    <div class="gm-section gm-new-act d-none" id="gmNewActSection">
      <div class="gm-section-label" data-s="staff.newActivityHeading"></div>
      <div class="gm-row">
        <div class="gm-field">
          <label for="gmNewActName" data-s="staff.newActivityName"></label>
          <input type="text" id="gmNewActName" autocomplete="off">
        </div>
        <div class="gm-field">
          <label for="gmNewActTag" data-s="admin.classTag"></label>
          <select id="gmNewActTag"><option value="">—</option></select>
        </div>
      </div>
    </div>
    <div class="gm-row mb-16">
      <div class="gm-field">
        <label for="gmTimeOut" data-s="staff.departure"></label>
        <input type="time" id="gmTimeOut">
      </div>
      <div class="gm-field">
        <label for="gmReturnBy" data-s="staff.expectedReturn"></label>
        <input type="time" id="gmReturnBy">
      </div>
    </div>

    <!-- Participants stepper -->
    <div class="gm-section">
      <div class="gm-section-label" id="gmParticLabel" data-s="staff.participants"></div>
      <div class="gm-stepper">
        <button class="gm-stepper-btn" data-staff-click="adjGroupCount" data-staff-arg="participants" data-staff-arg2="-1">−</button>
        <span class="gm-stepper-val" id="gmParticCount">0</span>
        <button class="gm-stepper-btn" data-staff-click="adjGroupCount" data-staff-arg="participants" data-staff-arg2="1">+</button>
        <span class="text-xs text-muted ml-6" id="gmTotalNote"></span>
      </div>
    </div>

    <!-- Staff on water -->
    <div class="gm-section">
      <div class="gm-section-label" id="gmStaffLabel">Staff on water <span class="text-9 text-red" data-s="staff.requiredStar"></span></div>
      <div id="gmStaffSection"></div>
      <button data-staff-click="addGmStaffRow" class="bg-none border-none text-muted text-xs cursor-pointer mt-4">+ Add another</button>
    </div>

    <div id="gmErr" class="text-red text-xs mb-8 d-none"></div>
    <button class="btn btn-primary w-full" data-staff-click="submitGroupCheckout">⛵ Launch group</button>
  </div>
</div>


<!-- Guest prompt is rendered by shared/guests.js; invoked via openGuestPrompt(). -->

</body>
</html>
