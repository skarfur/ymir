<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Trip Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<style>
.filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-bar input, .filter-bar select { flex:1; min-width:140px; }

.trip-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:8px; }
.trip-card.verified { border-left:3px solid var(--green); }
.trip-head  { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
.trip-date  { font-size:10px; color:var(--brass); margin-bottom:3px; }
.trip-title { font-size:13px; font-weight:500; }
.trip-meta  { font-size:11px; color:var(--muted); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }
.trip-notes { font-size:11px; color:var(--muted); margin-top:8px; padding-top:8px; border-top:1px solid var(--border)44; line-height:1.5; }
.badge      { font-size:10px; padding:2px 7px; border-radius:10px; border:1px solid; flex-shrink:0; }
.badge-verified   { color:#2ecc71; border-color:#2ecc7155; background:#2ecc7111; }
.badge-pending    { color:var(--muted); border-color:var(--border); }
.badge-linked     { color:var(--brass); border-color:var(--brass)55; background:var(--brass)11; }

.verify-row { display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border)44; flex-wrap:wrap; }
.verify-row input[type="text"] { flex:1; min-width:160px; }
.staff-comment { margin-top:8px; padding:8px 10px; background:var(--surface); border-radius:6px; font-size:11px; }
.staff-comment-label { font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px; }

.section-lbl { font-size:10px; color:var(--muted); letter-spacing:1.5px; margin:16px 0 10px; }
.empty-note  { color:var(--muted); font-size:12px; padding:8px 0; }
.stat-strip  { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
.stat-cell   { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 10px; text-align:center; }
.stat-n      { font-size:22px; color:var(--brass); font-weight:500; }
.stat-l      { font-size:9px; color:var(--muted); margin-top:3px; letter-spacing:.5px; }
</style>
</head>
<body>

<header style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="color:var(--muted);font-size:12px;text-decoration:none">← Staff Hub</a>
    <span style="color:var(--muted);font-size:11px">/</span>
    <span style="color:var(--text);font-size:13px;font-weight:500">Trip Review</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <span style="color:var(--muted);font-size:11px" id="userBadge"></span>
    <button class="btn-ghost" onclick="signOut()" style="font-size:11px;padding:5px 8px">Sign out</button>
  </div>
</header>

<div style="max-width:720px;margin:0 auto;padding:16px 14px 48px">

  <div class="stat-strip">
    <div class="stat-cell"><div class="stat-n" id="sTotalTrips">—</div><div class="stat-l">TOTAL TRIPS</div></div>
    <div class="stat-cell"><div class="stat-n" id="sPending">—</div><div class="stat-l">PENDING REVIEW</div></div>
    <div class="stat-cell"><div class="stat-n" id="sVerified">—</div><div class="stat-l">VERIFIED</div></div>
  </div>

  <div class="filter-bar">
    <input type="text" id="filterName" placeholder="Filter by member…" oninput="applyFilters()">
    <select id="filterStatus" onchange="applyFilters()">
      <option value="">All trips</option>
      <option value="pending">Pending review</option>
      <option value="verified">Verified</option>
    </select>
    <input type="date" id="filterFrom" onchange="applyFilters()" title="From date">
    <input type="date" id="filterTo"   onchange="applyFilters()" title="To date">
  </div>

  <div id="tripList"><div class="empty-note">Loading trips…</div></div>

</div>

<script>
const user = requireAuth(['staff','admin']);

let allTrips = [];
let filtered = [];

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

if (user) {
  document.getElementById('userBadge').textContent = user.name;
  init();
}

async function init() {
  try {
    const res = await apiGet('getTrips', { limit: 200 });
    allTrips = (res.trips || []).sort((a,b) => b.date > a.date ? 1 : -1);
    updateStats();
    applyFilters();
  } catch(e) {
    document.getElementById('tripList').innerHTML =
      '<div class="empty-note" style="color:var(--red)">Could not load trips: '+esc(e.message)+'</div>';
  }
}

function updateStats() {
  const pending  = allTrips.filter(t => !t.verified || t.verified === 'false').length;
  const verified = allTrips.filter(t =>  t.verified && t.verified !== 'false').length;
  document.getElementById('sTotalTrips').textContent = allTrips.length;
  document.getElementById('sPending').textContent    = pending;
  document.getElementById('sVerified').textContent   = verified;
}

function applyFilters() {
  const name   = document.getElementById('filterName').value.trim().toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;

  filtered = allTrips.filter(t => {
    if (name   && !((t.memberName||'').toLowerCase().includes(name))) return false;
    if (status === 'pending'  && (t.verified && t.verified !== 'false')) return false;
    if (status === 'verified' && (!t.verified || t.verified === 'false')) return false;
    if (from && (t.date||'') < from) return false;
    if (to   && (t.date||'') > to)   return false;
    return true;
  });
  renderTrips();
}

function renderTrips() {
  const el = document.getElementById('tripList');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-note">No trips match the current filters.</div>';
    return;
  }
  el.innerHTML = filtered.map(t => {
    const isVer  = t.verified && t.verified !== 'false';
    const isLinked = t.isLinked === true || t.isLinked === 'true';
    return `<div class="trip-card${isVer?' verified':''}" id="tc-${esc(t.id)}">
      <div class="trip-head">
        <div>
          <div class="trip-date">${esc(t.date||'—')} · <span style="color:var(--text)">${esc(t.memberName||'—')}</span></div>
          <div class="trip-title">${esc(t.boatName||'—')} · ${esc(t.locationName||'—')}</div>
          <div class="trip-meta">
            <span>${esc(t.timeOut||'')}–${esc(t.timeIn||'')}</span>
            <span>${(parseFloat(t.hoursDecimal)||0).toFixed(1)}h</span>
            <span>👥 ${esc(t.crew||1)}</span>
            ${t.beaufort ? `<span>💨 Bft ${esc(t.beaufort)}</span>` : ''}
            ${t.windDir  ? `<span>${esc(t.windDir)}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <span class="badge ${isVer?'badge-verified':'badge-pending'}">${isVer?'✓ VERIFIED':'PENDING'}</span>
          ${isLinked ? '<span class="badge badge-linked">LINKED</span>' : ''}
        </div>
      </div>

      ${t.notes ? `<div class="trip-notes">📝 ${esc(t.notes)}</div>` : ''}

      ${t.staffComment && isVer ? `
        <div class="staff-comment">
          <div class="staff-comment-label">STAFF NOTE</div>
          <div style="color:var(--text)">${esc(t.staffComment)}</div>
          ${t.verifiedBy ? `<div style="color:var(--muted);margin-top:3px;font-size:10px">— ${esc(t.verifiedBy)}</div>` : ''}
        </div>` : ''}

      <div class="verify-row" id="vrow-${esc(t.id)}">
        <input type="text" id="comment-${esc(t.id)}" placeholder="Staff comment (optional)…"
          value="${esc(t.staffComment||'')}" style="font-size:12px">
        ${isVer
          ? `<button class="btn btn-secondary" style="font-size:11px;padding:5px 12px;flex-shrink:0"
              onclick="unverifyTrip('${esc(t.id)}')">✗ Remove verification</button>`
          : `<button class="btn btn-primary" style="font-size:11px;padding:5px 14px;flex-shrink:0"
              onclick="verifyTrip('${esc(t.id)}')">✓ Verify</button>`}
      </div>
    </div>`;
  }).join('');
}

async function verifyTrip(id) {
  const comment = document.getElementById('comment-'+id)?.value.trim() || '';
  const btn = document.querySelector(`#tc-${id} .verify-row button`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    await apiPost('saveTrip', { id, verified: true, staffComment: comment, verifiedBy: user.name });
    const idx = allTrips.findIndex(t => t.id === id);
    if (idx >= 0) { allTrips[idx].verified = 'true'; allTrips[idx].staffComment = comment; allTrips[idx].verifiedBy = user.name; }
    updateStats();
    applyFilters();
    showMsg('✓ Trip verified.', 'ok');
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '✓ Verify'; }
    showMsg('Error: '+e.message, 'err');
  }
}

async function unverifyTrip(id) {
  const comment = document.getElementById('comment-'+id)?.value.trim() || '';
  const btn = document.querySelector(`#tc-${id} .verify-row button`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    await apiPost('saveTrip', { id, verified: false, staffComment: comment, verifiedBy: '' });
    const idx = allTrips.findIndex(t => t.id === id);
    if (idx >= 0) { allTrips[idx].verified = 'false'; allTrips[idx].staffComment = comment; allTrips[idx].verifiedBy = ''; }
    updateStats();
    applyFilters();
    showMsg('Verification removed.', 'ok');
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '✗ Remove verification'; }
    showMsg('Error: '+e.message, 'err');
  }
}

function showMsg(text, type) {
  const el = document.createElement('div');
  el.className = `msg msg-${type}`;
  el.textContent = text;
  el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);min-width:240px;text-align:center;z-index:200;font-size:12px;';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
