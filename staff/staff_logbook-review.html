<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Logbook Review</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/boats.js"></script>
  <script>document.write('<script src="../shared/strings-'+(localStorage.getItem('ymirLang')||'IS').toLowerCase()+'.js"><\/script>');</script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/certs.js" defer></script>
  <style>
    .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
    .filter-bar input, .filter-bar select { flex:1; min-width:140px; }
    .trip-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:8px; box-shadow:var(--shadow-sm); }
    .trip-card.verified { border-left:3px solid var(--green); }
    .trip-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .trip-date { font-size:10px; color:var(--brass-fg); margin-bottom:3px; }
    .trip-title { font-size:13px; font-weight:500; }
    .trip-meta { font-size:11px; color:var(--muted); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }
    .trip-notes { font-size:11px; color:var(--muted); margin-top:8px; padding-top:8px; border-top:1px solid var(--border)44; line-height:1.5; }
    .badge { font-size:10px; padding:2px 7px; border-radius:10px; border:1px solid; flex-shrink:0; }
    .badge-verified { color:var(--moss); border-color:color-mix(in srgb, var(--moss) 33%, transparent); background:color-mix(in srgb, var(--moss) 8%, transparent); }
    .badge-pending  { color:var(--muted); border-color:var(--border); background:var(--surface); }
    .badge-linked   { color:var(--brass-fg); border-color:var(--brass)55; background:var(--brass)11; }
    .verify-row { display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border)44; flex-wrap:wrap; }
    .verify-row input[type="text"] { flex:1; min-width:160px; }
    .staff-comment { margin-top:8px; padding:8px 10px; background:var(--surface); border-radius:var(--radius-sm); font-size:11px; }
    .staff-comment-label { font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px; }
    .stat-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
    .stat-cell { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px 10px; text-align:center; box-shadow:var(--shadow-sm); }
    .stat-n { font-size:22px; color:var(--brass-fg); font-weight:500; }
    .stat-l { font-size:9px; color:var(--muted); margin-top:3px; letter-spacing:.5px; }
    .cert-row { display:flex; align-items:flex-start; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); gap:10px; }
    .cert-row:last-child { border-bottom:none; }
    .cert-name { font-size:13px; font-weight:500; color:var(--text); }
    .cert-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .cert-actions { display:flex; gap:6px; flex-shrink:0; }
    .stat-strip + .stat-strip { margin-top:-8px; }
    .cat-hour-row      { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:11px; }
    .cat-hour-bar-wrap { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .cat-hour-bar      { height:100%; border-radius:3px; transition:width .3s; }
    .cat-hour-val      { font-size:11px; color:var(--muted); min-width:24px; text-align:right; }
  </style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">
  <div class="mb-16">
    <div class="fw-500" style="font-size:16px" data-s="logrev.title"></div>
    <div class="text-sm text-muted" data-s="logrev.subtitle" style="margin-top:2px"></div>
  </div>

  <!-- Stats row 1 -->
  <div class="stat-strip mb-8">
    <div class="stat-cell"><div class="stat-n" id="sTotalTrips">—</div><div class="stat-l">YTD TRIPS</div></div>
    <div class="stat-cell"><div class="stat-n text-brass" id="sRequested">—</div><div class="stat-l">AWAITING REVIEW</div></div>
    <div class="stat-cell"><div class="stat-n" id="sVerified">—</div><div class="stat-l">VERIFIED</div></div>
  </div>
  <!-- Stats row 2 -->
  <div class="stat-strip mb-16">
    <div class="stat-cell"><div class="stat-n" id="sTotalPersons">—</div><div class="stat-l">PERSONS ON WATER</div></div>
    <div class="stat-cell"><div class="stat-n" id="sUniquePersons">—</div><div class="stat-l">UNIQUE MEMBERS</div></div>
    <div class="stat-cell" style="text-align:left;padding:8px 10px">
      <div class="section-label mb-4">BY BOAT TYPE</div>
      <div id="sBoatCats" class="text-sm" style="line-height:1.8"></div>
    </div>
  </div>
  
  <!-- Trips section header + show-all toggle -->
  <div class="flex-between mb-8">
    <div class="section-label" data-s="logrev.validationRequests"></div>
    <label class="flex-center gap-6 text-sm text-muted" style="cursor:pointer">
      <input type="checkbox" id="showAllTrips" onchange="applyFilters()">
      <span data-s="logrev.showAll"></span>
    </label>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="filterName" oninput="applyFilters()">
    <select id="filterStatus" onchange="applyFilters()">
      <option value=""    id="filterOptAll"></option>
      <option value="pending"   id="filterOptPending"></option>
      <option value="verified"  id="filterOptVerified"></option>
    </select>
    <input type="date" id="filterFrom" onchange="applyFilters()">
    <input type="date" id="filterTo"   onchange="applyFilters()">
  </div>

  <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>

  <!-- ══ CERTIFICATIONS ══════════════════════════════════════════════════════ -->
  <div style="margin-top:32px;border-top:1px solid var(--border);padding-top:24px">
    <div class="section-label mb-14">CERTIFICATIONS</div>

    <!-- Mode toggle -->
    <div class="mb-16" style="display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;width:fit-content">
      <button id="certModeByMember" onclick="setCertMode('member')"
        class="text-md" style="padding:7px 16px;font-family:inherit;border:none;cursor:pointer;transition:all .2s;background:var(--brass);color:#fff">
        By member
      </button>
      <button id="certModeByType" onclick="setCertMode('type')"
        class="text-md" style="padding:7px 16px;font-family:inherit;border:none;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--muted)">
        By credential
      </button>
    </div>

    <!-- ── MODE A: search by member ── -->
    <div id="certPanelModeA">
      <div class="mb-14" style="position:relative">
        <input type="text" id="certMemberSearch"
          class="text-md" style="width:100%;box-sizing:border-box;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;padding:9px 12px"
          oninput="searchCertMember(this.value)">
        <div id="certMemberDrop"
          style="position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);z-index:100;display:none;max-height:200px;overflow-y:auto;box-shadow:var(--shadow-md)">
        </div>
      </div>

      <div id="certMemberPanel" style="display:none">
        <div class="flex-between mb-10">
          <div>
            <div class="text-lg fw-500" id="certPanelName"></div>
            <div class="text-sm text-muted" id="certPanelMeta"></div>
          </div>
          <button onclick="openCertAssignModal()" class="btn btn-primary text-sm" style="padding:5px 12px">+ Add / Change cert</button>
        </div>
        <div id="certPanelList"></div>
      </div>

      <div id="certMemberEmpty" class="text-muted text-md" style="padding:8px 0">
        <span data-s="logrev.certSearch"></span>
      </div>
    </div>

    <!-- ── MODE B: filter by cert type ── -->
    <div id="certPanelModeB" style="display:none">
      <div class="flex-center flex-wrap gap-8 mb-12">
        <select id="certFilterType" onchange="applyCertFilter()"
          class="flex-1 text-md" style="min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;padding:7px 10px">
          <option value="">— Select credential —</option>
        </select>
      </div>
      <div id="certFilterResults"></div>
    </div>

  </div>

<!-- ══ CERT ASSIGNMENT MODAL ══ -->
<div class="modal-overlay hidden" id="tripCertModal" onclick="if(event.target===this)closeModal('tripCertModal')">
  <div class="modal" style="max-width:440px">
    <div class="modal-header mb-16">
      <h3 id="tcmTitle"></h3>
      <button class="modal-close-x" onclick="closeModal('tripCertModal')">×</button>
    </div>

    <!-- Current certs for this member -->
    <div class="mb-14">
      <div class="section-label mb-8" data-s="logrev.certModal"></div>
      <div id="tcmCurrentList"><div class="text-sm text-muted" style="font-style:italic" data-s="lbl.loading"></div></div>
    </div>

    <!-- Assign new cert -->
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div class="section-label mb-10" data-s="logrev.assignCert"></div>
      <div class="field">
        <label data-s="lbl.type"></label>
        <select id="tcmCertType" onchange="tcmCertTypeChanged()">
          <option value=""></option>
        </select>
      </div>
      <div class="field" id="tcmSubcatField" style="display:none">
        <label data-s="cert.level"></label>
        <select id="tcmSubcat"><option value=""></option></select>
      </div>
      <div class="grid2 gap-10">
        <div class="field">
          <label data-s="logrev.assignedDate"></label>
          <input type="date" id="tcmAssignedAt">
        </div>
        <div class="field" id="tcmExpiryField" style="display:none">
          <label data-s="logrev.expires"></label>
          <input type="date" id="tcmExpiresAt">
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="tcmAssign()" id="tcmAssignBtn" data-s="logrev.assignBtn"></button>
    </div>

    <div class="mt-8" style="text-align:right">
      <button class="btn btn-secondary" onclick="closeModal('tripCertModal')" data-s="btn.close"></button>
    </div>
  </div>
</div>

<script>
const user = requireAuth(isStaff);
const L = getLang();

let allTrips    = [];
let filtered    = [];
let _allMembers = [];   // single source of truth for member list
let _certDefs   = [];   // single source of truth for cert definitions
let _certCats   = [];   // cert categories, used for bilingual label resolution
let _verifyReqs = [];   // pending 'verify' handshakes
let _dataLoaded = false;

// Currently selected member in the cert panel
let _certMember = null;   // { id, name, kennitala }

document.addEventListener('DOMContentLoaded', () => {
  buildHeader('logbook-review');
  applyStrings();

  // Wire string-keyed placeholders/labels that can't use data-s
  document.getElementById('filterName').placeholder   = s('logrev.filterName');
  document.getElementById('filterFrom').title         = s('logrev.filterFrom');
  document.getElementById('filterTo').title           = s('logrev.filterTo');
  document.getElementById('filterOptAll').textContent      = s('logrev.filterAll');
  document.getElementById('filterOptPending').textContent  = s('logrev.filterPending');
  document.getElementById('filterOptVerified').textContent = s('logrev.filterVerified');
  document.getElementById('certMemberSearch').placeholder  = s('logrev.certSearchPlaceholder');
  document.getElementById('tcmAssignBtn').textContent      = s('logrev.assignBtn');

  // Pre-fill today in assigned-date
  document.getElementById('tcmAssignedAt').value = todayISO();

  init();
});

// ── Init: load trips + members + certDefs in one pass ────────────────────────
async function init() {
  try {
    const [tripsRes, membersRes, cfgRes, verifyRes] = await Promise.all([
      apiGet('getTrips', { limit: 200 }),
      apiGet('getMembers'),
      apiGet('getConfig'),
      apiGet('getVerificationRequests'),
    ]);

    _allMembers = membersRes.members || [];
    _certDefs   = certDefsFromConfig(cfgRes.certDefs || []);
    _certCats   = certCategoriesFromConfig(cfgRes.certCategories || []);
    _verifyReqs = verifyRes.requests || [];
    _dataLoaded = true;

    // Populate cert-type dropdown once
    populateCertFilterType();

    // Enrich trips with resolved member name where missing
    allTrips = (tripsRes.trips || [])
      .map(t => _enrichTripMember(t))
      .sort((a, b) => (b.date > a.date ? 1 : -1));

    updateStats();
    applyFilters();
  } catch (e) {
    document.getElementById('tripList').innerHTML =
      `<div class="empty-note text-red">${s('toast.loadFailed')}: ${esc(e.message)}</div>`;
  }
}

// Resolve memberName from _allMembers if the trip doesn't have it
function _enrichTripMember(t) {
  if (t.memberName) return t;
  const m = _allMembers.find(x =>
    (t.memberKennitala && x.kennitala === t.memberKennitala) ||
    (t.memberId       && x.id        === t.memberId)
  );
  return m ? { ...t, memberName: m.name } : t;
}

function _buildCertTypeSelect() {
  const sel = document.getElementById('tcmCertType');
  sel.innerHTML = `<option value="">${s('lbl.selectDots')}</option>`;
  _certDefs.forEach(d => {
    const o = document.createElement('option');
    o.value       = d.id;
    o.textContent = certDefName(d);
    sel.appendChild(o);
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const yr  = new Date().getFullYear() + '';
  const ytd = allTrips.filter(t => (t.date || '').startsWith(yr));

  const verifyTripIds = new Set(_verifyReqs.map(r => r.tripId).filter(Boolean));
  const requested = allTrips.filter(t =>
    ((t.validationRequested === true || t.validationRequested === 'true') || verifyTripIds.has(t.id)) &&
    (!t.verified || t.verified === 'false')
  ).length;
  const verified = allTrips.filter(t => t.verified && t.verified !== 'false').length;

  const totalPersons = ytd.reduce((n, t) => n + (parseInt(t.crew) || 1), 0);
  const uniqueIds    = new Set(ytd.map(t => t.memberKennitala || t.memberId || t.memberName || '').filter(Boolean));

  const catCounts = {};
  ytd.forEach(t => {
    const c = (t.boatCategory || '').trim() || 'Other';
    catCounts[c] = (catCounts[c] || 0) + 1;
  });
  const catEntries = Object.entries(catCounts).sort((a, b) => b[1] - a[1]);
  const catMax = catEntries.length ? catEntries[0][1] : 0;
  const catHtml = catEntries.map(([k, v]) => {
    const key = (k || '').toLowerCase();
    const col = (typeof BOAT_CAT_COLORS !== 'undefined' && BOAT_CAT_COLORS[key]) || { color: 'var(--brass)' };
    const pct = catMax ? Math.round(v / catMax * 100) : 0;
    const label = (typeof _boatCatLabel === 'function') ? _boatCatLabel(key || 'other') : k;
    return `<div class="cat-hour-row">
      <span style="min-width:70px;color:var(--text)">${esc(label)}</span>
      <div class="cat-hour-bar-wrap"><div class="cat-hour-bar" style="width:${pct}%;background:${col.color}"></div></div>
      <span class="cat-hour-val">${v}</span>
    </div>`;
  }).join('');

  _set('sTotalTrips',   ytd.length);
  _set('sRequested',    requested);
  _set('sVerified',     verified);
  _set('sTotalPersons', totalPersons);
  _set('sUniquePersons',uniqueIds.size);
  const bc = document.getElementById('sBoatCats');
  if (bc) bc.innerHTML = catHtml || '—';
}

function _set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

// ── Trips filter + render ─────────────────────────────────────────────────────
function applyFilters() {
  const name    = document.getElementById('filterName').value.trim().toLowerCase();
  const status  = document.getElementById('filterStatus').value;
  const from    = document.getElementById('filterFrom').value;
  const to      = document.getElementById('filterTo').value;
  const showAll = document.getElementById('showAllTrips')?.checked ?? false;

  // Build set of trip IDs with pending verify handshakes
  const verifyTripIds = new Set(_verifyReqs.map(r => r.tripId).filter(Boolean));

  filtered = allTrips.filter(t => {
    if (!showAll &&
        t.validationRequested !== true &&
        t.validationRequested !== 'true' &&
        !verifyTripIds.has(t.id)) return false;
    if (name && !(t.memberName || '').toLowerCase().includes(name)) return false;
    if (status === 'pending'  && (t.verified && t.verified !== 'false')) return false;
    if (status === 'verified' && (!t.verified || t.verified === 'false')) return false;
    if (from && (t.date || '') < from) return false;
    if (to   && (t.date || '') > to)   return false;
    return true;
  });

  renderTrips();
}

function renderTrips() {
  const el = document.getElementById('tripList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-note">${s('logrev.noTrips')}</div>`;
    return;
  }
  const verifyTripIds = new Set(_verifyReqs.map(r => r.tripId).filter(Boolean));
  el.innerHTML = filtered.map(t => {
    const isVer    = t.verified && t.verified !== 'false';
    const isLinked = t.isLinked === true || t.isLinked === 'true';
    const hasVerifyReq = verifyTripIds.has(t.id);
    return `<div class="trip-card${isVer ? ' verified' : ''}" id="tc-${esc(t.id)}">
      <div class="trip-head">
        <div>
          <div class="trip-date">${esc(t.date || '—')} · <span style="color:var(--text)">${esc(t.memberName || '—')}</span></div>
          <div class="trip-title">${esc(t.boatName || '—')} · ${esc(t.locationName || '—')}</div>
          <div class="trip-meta">
            <span>${esc(t.timeOut || '')}–${esc(t.timeIn || '')}</span>
            <span>${(parseFloat(t.hoursDecimal) || 0).toFixed(1)}h</span>
            <span>👥 ${esc(t.crew || 1)}</span>
            ${t.beaufort ? `<span>💨 Force ${esc(t.beaufort)}</span>` : ''}
            ${t.windDir  ? `<span>${esc(t.windDir)}</span>` : ''}
          </div>
        </div>
        <div class="flex-col gap-4" style="align-items:flex-end">
          <span class="badge ${isVer ? 'badge-verified' : 'badge-pending'}">
            ${isVer ? ('✓ ' + s('logrev.verified')) : s('logrev.pending')}
          </span>
          ${isLinked ? `<span class="badge badge-linked">LINKED</span>` : ''}
          ${hasVerifyReq && !isVer ? `<span class="badge" style="color:var(--navy-l);border-color:color-mix(in srgb, var(--navy-l) 33%, transparent);background:color-mix(in srgb, var(--navy-l) 8%, transparent)">${s('logrev.verifyRequest')}</span>` : ''}
        </div>
      </div>
      ${t.skipperNote ? `<div class="trip-notes text-brass">📋 ${esc(t.skipperNote)}</div>` : ''}
      ${t.notes ? `<div class="trip-notes">📝 ${esc(t.notes)}</div>` : ''}
      ${t.staffComment && isVer ? `
        <div class="staff-comment">
          <div class="staff-comment-label">${s('incident.staffNotes').toUpperCase()}</div>
          <div>${esc(t.staffComment)}</div>
          ${t.verifiedBy ? `<div class="text-muted text-xs" style="margin-top:3px">— ${esc(t.verifiedBy)}</div>` : ''}
        </div>` : ''}
      <div class="verify-row" id="vrow-${esc(t.id)}">
        <input type="text" id="comment-${esc(t.id)}" placeholder="${s('logrev.staffComment')}"
               value="${esc(t.staffComment || '')}" class="text-md">
        ${isVer
          ? `<button class="btn btn-secondary text-sm" style="padding:5px 12px;flex-shrink:0"
               onclick="unverifyTrip('${esc(t.id)}')">✗ ${s('logrev.unverify')}</button>`
          : `<button class="btn btn-primary text-sm" style="padding:5px 14px;flex-shrink:0"
               onclick="verifyTrip('${esc(t.id)}')">✓ ${s('logrev.verify')}</button>`}
      </div>
    </div>`;
  }).join('');
}

// ── Verify / Unverify ─────────────────────────────────────────────────────────
async function verifyTrip(id) {
  const comment = document.getElementById('comment-' + id)?.value.trim() || '';
  const btn = document.querySelector(`#tc-${id} .btn-primary`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    // If there's a pending 'verify' handshake for this trip, respond via the protocol
    const vr = _verifyReqs.find(r => r.tripId === id && r.status === 'pending');
    if (vr) {
      await apiPost('respondConfirmation', { id: vr.id, response: 'confirmed', responderName: user.name });
      _verifyReqs = _verifyReqs.filter(r => r.id !== vr.id);
    }
    // Also update staffComment directly (handshake sets verified + verifiedBy)
    await apiPost('saveTrip', { id, verified: true, staffComment: comment, verifiedBy: user.name });
    const t = allTrips.find(x => x.id === id);
    if (t) Object.assign(t, { verified: 'true', staffComment: comment, verifiedBy: user.name });
    updateStats();
    applyFilters();
    showToast(s('lbl.verified'));
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '✓ ' + s('logrev.verify'); }
    showToast(s('toast.error'), 'err');
  }
}

async function unverifyTrip(id) {
  const comment = document.getElementById('comment-' + id)?.value.trim() || '';
  try {
    await apiPost('saveTrip', { id, verified: false, staffComment: comment, verifiedBy: '' });
    const t = allTrips.find(x => x.id === id);
    if (t) Object.assign(t, { verified: 'false', staffComment: comment, verifiedBy: '' });
    updateStats();
    applyFilters();
    showToast(s('logrev.unverify'));
  } catch (e) {
    showToast(s('toast.error'), 'err');
  }
}

// ── Certification section: member search ──────────────────────────────────────
function searchCertMember(q) {
  const drop = document.getElementById('certMemberDrop');
  if (!q || q.length < 2) { drop.style.display = 'none'; drop.innerHTML = ''; return; }

  const matches = _allMembers
    .filter(m => m.name && m.name.toLowerCase().includes(q.toLowerCase()))
    .slice(0, 8);

  if (!matches.length) { drop.style.display = 'none'; return; }

  drop.innerHTML = '';
  matches.forEach(m => {
    const item = document.createElement('div');
    item.className = 'text-md';
    item.style.cssText = 'padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border)';
    item.textContent   = m.name;
    item.addEventListener('mouseover', function () { this.style.background = 'var(--card)'; });
    item.addEventListener('mouseout',  function () { this.style.background = ''; });
    item.addEventListener('mousedown', e => { e.preventDefault(); selectCertMember(m); });
    drop.appendChild(item);
  });
  drop.style.display = 'block';
}

function selectCertMember(m) {
  _certMember = m;   // store full member object

  document.getElementById('certMemberSearch').value   = m.name;
  document.getElementById('certMemberDrop').style.display = 'none';
  document.getElementById('certPanelName').textContent = m.name;
  document.getElementById('certPanelMeta').textContent =
    [m.kennitala, m.email].filter(Boolean).join(' · ');
  document.getElementById('certMemberPanel').style.display = '';
  document.getElementById('certMemberEmpty').style.display = 'none';

  renderCertPanelList();
}

function renderCertPanelList() {
  const el = document.getElementById('certPanelList');
  if (!_certMember) return;

  const m     = _allMembers.find(x => x.id === _certMember.id);
  const certs = m ? enrichMemberCerts(_parseJson(m.certifications, []), _certDefs, _certCats) : [];

  if (!certs.length) {
    el.innerHTML = `<div class="text-muted text-md" style="padding:8px 0">${s('cert.noCerts')}</div>`;
    return;
  }

  el.innerHTML = certs.map(c => {
    const expiry = c.expiresAt
      ? (new Date(c.expiresAt) < new Date()
          ? `<span class="text-red">Expired ${esc(c.expiresAt)}</span>`
          : `Expires ${esc(c.expiresAt)}`)
      : 'Does not expire';
    const defLabel = c.def ? certDefName(c.def) : (c.certId || '');
    const label = c.subcat
      ? `${esc(defLabel)} — ${esc(certSubcatLabel(c.subcat))}`
      : esc(defLabel);
    return `<div class="cert-row">
      <div>
        <div class="cert-name">${label}</div>
        <div class="cert-meta">${expiry}${c.assignedAt ? ' · Issued ' + esc(c.assignedAt) : ''}</div>
      </div>
      <div class="cert-actions">
        <button class="btn btn-secondary text-sm" style="padding:4px 10px"
          onclick="editCert('${esc(c.certId)}','${esc(c.sub||'')}')">Edit</button>
        <button class="btn btn-secondary text-sm text-red" style="padding:4px 10px"
          onclick="deleteCert('${esc(c.certId)}','${esc(c.sub||'')}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Cert assignment modal ─────────────────────────────────────────────────────
function openCertAssignModal(certId, subcatKey) {
  if (!_certMember) return;

  document.getElementById('tcmTitle').textContent =
    s('cert.assign') + ' — ' + _certMember.name;

  // Show current certs
  const m     = _allMembers.find(x => x.id === _certMember.id);
  const certs = m ? enrichMemberCerts(_parseJson(m.certifications, []), _certDefs, _certCats) : [];
  document.getElementById('tcmCurrentList').innerHTML = certs.length
    ? certs.map(certBadgeHTML).join('')
    : `<div class="text-muted text-sm" style="font-style:italic">${s('cert.noCerts')}</div>`;

  // Reset / pre-fill form
  document.getElementById('tcmAssignedAt').value     = todayISO();
  document.getElementById('tcmExpiresAt').value      = '';
  document.getElementById('tcmSubcatField').style.display = 'none';
  document.getElementById('tcmExpiryField').style.display = 'none';

  if (certId) {
    document.getElementById('tcmCertType').value = certId;
    tcmCertTypeChanged();
    if (subcatKey) {
      // wait one tick for subcat select to render
      setTimeout(() => {
        document.getElementById('tcmSubcat').value = subcatKey;
      }, 50);
    }
  } else {
    document.getElementById('tcmCertType').value = '';
  }

  openModal('tripCertModal');
}

function editCert(certId, subcatKey) {
  openCertAssignModal(certId, subcatKey);
}

function tcmCertTypeChanged() {
  const def    = _certDefs.find(d => d.id === document.getElementById('tcmCertType').value);
  const sField = document.getElementById('tcmSubcatField');
  const eField = document.getElementById('tcmExpiryField');

  if (def?.subcats?.length) {
    const sSel = document.getElementById('tcmSubcat');
    sSel.innerHTML = `<option value="">${s('lbl.selectDots')}</option>`;
    def.subcats.forEach(sc => {
      const o = document.createElement('option');
      o.value = sc.key; o.textContent = sc.label;
      sSel.appendChild(o);
    });
    sField.style.display = '';
  } else {
    sField.style.display = 'none';
  }

  if (def?.expires) {
    eField.style.display = '';
  } else {
    document.getElementById('tcmExpiresAt').value = '';
    eField.style.display = 'none';
  }
}

async function tcmAssign() {
  const certId = document.getElementById('tcmCertType').value;
  if (!certId) { showToast(s('lbl.type') + ' required.', 'err'); return; }

  const def = _certDefs.find(d => d.id === certId);
  const sub = def?.subcats?.length ? document.getElementById('tcmSubcat').value : null;
  if (def?.subcats?.length && !sub) { showToast(s('cert.level') + ' required.', 'err'); return; }

  if (!_certMember) { showToast(s('logrev.noMemberSelected'), 'err'); return; }

  const m = _allMembers.find(x => x.id === _certMember.id);
  if (!m) { showToast(s('logrev.memberNotFound'), 'err'); return; }

  const newCert = {
    certId,
    sub:        sub || null,
    assignedBy: user.name,
    assignedAt: document.getElementById('tcmAssignedAt').value || todayISO(),
    expiresAt:  document.getElementById('tcmExpiresAt').value  || null,
  };

  // Apply rank rule (removes lower-ranked subcats of same cert), then
  // remove exact duplicate before appending
  let existing = _parseJson(m.certifications, []);
  existing = applyRankRule(existing, newCert, _certDefs);
  existing = existing.filter(c => !(c.certId === certId && (c.sub || null) === (sub || null)));
  const updated = [...existing, newCert];

  try {
    await apiPost('saveMemberCert', { memberId: _certMember.id, certifications: updated });

    // Update local copy
    const idx = _allMembers.findIndex(x => x.id === _certMember.id);
    if (idx >= 0) _allMembers[idx] = { ..._allMembers[idx], certifications: JSON.stringify(updated) };

    // Refresh current-certs display inside modal
    document.getElementById('tcmCurrentList').innerHTML =
      enrichMemberCerts(updated, _certDefs, _certCats).map(certBadgeHTML).join('');

    // Reset form
    document.getElementById('tcmCertType').value         = '';
    document.getElementById('tcmSubcatField').style.display = 'none';
    document.getElementById('tcmExpiryField').style.display = 'none';

    showToast('✓ ' + s('cert.assign') + ': ' + m.name);

    // Refresh cert panel list too
    renderCertPanelList();
  } catch (e) {
    showToast(s('toast.error') + ': ' + e.message, 'err');
  }
}

async function deleteCert(certId, subcatKey) {
  if (!_certMember) return;
  if (!await ymConfirm('Remove this credential?')) return;

  const m = _allMembers.find(x => x.id === _certMember.id);
  if (!m) return;

  let certs = _parseJson(m.certifications, []);
  certs = certs.filter(c => !(c.certId === certId && (c.sub || '') === (subcatKey || '')));

  try {
    await apiPost('saveMemberCert', { memberId: _certMember.id, certifications: certs });
    const idx = _allMembers.findIndex(x => x.id === _certMember.id);
    if (idx >= 0) _allMembers[idx] = { ..._allMembers[idx], certifications: JSON.stringify(certs) };
    renderCertPanelList();
    showToast(s('logrev.credentialRemoved'));
  } catch (e) {
    showToast(s('toast.error') + ': ' + e.message, 'err');
  }
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function _parseJson(v, fallback) {
  if (!v) return fallback;
  try { return typeof v === 'string' ? JSON.parse(v) : v; } catch { return fallback; }
}

  function populateCertFilterType() {
  const sel = document.getElementById('certFilterType');
  if (!sel) return;
  sel.innerHTML = `<option value="">— Select credential —</option>`;
  _certDefs.forEach(d => {
    if (d.subcats?.length) {
      d.subcats.forEach(sc => {
        const o = document.createElement('option');
        o.value = d.id + '|' + sc.key;
        o.textContent = certDefName(d) + ' — ' + certSubcatLabel(sc);
        sel.appendChild(o);
      });
    } else {
      const o = document.createElement('option');
      o.value = d.id + '|';
      o.textContent = certDefName(d);
      sel.appendChild(o);
    }
  });
}

function setCertMode(mode) {
  const isMember = mode === 'member';
  document.getElementById('certPanelModeA').style.display  = isMember ? '' : 'none';
  document.getElementById('certPanelModeB').style.display  = isMember ? 'none' : '';
  document.getElementById('certModeByMember').style.background = isMember ? 'var(--brass)' : 'var(--surface)';
  document.getElementById('certModeByMember').style.color      = isMember ? '#fff' : 'var(--muted)';
  document.getElementById('certModeByType').style.background   = isMember ? 'var(--surface)' : 'var(--brass)';
  document.getElementById('certModeByType').style.color        = isMember ? 'var(--muted)' : '#fff';
}
  
function applyCertFilter() {
  const el = document.getElementById('certFilterResults');
  const val = document.getElementById('certFilterType').value;
  if (!val) { el.innerHTML = ''; return; }
  const [certId, sub] = val.split('|');
  const def = _certDefs.find(d => d.id === certId);
  const matches = (_allMembers || []).filter(m => {
    const certs = _parseJson(m.certifications, []);
    return certs.some(c => c.certId === certId && (sub ? c.sub === sub : true));
  });
  if (!matches.length) {
    el.innerHTML = `<div class="text-muted text-md" style="padding:6px 0">${s('logrev.certNoMatches')}</div>`;
    return;
  }
  const color = certColor(def || {});
  el.innerHTML = `<div class="text-xs text-muted mb-6">${matches.length} member${matches.length!==1?'s':''}</div>` +
    matches.map(m => {
      const certs = _parseJson(m.certifications, []);
      const c = certs.find(c => c.certId === certId && (sub ? c.sub === sub : true));
      const expiry = c?.expiresAt ? (c.expiresAt < todayISO() ? `<span class="text-red text-xs"> · expired</span>` : `<span class="text-muted text-xs"> · exp. ${c.expiresAt}</span>`) : '';
      return `<div class="flex-center gap-10" style="padding:7px 0;border-bottom:1px solid var(--border)44">
        <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <div class="flex-1 text-base">${esc(m.name)}<span class="text-xs text-muted" style="margin-left:6px">${esc(m.role||'')}</span>${expiry}</div>
      </div>`;
    }).join('');
}
</script>
