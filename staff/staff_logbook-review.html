<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Logbook Review</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <script src="../shared/theme-init.js"></script>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="../shared/tripcard.css">
  <script src="../shared/api.js" defer></script>
  <script src="../shared/ui.js" defer></script>
  <script src="../shared/layout.js" defer></script>
  <script src="../shared/boats.js" defer></script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/certs.js" defer></script>
  <script src="../shared/mcm.js" defer></script>
  <script src="../shared/tripcard.js" defer></script>
  <link rel="stylesheet" href="staff_logbook-review.css">
</head>
<body>
<ymir-header></ymir-header>

<div class="page-content">
  <div class="mb-16">
    <div class="fw-500" style="font-size:16px" data-s="logrev.title"></div>
    <div class="text-sm text-muted mt-2" data-s="logrev.subtitle"></div>
  </div>

  <!-- Stats row 1 -->
  <div class="stat-strip mb-8">
    <div class="stat-cell"><div class="stat-n" id="sTotalTrips">—</div><div class="stat-l" data-s="slr.stat.ytdTrips"></div></div>
    <div class="stat-cell"><div class="stat-n text-accent" id="sRequested">—</div><div class="stat-l" data-s="slr.stat.awaiting"></div></div>
    <div class="stat-cell"><div class="stat-n" id="sVerified">—</div><div class="stat-l" data-s="slr.stat.verified"></div></div>
  </div>
  <!-- Stats row 2 -->
  <div class="stat-strip slr-stats-detail mb-16">
    <div class="stat-cell"><div class="stat-n" id="sTotalPersons">—</div><div class="stat-l" data-s="slr.stat.peopleOut"></div></div>
    <div class="stat-cell"><div class="stat-n" id="sUniquePersons">—</div><div class="stat-l" data-s="slr.stat.uniqueMem"></div></div>
    <div class="stat-cell slr-stat-cats">
      <div class="section-label mb-4" data-s="slr.stat.byBoatType"></div>
      <div id="sBoatCats" class="text-sm slr-boat-cats"></div>
    </div>
  </div>
  
  <!-- Trips section header + show-all toggle -->
  <div class="flex-between mb-8">
    <div class="section-label" data-s="logrev.validationRequests"></div>
    <label class="flex-center gap-6 text-sm text-muted cursor-pointer">
      <input type="checkbox" id="showAllTrips" data-slr-change="applyFilters">
      <span data-s="logrev.showAll"></span>
    </label>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="filterName" data-slr-input="applyFilters">
    <select id="filterStatus" data-slr-change="applyFilters">
      <option value=""    id="filterOptAll"></option>
      <option value="pending"   id="filterOptPending"></option>
      <option value="verified"  id="filterOptVerified"></option>
    </select>
    <input type="date" id="filterFrom" data-slr-change="applyFilters">
    <input type="date" id="filterTo"   data-slr-change="applyFilters">
  </div>

  <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>

  <!-- ══ CERTIFICATIONS ══════════════════════════════════════════════════════ -->
  <div style="margin-top:32px;border-top:1px solid var(--border);padding-top:24px">
    <div class="section-label mb-14" data-s="slr.stat.certs"></div>

    <!-- Mode toggle -->
    <div class="mb-16 d-flex border-muted overflow-hidden" style="gap:0;border-radius:var(--radius-sm);width:fit-content">
      <button id="certModeByMember" data-slr-click="setCertMode" data-slr-arg="member"
        class="text-md font-inherit border-none cursor-pointer" style="padding:7px 16px;transition:all .2s;background:var(--accent);color:#fff">
        By member
      </button>
      <button id="certModeByType" data-slr-click="setCertMode" data-slr-arg="type"
        class="text-md font-inherit border-none cursor-pointer bg-surface text-muted" style="padding:7px 16px;transition:all .2s">
        By credential
      </button>
    </div>

    <!-- ── MODE A: search by member ── -->
    <div id="certPanelModeA">
      <div class="mb-14 pos-relative">
        <input type="text" id="certMemberSearch"
          class="text-md w-full bg-surface border-muted font-inherit" style="box-sizing:border-box;border-radius:var(--radius-sm);color:var(--text);padding:9px 12px"
          data-slr-input-val="searchCertMember">
        <div id="certMemberDrop"
          class="bg-surface border-muted d-none" style="position:absolute;top:100%;left:0;right:0;border-radius:0 0 var(--radius-sm) var(--radius-sm);z-index:100;max-height:200px;overflow-y:auto;box-shadow:var(--shadow-md)">
        </div>
      </div>

      <div id="certMemberPanel" class="d-none">
        <div class="flex-between mb-10">
          <div>
            <div class="text-lg fw-500" id="certPanelName"></div>
            <div class="text-sm text-muted" id="certPanelMeta"></div>
          </div>
          <button data-slr-click="openCertAssignModal" class="btn btn-primary btn-sm" data-s="cq.assignCred"></button>
        </div>
        <div id="certPanelList"></div>
      </div>

      <div id="certMemberEmpty" class="text-muted text-md" style="padding:8px 0">
        <span data-s="logrev.certSearch"></span>
      </div>
    </div>

    <!-- ── MODE B: filter by cert type ── -->
    <div id="certPanelModeB" class="d-none">
      <div class="flex-center flex-wrap gap-8 mb-12">
        <select id="certFilterType" data-slr-change="applyCertFilter"
          class="flex-1 text-md bg-surface border-muted font-inherit" style="min-width:200px;border-radius:var(--radius-sm);color:var(--text);padding:7px 10px">
          <option value="" data-s="slr.selectCredential"></option>
        </select>
      </div>
      <div id="certFilterResults"></div>
    </div>

  </div>

  <!-- ══ ACTIVITY LOGS ══════════════════════════════════════════════════════ -->
  <div style="margin-top:32px;border-top:1px solid var(--border);padding-top:24px">
    <div class="section-label mb-4" data-s="slr.act.title"></div>
    <div class="text-sm text-muted mb-14" data-s="slr.act.subtitle"></div>

    <div class="filter-bar">
      <select id="actFilterTag" data-slr-change="applyActivityFilters">
        <option value="" id="actFilterTagAll"></option>
      </select>
      <select id="actFilterType" data-slr-change="applyActivityFilters">
        <option value="" id="actFilterTypeAll"></option>
      </select>
      <input type="text" id="actFilterSearch" data-slr-input="applyActivityFilters">
      <input type="date" id="actFilterFrom" data-slr-change="reloadActivityLog">
      <input type="date" id="actFilterTo"   data-slr-change="reloadActivityLog">
      <label class="flex-center gap-6 text-sm text-muted cursor-pointer">
        <input type="checkbox" id="actFilterLogged" data-slr-change="applyActivityFilters">
        <span data-s="slr.act.loggedOnly"></span>
      </label>
    </div>

    <div id="actSummary" class="text-xs text-muted mb-8"></div>
    <div id="actList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

<script src="staff_logbook-review.js" defer></script>
</body>
</html>
