<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Logbook Review</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/boats.js"></script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/certs.js" defer></script>
  <link rel="stylesheet" href="staff_logbook-review.css">
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">
  <div class="mb-16">
    <div class="fw-500" style="font-size:16px" data-s="logrev.title"></div>
    <div class="text-sm text-muted" data-s="logrev.subtitle" style="margin-top:2px"></div>
  </div>

  <!-- Stats row 1 -->
  <div class="stat-strip mb-8">
    <div class="stat-cell"><div class="stat-n" id="sTotalTrips">—</div><div class="stat-l">YTD TRIPS</div></div>
    <div class="stat-cell"><div class="stat-n text-brass" id="sRequested">—</div><div class="stat-l">AWAITING REVIEW</div></div>
    <div class="stat-cell"><div class="stat-n" id="sVerified">—</div><div class="stat-l">VERIFIED</div></div>
  </div>
  <!-- Stats row 2 -->
  <div class="stat-strip mb-16">
    <div class="stat-cell"><div class="stat-n" id="sTotalPersons">—</div><div class="stat-l">PERSONS ON WATER</div></div>
    <div class="stat-cell"><div class="stat-n" id="sUniquePersons">—</div><div class="stat-l">UNIQUE MEMBERS</div></div>
    <div class="stat-cell" style="text-align:left;padding:8px 10px">
      <div class="section-label mb-4">BY BOAT TYPE</div>
      <div id="sBoatCats" class="text-sm" style="line-height:1.8"></div>
    </div>
  </div>
  
  <!-- Trips section header + show-all toggle -->
  <div class="flex-between mb-8">
    <div class="section-label" data-s="logrev.validationRequests"></div>
    <label class="flex-center gap-6 text-sm text-muted" style="cursor:pointer">
      <input type="checkbox" id="showAllTrips" data-slr-change="applyFilters">
      <span data-s="logrev.showAll"></span>
    </label>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="filterName" data-slr-input="applyFilters">
    <select id="filterStatus" data-slr-change="applyFilters">
      <option value=""    id="filterOptAll"></option>
      <option value="pending"   id="filterOptPending"></option>
      <option value="verified"  id="filterOptVerified"></option>
    </select>
    <input type="date" id="filterFrom" data-slr-change="applyFilters">
    <input type="date" id="filterTo"   data-slr-change="applyFilters">
  </div>

  <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>

  <!-- ══ CERTIFICATIONS ══════════════════════════════════════════════════════ -->
  <div style="margin-top:32px;border-top:1px solid var(--border);padding-top:24px">
    <div class="section-label mb-14">CERTIFICATIONS</div>

    <!-- Mode toggle -->
    <div class="mb-16" style="display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;width:fit-content">
      <button id="certModeByMember" data-slr-click="setCertMode" data-slr-arg="member"
        class="text-md" style="padding:7px 16px;font-family:inherit;border:none;cursor:pointer;transition:all .2s;background:var(--brass);color:#fff">
        By member
      </button>
      <button id="certModeByType" data-slr-click="setCertMode" data-slr-arg="type"
        class="text-md" style="padding:7px 16px;font-family:inherit;border:none;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--muted)">
        By credential
      </button>
    </div>

    <!-- ── MODE A: search by member ── -->
    <div id="certPanelModeA">
      <div class="mb-14" style="position:relative">
        <input type="text" id="certMemberSearch"
          class="text-md" style="width:100%;box-sizing:border-box;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;padding:9px 12px"
          data-slr-input-val="searchCertMember">
        <div id="certMemberDrop"
          style="position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);z-index:100;display:none;max-height:200px;overflow-y:auto;box-shadow:var(--shadow-md)">
        </div>
      </div>

      <div id="certMemberPanel" style="display:none">
        <div class="flex-between mb-10">
          <div>
            <div class="text-lg fw-500" id="certPanelName"></div>
            <div class="text-sm text-muted" id="certPanelMeta"></div>
          </div>
          <button data-slr-click="openCertAssignModal" class="btn btn-primary text-sm" style="padding:5px 12px">+ Add / Change cert</button>
        </div>
        <div id="certPanelList"></div>
      </div>

      <div id="certMemberEmpty" class="text-muted text-md" style="padding:8px 0">
        <span data-s="logrev.certSearch"></span>
      </div>
    </div>

    <!-- ── MODE B: filter by cert type ── -->
    <div id="certPanelModeB" style="display:none">
      <div class="flex-center flex-wrap gap-8 mb-12">
        <select id="certFilterType" data-slr-change="applyCertFilter"
          class="flex-1 text-md" style="min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;padding:7px 10px">
          <option value="">— Select credential —</option>
        </select>
      </div>
      <div id="certFilterResults"></div>
    </div>

  </div>

<!-- ══ CERT ASSIGNMENT MODAL ══ -->
<div class="modal-overlay hidden" id="tripCertModal" data-slr-close-self>
  <div class="modal" style="max-width:440px">
    <div class="modal-header mb-16">
      <h3 id="tcmTitle"></h3>
      <button class="modal-close-x" data-slr-close="tripCertModal">×</button>
    </div>

    <!-- Current certs for this member -->
    <div class="mb-14">
      <div class="section-label mb-8" data-s="logrev.certModal"></div>
      <div id="tcmCurrentList"><div class="text-sm text-muted" style="font-style:italic" data-s="lbl.loading"></div></div>
    </div>

    <!-- Assign new cert -->
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div class="section-label mb-10" data-s="logrev.assignCert"></div>
      <div class="field">
        <label data-s="lbl.type"></label>
        <select id="tcmCertType" data-slr-change="tcmCertTypeChanged">
          <option value=""></option>
        </select>
      </div>
      <div class="field" id="tcmSubcatField" style="display:none">
        <label data-s="cert.level"></label>
        <select id="tcmSubcat"><option value=""></option></select>
      </div>
      <div class="grid2 gap-10">
        <div class="field">
          <label data-s="logrev.assignedDate"></label>
          <input type="date" id="tcmAssignedAt">
        </div>
        <div class="field" id="tcmExpiryField" style="display:none">
          <label data-s="logrev.expires"></label>
          <input type="date" id="tcmExpiresAt">
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" data-slr-click="tcmAssign" id="tcmAssignBtn" data-s="logrev.assignBtn"></button>
    </div>

    <div class="mt-8" style="text-align:right">
      <button class="btn btn-secondary" data-slr-close="tripCertModal" data-s="btn.close"></button>
    </div>
  </div>
</div>

<script src="staff_logbook-review.js" defer></script>
</body>
</html>
