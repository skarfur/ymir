<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ýmir — Alert Action</title>
<style>
  body { margin:0; padding:40px 20px; background:#071526; font-family:system-ui,sans-serif; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; box-sizing:border-box; }
  .card { background:#0b1f38; border:1px solid #1e3a5a; border-radius:8px; padding:32px; max-width:440px; width:100%; text-align:center; }
  .logo { color:var(--brass,#c8a84b); font-size:22px; font-weight:bold; margin-bottom:24px; letter-spacing:1px; }
  .icon { font-size:48px; margin-bottom:16px; }
  h2 { margin:0 0 12px; font-size:20px; }
  p  { margin:0 0 24px; color:#7a9cbe; font-size:14px; line-height:1.6; }
  .btn { display:inline-block; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:14px; }
  .btn-primary { background:#27ae60; color:#fff; }
  .btn-secondary { background:#1e3a5a; color:#7a9cbe; margin-left:8px; }
  .spinner { width:36px; height:36px; border:3px solid #1e3a5a; border-top-color:#c8a84b; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error { color:#e74c3c; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ÝMIR</div>
  <div id="state">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDOdwZGy2gDt99PEENSk6D3xTC8KQHdOICRIDEFd0VDB1eCMmA1hJ3-iJJ1Q8PDuqh/exec';
const p = new URLSearchParams(location.search);
const op = p.get('op') || 'silence';
const id = p.get('id') || '';
const token = p.get('token') || '';

async function run() {
  const el = document.getElementById('state');
  try {
    const body = JSON.stringify({ action: 'silenceAlert', checkoutId: id, op, token });
    const res  = await fetch(SCRIPT_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body });
    const data = await res.json();
    if (op === 'checkInAndClose') {
      el.innerHTML = '<div class="icon">✅</div><h2>Boat checked in</h2><p>The alert has been closed and the checkout marked as returned.</p><a class="btn btn-primary" href="../staff/">Staff hub</a>';
    } else if (op === 'snooze') {
      el.innerHTML = '<div class="icon">⏱</div><h2>Alert snoozed</h2><p>You will be reminded again shortly if the boat is still out.</p><a class="btn btn-primary" href="../staff/">Staff hub</a>';
    } else {
      el.innerHTML = '<div class="icon">🔕</div><h2>Alert silenced</h2><p>No further alerts will be sent for this checkout.</p><a class="btn btn-primary" href="../staff/">Staff hub</a>';
    }
  } catch(e) {
    el.innerHTML = '<div class="icon error">⚠️</div><h2 class="error">Error</h2><p>' + e.message + '</p>';
  }
}

if (!id || !token) {
  document.getElementById('state').innerHTML = '<div class="icon error">⚠️</div><h2 class="error">Invalid link</h2><p>This link is missing required parameters.</p>';
} else {
  run();
}
</script>
</body>
</html>
