<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://unpkg.com https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Logbook</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://unpkg.com">
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="../shared/tripcard.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/trip-form.js"></script>
<script src="../shared/list-filter.js"></script>
<script src="../shared/guests.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/boats.js" defer></script>
<link rel="stylesheet" href="logbook.css">
</head>
<body>
<ymir-header></ymir-header>
<div class="page">

  <!-- Stats -->
  <div class="stat-strip" style="display:none">
    <div class="stat-card"><div class="stat-val" id="stTrips">—</div><div class="stat-lbl" data-s="lb.stat.trips"></div></div>
    <div class="stat-card"><div class="stat-val" id="stHours">—</div><div class="stat-lbl" data-s="lb.stat.hours"></div></div>
    <div class="stat-card"><div class="stat-val" id="stSeason">—</div><div class="stat-lbl" data-s="lb.stat.season"></div></div>
    <div class="stat-card"><div class="stat-val" id="stSkipper">—</div><div class="stat-lbl" data-s="lb.stat.skipper"></div></div>
    <div class="stat-card"><div class="stat-val" id="stDistance">—</div><div class="stat-lbl" data-s="lb.stat.distance"></div></div>
    <div class="stat-card"><div class="stat-val" id="stLongest">—</div><div class="stat-lbl" data-s="lb.stat.longest"></div></div>
    <div class="stat-card"><div class="stat-val" id="stAvgWind">—</div><div class="stat-lbl" data-s="lb.stat.avgWind"></div></div>
    <div class="stat-card"><div class="stat-val" id="stPeakWind">—</div><div class="stat-lbl" data-s="lb.stat.peakWind"></div></div>
    <div class="stat-card"><div class="stat-val" id="stStreak">—</div><div class="stat-lbl" data-s="lb.stat.streak"></div></div>
    <div class="stat-card"><div class="stat-val" id="stBoats">—</div><div class="stat-lbl" data-s="lb.stat.boats"></div></div>
    <div class="stat-card"><div class="stat-val" id="stCrew">—</div><div class="stat-lbl" data-s="lb.stat.asCrew"></div></div>
    <div class="stat-card"><div class="stat-val" id="stHelmHours">—</div><div class="stat-lbl" data-s="lb.stat.helmHours"></div></div>
    <div class="stat-card"><div class="stat-val" id="stStudent">—</div><div class="stat-lbl" data-s="lb.stat.asStudent"></div></div>
    <div class="stat-card"><div class="stat-val stat-val-text" id="stFavBoat">—</div><div class="stat-lbl" data-s="lb.stat.favBoat"></div></div>
    <div class="stat-card"><div class="stat-val stat-val-text" id="stFavLocation">—</div><div class="stat-lbl" data-s="lb.stat.favLocation"></div></div>
    <div class="stat-card"><div class="stat-val" id="stHeavy">—</div><div class="stat-lbl" data-s="lb.stat.heavyWx"></div></div>
    <div class="stat-card"><div class="stat-val" id="stAvgDuration">—</div><div class="stat-lbl" data-s="lb.stat.avgDuration"></div></div>
    <div class="stat-card"><div class="stat-val" id="stLocations">—</div><div class="stat-lbl" data-s="lb.stat.locations"></div></div>
    <div class="stat-card"><div class="stat-val" id="stVerified">—</div><div class="stat-lbl" data-s="lb.stat.verified"></div></div>
  </div>
  <div class="cat-hours" id="catHours" style="display:none">
    <div class="cat-hours-title" data-s="lb.stat.hoursByCategory"></div>
    <div id="catHoursList"></div>
  </div>

  <!-- Member heatmap -->
  <div class="member-heatmap d-none" id="memberHeatmapWrap">
    <div class="member-heatmap-header">
      <span class="member-heatmap-title" data-s="lb.heatmap"></span>
      <div class="heatmap-toggle">
        <button class="active" data-mode="trips" data-lb-click="setHeatMode" data-lb-arg="trips" data-s="lb.heatTrips"></button>
        <button data-mode="time" data-lb-click="setHeatMode" data-lb-arg="time" data-s="lb.heatTime"></button>
        <button data-mode="tracks" data-lb-click="setHeatMode" data-lb-arg="tracks" data-s="lb.heatTracks"></button>
      </div>
    </div>
    <div id="memberHeatmap"></div>
  </div>

  <!-- Share logbook -->
  <div id="shareBar" class="flex-center flex-wrap gap-10 mb-12">
    <button class="btn-accent flex-shrink-0" data-lb-click="toggleSharePanel" data-s="logbook.shareBtn"></button>
    <button class="btn-accent flex-shrink-0" data-lb-click="openLogModal"><span data-s="lb.addManualBtn"></span></button>
    <button class="btn-accent flex-shrink-0" data-lb-click="openConfirmationsModal"><span data-s="member.pendingConfirmations"></span><span class="conf-badge" id="confBadge" style="display:none">0</span></button>
    <div id="sharePanel" class="w-full mt-4" style="display:none;padding-top:8px;border-top:1px solid var(--border)">
      <div id="shareCatChecks" class="flex-center flex-wrap gap-8 mb-8"></div>
      <div class="flex-center flex-wrap mb-8" style="gap:14px">
        <label class="flex-center text-sm gap-4" style="text-transform:none;letter-spacing:0;margin:0">
          <input type="checkbox" id="sharePhotos" checked class="accent-checkbox" style="width:14px;height:14px">
          <span data-s="logbook.sharePhotos"></span>
        </label>
        <label class="flex-center text-sm gap-4" style="text-transform:none;letter-spacing:0;margin:0">
          <input type="checkbox" id="shareTracks" checked class="accent-checkbox" style="width:14px;height:14px">
          <span data-s="logbook.shareTracks"></span>
        </label>
      </div>
      <button class="btn-primary text-sm" style="width:auto;padding:7px 16px" data-lb-click="generateAndCopyShareLink" data-s="logbook.shareCopy"></button>
      <button class="btn-secondary text-sm ml-6" style="width:auto;padding:7px 16px" data-lb-click="exportLogbookCsv" data-s="logbook.exportCsv"></button>
    </div>
    <div id="shareActiveTokens" class="w-full"></div>
  </div>

  <!-- Credentials -->
  <div class="section-hdr"><span data-s="member.tabCerts"></span></div>
  <div id="certsList"><div class="empty-note" data-s="logbook.loading"></div></div>

  <!-- Logbook header -->
  <div class="section-hdr" style="margin-top:24px">
    <span data-s="logbook.sectTitle"></span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <select id="fYear"><option value="" data-s="logbook.filterAllYears"></option></select>
    <select id="fCat"><option value="" data-s="logbook.filterAllBoats"></option></select>
    <select id="fRole"><option value="" data-s="logbook.filterAnyRole"></option><option value="skipper" data-s="logbook.filterRoleSkipper"></option><option value="crew" data-s="logbook.filterRoleCrew"></option><option value="helm" data-s="logbook.filterRoleHelm"></option><option value="student" data-s="logbook.filterRoleStudent"></option><option value="guest" data-s="logbook.filterRoleGuest"></option></select>
    <select id="fWind">
      <option value="" data-s="logbook.filterAnyWind"></option>
      <option value="calm" data-s="logbook.filterWindCalm"></option>
      <option value="light" data-s="logbook.filterWindLight"></option>
      <option value="moderate" data-s="logbook.filterWindModerate"></option>
      <option value="strong" data-s="logbook.filterWindStrong"></option>
      <option value="gt4" data-s="logbook.filterWindGt4"></option>
      <option value="lte4" data-s="logbook.filterWindLte4"></option>
    </select>
    <div class="filter-search-row">
      <input id="fText" type="text" data-s="logbook.searchPh" data-s-attr="placeholder">
      <span class="filter-count" id="filterCount"></span>
    </div>
  </div>
  <div id="tripList"><div class="empty-note" data-s="logbook.loading"></div></div>
</div>

<!-- Lightbox overlay -->
<div class="lightbox-overlay hidden" id="lightbox" data-lb-click="closeLightbox">
  <button class="lightbox-close" data-lb-click="closeLightbox">&times;</button>
  <button class="lightbox-nav prev" data-lb-click="lightboxNav" data-lb-arg="-1">&lsaquo;</button>
  <button class="lightbox-nav next" data-lb-click="lightboxNav" data-lb-arg="1">&rsaquo;</button>
  <img class="lightbox-img" id="lightboxImg" alt="" data-lb-nobubble>
</div>

<!-- Full-screen map modal -->
<div class="map-modal-overlay hidden" id="mapModal">
  <div class="map-modal-bar">
    <span id="mapModalTitle" data-s="lb.gpsTrack"></span>
    <button class="map-modal-close" data-lb-click="closeMapModal">&times;</button>
  </div>
  <div class="map-modal-body" id="mapModalBody"></div>
</div>

<!-- Confirmations modal -->
<div class="modal-overlay hidden" id="confirmationsModal" data-lb-close-self="closeConfModal">
  <div class="modal modal--md">
    <div class="modal-title">
      <span id="confirmationsTitle"></span>
      <button class="modal-close" data-lb-click="closeConfModal">&#10005;</button>
    </div>
    <div class="section-label mb-8" style="letter-spacing:1.5px" data-s="member.incoming"></div>
    <div id="incomingConfirmations"><div class="empty-note" data-s="lbl.loading"></div></div>
    <div class="section-label mt-14 mb-8" style="letter-spacing:1.5px" data-s="member.outgoing"></div>
    <div id="outgoingConfirmations"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>
</div>

<!-- Log manually modal -->
<div class="modal-overlay hidden" id="logModal" data-lb-close-self="closeLogModal">
  <div class="modal modal--md">
    <div class="modal-title">
      <span id="logModalTitle" data-s="lb.addEntryTitle"></span>
      <button class="modal-close" data-lb-click="closeLogModal">✕</button>
    </div>

    <!-- Step 1: enter manually or join a recent trip -->
    <div id="logStep1">
      <p class="text-sm text-muted mb-12" data-s="lb.addEntryBlurb"></p>
      <button class="btn-secondary" data-lb-click="showManualForm"><span data-s="lb.enterManually"></span></button>

      <div class="text-xs text-muted uppercase" style="margin:12px 0;text-align:center;letter-spacing:.8px" data-s="lb.orJoin"></div>
      <div id="recentTripsList"><div class="empty-note" data-s="lb.loadingRecent"></div></div>
      <button class="load-more" id="loadMoreTripsBtn" data-lb-click="loadMoreTrips" style="display:none"><span data-s="lb.loadMore"></span></button>

      <!-- Confirmation request form when a club trip is selected -->
      <div id="joinExtras" class="mt-12 rounded-8" style="display:none;padding:14px;background:var(--card);border:1px solid var(--border-l)">
        <div class="section-label mb-6" style="letter-spacing:.8px" data-s="lb.requestJoinTitle"></div>
        <p class="text-sm text-muted mb-12" data-s="lb.requestJoinBlurb"></p>
        <div id="jErr" class="text-sm text-red mb-8" style="display:none"></div>
        <button class="btn-primary" id="jSubmitBtn" data-lb-click="submitJoinTrip"><span data-s="lb.requestJoin"></span></button>
      </div>
    </div>

    <!-- Step 2: manual entry form -->
    <div id="logStep2" style="display:none">
      <button class="text-sm text-muted mb-12 bg-none border-none cursor-pointer" data-lb-click="showStep1" style="padding:0"><span data-s="lb.back"></span></button>
      <div class="form-row">
        <div class="form-field"><label for="mDate" data-s="lbl.date"></label><input type="date" id="mDate"></div>
        <div class="form-field"><label for="mRole" data-s="lbl.role"></label>
          <select id="mRole" data-lb-change="onRoleChange"><option value="skipper" data-s="tc.skipper"></option><option value="crew" data-s="lbl.crew"></option></select>
        </div>
      </div>
      <!-- Skipper assignment: shown when role=crew -->
      <div class="form-field pos-relative" id="mSkipperSection" style="display:none">
        <label for="mSkipperName" data-s="tc.skipper"></label>
        <input type="text" id="mSkipperName" autocomplete="off" data-s="logbook.searchByNamePh" data-s-attr="placeholder"
          data-lb-input-el="searchManualMember" data-lb-arg="mSkipperDrop" data-lb-blur-hide="mSkipperDrop">
        <div id="mSkipperDrop" class="manual-member-drop"></div>
      </div>
      <!-- Non-club trip toggle -->
      <div class="form-field mb-8">
        <label class="flex-center gap-6 cursor-pointer text-xs">
          <input type="checkbox" id="mNonClub" data-lb-change="onNonClubToggle" style="width:auto;accent-color:var(--accent)">
          <span data-s="logbook.nonClubToggle">Non-club trip</span>
          <span class="text-muted text-9 fw-400" data-s="logbook.nonClubHint">— log a trip outside the club system</span>
        </label>
      </div>
      <!-- Club boat + location (default) -->
      <div id="mClubRow" class="form-row">
        <div id="mBoatClub" class="form-field"><label for="mBoat" data-s="lbl.boat"></label>
          <select id="mBoat" data-lb-change="onBoatChange"><option value="" data-s="lb.selectBoat"></option></select>
        </div>
        <div id="mLocClub" class="form-field"><label for="mLocation" data-s="lbl.location"></label>
          <select id="mLocation"><option value="" data-s="lb.selectLocation"></option></select>
        </div>
      </div>
      <!-- Non-club boat (hidden by default) -->
      <div id="mBoatFree" style="display:none">
        <div class="form-row">
          <div class="form-field"><label data-s="logbook.boatNameLabel" for="mBoatFreeInput">Boat name</label>
            <input type="text" id="mBoatFreeInput" placeholder="e.g. Sunfish, RIB, etc." autocomplete="off">
          </div>
          <div class="form-field"><label data-s="logbook.boatCategory" for="mBoatFreeCat">Category</label>
            <select id="mBoatFreeCat">
              <option value="dinghy" data-s="lb.cat.dinghy"></option><option value="keelboat" data-s="lb.cat.keelboat"></option>
              <option value="kayak" data-s="lb.cat.kayak"></option><option value="rowboat" data-s="lb.cat.rowboat"></option>
              <option value="sup" data-s="lb.cat.sup"></option><option value="wingfoil" data-s="lb.cat.wingfoil"></option>
              <option value="other" data-s="lb.cat.other"></option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field"><label for="mBoatFreeModel">Model / make <span class="text-muted text-9" data-s="lb.optional"></span></label>
            <input type="text" id="mBoatFreeModel" placeholder="e.g. Laser Pico" autocomplete="off">
          </div>
          <div class="form-field"><label for="mBoatFreeSail">Sail number <span class="text-muted text-9" data-s="lb.optional"></span></label>
            <input type="text" id="mBoatFreeSail" placeholder="e.g. ISL 1234" autocomplete="off">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field"><label for="mBoatFreeReg">Registration <span class="text-muted text-9" data-s="lb.optional"></span></label>
            <input type="text" id="mBoatFreeReg" placeholder="e.g. RE-001" autocomplete="off">
          </div>
          <div class="form-field"><label for="mBoatFreeLen">Length (m) <span class="text-muted text-9" data-s="lb.optional"></span></label>
            <input type="number" id="mBoatFreeLen" min="0" step="0.1" placeholder="e.g. 6.5">
          </div>
        </div>
      </div>
      <!-- Non-club location (hidden by default) -->
      <div id="mLocFree" class="form-field" style="display:none">
        <label data-s="lbl.location" for="mLocFreeInput">Location</label>
        <input type="text" id="mLocFreeInput" placeholder="e.g. Lake Thingvallavatn" autocomplete="off">
        <button type="button" class="text-xs text-accent bg-none border-none cursor-pointer" id="mLocGeoBtn" data-lb-click="useMyLocation" data-lb-arg="mLocFreeInput" data-lb-arg2="mLocGeoStatus" style="padding:4px 0;display:block" data-s="logbook.useMyLocation">📍 Use my location</button>
        <div id="mLocGeoStatus" class="text-xs text-muted mt-2" style="display:none"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label for="mTimeOut" data-s="lb.departed"></label><input type="text" id="mTimeOut" placeholder="HH:MM" maxlength="5"
          data-lb-time-format></div>
        <div class="form-field"><label for="mTimeIn" data-s="lb.returned"></label><input type="text" id="mTimeIn" placeholder="HH:MM" maxlength="5"
          data-lb-time-format></div>
      </div>
      <div class="form-field"><label for="mCrew" data-s="lb.crewAboardTotal"></label><input type="number" id="mCrew" min="1" value="1" data-lb-input="onCrewChange"></div>
      <!-- Crew member inputs: shown when crew > 1 -->
      <div id="mCrewSection" class="mb-12" style="display:none">
        <label class="check-label mb-8">
          <input type="checkbox" id="mHelmSelf" class="accent-checkbox">
          <span class="text-xs" data-s="lb.iWasHelm"></span>
        </label>
        <label class="text-9" style="letter-spacing:.8px" for="mDeparturePort">Crew members <span class="fw-400" style="opacity:.6" data-s="lb.searchByName"></span></label>
        <div id="mCrewInputs"></div>
        <div class="text-xs text-muted mt-4" data-s="lb.namedCrewNote"></div>
      </div>

      <!-- Port section: open/prominent for keelboats, collapsed for others -->
      <details id="portDetails" class="mb-12">
        <summary id="portSummary" class="section-label flex-center gap-6 mb-8 cursor-pointer" style="list-style:none">
          <span>⚓️</span><span id="portSummaryLabel" data-s="lb.portsOptional"></span>
        </summary>
        <div class="form-row mt-6">
          <div class="form-field">
            <label data-s="lb.departurePort"></label>
            <input list="portsList" id="mDeparturePort" placeholder="e.g. Reykjavík" autocomplete="off"
              data-lb-input="watchPortInput" data-lb-arg="departure">
          </div>
          <div class="form-field">
            <label for="mArrivalPort" data-s="lb.arrivalPort"></label>
            <input list="portsList" id="mArrivalPort" placeholder="Same as departure" autocomplete="off"
              data-lb-input="watchPortInput" data-lb-arg="arrival">
          </div>
        </div>
        <datalist id="portsList"></datalist>
        <div id="addPortHint" class="text-xs text-accent cursor-pointer mt-4" style="display:none"
          data-lb-click="addNewPort">+ Add "<span id="addPortName"></span>" to ports list</div>
      </details>

      <!-- Weather -->
      <div class="flex-center gap-6 justify-between" style="margin:12px 0 8px">
        <div class="section-label" data-s="lb.weatherOptional"></div>
        <button type="button" class="text-xs text-accent bg-none border-none cursor-pointer" id="mWxFetchBtn" data-lb-click="fetchCurrentWeather" style="padding:0"><span data-s="lb.useCurrentWx"></span></button>
      </div>
      <div id="mWxFetchStatus" class="text-xs text-muted mb-6" style="display:none"></div>
      <!-- Weather fields rendered by shared/trip-form.js; handlers wired after inject. -->
      <div id="mWxFields"></div>
      <div class="form-field"><label for="mDistanceNm">Distance (nm) <span class="text-muted text-9" data-s="lb.autoFromGps"></span></label>
        <input type="number" id="mDistanceNm" min="0" step="0.1" placeholder="e.g. 12.5"></div>
      <!-- GPS Track upload -->
      <div class="form-field">
        <label for="mTrackFile">GPS Track — GPX / KML / KMZ <span class="text-muted text-9" data-s="lb.optional"></span></label>
        <input type="file" id="mTrackFile" accept=".gpx,.kml,.kmz" data-lb-change-el="handleTrackFile"
          class="text-sm">
        <div id="mTrackStatus" class="text-sm text-muted mt-4"></div>
      </div>
      <!-- Photo upload -->
      <div class="form-field">
        <label for="mPhotoFiles">Photos <span class="text-muted text-9" data-s="lb.optional"></span></label>
        <input type="file" id="mPhotoFiles" accept="image/*" multiple data-lb-change-el="handlePhotoFiles"
          class="text-sm">
        <div id="mPhotoPreview" class="flex-center flex-wrap gap-6 mt-6"></div>
        <div class="photo-meta-row mt-6">
          <label><input type="checkbox" id="mPhotoShared" checked> Share with crew</label>
          <label><input type="checkbox" id="mPhotoClubUse"> Club may use</label>
        </div>
      </div>
      <div class="form-field" id="mSkipperNoteWrap">
        <label for="mSkipperNote">Skipper's note <span class="text-muted text-9" data-s="lb.visibleToCrew"></span></label>
        <textarea id="mSkipperNote" rows="2" placeholder="Notes for the crew…"></textarea>
      </div>
      <div class="form-field" id="mPersonalNoteWrap">
        <label for="mNotes">Personal note <span class="text-muted text-9" data-s="lb.onlyYou"></span></label>
        <textarea id="mNotes" rows="2" placeholder="Private notes…"></textarea>
      </div>
      <div id="mErr" class="text-sm text-red mb-8" style="display:none"></div>
      <button class="btn-primary" id="mSubmitBtn" data-lb-click="submitManual"><span data-s="lb.saveToLogbook"></span></button>
    </div>
  </div>
</div>

<script src="logbook.js" defer></script>
<script src="../shared/tripcard.js" defer></script>
<script src="../shared/logbook.js" defer></script>
<script src="../shared/logbook-form.js" defer></script>
<script src="../shared/logbook-share.js" defer></script>
<script src="../shared/logbook-confirm.js" defer></script>
<script src="../shared/logbook-edit.js" defer></script>


<!-- Edit trip modal (skipper only) -->
<div class="modal-overlay hidden" id="editTripModal" data-lb-close-self="closeEditTrip">
  <div class="modal modal--md">
    <div class="modal-title">
      <span id="editTripTitle" data-s="lb.editTrip"></span>
      <button class="modal-close" data-lb-click="closeEditTrip">✕</button>
    </div>
    <input type="hidden" id="etId">
    <div class="form-row">
      <div class="form-field"><label for="etDate" data-s="lbl.date"></label><input type="date" id="etDate"></div>
      <div class="form-field"><label for="etBoat" data-s="lbl.boat"></label>
        <select id="etBoat"><option value="" data-s="lb.selectBoat"></option></select>
      </div>
    </div>
    <div class="form-field"><label for="etLocation" data-s="lbl.location"></label>
      <select id="etLocation"><option value="" data-s="lb.selectLocation"></option></select>
    </div>
    <div class="form-row">
      <div class="form-field"><label for="etTimeOut" data-s="lb.departed"></label><input type="text" id="etTimeOut" placeholder="HH:MM" maxlength="5"
        data-lb-time-format></div>
      <div class="form-field"><label for="etTimeIn" data-s="lb.returned"></label><input type="text" id="etTimeIn" placeholder="HH:MM" maxlength="5"
        data-lb-time-format></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label for="etCrew" data-s="lb.crewAboard"></label><input type="number" id="etCrew" min="1" value="1"></div>
      <div class="form-field"><label for="etDistanceNm" data-s="lb.distanceNm"></label><input type="number" id="etDistanceNm" min="0" step="0.1"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label for="etDeparturePort" data-s="lb.departurePort"></label><input list="portsList" id="etDeparturePort" autocomplete="off"></div>
      <div class="form-field"><label for="etArrivalPort" data-s="lb.arrivalPort"></label><input list="portsList" id="etArrivalPort" autocomplete="off"></div>
    </div>
    <div class="section-label" style="margin:12px 0 8px" data-s="lb.weatherHdr"></div>
    <!-- Weather fields rendered by shared/trip-form.js. -->
    <div id="etWxFields"></div>
    <div class="form-field mt-8"><label for="etSkipperNote">Skipper's comments <span class="text-muted text-9" data-s="lb.parenVisibleToCrew"></span></label>

      <textarea id="etSkipperNote" rows="2"></textarea>
    </div>
    <div id="etErr" class="text-sm text-red mb-8" style="display:none"></div>
    <button class="btn-primary" id="etSubmitBtn" data-lb-click="submitEditTrip"><span data-s="lb.saveChanges"></span></button>
  </div>
</div>


<!-- Inline photo upload modal -->
<div class="modal-overlay hidden" id="photoUploadModal" data-lb-close-self="closePhotoUpload">
  <div class="modal modal--md">
    <div class="modal-title">
      <span id="photoUploadTitle" data-s="lb.addPhotos"></span>
      <button class="modal-close" data-lb-click="closePhotoUpload">✕</button>
    </div>
    <input type="hidden" id="puTripId">
    <div class="form-field">
      <label for="puPhotoFiles" data-s="lb.photosLabel"></label>
      <input type="file" id="puPhotoFiles" accept="image/*" multiple data-lb-change-el="handleInlinePhotos" class="text-sm">
      <div id="puPhotoPreview" class="flex-center flex-wrap gap-6 mt-6"></div>
    </div>
    <div class="photo-meta-row mb-8">
      <label><input type="checkbox" id="puShared" checked> <span id="puSharedLbl" data-s="lb.shareWithCrew"></span></label>
      <label><input type="checkbox" id="puClubUse"> <span id="puClubLbl" data-s="lb.clubMayUse"></span></label>
    </div>
    <div class="text-xs text-muted mb-12" id="puHint" data-s="lb.photosBlurb"></div>
    <div id="puErr" class="text-sm text-red mb-8" style="display:none"></div>
    <button class="btn-primary" id="puSubmitBtn" data-lb-click="submitInlinePhotos"><span data-s="lb.uploadPhotos"></span></button>
  </div>
</div>

<!-- Guest prompt is rendered by shared/guests.js; invoked via openGuestPrompt(). -->

</body>
</html>
