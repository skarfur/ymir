<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ymir — Settings</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<style>
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.settings-page{max-width:560px;width:100%;background:var(--card);border:1px solid var(--border-l);border-radius:var(--radius-lg);padding:24px 20px 20px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:var(--shadow-lg)}
.settings-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.settings-section-title{font-size:9px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.settings-hint{font-size:11px;color:var(--muted);margin-top:4px}
.settings-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.settings-row:last-child{margin-bottom:0}
.settings-row label{font-size:12px;color:var(--text);flex:1;display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;margin:0}
.settings-row input[type="text"]{width:80px;font-size:14px;font-weight:500;text-align:center;letter-spacing:2px;padding:8px;text-transform:uppercase}
.settings-row select{width:auto;min-width:140px;font-size:12px;padding:7px 10px}
.toggle-group{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.toggle-group button{background:none;border:none;border-right:1px solid var(--border);padding:7px 14px;font-size:11px;font-family:inherit;cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap}
.toggle-group button:last-child{border-right:none}
.toggle-group button.active{background:var(--brass);color:#0b1f38;font-weight:600}
.toggle-group button:hover:not(.active){color:var(--text);background:var(--faint)}
.stat-group-label{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin:14px 0 6px;font-weight:600}
.stat-group-label:first-child{margin-top:0}
.pill-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.pill-toggle{display:inline-flex;align-items:center;padding:5px 12px;border-radius:99px;border:1px solid var(--border);font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;user-select:none;background:none}
.pill-toggle:hover{border-color:var(--text);color:var(--text)}
.pill-toggle.active{background:var(--brass);color:#0b1f38;border-color:var(--brass);font-weight:500}
.pill-toggle input{display:none}
.session-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface)}
.session-row .meta{flex:1;min-width:0}
.session-row .ua{font-size:12px;color:var(--text);word-break:break-word}
.session-row .when{font-size:10px;color:var(--muted);margin-top:2px}
.session-row.current{border-color:var(--brass)}
.session-row.current .badge{display:inline-block;margin-left:6px;font-size:9px;color:var(--brass-fg);border:1px solid var(--brass);border-radius:99px;padding:1px 6px;letter-spacing:.5px;text-transform:uppercase}
.session-row .row-del{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px}
.session-row .row-del:hover{border-color:var(--red);color:var(--red)}
.save-bar{position:sticky;bottom:-20px;background:var(--card);border-top:1px solid var(--border);padding:12px 0;margin-top:16px;display:flex;gap:8px;justify-content:flex-end}
.save-bar .btn{min-width:120px}
@media(max-width:600px){.settings-overlay{padding:0;align-items:flex-end}.settings-page{max-height:95vh;border-radius:var(--radius-lg) var(--radius-lg) 0 0}}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="settings-overlay" id="settingsOverlay">
<div class="settings-page">
  <div class="fw-500 mb-16" style="font-size:16px" data-s="settings.title"></div>

  <!-- Initials -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.initials"></div>
    <div class="settings-row">
      <input type="text" id="sInitials" maxlength="4" placeholder="—">
    </div>
    <div class="settings-hint" data-s="settings.initialsHint"></div>
  </div>

  <!-- Language -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.language"></div>
    <div class="settings-row">
      <div class="toggle-group" id="langToggle">
        <button data-val="EN">English</button>
        <button data-val="IS">Islenska</button>
      </div>
    </div>
  </div>

  <!-- Wind units -->
  <div class="settings-section" data-member-only>
    <div class="settings-section-title" data-s="settings.windUnit"></div>
    <div class="settings-row">
      <select id="sWindUnit">
        <option value="bft" data-s="settings.windUnit.bft"></option>
        <option value="ms" data-s="settings.windUnit.ms"></option>
        <option value="kts" data-s="settings.windUnit.kts"></option>
        <option value="kmh" data-s="settings.windUnit.kmh"></option>
        <option value="mph" data-s="settings.windUnit.mph"></option>
      </select>
    </div>
    <div class="settings-hint" data-s="settings.windUnitHint"></div>
  </div>

  <!-- Theme -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.theme"></div>
    <div class="settings-row">
      <div class="toggle-group" id="themeToggle">
        <button data-val="dark" data-s="settings.theme.dark"></button>
        <button data-val="light" data-s="settings.theme.light"></button>
        <button data-val="auto" data-s="settings.theme.auto"></button>
      </div>
    </div>
  </div>

  <!-- Privacy -->
  <div class="settings-section" data-member-only>
    <div class="settings-section-title" data-s="settings.privacy"></div>
    <div class="pill-grid">
      <label class="pill-toggle"><input type="checkbox" id="svSharePhoneVol"><span data-s="settings.sharePhoneVol"></span></label>
    </div>
    <div class="settings-hint" data-s="settings.sharePhoneVolHint"></div>
  </div>

  <!-- Sign-in -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.signIn"></div>

    <!-- Username style (display preference) -->
    <div class="settings-row" style="margin-bottom:12px">
      <label data-s="settings.usernameStyle"></label>
      <div class="toggle-group" id="usernameStyleToggle">
        <button data-val="kt" data-s="settings.usernameStyle.kt"></button>
        <button data-val="initials" data-s="settings.usernameStyle.initials"></button>
      </div>
    </div>
    <div class="settings-hint mb-10" data-s="settings.usernameStyleHint"></div>

    <!-- Stay logged in -->
    <div class="pill-grid">
      <label class="pill-toggle"><input type="checkbox" id="svStayLoggedIn"><span data-s="settings.stayLoggedIn"></span></label>
    </div>
    <div class="settings-hint mb-10" data-s="settings.stayLoggedInHint"></div>

    <!-- Password change -->
    <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:6px;margin-top:12px">
      <label data-s="settings.currentPassword"></label>
      <input type="password" id="sCurrentPw" autocomplete="current-password" style="width:100%;text-align:left;letter-spacing:normal;text-transform:none;padding:8px 10px;font-size:13px">
    </div>
    <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:6px">
      <label data-s="settings.newPassword"></label>
      <input type="password" id="sNewPw" autocomplete="new-password" style="width:100%;text-align:left;letter-spacing:normal;text-transform:none;padding:8px 10px;font-size:13px">
    </div>
    <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:6px;margin-bottom:6px">
      <label data-s="settings.confirmPassword"></label>
      <input type="password" id="sConfirmPw" autocomplete="new-password" style="width:100%;text-align:left;letter-spacing:normal;text-transform:none;padding:8px 10px;font-size:13px">
    </div>
    <div class="settings-row">
      <button class="btn btn-ghost" type="button" id="changePwBtn" data-s="settings.changePassword"></button>
    </div>
    <div class="settings-hint" data-s="settings.passwordHint"></div>
    <div id="pwMsg" class="msg" style="display:none;margin-top:8px;font-size:11px"></div>
  </div>

  <!-- Sign-in activity -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.signInActivity"></div>
    <div class="settings-hint mb-10" style="margin-top:0" data-s="settings.signInActivityHint"></div>
    <div id="sessionList" style="display:flex;flex-direction:column;gap:8px"></div>
    <div class="settings-row" style="margin-top:10px">
      <button class="btn btn-ghost" type="button" id="signOutAllBtn" data-s="settings.signOutEverywhereElse"></button>
    </div>
    <div id="sessionMsg" class="msg" style="display:none;margin-top:8px;font-size:11px"></div>
  </div>

  <!-- Logbook page -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.logbookPage"></div>
    <div class="pill-grid">
      <label class="pill-toggle"><input type="checkbox" id="svShowHeatmap"><span data-s="settings.showHeatmap"></span></label>
    </div>
    <div class="settings-hint" data-s="settings.showHeatmapHint"></div>
  </div>

  <!-- Stats visibility -->
  <div class="settings-section" data-member-only>
    <div class="settings-section-title" data-s="settings.stats"></div>
    <div class="settings-hint mb-10" style="margin-top:0" data-s="settings.statsHint"></div>

    <div class="stat-group-label" data-s="settings.statsGroup.activity"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svCareer" checked><span data-s="settings.stats.career"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svHours" checked><span data-s="settings.stats.hours"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svYtd" checked><span data-s="settings.stats.ytd"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svStreak" checked><span data-s="settings.stats.streak"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.sailing"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svDistance" checked><span data-s="settings.stats.distance"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svLongest" checked><span data-s="settings.stats.longest"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svAvgDuration" checked><span data-s="settings.stats.avgDuration"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.roles"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svSkipper" checked><span data-s="settings.stats.skipper"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svCrew" checked><span data-s="settings.stats.crew"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svHelmHours" checked><span data-s="settings.stats.helmHours"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svStudent" checked><span data-s="settings.stats.student"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svBoats" checked><span data-s="settings.stats.boats"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svFavBoat" checked><span data-s="settings.stats.favBoat"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svByCategory" checked><span data-s="settings.stats.byCategory"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.conditions"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svAvgWind" checked><span data-s="settings.stats.avgWind"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svPeakWind" checked><span data-s="settings.stats.peakWind"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svHeavy" checked><span data-s="settings.stats.heavy"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.other"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svLocations" checked><span data-s="settings.stats.locations"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svFavLocation" checked><span data-s="settings.stats.favLocation"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svVerified" checked><span data-s="settings.stats.verified"></span></label>
    </div>
  </div>

  <!-- Save -->
  <div class="save-bar">
    <button class="btn btn-ghost" id="cancelBtn" data-s="btn.cancel"></button>
    <button class="btn btn-primary" id="saveBtn" data-s="btn.saveClose"></button>
  </div>
</div>
</div>

<script src="settings.js" defer></script>
</body>
</html>
