<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com/gsi/; frame-src https://accounts.google.com/gsi/; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ymir — Settings</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js" defer></script>
<script src="../shared/ui.js" defer></script>
<script src="../shared/layout.js" defer></script>
<script src="../shared/strings.js" defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="settings.css">
</head>
<body>
<ymir-header></ymir-header>

<div class="settings-overlay" id="settingsOverlay">
<div class="settings-page">
  <div class="fw-500 mb-16" style="font-size:16px" data-s="settings.title"></div>

  <!-- Initials -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.initials"></div>
    <div class="settings-row">
      <input type="text" id="sInitials" maxlength="4" placeholder="—">
    </div>
    <div class="settings-hint" data-s="settings.initialsHint"></div>
  </div>

  <!-- Language -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.language"></div>
    <div class="settings-row">
      <div class="toggle-group" id="langToggle">
        <button data-val="EN">English</button>
        <button data-val="IS">Islenska</button>
      </div>
    </div>
  </div>

  <!-- Wind units -->
  <div class="settings-section" data-member-only>
    <div class="settings-section-title" data-s="settings.windUnit"></div>
    <div class="settings-row">
      <select id="sWindUnit">
        <option value="bft" data-s="settings.windUnit.bft"></option>
        <option value="ms" data-s="settings.windUnit.ms"></option>
        <option value="kts" data-s="settings.windUnit.kts"></option>
        <option value="kmh" data-s="settings.windUnit.kmh"></option>
        <option value="mph" data-s="settings.windUnit.mph"></option>
      </select>
    </div>
    <div class="settings-hint" data-s="settings.windUnitHint"></div>
  </div>

  <!-- Theme -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.theme"></div>
    <div class="settings-row">
      <div class="toggle-group" id="themeToggle">
        <button data-val="dark" data-s="settings.theme.dark"></button>
        <button data-val="light" data-s="settings.theme.light"></button>
        <button data-val="auto" data-s="settings.theme.auto"></button>
      </div>
    </div>
  </div>

  <!-- Privacy -->
  <div class="settings-section" data-member-only>
    <div class="settings-section-title" data-s="settings.privacy"></div>
    <div class="pill-grid">
      <label class="pill-toggle"><input type="checkbox" id="svSharePhoneVol"><span data-s="settings.sharePhoneVol"></span></label>
    </div>
    <div class="settings-hint" data-s="settings.sharePhoneVolHint"></div>
  </div>

  <!-- Sign-in -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.signIn"></div>

    <!-- Username style (display preference) -->
    <div class="settings-row mb-12">
      <label data-s="settings.usernameStyle" for="sCurrentPw"></label>
      <div class="toggle-group" id="usernameStyleToggle">
        <button data-val="kt" data-s="settings.usernameStyle.kt"></button>
        <button data-val="initials" data-s="settings.usernameStyle.initials"></button>
      </div>
    </div>
    <div class="settings-hint mb-10" data-s="settings.usernameStyleHint"></div>

    <!-- Stay logged in -->
    <div class="pill-grid">
      <label class="pill-toggle"><input type="checkbox" id="svStayLoggedIn"><span data-s="settings.stayLoggedIn"></span></label>
    </div>
    <div class="settings-hint mb-10" data-s="settings.stayLoggedInHint"></div>

    <!-- Google link -->
    <div id="googleLinkSection" class="settings-row flex-col gap-6 mt-12 d-none" style="align-items:stretch">
      <label data-s="settings.googleAccount"></label>
      <div id="googleLinkedRow" class="d-none d-flex items-center gap-8 flex-wrap">
        <span class="text-sm" id="googleLinkedEmail"></span>
        <button class="btn btn-ghost" type="button" id="googleUnlinkBtn" data-s="settings.googleUnlink"></button>
      </div>
      <div id="googleUnlinkedRow" class="d-none">
        <div id="googleLinkBtn"></div>
      </div>
      <div class="settings-hint" data-s="settings.googleAccountHint"></div>
      <div id="googleMsg" class="msg d-none mt-8 text-xs"></div>
    </div>

    <!-- Password change -->
    <div class="settings-row flex-col gap-6 mt-12" style="align-items:stretch">
      <label data-s="settings.currentPassword"></label>
      <input type="password" id="sCurrentPw" autocomplete="current-password" class="w-full text-base" style="text-align:left;letter-spacing:normal;text-transform:none;padding:8px 10px">
    </div>
    <div class="settings-row flex-col gap-6" style="align-items:stretch">
      <label data-s="settings.newPassword" for="sNewPw"></label>
      <input type="password" id="sNewPw" autocomplete="new-password" class="w-full text-base" style="text-align:left;letter-spacing:normal;text-transform:none;padding:8px 10px">
    </div>
    <div class="settings-row flex-col gap-6 mb-6" style="align-items:stretch">
      <label data-s="settings.confirmPassword" for="sConfirmPw"></label>
      <input type="password" id="sConfirmPw" autocomplete="new-password" class="w-full text-base" style="text-align:left;letter-spacing:normal;text-transform:none;padding:8px 10px">
    </div>
    <div class="settings-row">
      <button class="btn btn-ghost" type="button" id="changePwBtn" data-s="settings.changePassword"></button>
    </div>
    <div class="settings-hint" data-s="settings.passwordHint"></div>
    <div id="pwMsg" class="msg d-none mt-8 text-xs"></div>
  </div>

  <!-- Sign-in activity -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.signInActivity"></div>
    <div class="settings-hint mb-10" style="margin-top:0" data-s="settings.signInActivityHint"></div>
    <div id="sessionList" class="d-flex flex-col gap-8"></div>
    <div class="settings-row mt-10">
      <button class="btn btn-ghost" type="button" id="signOutAllBtn" data-s="settings.signOutEverywhereElse"></button>
    </div>
    <div id="sessionMsg" class="msg d-none mt-8 text-xs"></div>
  </div>

  <!-- Logbook page -->
  <div class="settings-section">
    <div class="settings-section-title" data-s="settings.logbookPage"></div>
    <div class="pill-grid">
      <label class="pill-toggle"><input type="checkbox" id="svShowHeatmap"><span data-s="settings.showHeatmap"></span></label>
    </div>
    <div class="settings-hint" data-s="settings.showHeatmapHint"></div>
  </div>

  <!-- Stats visibility -->
  <div class="settings-section" data-member-only>
    <div class="settings-section-title" data-s="settings.stats"></div>
    <div class="settings-hint mb-10" style="margin-top:0" data-s="settings.statsHint"></div>

    <div class="stat-group-label" data-s="settings.statsGroup.activity"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svCareer" checked><span data-s="settings.stats.career"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svHours" checked><span data-s="settings.stats.hours"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svYtd" checked><span data-s="settings.stats.ytd"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svStreak" checked><span data-s="settings.stats.streak"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.sailing"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svDistance" checked><span data-s="settings.stats.distance"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svLongest" checked><span data-s="settings.stats.longest"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svAvgDuration" checked><span data-s="settings.stats.avgDuration"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.roles"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svSkipper" checked><span data-s="settings.stats.skipper"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svCrew" checked><span data-s="settings.stats.crew"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svHelmHours" checked><span data-s="settings.stats.helmHours"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svStudent" checked><span data-s="settings.stats.student"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svBoats" checked><span data-s="settings.stats.boats"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svFavBoat" checked><span data-s="settings.stats.favBoat"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svByCategory" checked><span data-s="settings.stats.byCategory"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.conditions"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svAvgWind" checked><span data-s="settings.stats.avgWind"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svPeakWind" checked><span data-s="settings.stats.peakWind"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svHeavy" checked><span data-s="settings.stats.heavy"></span></label>
    </div>

    <div class="stat-group-label" data-s="settings.statsGroup.other"></div>
    <div class="pill-grid">
      <label class="pill-toggle active"><input type="checkbox" id="svLocations" checked><span data-s="settings.stats.locations"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svFavLocation" checked><span data-s="settings.stats.favLocation"></span></label>
      <label class="pill-toggle active"><input type="checkbox" id="svVerified" checked><span data-s="settings.stats.verified"></span></label>
    </div>
  </div>

  <!-- Save -->
  <div class="save-bar">
    <button class="btn btn-ghost" id="cancelBtn" data-s="btn.cancel"></button>
    <button class="btn btn-primary" id="saveBtn" data-s="btn.saveClose"></button>
  </div>
</div>
</div>

<script src="settings.js" defer></script>
</body>
</html>
