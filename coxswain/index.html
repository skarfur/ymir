<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Coxswain's Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/certs.js"></script>
<script src="../shared/maintenance.js"></script>
<style>
/* ── Stats ── */
.cx-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.cx-stat { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 12px; text-align:center; }
.cx-stat .sn { font-size:24px; color:var(--brass); font-weight:500; }
.cx-stat .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Section headers ── */
.cx-section { margin-bottom:20px; }
.cx-section-hdr { font-size:9px; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }

/* ── Cards ── */
.cx-card { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; }

/* ── Boats ── */
.cx-boat { display:flex; justify-content:space-between; align-items:flex-start;
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
.cx-boat-name { font-size:13px; font-weight:500; color:var(--text); }
.cx-boat-sub  { font-size:11px; color:var(--muted); margin-top:3px; }
.cx-boat-actions { margin-left:auto; display:flex; gap:6px; }
.cx-boat-actions button { font-size:10px; font-family:inherit; padding:4px 10px; border-radius:6px;
  cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); }
.cx-boat-actions button:hover { border-color:var(--brass); color:var(--brass); }

/* ── Trips ── */
.cx-trip { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; margin-bottom:6px; }

/* ── Read-only banner ── */
.cx-readonly { font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:8px 12px; margin-bottom:12px; text-align:center; }

/* ── Responsive ── */
@media(max-width:600px){
  .cx-stats { grid-template-columns:1fr 1fr; }
  .cx-stat .sn { font-size:20px; }
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="cxTitle"></div>
    <div class="text-sm text-muted" style="margin-top:2px" id="cxSubtitle"></div>
  </div>

  <!-- Read-only banner for non-coxswain rowers -->
  <div class="cx-readonly hidden" id="cxReadOnly" data-s="cox.readOnly"></div>

  <!-- ══ YTD STATS ══ -->
  <div class="cx-stats" id="cxStats">
    <div class="cx-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cox.statsTrips"></div></div>
    <div class="cx-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cox.statsHours"></div></div>
    <div class="cx-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cox.statsDist"></div></div>
  </div>

  <!-- ══ BOAT AVAILABILITY ══ -->
  <div class="cx-section" id="sectBoats">
    <div class="cx-section-hdr" data-s="cox.boatAvailability"></div>
    <div id="boatList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ MAINTENANCE ══ -->
  <div class="cx-section" id="sectMaint">
    <div class="cx-section-hdr" data-s="cox.maintenance"></div>
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ TRIPS ══ -->
  <div class="cx-section" id="sectTrips">
    <div class="cx-section-hdr" data-s="cox.trips"></div>
    <div id="tripList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ BIO & PROFILE (coxswains only) ══ -->
  <div class="cx-section hidden" id="sectBio">
    <div class="cx-section-hdr" data-s="cox.bio"></div>
    <div class="cx-card">
      <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:12px">
        <div id="headshotWrap">
          <div class="cq-headshot-placeholder" id="headshotPlaceholder">+</div>
        </div>
        <div style="flex:1">
          <label style="font-size:9px;color:var(--muted);letter-spacing:.8px;display:block;margin-bottom:6px">Profile photo (max 5 MB)</label>
          <input type="file" id="headshotFile" accept="image/*" style="font-size:11px;color:var(--text);width:100%">
        </div>
      </div>
      <textarea style="width:100%;min-height:80px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:inherit;font-size:12px;color:var(--text);resize:vertical" id="bioText" maxlength="500"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" onclick="saveBio()" data-s="btn.save"></button>
      </div>
    </div>
  </div>

</div>

<!-- ══ RESERVATION MODAL ══ -->
<div class="modal-overlay hidden" id="resModal" onclick="if(event.target===this)closeModal('resModal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="boat.addReservation"></h3>
      <button class="modal-close-x" onclick="closeModal('resModal')">×</button>
    </div>
    <div class="field">
      <label data-s="cq.resMember">Member</label>
      <div style="position:relative">
        <input type="text" id="cxResMemberSearch" autocomplete="off" placeholder="" oninput="searchCxResMember(this.value)">
        <div id="cxResMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="cxResMemberKt">
        <div id="cxResMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label data-s="cq.resStartDate">Start</label><input type="date" id="cxResStart"></div>
      <div class="field"><label data-s="cq.resEndDate">End</label><input type="date" id="cxResEnd"></div>
    </div>
    <div class="field"><label data-s="cq.resNote">Note</label><input type="text" id="cxResNote"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('resModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="saveCxReservation()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
const user = requireAuth();
if (!user || !hasRowingEndorsement(user)) { window.location.href = '../member/'; throw new Error('No rowing endorsement'); }

const _isCoxswain = isCoxswain(user);
var _boats = [], _locations = [], _members = [], _allMaint = [], _allTrips = [];

// ══ INIT ═════════════════════════════════════════════════════════════════════
(async function init() {
  applyTheme();
  buildHeader(document.getElementById('ym-header'), {
    title: s('cox.title'),
    back: '../member/',
    theme: true,
    lang: true,
    signOut: true,
  });
  document.getElementById('cxTitle').textContent = s('cox.title');
  document.getElementById('cxSubtitle').textContent = user.name;

  // Show read-only banner for non-coxswain rowers
  if (!_isCoxswain) {
    document.getElementById('cxReadOnly').classList.remove('hidden');
  } else {
    document.getElementById('sectBio').classList.remove('hidden');
  }

  try {
    const [cfgRes, maintRes, tripsRes, membersRes] = await Promise.all([
      apiGet('getConfig'),
      apiGet('getMaintenance'),
      apiGet('getTrips', { limit: 500 }),
      apiGet('getMembers'),
    ]);

    _boats     = (cfgRes.boats     || []);
    _locations = (cfgRes.locations || []).filter(l => l.active !== false && l.active !== 'false');
    _members   = (membersRes.members || []).filter(m => m.active !== false && m.active !== 'false');
    _allMaint  = maintRes.items || maintRes.maintenance || [];

    if (cfgRes.boatCategories) registerBoatCats(cfgRes.boatCategories);

    // Filter trips to rowing shell category
    var allTripsRaw = tripsRes.trips || [];
    _allTrips = allTripsRaw.filter(t => (t.boatCategory || '').toLowerCase() === 'rowing shell');

    renderStats();
    renderBoats();
    renderMaint();
    renderTrips();

    if (_isCoxswain) {
      renderBio();
    }

    applyStrings();
    warmContainer();
  } catch (e) {
    showToast(e.message, 'err');
  }
})();

// ══ STATS ════════════════════════════════════════════════════════════════════
function renderStats() {
  var now = new Date();
  var yearStart = now.getFullYear() + '-01-01';
  var myTrips = _allTrips.filter(t => String(t.kennitala) === String(user.kennitala) && t.date >= yearStart);
  var totalHrs = 0;
  myTrips.forEach(t => { totalHrs += parseFloat(t.hoursDecimal || 0); });
  document.getElementById('statTrips').textContent = myTrips.length;
  document.getElementById('statHours').textContent = totalHrs.toFixed(1);
  document.getElementById('statDist').textContent = '—';
}

// ══ BOAT AVAILABILITY ════════════════════════════════════════════════════════
function renderBoats() {
  var el = document.getElementById('boatList');
  // Show rowing shell boats that are controlled-access with a coxswain gate cert,
  // or have reservations for this user, or the user can access
  var rowingBoats = _boats.filter(b => {
    var cat = (b.category || '').toLowerCase();
    if (cat !== 'rowing shell') return false;
    // Show controlled-access rowing shells
    if (b.accessMode === 'controlled') return true;
    // Show any rowing shell this user has a reservation for
    if (b.reservations && b.reservations.some(r => String(r.memberKennitala) === String(user.kennitala))) return true;
    return false;
  });

  if (!rowingBoats.length) {
    el.innerHTML = '<div class="empty-note">' + s('cox.noBoats') + '</div>';
    return;
  }

  el.innerHTML = rowingBoats.map(b => {
    var isOos = boolVal(b.oos);
    var portName = '';
    if (b.defaultPortId) { var loc = _locations.find(l => l.id === b.defaultPortId); if (loc) portName = loc.name; }
    var isControlled = b.accessMode === 'controlled';

    // Reservation list
    var resHtml = '';
    if (b.reservations && b.reservations.length) {
      resHtml = '<div style="margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px">' + s('cq.reservations') + '</div>';
      resHtml += b.reservations.map(r => {
        var removeBtn = _isCoxswain
          ? '<button style="font-size:10px;background:none;border:none;color:var(--red);cursor:pointer" onclick="removeCxReservation(\'' + esc(b.id) + '\',\'' + esc(r.id) + '\')">&times;</button>'
          : '';
        return '<div style="font-size:11px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center">'
          + '<span>' + esc(r.memberName) + ' · ' + esc(r.startDate) + ' → ' + esc(r.endDate)
          + (r.note ? ' · <span style="color:var(--muted)">' + esc(r.note) + '</span>' : '') + '</span>'
          + removeBtn
          + '</div>';
      }).join('');
    }

    // Actions — only for coxswains
    var actionsHtml = '';
    if (_isCoxswain) {
      actionsHtml = '<div class="cx-boat-actions">'
        + '<button onclick="toggleBoatOos(\'' + esc(b.id) + '\',' + !isOos + ')">' + s(isOos ? 'cq.makeAvailable' : 'cq.makeUnavailable') + '</button>'
        + '<button onclick="openResModal(\'' + esc(b.id) + '\')">' + s('cq.addReservation') + '</button>'
        + '</div>';
    }

    return '<div class="cx-boat">'
      + '<div>'
        + '<div class="cx-boat-name">' + esc(boatEmoji(b.category)) + ' ' + esc(b.name)
          + (isControlled ? ' <span style="font-size:8px;letter-spacing:.5px;padding:2px 6px;border-radius:10px;border:1px solid var(--brass)44;background:var(--brass)11;color:var(--brass)">' + esc(s('fleet.badgeControlled')) + '</span>' : '')
        + '</div>'
        + '<div class="cx-boat-sub">'
          + (isOos ? '<span style="color:var(--red)">OUT OF SERVICE</span>' : '<span style="color:var(--green)">AVAILABLE</span>')
          + (portName ? ' · ' + esc(portName) : '')
        + '</div>'
      + '</div>'
      + actionsHtml
      + resHtml
    + '</div>';
  }).join('');
}

async function toggleBoatOos(boatId, oos) {
  try {
    var cfgRes = await apiGet('getConfig', { _fresh: true });
    var boats = cfgRes.boats || [];
    var idx = boats.findIndex(b => b.id === boatId);
    if (idx >= 0) {
      boats[idx].oos = oos;
      await apiPost('saveConfig', { boats: boats });
      _boats = boats;
      renderBoats();
      showToast(s('toast.saved'), 'ok');
    }
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ RESERVATION MANAGEMENT ═══════════════════════════════════════════════════
var _resBoatId = null;

function openResModal(boatId) {
  _resBoatId = boatId;
  document.getElementById('cxResMemberKt').value = '';
  document.getElementById('cxResMemberSearch').value = '';
  document.getElementById('cxResMemberName').textContent = '';
  document.getElementById('cxResMemberSuggestions').innerHTML = '';
  document.getElementById('cxResStart').value = '';
  document.getElementById('cxResEnd').value = '';
  document.getElementById('cxResNote').value = '';
  openModal('resModal');
}

function searchCxResMember(q) {
  var drop = document.getElementById('cxResMemberSuggestions');
  if (!q || q.length < 2) { drop.innerHTML=''; drop.style.display='none'; return; }
  var ql = q.toLowerCase();
  var hits = _members.filter(m => (m.name||'').toLowerCase().includes(ql)).slice(0, 8);
  if (!hits.length) { drop.innerHTML=''; drop.style.display='none'; return; }
  drop.innerHTML = hits.map(m => '<div class="suggest-item" style="padding:6px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" '
    + 'onclick="selectCxResMember(\'' + esc(m.kennitala) + '\',\'' + esc(m.name) + '\')">' + esc(m.name) + '</div>').join('');
  drop.style.display = 'block';
}

function selectCxResMember(kt, name) {
  document.getElementById('cxResMemberKt').value = kt;
  document.getElementById('cxResMemberSearch').value = '';
  document.getElementById('cxResMemberName').textContent = name;
  document.getElementById('cxResMemberSuggestions').innerHTML = '';
  document.getElementById('cxResMemberSuggestions').style.display = 'none';
}

async function saveCxReservation() {
  if (!_resBoatId) return;
  var kt = document.getElementById('cxResMemberKt').value;
  var name = document.getElementById('cxResMemberName').textContent;
  var start = document.getElementById('cxResStart').value;
  var end = document.getElementById('cxResEnd').value;
  var note = document.getElementById('cxResNote').value.trim();
  if (!kt || !name || !start || !end) { showToast('Member and dates required.', 'err'); return; }
  try {
    var res = await apiPost('saveReservation', { boatId: _resBoatId, memberKennitala: kt, memberName: name, startDate: start, endDate: end, note: note });
    var b = _boats.find(x => x.id === _resBoatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    closeModal('resModal');
    renderBoats();
    showToast(s('boat.reservationSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

async function removeCxReservation(boatId, resId) {
  if (!confirm(s('boat.removeReservation') + '?')) return;
  try {
    var res = await apiPost('removeReservation', { boatId: boatId, reservationId: resId });
    var b = _boats.find(x => x.id === boatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    renderBoats();
    showToast(s('boat.reservationRemoved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ MAINTENANCE ══════════════════════════════════════════════════════════════
function renderMaint() {
  var el = document.getElementById('maintList');
  var rowingBoatIds = _boats.filter(b => (b.category || '').toLowerCase() === 'rowing shell').map(b => b.id);
  var items = _allMaint.filter(m => rowingBoatIds.indexOf(m.boatId) !== -1 && m.status !== 'resolved');
  if (!items.length) {
    el.innerHTML = '<div class="empty-note">' + s('cq.noMaint') + '</div>';
    return;
  }
  el.innerHTML = items.map(m => {
    var sevClass = 'sev-' + (m.severity || 'low');
    return '<div class="cx-card">'
      + '<div style="font-size:12px;font-weight:500;color:var(--text)"><span class="sev-dot ' + sevClass + '"></span>' + esc(m.boatName || '') + '</div>'
      + '<div style="font-size:11px;color:var(--muted);margin-top:3px">' + esc(m.description || m.title || '') + '</div>'
      + '<div style="font-size:10px;color:var(--muted);margin-top:2px">' + esc(m.reportedBy || '') + ' · ' + fmtDate(m.createdAt) + '</div>'
      + '</div>';
  }).join('');
}

// ══ TRIPS ════════════════════════════════════════════════════════════════════
function renderTrips() {
  var el = document.getElementById('tripList');
  var myTrips = _allTrips.filter(t => String(t.kennitala) === String(user.kennitala));
  myTrips.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (!myTrips.length) {
    el.innerHTML = '<div class="empty-note">' + s('cq.noTrips') + '</div>';
    return;
  }
  el.innerHTML = myTrips.slice(0, 50).map(t => {
    var d = t.date ? new Date(t.date) : null;
    var dayStr = d ? d.getDate() : '';
    var monStr = d ? d.toLocaleDateString('en-GB', { month: 'short' }) : '';
    return '<div class="cx-trip">'
      + '<div style="display:flex;gap:10px;align-items:center">'
        + '<div style="text-align:center;min-width:36px"><div style="font-size:16px;font-weight:500;color:var(--brass)">' + dayStr + '</div><div style="font-size:9px;color:var(--muted);letter-spacing:.5px">' + monStr + '</div></div>'
        + '<div style="flex:1">'
          + '<div style="font-size:12px;color:var(--text)">' + esc(boatEmoji(t.boatCategory)) + ' ' + esc(t.boatName || '') + '</div>'
          + '<div style="font-size:10px;color:var(--muted)">' + esc(t.locationName || '') + (t.hoursDecimal ? ' · ' + parseFloat(t.hoursDecimal).toFixed(1) + ' hrs' : '') + '</div>'
        + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ══ BIO ══════════════════════════════════════════════════════════════════════
function renderBio() {
  document.getElementById('bioText').value = user.bio || '';
  var headshot = user.headshotUrl;
  if (headshot) {
    document.getElementById('headshotPlaceholder').innerHTML = '<img src="' + esc(headshot) + '" style="width:64px;height:64px;border-radius:50%;object-fit:cover">';
  }
  document.getElementById('headshotFile').onchange = async function() {
    var file = this.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('File too large (max 5 MB)', 'err'); return; }
    var reader = new FileReader();
    reader.onload = async function(ev) {
      try {
        var res = await apiPost('uploadHeadshot', { kennitala: user.kennitala, fileData: ev.target.result, fileName: file.name, mimeType: file.type });
        if (res.headshotUrl) {
          user.headshotUrl = res.headshotUrl;
          setUser(user);
          document.getElementById('headshotPlaceholder').innerHTML = '<img src="' + esc(res.headshotUrl) + '" style="width:64px;height:64px;border-radius:50%;object-fit:cover">';
          showToast(s('cq.headshotUploaded'), 'ok');
        }
      } catch (e) { showToast(e.message, 'err'); }
    };
    reader.readAsDataURL(file);
  };
}

async function saveBio() {
  var bio = document.getElementById('bioText').value.trim();
  try {
    await apiPost('saveCaptainBio', { kennitala: user.kennitala, bio: bio });
    user.bio = bio;
    setUser(user);
    showToast(s('cq.bioSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}
</script>
</body>
</html>
