<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Coxswain's Seat</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js" defer></script>
<script src="../shared/ui.js" defer></script>
<script src="../shared/layout.js" defer></script>
<script src="../shared/strings.js"></script>
<script src="../shared/calendar.js" defer></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/maintenance.js" defer></script>
<link rel="stylesheet" href="coxswain.css">
</head>
<body>
<ymir-header></ymir-header>

<div class="page-content">

  <div class="mb-14">
    <div class="fw-500" style="font-size:16px;color:var(--text)" id="cxTitle"></div>
    <div class="text-sm text-muted mt-2" id="cxSubtitle"></div>
  </div>

  <!-- Read-only banner for non-released rowers -->
  <div class="cx-readonly hidden" id="cxReadOnly" data-s="cox.readOnly"></div>

  <!-- ══ YTD STATS ══ -->
  <div class="cx-stats no-orphans-3 no-orphans-sm-2" id="cxStats">
    <div class="cx-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cox.statsTrips"></div></div>
    <div class="cx-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cox.statsHours"></div></div>
    <div class="cx-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cox.statsDist"></div></div>
  </div>

  <!-- ══ TAB BAR ══ -->
  <div class="cx-tab-bar" id="cxTabBar">
    <button class="cx-tab-btn active" data-tab="crews"    data-cx-click="showCxTab" data-cx-arg="crews"    data-s="cox.tabCrews"></button>
    <button class="cx-tab-btn"        data-tab="passport" data-cx-click="showCxTab" data-cx-arg="passport" data-s="cox.tabPassport"></button>
  </div>

  <!-- ══ TAB: CREWS & SLOTS ══ -->
  <div id="cxTab-crews">

    <!-- ══ MAINTENANCE ══ -->
    <div class="cx-section" id="sectMaint">
      <div class="cx-section-hdr" data-s="cox.maintenance"></div>
      <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- ══ CREW BOARD ══ -->
    <div class="cx-section" id="sectCrews">
      <div class="cx-section-hdr" data-s="cox.crewBoard">CREW BOARD</div>
      <div id="crewInviteList"></div>
      <div id="crewBoardList"><div class="empty-note" data-s="lbl.loading"></div></div>
      <div class="mt-8">
        <button class="btn btn-primary text-xs" data-cx-click="openCrewModal" data-s="cox.createCrew">+ Create Crew</button>
      </div>
    </div>

    <!-- ══ SLOT RESERVATIONS ══ -->
    <div class="cx-section d-none" id="sectSlots">
      <div class="cx-section-hdr" data-s="cox.slotReservations">SLOT RESERVATIONS</div>
      <div class="d-flex items-center gap-8 mb-10 flex-wrap">
        <label data-s="slot.filterBoat" class="text-10 text-muted" style="text-transform:uppercase;letter-spacing:.5px" for="cxSlotBoat">Boat</label>
        <select id="cxSlotBoat" data-cx-change="loadCxSlots" class="filter-select"></select>
        <label data-s="slot.filterCrew" class="text-10 text-muted" style="text-transform:uppercase;letter-spacing:.5px" for="cxSlotCrew">Crew</label>
        <select id="cxSlotCrew" data-cx-change="renderCxSlots" class="filter-select"></select>
        <div class="slot-week-nav">
          <button class="btn btn-secondary" data-cx-click="shiftCxWeek" data-cx-arg="-1">&larr;</button>
          <span id="cxWeekLabel" class="week-label"></span>
          <button class="btn btn-secondary" data-cx-click="shiftCxWeek" data-cx-arg="1">&rarr;</button>
          <button class="btn btn-secondary" data-cx-click="cxWeekToday" data-s="slot.today">Today</button>
          <button class="btn btn-primary" data-s="slot.bulkBook" data-s-attr="title" data-cx-click="openCxBulkBookModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="18" r="1" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.bulkBook">Bulk Book</span></button>
        </div>
      </div>
      <div id="cxSlotGrid" style="overflow-x:auto"></div>
      <div class="mt-8 d-flex gap-12 text-10 text-muted flex-wrap">
        <span><span class="d-inline-block bg-surface border-muted" style="width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendOpen">Open</span></span>
        <span><span class="d-inline-block" style="width:10px;height:10px;background:var(--accent);border-radius:2px;margin-right:4px;vertical-align:middle;box-shadow:inset 0 0 0 2px var(--bg)"></span> <span data-s="slot.legendYours">Yours</span></span>
        <span><span class="d-inline-block" style="width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendBooked">Booked</span></span>
        <span><span class="d-inline-block" style="width:10px;height:10px;background:var(--green);border:1px dashed var(--bg);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="cox.tentative">Tentative</span></span>
      </div>
    </div>

  </div><!-- /cxTab-crews -->

  <!-- ══ TAB: PASSPORT ══ -->
  <div id="cxTab-passport" class="hidden">
    <div class="cx-section" id="sectPassport">
      <div class="cx-section-hdr" data-s="passport.title">ROWING PASSPORT</div>
      <div id="passportPicker" class="hidden mb-10 pos-relative">
        <div class="d-flex gap-8 items-center flex-wrap">
          <label class="text-10 text-muted" style="letter-spacing:.5px" data-s="passport.viewMember" for="ppMemberSearch">VIEW MEMBER</label>
          <input type="text" id="ppMemberSearch" autocomplete="off" placeholder="" data-cx-input-val="ppSearchMember" class="text-xs flex-1" style="min-width:160px">
          <button class="btn btn-secondary btn-sm" data-cx-click="ppViewSelf" data-s="passport.viewSelf">My passport</button>
        </div>
        <div id="ppMemberSuggestions" class="suggest-drop hidden border-muted rounded-6 mt-2" style="position:absolute;left:0;right:0;top:100%;z-index:10;background:var(--card);max-height:240px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.2)"></div>
        <div id="ppCurrentTarget" class="text-10 text-accent mt-4"></div>
      </div>
      <div id="passportProgressBar" class="bg-surface border-muted overflow-hidden mb-10" style="height:6px;border-radius:3px">
        <div id="passportProgressFill" style="height:100%;width:0%;background:var(--accent);transition:width .3s"></div>
      </div>
      <div id="passportProgressLabel" class="text-10 text-muted mb-10" style="letter-spacing:.5px"></div>
      <div id="passportSignerBanner" class="hidden text-10 text-accent bg-surface border-muted rounded-6 mb-10" style="padding:6px 10px" data-s="passport.signerMode">Sign-off mode — tap items to sign.</div>
      <div id="passportSortBar" class="d-flex gap-6 items-center mb-10 flex-wrap">
        <span class="text-9 text-muted" style="letter-spacing:.5px;text-transform:uppercase" data-s="passport.sortBy">Sort by</span>
        <button class="btn btn-secondary btn-sm" id="ppSortCatMod" data-cx-click="ppSetSortMode" data-cx-arg="cat-mod" data-s="passport.sortCatMod">Category → Module</button>
        <button class="btn btn-secondary btn-sm" id="ppSortModCat" data-cx-click="ppSetSortMode" data-cx-arg="mod-cat" data-s="passport.sortModCat">Module → Category</button>
      </div>
      <div id="passportCategories"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>
  </div><!-- /cxTab-passport -->

</div>

<!-- ══ BULK BOOK MODAL ══ -->
<div class="modal-overlay hidden" id="cxBulkBookModal" data-cx-close-self>
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 data-s="slot.bulkTitle">Bulk Book Slots</h3>
      <button class="modal-close-x" data-cx-close="cxBulkBookModal">&times;</button>
    </div>
    <div class="field">
      <label data-s="slot.daysOfWeek" for="cxBbStartTime">Days of week</label>
      <div id="cxBbDays" class="d-flex gap-6 flex-wrap">
        <label class="text-xs"><input type="checkbox" value="1"> <span data-s="day.mon">Mon</span></label>
        <label class="text-xs"><input type="checkbox" value="2"> <span data-s="day.tue">Tue</span></label>
        <label class="text-xs"><input type="checkbox" value="3"> <span data-s="day.wed">Wed</span></label>
        <label class="text-xs"><input type="checkbox" value="4"> <span data-s="day.thu">Thu</span></label>
        <label class="text-xs"><input type="checkbox" value="5"> <span data-s="day.fri">Fri</span></label>
        <label class="text-xs"><input type="checkbox" value="6"> <span data-s="day.sat">Sat</span></label>
        <label class="text-xs"><input type="checkbox" value="0"> <span data-s="day.sun">Sun</span></label>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="slot.startTime">Start time</label><input type="time" id="cxBbStartTime"></div>
      <div class="field"><label data-s="slot.endTime" for="cxBbEndTime">End time</label><input type="time" id="cxBbEndTime"></div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="slot.fromDate" for="cxBbFromDate">From date</label><input type="date" id="cxBbFromDate"></div>
      <div class="field"><label data-s="slot.toDate" for="cxBbToDate">To date</label><input type="date" id="cxBbToDate"></div>
    </div>
    <div id="cxBbPreview" class="text-10 text-muted mb-8"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cx-click="previewCxBulkBook" data-s="slot.preview">Preview</button>
      <button class="btn btn-primary" data-cx-click="submitCxBulkBook" data-s="slot.bulkBook">Bulk Book</button>
    </div>
  </div>
</div>

<!-- ══ CREW CREATION MODAL ══ -->
<div class="modal-overlay hidden" id="crewModal" data-cx-close-self>
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="cox.createCrewTitle">Create Crew</h3>
      <button class="modal-close-x" data-cx-close="crewModal">×</button>
    </div>
    <div class="field">
      <label data-s="cox.crewName" for="cmCrewName">Crew name</label>
      <input type="text" id="cmCrewName" placeholder="e.g., Thunderbolts" class="text-md">
    </div>
    <div class="field">
      <label data-s="cox.description" for="cmDescription">Description</label>
      <input type="text" id="cmDescription" class="text-md" data-placeholder-s="cox.descPlaceholder" placeholder="e.g., Mon & Wed 7am, casual pace">
    </div>
    <div class="gap-8" style="display:grid;grid-template-columns:1fr 1fr">
      <div class="field">
        <label data-s="cox.numBoats" for="cmNumPairs">Number of boats</label>
        <select id="cmNumPairs" class="text-md">
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div class="field">
        <label data-s="cox.visibility" for="cmVisibility">Visibility</label>
        <select id="cmVisibility" class="text-md">
          <option value="open" data-s="cox.visOpen">Open — anyone can join</option>
          <option value="invite_only" data-s="cox.visInvite">Invite only</option>
        </select>
      </div>
    </div>
    <div class="gap-8" style="display:grid;grid-template-columns:1fr 1fr">
      <div class="field">
        <label data-s="cox.boat" for="cmMyPair">Boat</label>
        <select id="cmMyPair" class="text-md">
          <option value="0">Boat 1</option>
          <option value="1">Boat 2</option>
        </select>
      </div>
      <div class="field">
        <label data-s="cox.yourSeat" for="cmMySeat">Your seat</label>
        <select id="cmMySeat" class="text-md">
          <option value="0" data-s="cox.seatBow">Bow</option>
          <option value="1" data-s="cox.seatStern">Stern</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label data-s="cox.crewColor" for="ciPairId">Color</label>
      <div class="d-flex items-center gap-8">
        <input type="color" id="cmColor" class="border-muted rounded-6 bg-surface cursor-pointer" style="width:32px;height:32px;padding:2px">
        <div id="cmColorPicker" class="d-flex flex-wrap" style="gap:5px"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cx-close="crewModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cx-click="createNewCrew" data-s="cox.createCrew">Create</button>
    </div>
  </div>
</div>

<!-- ══ CREW INVITE MODAL ══ -->
<div class="modal-overlay hidden" id="crewInvModal" data-cx-close-self>
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="cox.inviteMember">Invite Member</h3>
      <button class="modal-close-x" data-cx-close="crewInvModal">×</button>
    </div>
    <div class="field">
      <label data-s="cox.searchMember">Member</label>
      <div class="pos-relative">
        <input type="text" id="ciMemberSearch" autocomplete="off" placeholder="" data-cx-input-val="searchCrewInvMember">
        <div id="ciMemberSuggestions" class="suggest-drop pos-relative"></div>
        <input type="hidden" id="ciMemberKt">
        <div id="ciMemberName" class="text-10 text-muted mt-3"></div>
      </div>
    </div>
    <div class="field">
      <label data-s="cox.pairAssignment">Pair</label>
      <select id="ciPairId" class="text-md"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cx-close="crewInvModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cx-click="sendCrewInvite" data-s="cox.sendInvite">Send Invite</button>
    </div>
  </div>
</div>

<script src="coxswain.js" defer></script>
</body>
</html>
