<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Coxswain's Seat</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/calendar.js" defer></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/certs.js" defer></script>
<script src="../shared/maintenance.js" defer></script>
<style>
/* ── Stats ── */
.cx-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.cx-stat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px 12px; text-align:center; box-shadow:var(--shadow-sm); }
.cx-stat .sn { font-size:24px; color:var(--brass-fg); font-weight:500; }
.cx-stat .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Tab bar ── */
.cx-tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:16px; overflow-x:auto; }
.cx-tab-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted);
  font-family:inherit; font-size:11px; letter-spacing:.6px; padding:10px 16px; cursor:pointer;
  white-space:nowrap; transition:color .2s,border-color .2s; text-transform:uppercase; margin-bottom:-1px; }
.cx-tab-btn.active { color:var(--brass-fg); border-bottom-color:var(--brass); }
.cx-tab-btn:hover:not(.active) { color:var(--text); }

/* ── Section headers ── */
.cx-section { margin-bottom:20px; }
.cx-section-hdr { font-size:9px; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }

/* ── Cards ── */
.cx-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:12px 14px; margin-bottom:8px; box-shadow:var(--shadow-sm); }

/* ── Boats ── */
.cx-boat { display:flex; justify-content:space-between; align-items:flex-start;
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:12px 14px; margin-bottom:8px; flex-wrap:wrap; gap:8px; box-shadow:var(--shadow-sm); }
.cx-boat-name { font-size:13px; font-weight:500; color:var(--text); }
.cx-boat-sub  { font-size:11px; color:var(--muted); margin-top:3px; }
.cx-boat-actions { margin-left:auto; display:flex; gap:6px; }
.cx-boat-actions button { font-size:10px; font-family:inherit; padding:4px 10px; border-radius:var(--radius-sm);
  cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); transition:color .2s,border-color .2s,background .2s; }
.cx-boat-actions button:hover { border-color:var(--brass); color:var(--brass-fg); background:var(--brass)08; }

/* ── Read-only banner ── */
.cx-readonly { font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:8px 12px; margin-bottom:12px; text-align:center; }

/* ── Crew board ── */
.cb-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.cb-card { background:var(--card); border:3px solid var(--border); border-radius:var(--radius-md); padding:14px;
  box-shadow:var(--shadow-sm); }
.cb-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.cb-name { font-size:13px; font-weight:500; color:var(--text); }
.cb-count { font-size:10px; color:var(--muted); }
.cb-badge { font-size:8px; padding:2px 6px; border-radius:10px; font-weight:500; }
.cb-badge--active { background:var(--green)22; color:var(--green); border:1px solid var(--green)44; }
.cb-badge--forming { background:var(--brass)22; color:var(--brass-fg); border:1px solid var(--brass)44; }
.cb-desc { font-size:11px; color:var(--muted); margin-bottom:8px; font-style:italic; }
.cb-boats { display:flex; gap:8px; flex-wrap:wrap; }
.cb-boat { min-width:70px; flex:1; }
.cb-boat-label { font-size:9px; color:var(--muted); text-align:center; margin-bottom:3px; letter-spacing:.5px; }
.cb-seat { display:flex; align-items:center; gap:4px; height:28px; border:1px solid var(--border);
  font-size:11px; padding:0 8px; overflow:hidden; white-space:nowrap; }
.cb-seat:first-of-type { border-radius:6px 6px 0 0; border-bottom:none; }
.cb-seat:last-of-type { border-radius:0 0 6px 6px; }
.cb-seat--filled { background:var(--surface); color:var(--text); cursor:pointer; }
.cb-seat--you { background:var(--brass)18; color:var(--brass-fg); border-color:var(--brass)66; font-weight:500; cursor:pointer; }
.cb-seat--open { background:transparent; color:var(--muted); border-style:dashed; cursor:pointer; transition:all .15s; }
.cb-seat--open:hover { border-color:var(--brass); color:var(--brass-fg); background:var(--brass)08; }
.cb-seat--expanded { height:auto; min-height:28px; white-space:normal; padding-top:4px; padding-bottom:4px; }
.cb-seat--expanded .cb-seat-name { overflow:visible; text-overflow:clip; white-space:normal; word-break:break-word; line-height:1.2; }
.cb-seat-role { font-size:8px; color:var(--muted); min-width:28px; opacity:.7; }
.cb-seat-name { overflow:hidden; text-overflow:ellipsis; }
.cb-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.cb-needs { font-size:10px; color:var(--brass-fg); margin-top:6px; }
.cb-color-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ── Passport ── */
.pp-cat { margin-bottom:14px; }
.pp-cat-hdr { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.pp-cat-count { font-size:9px; color:var(--brass-fg); }
.pp-item { display:flex; align-items:flex-start; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; margin-bottom:4px; font-size:11px; }
.pp-item-signable { cursor:pointer; transition:border-color .2s; }
.pp-item-signable:hover { border-color:var(--brass); }
.pp-item-complete { border-left:3px solid var(--green); }
.pp-item-icon { font-size:14px; color:var(--brass-fg); width:18px; text-align:center; flex-shrink:0; }
.pp-item-complete .pp-item-icon { color:var(--green); }
.pp-item-body { flex:1; min-width:0; }
.pp-item-name { color:var(--text); font-weight:500; }
.pp-item-desc { color:var(--muted); font-size:10px; margin-top:2px; }
.pp-item-sigs { color:var(--muted); font-size:9px; margin-top:3px; font-style:italic; }
.pp-item-count { font-size:10px; color:var(--muted); flex-shrink:0; }
.pp-asmt { display:inline-block; font-size:8px; padding:1px 6px; border-radius:8px; margin-left:6px; vertical-align:middle; letter-spacing:.5px; text-transform:uppercase; font-weight:500; }
.pp-asmt-practical { background:var(--brass)22; color:var(--brass-fg); border:1px solid var(--brass)44; }
.pp-asmt-theory    { background:var(--surface); color:var(--muted); border:1px solid var(--border); }
.pp-mod { display:inline-block; font-size:8px; padding:1px 6px; border-radius:8px; margin-left:4px; vertical-align:middle; letter-spacing:.5px; text-transform:uppercase; font-weight:500; background:var(--surface); color:var(--brass-fg); border:1px solid var(--brass)44; }
.pp-sortbtn-active { background:var(--brass) !important; color:var(--card) !important; border-color:var(--brass) !important; }
.pp-mod-hdr { font-size:11px; color:var(--brass-fg); font-weight:700; letter-spacing:1px; text-transform:uppercase; margin:10px 0 4px; display:flex; align-items:center; gap:8px; }
.pp-mod-hdr .pp-cat-count { color:var(--muted); font-weight:400; }
.pp-subcat-hdr { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin:6px 0 4px 0; padding-left:8px; border-left:2px solid var(--border); }

/* ── Responsive ── */
@media(max-width:600px){
  .cx-stats { grid-template-columns:1fr 1fr; }
  .cx-stat .sn { font-size:20px; }
  .cb-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="cxTitle"></div>
    <div class="text-sm text-muted" style="margin-top:2px" id="cxSubtitle"></div>
  </div>

  <!-- Read-only banner for non-released rowers -->
  <div class="cx-readonly hidden" id="cxReadOnly" data-s="cox.readOnly"></div>

  <!-- ══ YTD STATS ══ -->
  <div class="cx-stats" id="cxStats">
    <div class="cx-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cox.statsTrips"></div></div>
    <div class="cx-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cox.statsHours"></div></div>
    <div class="cx-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cox.statsDist"></div></div>
  </div>

  <!-- ══ TAB BAR ══ -->
  <div class="cx-tab-bar" id="cxTabBar">
    <button class="cx-tab-btn active" data-tab="crews"    data-cx-click="showCxTab" data-cx-arg="crews"    data-s="cox.tabCrews"></button>
    <button class="cx-tab-btn"        data-tab="passport" data-cx-click="showCxTab" data-cx-arg="passport" data-s="cox.tabPassport"></button>
  </div>

  <!-- ══ TAB: CREWS & SLOTS ══ -->
  <div id="cxTab-crews">

    <!-- ══ MAINTENANCE ══ -->
    <div class="cx-section" id="sectMaint">
      <div class="cx-section-hdr" data-s="cox.maintenance"></div>
      <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>

    <!-- ══ CREW BOARD ══ -->
    <div class="cx-section" id="sectCrews">
      <div class="cx-section-hdr" data-s="cox.crewBoard">CREW BOARD</div>
      <div id="crewInviteList"></div>
      <div id="crewBoardList"><div class="empty-note" data-s="lbl.loading"></div></div>
      <div style="margin-top:8px">
        <button class="btn btn-primary" style="font-size:11px" data-cx-click="openCrewModal" data-s="cox.createCrew">+ Create Crew</button>
      </div>
    </div>

    <!-- ══ SLOT RESERVATIONS ══ -->
    <div class="cx-section" id="sectSlots" style="display:none">
      <div class="cx-section-hdr" data-s="cox.slotReservations">SLOT RESERVATIONS</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <label data-s="slot.filterBoat" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Boat</label>
        <select id="cxSlotBoat" data-cx-change="loadCxSlots" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:4px 8px"></select>
        <label data-s="slot.filterCrew" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Crew</label>
        <select id="cxSlotCrew" data-cx-change="renderCxSlots" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:4px 8px"></select>
        <div class="slot-week-nav">
          <button class="btn btn-secondary" data-cx-click="shiftCxWeek" data-cx-arg="-1">&larr;</button>
          <span id="cxWeekLabel" class="week-label"></span>
          <button class="btn btn-secondary" data-cx-click="shiftCxWeek" data-cx-arg="1">&rarr;</button>
          <button class="btn btn-secondary" data-cx-click="cxWeekToday" data-s="slot.today">Today</button>
          <button class="btn btn-primary" data-s="slot.bulkBook" data-s-attr="title" data-cx-click="openCxBulkBookModal"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/><circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="18" r="1" fill="currentColor" stroke="none"/></svg><span class="btn-label" data-s="slot.bulkBook">Bulk Book</span></button>
        </div>
      </div>
      <div id="cxSlotGrid" style="overflow-x:auto"></div>
      <div style="margin-top:8px;display:flex;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--surface);border:1px solid var(--border);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendOpen">Open</span></span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--brass);border-radius:2px;margin-right:4px;vertical-align:middle;box-shadow:inset 0 0 0 2px var(--bg)"></span> <span data-s="slot.legendYours">Yours</span></span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendBooked">Booked</span></span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border:1px dashed var(--bg);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="cox.tentative">Tentative</span></span>
      </div>
    </div>

  </div><!-- /cxTab-crews -->

  <!-- ══ TAB: PASSPORT ══ -->
  <div id="cxTab-passport" class="hidden">
    <div class="cx-section" id="sectPassport">
      <div class="cx-section-hdr" data-s="passport.title">ROWING PASSPORT</div>
      <div id="passportPicker" class="hidden" style="margin-bottom:10px;position:relative">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <label style="font-size:10px;color:var(--muted);letter-spacing:.5px" data-s="passport.viewMember">VIEW MEMBER</label>
          <input type="text" id="ppMemberSearch" autocomplete="off" placeholder="" data-cx-input-val="ppSearchMember" style="font-size:11px;flex:1;min-width:160px">
          <button class="btn btn-secondary" style="font-size:10px;padding:4px 10px" data-cx-click="ppViewSelf" data-s="passport.viewSelf">My passport</button>
        </div>
        <div id="ppMemberSuggestions" class="suggest-drop hidden" style="position:absolute;left:0;right:0;top:100%;z-index:10;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-top:2px;max-height:240px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.2)"></div>
        <div id="ppCurrentTarget" style="font-size:10px;color:var(--brass-fg);margin-top:4px"></div>
      </div>
      <div id="passportProgressBar" style="height:6px;background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px">
        <div id="passportProgressFill" style="height:100%;width:0%;background:var(--brass);transition:width .3s"></div>
      </div>
      <div id="passportProgressLabel" style="font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:10px"></div>
      <div id="passportSignerBanner" class="hidden" style="font-size:10px;color:var(--brass-fg);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;margin-bottom:10px" data-s="passport.signerMode">Sign-off mode — tap items to sign.</div>
      <div id="passportSortBar" style="display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase" data-s="passport.sortBy">Sort by</span>
        <button class="btn btn-secondary" id="ppSortCatMod" style="font-size:10px;padding:3px 8px" data-cx-click="ppSetSortMode" data-cx-arg="cat-mod" data-s="passport.sortCatMod">Category → Module</button>
        <button class="btn btn-secondary" id="ppSortModCat" style="font-size:10px;padding:3px 8px" data-cx-click="ppSetSortMode" data-cx-arg="mod-cat" data-s="passport.sortModCat">Module → Category</button>
      </div>
      <div id="passportCategories"><div class="empty-note" data-s="lbl.loading"></div></div>
    </div>
  </div><!-- /cxTab-passport -->

</div>

<!-- ══ BULK BOOK MODAL ══ -->
<div class="modal-overlay hidden" id="cxBulkBookModal" data-cx-close-self>
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 data-s="slot.bulkTitle">Bulk Book Slots</h3>
      <button class="modal-close-x" data-cx-close="cxBulkBookModal">&times;</button>
    </div>
    <div class="field">
      <label data-s="slot.daysOfWeek">Days of week</label>
      <div id="cxBbDays" style="display:flex;gap:6px;flex-wrap:wrap">
        <label style="font-size:11px"><input type="checkbox" value="1"> <span data-s="day.mon">Mon</span></label>
        <label style="font-size:11px"><input type="checkbox" value="2"> <span data-s="day.tue">Tue</span></label>
        <label style="font-size:11px"><input type="checkbox" value="3"> <span data-s="day.wed">Wed</span></label>
        <label style="font-size:11px"><input type="checkbox" value="4"> <span data-s="day.thu">Thu</span></label>
        <label style="font-size:11px"><input type="checkbox" value="5"> <span data-s="day.fri">Fri</span></label>
        <label style="font-size:11px"><input type="checkbox" value="6"> <span data-s="day.sat">Sat</span></label>
        <label style="font-size:11px"><input type="checkbox" value="0"> <span data-s="day.sun">Sun</span></label>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="slot.startTime">Start time</label><input type="time" id="cxBbStartTime"></div>
      <div class="field"><label data-s="slot.endTime">End time</label><input type="time" id="cxBbEndTime"></div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="slot.fromDate">From date</label><input type="date" id="cxBbFromDate"></div>
      <div class="field"><label data-s="slot.toDate">To date</label><input type="date" id="cxBbToDate"></div>
    </div>
    <div id="cxBbPreview" style="font-size:10px;color:var(--muted);margin-bottom:8px"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cx-click="previewCxBulkBook" data-s="slot.preview">Preview</button>
      <button class="btn btn-primary" data-cx-click="submitCxBulkBook" data-s="slot.bulkBook">Bulk Book</button>
    </div>
  </div>
</div>

<!-- ══ CREW CREATION MODAL ══ -->
<div class="modal-overlay hidden" id="crewModal" data-cx-close-self>
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="cox.createCrewTitle">Create Crew</h3>
      <button class="modal-close-x" data-cx-close="crewModal">×</button>
    </div>
    <div class="field">
      <label data-s="cox.crewName">Crew name</label>
      <input type="text" id="cmCrewName" placeholder="e.g., Thunderbolts" style="font-size:12px">
    </div>
    <div class="field">
      <label data-s="cox.description">Description</label>
      <input type="text" id="cmDescription" style="font-size:12px" data-placeholder-s="cox.descPlaceholder" placeholder="e.g., Mon & Wed 7am, casual pace">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label data-s="cox.numBoats">Number of boats</label>
        <select id="cmNumPairs" style="font-size:12px">
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div class="field">
        <label data-s="cox.visibility">Visibility</label>
        <select id="cmVisibility" style="font-size:12px">
          <option value="open" data-s="cox.visOpen">Open — anyone can join</option>
          <option value="invite_only" data-s="cox.visInvite">Invite only</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label data-s="cox.boat">Boat</label>
        <select id="cmMyPair" style="font-size:12px">
          <option value="0">Boat 1</option>
          <option value="1">Boat 2</option>
        </select>
      </div>
      <div class="field">
        <label data-s="cox.yourSeat">Your seat</label>
        <select id="cmMySeat" style="font-size:12px">
          <option value="0" data-s="cox.seatBow">Bow</option>
          <option value="1" data-s="cox.seatStern">Stern</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label data-s="cox.crewColor">Color</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="color" id="cmColor" style="width:32px;height:32px;border:1px solid var(--border);border-radius:6px;padding:2px;background:var(--surface);cursor:pointer">
        <div id="cmColorPicker" style="display:flex;gap:5px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cx-close="crewModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cx-click="createNewCrew" data-s="cox.createCrew">Create</button>
    </div>
  </div>
</div>

<!-- ══ CREW INVITE MODAL ══ -->
<div class="modal-overlay hidden" id="crewInvModal" data-cx-close-self>
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="cox.inviteMember">Invite Member</h3>
      <button class="modal-close-x" data-cx-close="crewInvModal">×</button>
    </div>
    <div class="field">
      <label data-s="cox.searchMember">Member</label>
      <div style="position:relative">
        <input type="text" id="ciMemberSearch" autocomplete="off" placeholder="" data-cx-input-val="searchCrewInvMember">
        <div id="ciMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="ciMemberKt">
        <div id="ciMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div class="field">
      <label data-s="cox.pairAssignment">Pair</label>
      <select id="ciPairId" style="font-size:12px"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-cx-close="crewInvModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-cx-click="sendCrewInvite" data-s="cox.sendInvite">Send Invite</button>
    </div>
  </div>
</div>

<script src="coxswain.js" defer></script>
</body>
</html>
