<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Coxswain's Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/certs.js"></script>
<script src="../shared/maintenance.js"></script>
<style>
/* ── Stats ── */
.cx-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.cx-stat { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 12px; text-align:center; }
.cx-stat .sn { font-size:24px; color:var(--brass); font-weight:500; }
.cx-stat .sl { font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

/* ── Section headers ── */
.cx-section { margin-bottom:20px; }
.cx-section-hdr { font-size:9px; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }

/* ── Cards ── */
.cx-card { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; }

/* ── Boats ── */
.cx-boat { display:flex; justify-content:space-between; align-items:flex-start;
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
.cx-boat-name { font-size:13px; font-weight:500; color:var(--text); }
.cx-boat-sub  { font-size:11px; color:var(--muted); margin-top:3px; }
.cx-boat-actions { margin-left:auto; display:flex; gap:6px; }
.cx-boat-actions button { font-size:10px; font-family:inherit; padding:4px 10px; border-radius:6px;
  cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); }
.cx-boat-actions button:hover { border-color:var(--brass); color:var(--brass); }

/* ── Read-only banner ── */
.cx-readonly { font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:8px 12px; margin-bottom:12px; text-align:center; }

/* ── Responsive ── */
@media(max-width:600px){
  .cx-stats { grid-template-columns:1fr 1fr; }
  .cx-stat .sn { font-size:20px; }
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-content">

  <div class="mb-14">
    <div style="font-size:16px;font-weight:500;color:var(--text)" id="cxTitle"></div>
    <div class="text-sm text-muted" style="margin-top:2px" id="cxSubtitle"></div>
  </div>

  <!-- Read-only banner for non-coxswain rowers -->
  <div class="cx-readonly hidden" id="cxReadOnly" data-s="cox.readOnly"></div>

  <!-- ══ YTD STATS ══ -->
  <div class="cx-stats" id="cxStats">
    <div class="cx-stat"><div class="sn" id="statTrips">—</div><div class="sl" data-s="cox.statsTrips"></div></div>
    <div class="cx-stat"><div class="sn" id="statHours">—</div><div class="sl" data-s="cox.statsHours"></div></div>
    <div class="cx-stat"><div class="sn" id="statDist">—</div><div class="sl" data-s="cox.statsDist"></div></div>
  </div>

  <!-- ══ BOAT AVAILABILITY ══ -->
  <div class="cx-section" id="sectBoats">
    <div class="cx-section-hdr" data-s="cox.boatAvailability"></div>
    <div id="boatList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

  <!-- ══ MY CREWS ══ -->
  <div class="cx-section" id="sectCrews">
    <div class="cx-section-hdr" data-s="cox.myCrews">MY CREWS</div>
    <div id="crewList"><div class="empty-note" data-s="lbl.loading"></div></div>
    <div id="crewInviteList"></div>
    <div style="margin-top:8px">
      <button class="btn btn-primary" style="font-size:11px" onclick="openCrewModal()" data-s="cox.createCrew">+ Create Crew</button>
    </div>
  </div>

  <!-- ══ SLOT RESERVATIONS ══ -->
  <div class="cx-section" id="sectSlots" style="display:none">
    <div class="cx-section-hdr" data-s="cox.slotReservations">SLOT RESERVATIONS</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <select id="cxSlotBoat" onchange="loadCxSlots()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:4px 8px"></select>
      <select id="cxSlotCrew" onchange="renderCxSlots()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:4px 8px"></select>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="shiftCxWeek(-1)">&larr;</button>
        <span id="cxWeekLabel" style="font-size:11px;min-width:140px;text-align:center"></span>
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="shiftCxWeek(1)">&rarr;</button>
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="cxWeekToday()" data-s="slot.today">Today</button>
        <button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="openCxBulkBookModal()" data-s="slot.bulkBook">Bulk Book</button>
      </div>
    </div>
    <div id="cxSlotGrid" style="overflow-x:auto"></div>
    <div style="margin-top:8px;display:flex;gap:12px;font-size:10px;color:var(--muted)">
      <span><span style="display:inline-block;width:10px;height:10px;border:2px solid var(--brass);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendOpen">Open</span></span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--brass)44;border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendYours">Yours</span></span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px;vertical-align:middle"></span> <span data-s="slot.legendBooked">Booked</span></span>
    </div>
  </div>

  <!-- ══ MAINTENANCE ══ -->
  <div class="cx-section" id="sectMaint">
    <div class="cx-section-hdr" data-s="cox.maintenance"></div>
    <div id="maintList"><div class="empty-note" data-s="lbl.loading"></div></div>
  </div>

</div>

<!-- ══ BULK BOOK MODAL ══ -->
<div class="modal-overlay hidden" id="cxBulkBookModal" onclick="if(event.target===this)closeModal('cxBulkBookModal')">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 data-s="slot.bulkTitle">Bulk Book Slots</h3>
      <button class="modal-close-x" onclick="closeModal('cxBulkBookModal')">&times;</button>
    </div>
    <div class="field">
      <label data-s="slot.daysOfWeek">Days of week</label>
      <div id="cxBbDays" style="display:flex;gap:6px;flex-wrap:wrap">
        <label style="font-size:11px"><input type="checkbox" value="1"> <span data-s="day.mon">Mon</span></label>
        <label style="font-size:11px"><input type="checkbox" value="2"> <span data-s="day.tue">Tue</span></label>
        <label style="font-size:11px"><input type="checkbox" value="3"> <span data-s="day.wed">Wed</span></label>
        <label style="font-size:11px"><input type="checkbox" value="4"> <span data-s="day.thu">Thu</span></label>
        <label style="font-size:11px"><input type="checkbox" value="5"> <span data-s="day.fri">Fri</span></label>
        <label style="font-size:11px"><input type="checkbox" value="6"> <span data-s="day.sat">Sat</span></label>
        <label style="font-size:11px"><input type="checkbox" value="0"> <span data-s="day.sun">Sun</span></label>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="slot.startTime">Start time</label><input type="time" id="cxBbStartTime"></div>
      <div class="field"><label data-s="slot.endTime">End time</label><input type="time" id="cxBbEndTime"></div>
    </div>
    <div class="grid2">
      <div class="field"><label data-s="slot.fromDate">From date</label><input type="date" id="cxBbFromDate"></div>
      <div class="field"><label data-s="slot.toDate">To date</label><input type="date" id="cxBbToDate"></div>
    </div>
    <div id="cxBbPreview" style="font-size:10px;color:var(--muted);margin-bottom:8px"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="previewCxBulkBook()" data-s="slot.preview">Preview</button>
      <button class="btn btn-primary" onclick="submitCxBulkBook()" data-s="slot.bulkBook">Bulk Book</button>
    </div>
  </div>
</div>

<!-- ══ RESERVATION MODAL ══ -->
<div class="modal-overlay hidden" id="resModal" onclick="if(event.target===this)closeModal('resModal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="boat.addReservation"></h3>
      <button class="modal-close-x" onclick="closeModal('resModal')">×</button>
    </div>
    <div class="field">
      <label data-s="cox.resMember">Member</label>
      <div style="position:relative">
        <input type="text" id="cxResMemberSearch" autocomplete="off" placeholder="" oninput="searchCxResMember(this.value)">
        <div id="cxResMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="cxResMemberKt">
        <div id="cxResMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label data-s="cox.resStartDate">Start</label><input type="date" id="cxResStart"></div>
      <div class="field"><label data-s="cox.resEndDate">End</label><input type="date" id="cxResEnd"></div>
    </div>
    <div class="field"><label data-s="cox.resNote">Note</label><input type="text" id="cxResNote"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('resModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="saveCxReservation()" data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ CREW CREATION MODAL ══ -->
<div class="modal-overlay hidden" id="crewModal" onclick="if(event.target===this)closeModal('crewModal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="cox.createCrewTitle">Create Crew</h3>
      <button class="modal-close-x" onclick="closeModal('crewModal')">×</button>
    </div>
    <div class="field">
      <label data-s="cox.crewName">Crew name</label>
      <input type="text" id="cmCrewName" placeholder="e.g., Thunderbolts" style="font-size:12px">
    </div>
    <div class="field">
      <label data-s="cox.numPairs">Number of pairs</label>
      <select id="cmNumPairs" style="font-size:12px">
        <option value="2">2 pairs (4 people)</option>
        <option value="3">3 pairs (6 people)</option>
      </select>
    </div>
    <div class="field">
      <label data-s="cox.yourPair">Your pair assignment</label>
      <select id="cmMyPair" style="font-size:12px">
        <option value="0">Pair 1</option>
        <option value="1">Pair 2</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('crewModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="createNewCrew()" data-s="cox.createCrew">Create</button>
    </div>
  </div>
</div>

<!-- ══ CREW INVITE MODAL ══ -->
<div class="modal-overlay hidden" id="crewInvModal" onclick="if(event.target===this)closeModal('crewInvModal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 data-s="cox.inviteMember">Invite Member</h3>
      <button class="modal-close-x" onclick="closeModal('crewInvModal')">×</button>
    </div>
    <div class="field">
      <label data-s="cox.searchMember">Member</label>
      <div style="position:relative">
        <input type="text" id="ciMemberSearch" autocomplete="off" placeholder="" oninput="searchCrewInvMember(this.value)">
        <div id="ciMemberSuggestions" class="suggest-drop" style="position:relative"></div>
        <input type="hidden" id="ciMemberKt">
        <div id="ciMemberName" style="font-size:10px;color:var(--muted);margin-top:3px"></div>
      </div>
    </div>
    <div class="field">
      <label data-s="cox.pairAssignment">Pair</label>
      <select id="ciPairId" style="font-size:12px"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('crewInvModal')" data-s="btn.cancel"></button>
      <button class="btn btn-primary" onclick="sendCrewInvite()" data-s="cox.sendInvite">Send Invite</button>
    </div>
  </div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
const user = requireAuth();
if (!user || !hasRowingEndorsement(user)) { window.location.href = '../member/'; throw new Error('No rowing endorsement'); }

const _isCoxswain = isCoxswain(user);
var _boats = [], _locations = [], _members = [], _allMaint = [], _allTrips = [];

// ══ INIT ═════════════════════════════════════════════════════════════════════
(async function init() {
  applyTheme();
  buildHeader('coxswain');
  document.getElementById('cxTitle').textContent = s('cox.title');
  document.getElementById('cxSubtitle').textContent = user.name;

  // Show read-only banner for non-coxswain rowers
  if (!_isCoxswain) {
    document.getElementById('cxReadOnly').classList.remove('hidden');
  }

  try {
    const [cfgRes, maintRes, tripsRes, membersRes, crewRes, invRes] = await Promise.all([
      apiGet('getConfig'),
      apiGet('getMaintenance'),
      apiGet('getTrips', { limit: 500 }),
      apiGet('getMembers'),
      apiGet('getCrews', { kennitala: user.kennitala }),
      apiGet('getCrewInvites', { kennitala: user.kennitala }),
    ]);

    _boats     = (cfgRes.boats     || []);
    _locations = (cfgRes.locations || []).filter(l => l.active !== false && l.active !== 'false');
    _members   = (membersRes.members || []).filter(m => m.active !== false && m.active !== 'false');
    _allMaint  = maintRes.requests || maintRes.items || maintRes.maintenance || [];
    _myCrews     = crewRes.crews || [];
    _crewInvites = invRes.invites || [];

    if (cfgRes.boatCategories) registerBoatCats(cfgRes.boatCategories);

    // Filter trips to coxswain-gated boats
    var cxBoatIds = new Set(_boats.filter(b => b.accessGateCert === 'coxswain').map(b => b.id));
    _allTrips = (tripsRes.trips || []).filter(t => cxBoatIds.has(t.boatId));

    renderStats();
    renderBoats();
    renderMaint();
    renderCrews();
    renderCrewInvites();
    initCxSlots();

    applyStrings();
    warmContainer();
  } catch (e) {
    showToast(e.message, 'err');
  }
})();

// ══ STATS ════════════════════════════════════════════════════════════════════
function renderStats() {
  var now = new Date();
  var yearStart = now.getFullYear() + '-01-01';
  var myTrips = _allTrips.filter(t => String(t.kennitala) === String(user.kennitala) && t.date >= yearStart);
  var totalHrs = 0;
  myTrips.forEach(t => { totalHrs += parseFloat(t.hoursDecimal || 0); });
  document.getElementById('statTrips').textContent = myTrips.length;
  document.getElementById('statHours').textContent = totalHrs.toFixed(1);
  document.getElementById('statDist').textContent = '—';
}

// ══ BOAT AVAILABILITY ════════════════════════════════════════════════════════
function renderBoats() {
  var el = document.getElementById('boatList');
  // Show rowing-shell boats that are controlled-access with a coxswain gate cert,
  // or have reservations for this user, or the user can access
  var rowingBoats = _boats.filter(b => {
    // Show controlled-access boats gated by coxswain cert
    if (b.accessMode === 'controlled' && b.accessGateCert === 'coxswain') return true;
    // Show slot-scheduled boats gated by coxswain cert
    if (boolVal(b.slotSchedulingEnabled) && b.accessGateCert === 'coxswain') return true;
    // Show any boat this user has a reservation for
    if (b.reservations && b.reservations.some(r => String(r.memberKennitala) === String(user.kennitala))) return true;
    return false;
  });

  if (!rowingBoats.length) {
    el.innerHTML = '<div class="empty-note">' + s('cox.noBoats') + '</div>';
    return;
  }

  el.innerHTML = rowingBoats.map(b => {
    var isOos = boolVal(b.oos);
    var portName = '';
    if (b.defaultPortId) { var loc = _locations.find(l => l.id === b.defaultPortId); if (loc) portName = loc.name; }
    var isControlled = b.accessMode === 'controlled';

    // Reservation list
    var resHtml = '';
    if (b.reservations && b.reservations.length) {
      resHtml = '<div style="margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px">' + s('cox.reservations') + '</div>';
      resHtml += b.reservations.map(r => {
        var removeBtn = _isCoxswain
          ? '<button style="font-size:10px;background:none;border:none;color:var(--red);cursor:pointer" onclick="removeCxReservation(\'' + esc(b.id) + '\',\'' + esc(r.id) + '\')">&times;</button>'
          : '';
        return '<div style="font-size:11px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center">'
          + '<span>' + esc(r.memberName) + ' · ' + esc(r.startDate) + ' → ' + esc(r.endDate)
          + (r.note ? ' · <span style="color:var(--muted)">' + esc(r.note) + '</span>' : '') + '</span>'
          + removeBtn
          + '</div>';
      }).join('');
    }

    // Actions — only for coxswains
    var actionsHtml = '';
    if (_isCoxswain) {
      actionsHtml = '<div class="cx-boat-actions">'
        + '<button onclick="toggleBoatOos(\'' + esc(b.id) + '\',' + !isOos + ')">' + s(isOos ? 'cox.makeAvailable' : 'cox.makeUnavailable') + '</button>'
        + '<button onclick="openResModal(\'' + esc(b.id) + '\')">' + s('cox.addReservation') + '</button>'
        + '</div>';
    }

    return '<div class="cx-boat">'
      + '<div>'
        + '<div class="cx-boat-name">' + esc(boatEmoji(b.category)) + ' ' + esc(b.name)
          + (isControlled ? ' <span style="font-size:8px;letter-spacing:.5px;padding:2px 6px;border-radius:10px;border:1px solid var(--brass)44;background:var(--brass)11;color:var(--brass)">' + esc(s('fleet.badgeControlled')) + '</span>' : '')
        + '</div>'
        + '<div class="cx-boat-sub">'
          + (isOos ? '<span style="color:var(--red)">OUT OF SERVICE</span>' : '<span style="color:var(--green)">AVAILABLE</span>')
          + (portName ? ' · ' + esc(portName) : '')
        + '</div>'
      + '</div>'
      + actionsHtml
      + resHtml
    + '</div>';
  }).join('');
}

async function toggleBoatOos(boatId, oos) {
  var idx = _boats.findIndex(b => b.id === boatId);
  if (idx < 0) return;
  // Optimistic UI update
  var prev = _boats[idx].oos;
  _boats[idx].oos = oos;
  renderBoats();
  try {
    await apiPost('saveConfig', { boats: _boats });
    showToast(s('toast.saved'), 'ok');
  } catch (e) {
    _boats[idx].oos = prev;
    renderBoats();
    showToast(e.message, 'err');
  }
}

// ══ RESERVATION MANAGEMENT ═══════════════════════════════════════════════════
var _resBoatId = null;

function openResModal(boatId) {
  _resBoatId = boatId;
  document.getElementById('cxResMemberKt').value = '';
  document.getElementById('cxResMemberSearch').value = '';
  document.getElementById('cxResMemberName').textContent = '';
  document.getElementById('cxResMemberSuggestions').innerHTML = '';
  document.getElementById('cxResStart').value = '';
  document.getElementById('cxResEnd').value = '';
  document.getElementById('cxResNote').value = '';
  openModal('resModal');
}

var _searchCxResTimer = null;
function searchCxResMember(q) {
  clearTimeout(_searchCxResTimer);
  var drop = document.getElementById('cxResMemberSuggestions');
  if (!q || q.length < 2) { drop.innerHTML=''; drop.style.display='none'; return; }
  _searchCxResTimer = setTimeout(function() {
    var ql = q.toLowerCase();
    var hits = [], count = 0;
    for (var i = 0; i < _members.length && count < 8; i++) {
      if (((_members[i].name||'').toLowerCase()).includes(ql)) { hits.push(_members[i]); count++; }
    }
    if (!hits.length) { drop.innerHTML=''; drop.style.display='none'; return; }
    drop.innerHTML = hits.map(m => '<div class="suggest-item" style="padding:6px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" '
      + 'onclick="selectCxResMember(\'' + esc(m.kennitala) + '\',\'' + esc(m.name) + '\')">' + esc(m.name) + '</div>').join('');
    drop.style.display = 'block';
  }, 150);
}

function selectCxResMember(kt, name) {
  document.getElementById('cxResMemberKt').value = kt;
  document.getElementById('cxResMemberSearch').value = '';
  document.getElementById('cxResMemberName').textContent = name;
  document.getElementById('cxResMemberSuggestions').innerHTML = '';
  document.getElementById('cxResMemberSuggestions').style.display = 'none';
}

async function saveCxReservation() {
  if (!_resBoatId) return;
  var kt = document.getElementById('cxResMemberKt').value;
  var name = document.getElementById('cxResMemberName').textContent;
  var start = document.getElementById('cxResStart').value;
  var end = document.getElementById('cxResEnd').value;
  var note = document.getElementById('cxResNote').value.trim();
  if (!kt || !name || !start || !end) { showToast('Member and dates required.', 'err'); return; }
  try {
    var res = await apiPost('saveReservation', { boatId: _resBoatId, memberKennitala: kt, memberName: name, startDate: start, endDate: end, note: note });
    var b = _boats.find(x => x.id === _resBoatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    closeModal('resModal');
    renderBoats();
    showToast(s('boat.reservationSaved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

async function removeCxReservation(boatId, resId) {
  if (!confirm(s('boat.removeReservation') + '?')) return;
  try {
    var res = await apiPost('removeReservation', { boatId: boatId, reservationId: resId });
    var b = _boats.find(x => x.id === boatId);
    if (b && res.boat) { b.reservations = res.boat.reservations; b.charter = res.boat.charter; }
    renderBoats();
    showToast(s('boat.reservationRemoved'), 'ok');
  } catch (e) { showToast(e.message, 'err'); }
}

// ══ MAINTENANCE ══════════════════════════════════════════════════════════════
var _coxswainBoatIdSet = null;
function renderMaint() {
  var el = document.getElementById('maintList');
  if (!_coxswainBoatIdSet) {
    _coxswainBoatIdSet = new Set(_boats.filter(b => b.accessGateCert === 'coxswain').map(b => b.id));
  }
  var items = _allMaint.filter(m => _coxswainBoatIdSet.has(m.boatId) && m.status !== 'resolved');
  if (!items.length) {
    el.innerHTML = '<div class="empty-note">' + s('cox.noMaint') + '</div>';
    return;
  }
  el.innerHTML = items.map(m => {
    var sevClass = 'sev-' + (m.severity || 'low');
    return '<div class="cx-card">'
      + '<div style="font-size:12px;font-weight:500;color:var(--text)"><span class="sev-dot ' + sevClass + '"></span>' + esc(m.boatName || '') + '</div>'
      + '<div style="font-size:11px;color:var(--muted);margin-top:3px">' + esc(m.description || m.title || '') + '</div>'
      + '<div style="font-size:10px;color:var(--muted);margin-top:2px">' + esc(m.reportedBy || '') + ' · ' + fmtDate(m.createdAt) + '</div>'
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════════
// CREW MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════════

var _myCrews = [];
var _crewInvites = [];
var _invCrewId = null; // crew being invited to

async function loadCrews() {
  try {
    var [crewRes, invRes] = await Promise.all([
      apiGet('getCrews', { kennitala: user.kennitala }),
      apiGet('getCrewInvites', { kennitala: user.kennitala }),
    ]);
    _myCrews = crewRes.crews || [];
    _crewInvites = invRes.invites || [];
  } catch(e) { _myCrews = []; _crewInvites = []; }
  renderCrews();
  renderCrewInvites();
}

function renderCrews() {
  var el = document.getElementById('crewList');
  if (!_myCrews.length) {
    el.innerHTML = '<div class="empty-note">' + s('cox.noCrews') + '</div>';
    return;
  }
  el.innerHTML = _myCrews.map(function(c) {
    var pairs = c.pairs || [];
    var pairsHtml = pairs.map(function(p, pi) {
      var mems = (p.members || []).map(function(m) { return esc(m.name); }).join(', ');
      var openSlots = 2 - (p.members || []).length;
      return '<div style="font-size:11px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:3px">'
        + '<strong>' + s('cox.pair') + ' ' + (pi + 1) + ':</strong> '
        + (mems || '<span style="color:var(--muted)">' + s('cox.empty') + '</span>')
        + (openSlots > 0 ? ' <span style="color:var(--muted)">(' + openSlots + ' ' + s('cox.openSpots') + ')</span>' : '')
        + '</div>';
    }).join('');
    var statusBadge = c.status === 'active'
      ? '<span style="font-size:8px;padding:2px 6px;border-radius:10px;background:var(--green)22;color:var(--green);border:1px solid var(--green)44">' + s('cox.active') + '</span>'
      : '<span style="font-size:8px;padding:2px 6px;border-radius:10px;background:var(--brass)22;color:var(--brass);border:1px solid var(--brass)44">' + s('cox.forming') + '</span>';
    var actions = '<div style="display:flex;gap:6px;margin-top:8px">';
    if (c.status === 'forming') {
      actions += '<button class="btn btn-secondary" style="font-size:10px;padding:3px 8px" onclick="openCrewInvModal(\'' + esc(c.id) + '\')">' + s('cox.inviteMember') + '</button>';
    }
    actions += '<button class="btn btn-secondary" style="font-size:10px;padding:3px 8px" onclick="disbandCrewConfirm(\'' + esc(c.id) + '\')">' + s('cox.disband') + '</button>';
    actions += '</div>';
    return '<div class="cx-card">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        + '<span style="font-size:13px;font-weight:500">' + esc(c.name) + '</span> ' + statusBadge
      + '</div>'
      + pairsHtml + actions
    + '</div>';
  }).join('');
}

function renderCrewInvites() {
  var el = document.getElementById('crewInviteList');
  if (!_crewInvites.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">' + s('cox.pendingInvites') + '</div>'
    + _crewInvites.map(function(inv) {
      return '<div class="cx-card" style="border-left:3px solid var(--brass)">'
        + '<div style="font-size:12px;font-weight:500">' + esc(inv.crewName || '') + '</div>'
        + '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + s('cox.invitedBy') + ': ' + esc(inv.fromName) + ' · ' + s('cox.pair') + ' ' + esc(inv.pairId || '').replace('pair_', '') + '</div>'
        + '<div style="display:flex;gap:6px;margin-top:8px">'
          + '<button class="btn btn-primary" style="font-size:10px;padding:3px 10px" onclick="respondInvite(\'' + esc(inv.id) + '\',\'accepted\')">' + s('cox.accept') + '</button>'
          + '<button class="btn btn-secondary" style="font-size:10px;padding:3px 10px" onclick="respondInvite(\'' + esc(inv.id) + '\',\'rejected\')">' + s('cox.reject') + '</button>'
        + '</div>'
      + '</div>';
    }).join('');
}

function openCrewModal() {
  document.getElementById('cmCrewName').value = '';
  document.getElementById('cmNumPairs').value = '2';
  document.getElementById('cmMyPair').innerHTML = '<option value="0">' + s('cox.pair') + ' 1</option><option value="1">' + s('cox.pair') + ' 2</option>';
  document.getElementById('cmNumPairs').onchange = function() {
    var n = parseInt(this.value);
    var sel = document.getElementById('cmMyPair');
    sel.innerHTML = '';
    for (var i = 0; i < n; i++) sel.innerHTML += '<option value="' + i + '">' + s('cox.pair') + ' ' + (i + 1) + '</option>';
  };
  applyStrings(document.getElementById('crewModal'));
  openModal('crewModal');
}

async function createNewCrew() {
  var name = document.getElementById('cmCrewName').value.trim();
  if (!name) { showToast(s('cox.crewNameRequired'), 'err'); return; }
  var numPairs = parseInt(document.getElementById('cmNumPairs').value);
  var myPair = parseInt(document.getElementById('cmMyPair').value);
  try {
    await apiPost('createCrew', {
      name: name, numPairs: numPairs, creatorPairIndex: myPair,
      kennitala: user.kennitala, memberName: user.name,
    });
    closeModal('crewModal');
    showToast(s('toast.saved'), 'ok');
    await loadCrews();
  } catch(e) { showToast(e.message, 'err'); }
}

function openCrewInvModal(crewId) {
  _invCrewId = crewId;
  document.getElementById('ciMemberKt').value = '';
  document.getElementById('ciMemberSearch').value = '';
  document.getElementById('ciMemberName').textContent = '';
  document.getElementById('ciMemberSuggestions').innerHTML = '';
  // Populate pair options
  var crew = _myCrews.find(function(c) { return c.id === crewId; });
  var pairSel = document.getElementById('ciPairId');
  pairSel.innerHTML = '';
  if (crew) {
    (crew.pairs || []).forEach(function(p, i) {
      var openSlots = 2 - (p.members || []).length;
      if (openSlots > 0) {
        pairSel.innerHTML += '<option value="' + esc(p.pairId) + '">' + s('cox.pair') + ' ' + (i + 1) + ' (' + openSlots + ' ' + s('cox.openSpots') + ')</option>';
      }
    });
  }
  applyStrings(document.getElementById('crewInvModal'));
  openModal('crewInvModal');
}

var _searchCrewInvTimer = null;
function searchCrewInvMember(q) {
  clearTimeout(_searchCrewInvTimer);
  var drop = document.getElementById('ciMemberSuggestions');
  if (!q || q.length < 2) { drop.innerHTML = ''; drop.style.display = 'none'; return; }
  _searchCrewInvTimer = setTimeout(function() {
    var ql = q.toLowerCase();
    var hits = [], count = 0;
    for (var i = 0; i < _members.length && count < 8; i++) {
      var m = _members[i];
      if ((m.name || '').toLowerCase().includes(ql) && hasRowingEndorsement(m)) { hits.push(m); count++; }
    }
    if (!hits.length) { drop.innerHTML = ''; drop.style.display = 'none'; return; }
    drop.innerHTML = hits.map(function(m) {
      return '<div class="suggest-item" style="padding:6px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" '
        + 'onclick="selectCrewInvMember(\'' + esc(m.kennitala) + '\',\'' + esc(m.name) + '\')">' + esc(m.name) + '</div>';
    }).join('');
    drop.style.display = 'block';
  }, 150);
}

function selectCrewInvMember(kt, name) {
  document.getElementById('ciMemberKt').value = kt;
  document.getElementById('ciMemberSearch').value = '';
  document.getElementById('ciMemberName').textContent = name;
  document.getElementById('ciMemberSuggestions').innerHTML = '';
  document.getElementById('ciMemberSuggestions').style.display = 'none';
}

async function sendCrewInvite() {
  if (!_invCrewId) return;
  var kt = document.getElementById('ciMemberKt').value;
  var name = document.getElementById('ciMemberName').textContent;
  var pairId = document.getElementById('ciPairId').value;
  if (!kt || !name) { showToast(s('cox.selectMember'), 'err'); return; }
  if (!pairId) { showToast(s('cox.selectPair'), 'err'); return; }
  try {
    await apiPost('inviteToCrew', {
      crewId: _invCrewId, toKennitala: kt, toName: name,
      fromKennitala: user.kennitala, fromName: user.name,
      pairId: pairId,
    });
    closeModal('crewInvModal');
    showToast(s('cox.inviteSent'), 'ok');
    await loadCrews();
  } catch(e) { showToast(e.message, 'err'); }
}

async function respondInvite(inviteId, response) {
  // Optimistic UI — remove invite card immediately
  var prevInvites = _crewInvites.slice();
  _crewInvites = _crewInvites.filter(function(inv) { return inv.id !== inviteId; });
  renderCrewInvites();
  try {
    await apiPost('respondCrewInvite', { inviteId: inviteId, response: response });
    showToast(response === 'accepted' ? s('cox.inviteAccepted') : s('cox.inviteRejected'), 'ok');
    await loadCrews();
    initCxSlots(); // refresh slot view if crew is now active
  } catch(e) {
    _crewInvites = prevInvites;
    renderCrewInvites();
    showToast(e.message, 'err');
  }
}

async function disbandCrewConfirm(crewId) {
  if (!confirm(s('cox.confirmDisband'))) return;
  // Optimistic UI — remove crew card immediately
  var prevCrews = _myCrews.slice();
  _myCrews = _myCrews.filter(function(c) { return c.id !== crewId; });
  renderCrews();
  try {
    await apiPost('disbandCrew', { crewId: crewId });
    showToast(s('cox.crewDisbanded'), 'ok');
    await loadCrews();
  } catch(e) {
    _myCrews = prevCrews;
    renderCrews();
    showToast(e.message, 'err');
  }
}


// ═══════════════════════════════════════════════════════════════════════════════
// SLOT BOOKING (ROWING SHELLS)
// ═══════════════════════════════════════════════════════════════════════════════

var _cxWeekStart = null;
var _cxSlots = [];
var _cxSlotBoats = [];

function initCxSlots() {
  // Find rowing-shell boats with slot scheduling
  _cxSlotBoats = (_boats || []).filter(function(b) {
    return boolVal(b.slotSchedulingEnabled) && b.accessGateCert === 'coxswain';
  });
  var sect = document.getElementById('sectSlots');
  // Only show if there are slot-scheduled rowing-shells AND user has active crews
  var activeCrews = _myCrews.filter(function(c) { return c.status === 'active'; });
  if (!_cxSlotBoats.length || !activeCrews.length) { sect.style.display = 'none'; return; }
  sect.style.display = '';
  // Populate boat filter
  var boatSel = document.getElementById('cxSlotBoat');
  boatSel.innerHTML = '';
  _cxSlotBoats.forEach(function(b) {
    boatSel.innerHTML += '<option value="' + esc(b.id) + '">' + esc(b.name) + '</option>';
  });
  // Populate crew filter
  var crewSel = document.getElementById('cxSlotCrew');
  crewSel.innerHTML = '';
  activeCrews.forEach(function(c) {
    crewSel.innerHTML += '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>';
  });
  // Init week
  var d = new Date();
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  d.setHours(0,0,0,0);
  _cxWeekStart = d;
  loadCxSlots();
}

async function loadCxSlots() {
  var boatId = document.getElementById('cxSlotBoat').value;
  if (!boatId) return;
  var fromDate = _cxWeekStart.toISOString().slice(0, 10);
  var toD = new Date(_cxWeekStart); toD.setDate(toD.getDate() + 6);
  var toDate = toD.toISOString().slice(0, 10);
  try {
    var res = await apiGet('getSlots', { boatId: boatId, fromDate: fromDate, toDate: toDate });
    _cxSlots = res.slots || [];
  } catch(e) { _cxSlots = []; }
  renderCxSlots();
}

function renderCxSlots() {
  var crewId = document.getElementById('cxSlotCrew').value;
  var boatId = document.getElementById('cxSlotBoat').value;
  var boat = _cxSlotBoats.find(function(b) { return b.id === boatId; });
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(_cxWeekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  var todayStr = new Date().toISOString().slice(0, 10);
  document.getElementById('cxWeekLabel').textContent =
    days[0].toISOString().slice(5, 10) + ' – ' + days[6].toISOString().slice(5, 10);
  var dayNames = [s('day.sun'), s('day.mon'), s('day.tue'), s('day.wed'), s('day.thu'), s('day.fri'), s('day.sat')];
  // Build all active crew IDs for this user (to detect "mine" across any of their crews)
  var myCrewIds = _myCrews.filter(function(c) { return c.status === 'active'; }).map(function(c) { return c.id; });
  // Table calendar — matches admin style
  var html = '<table style="width:100%;border-collapse:collapse;font-size:10px">';
  html += '<thead><tr><th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border);min-width:80px">' + s('slot.boat') + '</th>';
  days.forEach(function(d) {
    var ds = d.toISOString().slice(0, 10);
    var isToday = ds === todayStr;
    html += '<th style="padding:4px 6px;border-bottom:1px solid var(--border);min-width:80px;text-align:center'
      + (isToday ? ';background:var(--brass)11;color:var(--brass)' : '') + '">'
      + dayNames[d.getDay()] + '<br>' + d.getDate() + '</th>';
  });
  html += '</tr></thead><tbody><tr>';
  html += '<td style="padding:6px;border-bottom:1px solid var(--border);font-weight:500">' + esc(boat ? boat.name : '') + '</td>';
  days.forEach(function(d) {
    var ds = d.toISOString().slice(0, 10);
    var isToday = ds === todayStr;
    var daySlots = _cxSlots.filter(function(sl) { return sl.date === ds; });
    var cellStyle = 'padding:4px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);vertical-align:top'
      + (isToday ? ';background:var(--brass)08' : '');
    html += '<td style="' + cellStyle + '">';
    if (daySlots.length) {
      daySlots.forEach(function(sl) {
        var isMyCrew = sl.bookedByCrewId && myCrewIds.indexOf(sl.bookedByCrewId) !== -1;
        var isBooked = !!sl.bookedByKennitala;
        var bg, border, cursor, onclick;
        if (isMyCrew) {
          bg = 'var(--brass)22'; border = 'var(--brass)'; cursor = 'pointer';
          onclick = 'onclick="unbookCxSlot(\'' + esc(sl.id) + '\')"';
        } else if (isBooked) {
          bg = 'var(--green)22'; border = 'var(--green)'; cursor = 'default';
          onclick = '';
        } else {
          bg = 'var(--surface)'; border = 'var(--brass)66'; cursor = 'pointer';
          onclick = 'onclick="bookCxSlot(\'' + esc(sl.id) + '\')"';
        }
        var label = sl.startTime + '–' + sl.endTime;
        if (isMyCrew) label += '<br><span style="font-size:8px">' + esc(s('slot.yours')) + '</span>';
        else if (isBooked) label += '<br><span style="font-size:8px">' + esc(sl.bookedByName || '') + '</span>';
        html += '<div ' + onclick + ' style="padding:3px 4px;margin-bottom:2px;border-radius:4px;border:1px solid '
          + border + ';background:' + bg + ';font-size:9px;cursor:' + cursor + ';text-align:center">' + label + '</div>';
      });
    } else {
      html += '<div style="color:var(--border);font-size:9px;text-align:center;padding:4px">—</div>';
    }
    html += '</td>';
  });
  html += '</tr></tbody></table>';
  document.getElementById('cxSlotGrid').innerHTML = html;
}

async function bookCxSlot(slotId) {
  var crewId = document.getElementById('cxSlotCrew').value;
  if (!crewId) { showToast(s('cox.selectCrew'), 'err'); return; }
  var crew = _myCrews.find(function(c) { return c.id === crewId; });
  var slot = _cxSlots.find(function(sl) { return sl.id === slotId; });
  if (slot) {
    slot.bookedByKennitala = user.kennitala;
    slot.bookedByName = user.name;
    slot.bookedByCrewId = crewId;
    slot.bookedByCrewName = crew ? crew.name : '';
    renderCxSlots();
  }
  try {
    await apiPost('bookSlot', { slotId: slotId, crewId: crewId, kennitala: user.kennitala, memberName: user.name });
    showToast(s('slot.booked'), 'ok');
  } catch(e) {
    showToast(e.message || 'Error', 'err');
    loadCxSlots();
  }
}

async function unbookCxSlot(slotId) {
  if (!confirm(s('slot.confirmUnbook'))) return;
  var slot = _cxSlots.find(function(sl) { return sl.id === slotId; });
  var prevSlot = slot ? Object.assign({}, slot) : null;
  if (slot) {
    slot.bookedByKennitala = '';
    slot.bookedByName = '';
    slot.bookedByCrewId = '';
    slot.bookedByCrewName = '';
    renderCxSlots();
  }
  try {
    await apiPost('unbookSlot', { slotId: slotId, kennitala: user.kennitala });
    showToast(s('slot.unbooked'), 'ok');
  } catch(e) {
    if (prevSlot && slot) { Object.assign(slot, prevSlot); renderCxSlots(); }
    showToast(e.message || 'Error', 'err');
  }
}

function openCxBulkBookModal() {
  var crewId = document.getElementById('cxSlotCrew').value;
  if (!crewId) { showToast(s('cox.selectCrew'), 'err'); return; }
  document.querySelectorAll('#cxBbDays input').forEach(function(cb) { cb.checked = false; });
  var today = new Date().toISOString().slice(0, 10);
  document.getElementById('cxBbStartTime').value = '';
  document.getElementById('cxBbEndTime').value = '';
  document.getElementById('cxBbFromDate').value = today;
  var endD = new Date(); endD.setMonth(endD.getMonth() + 1);
  document.getElementById('cxBbToDate').value = endD.toISOString().slice(0, 10);
  document.getElementById('cxBbPreview').textContent = '';
  applyStrings(document.getElementById('cxBulkBookModal'));
  openModal('cxBulkBookModal');
}

async function previewCxBulkBook() {
  var days = [];
  document.querySelectorAll('#cxBbDays input:checked').forEach(function(cb) { days.push(parseInt(cb.value)); });
  var fromDate = document.getElementById('cxBbFromDate').value;
  var toDate = document.getElementById('cxBbToDate').value;
  if (!days.length || !fromDate || !toDate) { document.getElementById('cxBbPreview').textContent = s('slot.selectDays'); return; }
  var boatId = document.getElementById('cxSlotBoat').value;
  var filterStart = document.getElementById('cxBbStartTime').value || '';
  var filterEnd = document.getElementById('cxBbEndTime').value || '';
  try {
    var res = await apiGet('getSlots', { boatId: boatId, fromDate: fromDate, toDate: toDate });
    var slots = res.slots || [];
    var total = 0; var open = 0;
    slots.forEach(function(sl) {
      var d = new Date(sl.date + 'T00:00:00');
      if (days.indexOf(d.getDay()) === -1) return;
      if (filterStart && sl.startTime < filterStart) return;
      if (filterEnd && sl.endTime > filterEnd) return;
      total++;
      if (!sl.bookedByKennitala) open++;
    });
    if (open === 0) { document.getElementById('cxBbPreview').textContent = s('slot.bulkNoSlots'); }
    else { document.getElementById('cxBbPreview').textContent = s('slot.bulkPreview', { open: open, total: total }); }
  } catch(e) { document.getElementById('cxBbPreview').textContent = e.message || 'Error'; }
}

async function submitCxBulkBook() {
  var crewId = document.getElementById('cxSlotCrew').value;
  if (!crewId) { showToast(s('cox.selectCrew'), 'err'); return; }
  var days = [];
  document.querySelectorAll('#cxBbDays input:checked').forEach(function(cb) { days.push(parseInt(cb.value)); });
  var fromDate = document.getElementById('cxBbFromDate').value;
  var toDate = document.getElementById('cxBbToDate').value;
  var boatId = document.getElementById('cxSlotBoat').value;
  var startTime = document.getElementById('cxBbStartTime').value || '';
  var endTime = document.getElementById('cxBbEndTime').value || '';
  if (!days.length || !fromDate || !toDate || !boatId) { showToast(s('slot.missingFields'), 'err'); return; }
  try {
    var res = await apiPost('bulkBookSlots', {
      boatId: boatId, crewId: crewId, kennitala: user.kennitala, memberName: user.name,
      fromDate: fromDate, toDate: toDate, daysOfWeek: days,
      startTime: startTime, endTime: endTime,
    });
    closeModal('cxBulkBookModal');
    if (res.skipped > 0) { showToast(s('slot.bulkPartial', { booked: res.booked, skipped: res.skipped }), 'ok'); }
    else { showToast(s('slot.bulkBooked', { count: res.booked }), 'ok'); }
    loadCxSlots();
  } catch(e) { showToast(e.message || 'Error', 'err'); }
}

function shiftCxWeek(dir) {
  _cxWeekStart.setDate(_cxWeekStart.getDate() + dir * 7);
  loadCxSlots();
}

function cxWeekToday() {
  var d = new Date();
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  d.setHours(0,0,0,0);
  _cxWeekStart = d;
  loadCxSlots();
}
</script>
