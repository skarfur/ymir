<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Daily Log</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/weather.js"></script>
<script src="../shared/tides.js"></script>
<script src="../shared/boats.js" defer></script>
<script src="../shared/maintenance.js" defer></script>
<style>
/* ── Date nav ── */
.date-nav { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.date-nav button { background:none; border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text); font-family:inherit; font-size:12px; padding:5px 12px; cursor:pointer; transition:border-color .2s,color .2s; }
.date-nav button:hover { border-color:var(--brass); color:var(--brass-fg); }
.date-big { font-size:13px; font-weight:400; color:var(--muted); letter-spacing:.5px; flex:1; text-align:center; }
.date-hero { font-size:28px; font-weight:500; color:var(--text); text-align:center; margin:4px 0 12px; line-height:1.1; }
.signoff-badge { display:inline-flex; align-items:center; gap:6px;
  background:var(--green)18; border:1px solid var(--green)44; color:var(--green);
  border-radius:var(--radius-sm); padding:4px 10px; font-size:11px; }
.readonly-badge { display:inline-flex; align-items:center;
  background:var(--surface); border:1px solid var(--border); color:var(--muted);
  border-radius:var(--radius-sm); padding:4px 10px; font-size:11px; }

/* ── Section headings ── */
.section-heading { font-size:9px; color:var(--muted); letter-spacing:1px;
  margin:20px 0 8px; display:flex; align-items:center; justify-content:space-between; }

/* ── Cards ── */
.content-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:4px; box-shadow:var(--shadow-sm); }

/* ── Checklists ── */
.cl-progress-line { font-size:11px; color:var(--muted); margin-bottom:8px; }
.cl-progress-line span { color:var(--brass-fg); font-weight:500; }
.cl-bar-wrap { height:4px; background:var(--border); border-radius:2px; margin-bottom:12px; overflow:hidden; }
.cl-bar      { height:100%; background:var(--brass); border-radius:2px; transition:width .3s; }
.checklist-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
.checklist-item:last-child { border-bottom:none; }
.checklist-item input[type=checkbox] { width:15px; height:15px; accent-color:var(--brass); flex-shrink:0; margin-top:2px; cursor:pointer; }
.item-text { font-size:13px; transition:opacity .15s; }
.checklist-item.done .item-text { opacity:.35; text-decoration:line-through; }

/* ── Activities ── */
.activity-row { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
.activity-row:last-child { border-bottom:none; }
.activity-info { flex:1; }
.activity-name { font-weight:500; }
.activity-meta { color:var(--muted); font-size:11px; margin-top:3px; }
.activity-note { color:var(--text); font-size:12px; margin-top:4px; opacity:.65; }
.del-btn { background:none; border:none; color:var(--border); cursor:pointer; font-size:18px; padding:0 4px; transition:color .15s; line-height:1; }
.del-btn:hover { color:var(--red); }

/* ── Trips ── */
.trip-row { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; cursor:pointer; }
.trip-row:last-child { border-bottom:none; }
.trip-row:hover { background:var(--card); margin:0 -16px; padding-left:16px; padding-right:16px; border-radius:4px; }
.trip-boat { font-weight:500; flex:1; }
.trip-meta { color:var(--muted); font-size:11px; margin-top:3px; }
.trip-times { font-size:12px; color:var(--muted); text-align:right; flex-shrink:0; }

/* ── Incident button ── */
.incident-btn { display:flex; align-items:center; gap:12px; padding:12px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
  text-decoration:none; color:var(--text); transition:border-color .2s,box-shadow .2s; margin-bottom:4px; cursor:pointer; box-shadow:var(--shadow-sm); }
.incident-btn:hover { border-color:var(--brass); box-shadow:var(--shadow-md); }
.incident-icon { font-size:22px; flex-shrink:0; }
.incident-label { font-size:13px; font-weight:500; }
.incident-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* ── Weather log ── */
.wx-snap-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:10px 12px; margin-bottom:8px; box-shadow:var(--shadow-sm); }
.wx-snap-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.wx-snap-time { color:var(--brass-fg); font-weight:500; font-size:14px; flex:1; }
.wx-snap-flag { font-size:16px; }
.wx-snap-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; }
.wx-snap-label { font-size:9px; color:var(--muted); letter-spacing:.8px; margin-bottom:2px; }
.wx-snap-val { font-size:12px; color:var(--text); font-weight:500; }

/* ── Tides (auto-filled widget) ── */

/* ── Save bar ── */
.save-bar { position:fixed; bottom:0; left:0; right:0; background:var(--card);
  border-top:1px solid var(--border); padding:10px 16px; display:flex;
  align-items:center; gap:10px; z-index:100; max-width:720px; margin:0 auto; }
.save-ok  { color:var(--green); font-size:12px; flex:1; }
.save-err { color:var(--red);   font-size:12px; flex:1; }

/* ── Activity type buttons ── */
.type-btns { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.type-btn { padding:5px 12px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); font-size:12px; font-family:inherit; color:var(--text);
  cursor:pointer; transition:all .2s; }
.type-btn.selected { background:var(--brass)22; border-color:var(--brass); color:var(--brass-fg); }

/* ── Trip detail modal ── */
.dl-drow { display:flex; gap:12px; padding:5px 0; border-bottom:1px solid var(--border); font-size:13px; }
.dl-drow:last-child { border-bottom:none; }
.dl-dlbl { font-size:9px; color:var(--muted); letter-spacing:.8px; width:90px; flex-shrink:0; padding-top:2px; }
.dl-dval { flex:1; color:var(--text); }

/* ── Responsive ── */
@media(max-width:600px){
  .wx-snap-grid{grid-template-columns:1fr}
  .save-bar{padding:8px 12px}
  .dl-drow{flex-direction:column;gap:2px}
  .dl-dlbl{width:auto;padding-top:0}
  .incident-btn{padding:10px 12px}
}
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div id="mainWrap" class="page-content">

  <!-- ══ DATE NAV ══ -->
  <div class="date-nav">
    <button id="prevBtn">◀</button>
    <div style="flex:1;text-align:center">
      <div class="date-big" id="dateBig"></div>
      <div class="date-hero" id="dateHero"></div>
    </div>
    <button id="nextBtn">▶</button>
  </div>
  <div class="flex-center mb-8"><button id="todayBtn" class="btn-ghost-sm" data-s="daily.today" style="font-size:11px"></button></div>

  <div class="flex-center flex-wrap gap-8 mb-16">
    <div class="signoff-badge hidden" id="signoffBadge"></div>
    <div class="readonly-badge hidden" id="readonlyBadge" data-s="daily.readOnly"></div>
  </div>

  <!-- ══ 1. WEATHER WIDGET ══ -->
  <div class="section-label" data-s="daily.wxLog"></div>
  <div class="content-card mb-4">
    <div id="wxLogList"></div>
    <div class="flex-center gap-8 mt-8">
      <button class="btn-ghost-sm" id="logWxBtn" data-s="daily.wxLogBtn"></button>
      <span id="logWxDesc" class="text-xs text-muted"></span>
      <span id="wxLogCount" class="text-xs text-muted ml-auto"></span>
    </div>
  </div>

  <!-- ══ 2. TIDES (auto-filled from harmonic prediction) ══ -->
  <div class="section-heading" data-s="daily.tides"></div>
  <div id="dailyTideWidget" class="mb-4"></div>

  <!-- ══ 3. TRIPS TODAY ══ -->
  <div class="section-heading">
    <span data-s="daily.tripsToday"></span>
    <span id="tripsCount"></span>
  </div>
  <div class="content-card" id="tripsCard">
    <div class="empty-state"><span class="spinner"></span></div>
  </div>

  <!-- ══ 4. OPENING CHECKLIST ══ -->
  <div class="section-heading" data-s="daily.openingChecklist"></div>
  <div class="content-card" id="amCard"></div>

  <!-- ══ 5. ACTIVITIES ══ -->
  <div class="section-heading">
    <span data-s="daily.activities"></span>
    <button class="btn-ghost-sm" id="addActivityBtn" data-s="daily.addActivity"></button>
  </div>
  <div class="content-card" id="activitiesCard">
    <div class="empty-state" id="activitiesEmpty" data-s="daily.noActivities"></div>
    <div id="activitiesList"></div>
  </div>

  <!-- ══ 6. STAFF NOTES ══ -->
  <div class="section-heading" data-s="daily.staffNotes"></div>
  <div class="content-card">
    <textarea id="narrativeInput" rows="4" style="width:100%;resize:vertical"></textarea>
  </div>

  <!-- ══ 7. INCIDENTS ══ -->
  <div class="section-heading" id="incidentHeading" data-s="daily.incidentReport"></div>
  <div id="incidentContainer"></div>

  <!-- ══ 8. CLOSING CHECKLIST ══ -->
  <div class="section-heading" data-s="daily.closingChecklist"></div>
  <div class="content-card" id="pmCard"></div>

  <!-- ══ SAVE BAR ══ -->
  <div class="save-bar">
    <span id="saveMsg"></span>
    <button class="btn btn-primary"   id="signOffBtn"   data-s="btn.signOff"></button>
  </div>

</div><!-- /mainWrap -->

<!-- ══ ACTIVITY MODAL ══ -->
<div class="modal-overlay hidden" id="activityModal" data-dl-close-self>
  <div class="modal">
    <div class="modal-header">
      <h3 data-s="daily.activityModal"></h3>
      <button class="modal-close-x" data-dl-close="activityModal">&times;</button>
    </div>
    <div class="field">
      <label data-s="daily.actType"></label>
      <div class="type-btns" id="actTypeBtns"></div>
    </div>
    <!-- Subtype buttons -->
    <div class="field" id="actSubtypeField" style="display:none">
      <div class="type-btns" id="actSubtypeBtns"></div>
    </div>
    <div class="field">
      <label data-s="daily.actNameLabel"></label>
      <input type="text" id="actName">
    </div>
    <div class="grid2">
      <div class="field">
        <label data-s="daily.startTime"></label>
        <input type="time" id="actStart">
      </div>
      <div class="field">
        <label data-s="daily.endTime"></label>
        <input type="time" id="actEnd">
      </div>
    </div>
    <div class="field">
      <label data-s="daily.actParticipants"></label>
      <input type="text" id="actParticipants">
    </div>
    <div class="field">
      <label data-s="daily.actNotes"></label>
      <input type="text" id="actNotes">
    </div>
    <!-- Abler checkbox -->
    <div class="check-row mb-10 mt-8">
      <input type="checkbox" id="actAbler">
      <label for="actAbler" class="text-md">Activity details registered in Abler</label>
    </div>
    <!-- Group checkout link -->
    <div id="actGroupLinkSection" class="mb-12">
      <div class="section-label">Linked group checkouts</div>
      <div id="actGroupLinkCards" class="flex-col gap-6 mb-6"></div>
      <button type="button" data-dl-click="openGroupLinkPicker" class="btn-dashed">+ Link group checkout</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="actCancelBtn" data-s="btn.cancel"></button>
      <button class="btn btn-ghost-sm" id="actSaveAddBtn">Save & add another</button>
      <button class="btn btn-primary"   id="actSaveBtn"   data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ GROUP LINK PICKER ══ -->
<div class="modal-overlay hidden" id="groupLinkModal" data-dl-close-self>
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3>Link Group Checkout</h3>
      <button class="modal-close-x" data-dl-close="groupLinkModal">&times;</button>
    </div>
    <div id="groupLinkPickerCards" class="mb-14"></div>
    <div id="groupLinkEmpty" class="text-muted text-md mb-14" style="display:none">No active group checkouts today.</div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-dl-close="groupLinkModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary" data-dl-click="confirmGroupLink" data-s="daily.linkSelected"></button>
    </div>
  </div>
</div>

<!-- ══ TRIP DETAIL MODAL ══ -->
<div class="modal-overlay hidden" id="tripDetailModal"
  data-dl-close-self>
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 id="tdTitle"></h3>
      <button class="modal-close-x" data-dl-close="tripDetailModal">×</button>
    </div>
    <div class="info-panel mb-10">
      <div class="section-label text-brass mb-10">TRIP</div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.boat"></span><span class="dl-dval" id="tdBoat"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.location"></span><span class="dl-dval" id="tdLocation"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" id="tdOutLabel"></span><span class="dl-dval" id="tdOut"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" id="tdReturnLabel"></span><span class="dl-dval" id="tdReturn"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" id="tdInLabel"></span><span class="dl-dval" id="tdIn"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.crew"></span><span class="dl-dval" id="tdCrew"></span></div>
      <div class="dl-drow" id="tdNotesRow"><span class="dl-dlbl" data-s="lbl.notes"></span><span class="dl-dval" id="tdNotes"></span></div>
    </div>
    <div class="info-panel" id="tdMemberSection">
      <div class="section-label text-brass mb-10" data-s="lbl.member"></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.name"></span><span class="dl-dval" id="tdMember"></span></div>
      <div class="dl-drow" id="tdPhoneRow"><span class="dl-dlbl" data-s="lbl.phone"></span><span class="dl-dval" id="tdPhone"></span></div>
      <div class="dl-drow" id="tdGuardianRow"><span class="dl-dlbl" data-s="lbl.guardian"></span><span class="dl-dval" id="tdGuardian"></span></div>
    </div>
  </div>
</div>

<!-- ══ INCIDENT DETAIL MODAL ══ -->
<!-- Incident peek — read-only summary with a link out to /incidents/ for the
     full editor (detailModal there). Intentionally not merged with the
     editor: this page shows many incidents as part of the day's activities
     and only needs a quick look. -->
<div class="modal-overlay hidden" id="incidentDetailModal"
  data-dl-close-self>
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="idTitle"></h3>
      <button class="modal-close-x" data-dl-close="incidentDetailModal">×</button>
    </div>
    <div id="idStatusRow" class="mb-10" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <div class="info-panel" id="idBody"></div>
    <div class="flex-center mt-14">
      <a id="idOpenFull" class="btn-ghost" href="#">→ <span data-s="incident.viewList"></span></a>
    </div>
  </div>
</div>

<script src="dailylog.js" defer></script>
</body>
</html>
