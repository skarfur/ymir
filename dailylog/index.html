<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ýmir — Daily Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/weather.js"></script>
<script src="../shared/boats.js"></script>
<script src="../shared/maintenance.js"></script>
<style>
/* ── Date nav ── */
.date-nav { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.date-nav button { background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:inherit; font-size:12px; padding:5px 12px; cursor:pointer; }
.date-nav button:hover { border-color:var(--brass); }
.date-big { font-size:13px; font-weight:400; color:var(--muted); letter-spacing:.5px; flex:1; text-align:center; }
.date-hero { font-size:28px; font-weight:500; color:var(--text); text-align:center; margin:4px 0 12px; line-height:1.1; }
.signoff-badge { display:inline-flex; align-items:center; gap:6px;
  background:var(--green)18; border:1px solid var(--green)44; color:var(--green);
  border-radius:6px; padding:4px 10px; font-size:11px; }
.readonly-badge { display:inline-flex; align-items:center;
  background:var(--surface); border:1px solid var(--border); color:var(--muted);
  border-radius:6px; padding:4px 10px; font-size:11px; }

/* ── Section headings ── */
.section-heading { font-size:9px; color:var(--muted); letter-spacing:1.5px;
  margin:20px 0 8px; display:flex; align-items:center; justify-content:space-between; }

/* ── Cards ── */
.content-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:4px; }

/* ── Checklists ── */
.cl-progress-line { font-size:11px; color:var(--muted); margin-bottom:8px; }
.cl-progress-line span { color:var(--brass); font-weight:500; }
.cl-bar-wrap { height:4px; background:var(--border); border-radius:2px; margin-bottom:12px; overflow:hidden; }
.cl-bar      { height:100%; background:var(--brass); border-radius:2px; transition:width .3s; }
.checklist-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
.checklist-item:last-child { border-bottom:none; }
.checklist-item input[type=checkbox] { width:15px; height:15px; accent-color:var(--brass); flex-shrink:0; margin-top:2px; cursor:pointer; }
.item-text { font-size:13px; transition:opacity .15s; }
.checklist-item.done .item-text { opacity:.35; text-decoration:line-through; }

/* ── Activities ── */
.activity-row { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
.activity-row:last-child { border-bottom:none; }
.activity-info { flex:1; }
.activity-name { font-weight:500; }
.activity-meta { color:var(--muted); font-size:11px; margin-top:3px; }
.activity-note { color:var(--text); font-size:12px; margin-top:4px; opacity:.65; }
.del-btn { background:none; border:none; color:var(--border); cursor:pointer; font-size:18px; padding:0 4px; transition:color .15s; line-height:1; }
.del-btn:hover { color:var(--red); }

/* ── Trips ── */
.trip-row { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; cursor:pointer; }
.trip-row:last-child { border-bottom:none; }
.trip-row:hover { background:var(--card); margin:0 -16px; padding-left:16px; padding-right:16px; border-radius:4px; }
.trip-boat { font-weight:500; flex:1; }
.trip-meta { color:var(--muted); font-size:11px; margin-top:3px; }
.trip-times { font-size:12px; color:var(--muted); text-align:right; flex-shrink:0; }

/* ── Incident button ── */
.incident-btn { display:flex; align-items:center; gap:12px; padding:12px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  text-decoration:none; color:var(--text); transition:border-color .15s; margin-bottom:4px; cursor:pointer; }
.incident-btn:hover { border-color:var(--brass); }
.incident-icon { font-size:22px; flex-shrink:0; }
.incident-label { font-size:13px; font-weight:500; }
.incident-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* ── Weather log ── */
.wx-snap-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
.wx-snap-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.wx-snap-time { color:var(--brass); font-weight:500; font-size:14px; flex:1; }
.wx-snap-flag { font-size:16px; }
.wx-snap-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; }
.wx-snap-label { font-size:9px; color:var(--muted); letter-spacing:.8px; margin-bottom:2px; }
.wx-snap-val { font-size:12px; color:var(--text); font-weight:500; }

/* ── Tides ── */
.tide-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.tide-cell { display:flex; flex-direction:column; gap:4px; }
.tide-label { font-size:9px; color:var(--muted); letter-spacing:.8px; }
.tide-inputs { display:flex; gap:6px; }
.tide-inputs input { flex:1; }

/* ── Save bar ── */
.save-bar { position:fixed; bottom:0; left:0; right:0; background:var(--card);
  border-top:1px solid var(--border); padding:10px 16px; display:flex;
  align-items:center; gap:10px; z-index:100; max-width:720px; margin:0 auto; }
.save-ok  { color:var(--green); font-size:12px; flex:1; }
.save-err { color:var(--red);   font-size:12px; flex:1; }

/* ── Activity type buttons ── */
.type-btns { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.type-btn { padding:5px 12px; background:var(--surface); border:1px solid var(--border);
  border-radius:4px; font-size:12px; font-family:inherit; color:var(--text);
  cursor:pointer; transition:all .15s; }
.type-btn.selected { background:var(--brass)22; border-color:var(--brass); color:var(--brass); }

/* ── Trip detail modal ── */
.dl-drow { display:flex; gap:12px; padding:5px 0; border-bottom:1px solid var(--border); font-size:13px; }
.dl-drow:last-child { border-bottom:none; }
.dl-dlbl { font-size:9px; color:var(--muted); letter-spacing:.8px; width:90px; flex-shrink:0; padding-top:2px; }
.dl-dval { flex:1; color:var(--text); }
</style>
</head>
<body>
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div id="mainWrap" style="max-width:720px;margin:0 auto;padding:16px 16px 80px">

  <!-- ══ DATE NAV ══ -->
  <div class="date-nav">
    <button id="prevBtn">◀</button>
    <div class="date-big" id="dateBig"></div>
    <button id="nextBtn">▶</button>
    <button id="todayBtn" data-s="daily.today"></button>
  </div>
    <div class="date-hero" id="dateHero"></div>

  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <div class="signoff-badge hidden" id="signoffBadge"></div>
    <div class="readonly-badge hidden" id="readonlyBadge" data-s="daily.readOnly"></div>
  </div>

  <!-- ══ 1. WEATHER WIDGET ══ -->
  <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px" data-s="daily.wxLog"></div>
  <div class="content-card" style="margin-bottom:4px">
    <div id="wxLogList"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <button class="btn-ghost" id="logWxBtn" style="font-size:11px;padding:3px 10px" data-s="daily.wxLogBtn"></button>
      <span id="logWxDesc" style="font-size:10px;color:var(--muted)"></span>
      <span id="wxLogCount" style="font-size:10px;color:var(--muted);margin-left:auto"></span>
    </div>
  </div>

  <!-- ══ 2. TIDES ══ -->
  <div class="section-heading" data-s="daily.tides"></div>
  <div class="content-card" style="margin-bottom:4px">
    <div class="tide-grid">
      <div class="tide-cell">
        <div class="tide-label">HIGH 1</div>
        <div class="tide-inputs">
          <input type="time" id="tideH1Time" style="max-width:100px">
          <input type="number" id="tideH1Height" placeholder="m" step="0.1" style="max-width:60px">
        </div>
      </div>
      <div class="tide-cell">
        <div class="tide-label">LOW 1</div>
        <div class="tide-inputs">
          <input type="time" id="tideL1Time" style="max-width:100px">
          <input type="number" id="tideL1Height" placeholder="m" step="0.1" style="max-width:60px">
        </div>
      </div>
      <div class="tide-cell">
        <div class="tide-label">HIGH 2</div>
        <div class="tide-inputs">
          <input type="time" id="tideH2Time" style="max-width:100px">
          <input type="number" id="tideH2Height" placeholder="m" step="0.1" style="max-width:60px">
        </div>
      </div>
      <div class="tide-cell">
        <div class="tide-label">LOW 2</div>
        <div class="tide-inputs">
          <input type="time" id="tideL2Time" style="max-width:100px">
          <input type="number" id="tideL2Height" placeholder="m" step="0.1" style="max-width:60px">
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 3. TRIPS TODAY ══ -->
  <div class="section-heading">
    <span data-s="daily.tripsToday"></span>
    <span id="tripsCount" style="font-weight:normal"></span>
  </div>
  <div class="content-card" id="tripsCard">
    <div class="empty-state"><span class="spinner"></span></div>
  </div>

  <!-- ══ 4. OPENING CHECKLIST ══ -->
  <div class="section-heading" data-s="daily.openingChecklist"></div>
  <div class="content-card" id="amCard"></div>

  <!-- ══ 5. ACTIVITIES ══ -->
  <div class="section-heading">
    <span data-s="daily.activities"></span>
    <button class="btn-ghost" id="addActivityBtn" style="font-size:11px;padding:3px 10px" data-s="daily.addActivity"></button>
  </div>
  <div class="content-card" id="activitiesCard">
    <div class="empty-state" id="activitiesEmpty" data-s="daily.noActivities"></div>
    <div id="activitiesList"></div>
  </div>

  <!-- ══ 6. STAFF NOTES ══ -->
  <div class="section-heading" data-s="daily.staffNotes"></div>
  <div class="content-card">
    <textarea id="narrativeInput" rows="4" style="width:100%;resize:vertical"></textarea>
  </div>

  <!-- ══ 7. INCIDENTS ══ -->
  <div class="section-heading" id="incidentHeading" data-s="daily.incidentReport"></div>
  <div id="incidentContainer"></div>

  <!-- ══ 8. CLOSING CHECKLIST ══ -->
  <div class="section-heading" data-s="daily.closingChecklist"></div>
  <div class="content-card" id="pmCard"></div>

  <!-- ══ SAVE BAR ══ -->
  <div class="save-bar">
    <span id="saveMsg"></span>
    <button class="btn btn-secondary" id="saveDraftBtn" data-s="btn.saveDraft"></button>
    <button class="btn btn-primary"   id="signOffBtn"   data-s="btn.signOff"></button>
  </div>

</div><!-- /mainWrap -->

<!-- ══ ACTIVITY MODAL ══ -->
<div class="modal-overlay hidden" id="activityModal">
  <div class="modal">
    <h3 data-s="daily.activityModal"></h3>
    <div class="field">
      <label data-s="daily.actType"></label>
      <div class="type-btns" id="actTypeBtns"></div>
    </div>
    <!-- Subtype buttons -->
    <div class="field" id="actSubtypeField" style="display:none">
      <div class="type-btns" id="actSubtypeBtns"></div>
    </div>
    <div class="field">
      <label data-s="daily.actNameLabel"></label>
      <input type="text" id="actName">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field">
        <label data-s="daily.startTime"></label>
        <input type="time" id="actStart">
      </div>
      <div class="field">
        <label data-s="daily.endTime"></label>
        <input type="time" id="actEnd">
      </div>
    </div>
    <div class="field">
      <label data-s="daily.actParticipants"></label>
      <input type="text" id="actParticipants">
    </div>
    <div class="field">
      <label data-s="daily.actNotes"></label>
      <input type="text" id="actNotes">
    </div>
    <!-- Abler checkbox -->
    <div class="check-row" style="margin:10px 0">
      <input type="checkbox" id="actAbler">
      <label for="actAbler" style="font-size:12px">Activity details registered in Abler</label>
    </div>
    <!-- Group checkout link -->
    <div id="actGroupLinkSection" style="margin-bottom:12px">
      <div style="font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px">Linked group checkouts</div>
      <div id="actGroupLinkCards" style="display:flex;flex-direction:column;gap:6px;margin-bottom:6px"></div>
      <button type="button" onclick="openGroupLinkPicker()" style="background:none;border:1px dashed var(--border);border-radius:6px;width:100%;padding:6px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit">+ Link group checkout</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="actCancelBtn" data-s="btn.cancel"></button>
      <button class="btn btn-primary"   id="actSaveBtn"   data-s="btn.save"></button>
    </div>
  </div>
</div>

<!-- ══ GROUP LINK PICKER ══ -->
<div class="modal-overlay hidden" id="groupLinkModal" onclick="if(event.target===this)closeModal('groupLinkModal')">
  <div class="modal" style="max-width:480px">
    <h3 style="margin-bottom:14px">Link Group Checkout</h3>
    <div id="groupLinkPickerCards" style="margin-bottom:14px"></div>
    <div id="groupLinkEmpty" style="display:none;color:var(--muted);font-size:12px;margin-bottom:14px">No active group checkouts today.</div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('groupLinkModal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmGroupLink()">Link selected</button>
    </div>
  </div>
</div>

<!-- ══ TRIP DETAIL MODAL ══ -->
<div class="modal-overlay hidden" id="tripDetailModal"
  onclick="if(event.target===this)closeModal('tripDetailModal')">
  <div class="modal" style="max-width:480px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0" id="tdTitle"></h3>
      <button class="btn-ghost" onclick="closeModal('tripDetailModal')"
        style="font-size:20px;padding:0 6px;line-height:1;border:none;color:var(--muted)">×</button>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px">
      <div style="font-size:10px;color:var(--brass);letter-spacing:1.5px;margin-bottom:10px">TRIP</div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.boat"></span><span class="dl-dval" id="tdBoat"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.location"></span><span class="dl-dval" id="tdLocation"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" id="tdOutLabel"></span><span class="dl-dval" id="tdOut"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" id="tdReturnLabel"></span><span class="dl-dval" id="tdReturn"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" id="tdInLabel"></span><span class="dl-dval" id="tdIn"></span></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.crew"></span><span class="dl-dval" id="tdCrew"></span></div>
      <div class="dl-drow" id="tdNotesRow"><span class="dl-dlbl" data-s="lbl.notes"></span><span class="dl-dval" id="tdNotes"></span></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px" id="tdMemberSection">
      <div style="font-size:10px;color:var(--brass);letter-spacing:1.5px;margin-bottom:10px" data-s="lbl.member"></div>
      <div class="dl-drow"><span class="dl-dlbl" data-s="lbl.name"></span><span class="dl-dval" id="tdMember"></span></div>
      <div class="dl-drow" id="tdPhoneRow"><span class="dl-dlbl" data-s="lbl.phone"></span><span class="dl-dval" id="tdPhone"></span></div>
      <div class="dl-drow" id="tdGuardianRow"><span class="dl-dlbl" data-s="lbl.guardian"></span><span class="dl-dval" id="tdGuardian"></span></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// SECTION 1 — AUTH + CONSTANTS
// ════════════════════════════════════════════════════════════════════════════
const user  = requireAuth(isStaff);
const L     = getLang();
const TODAY = new Date().toISOString().slice(0, 10);

function esc(s) {
  return (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════════════════════════
// SECTION 2 — DEFAULT FALLBACK DATA
// ════════════════════════════════════════════════════════════════════════════
const DEFAULT_AM = [
  { id:'am1', textEN:'Check all boats for damage',    textIS:'Athuga alla báta vegna skemmda' },
  { id:'am2', textEN:'Inspect safety equipment',      textIS:'Skoða öryggisbúnað' },
  { id:'am3', textEN:'Confirm weather conditions',    textIS:'Staðfesta veðurlag' },
  { id:'am4', textEN:'Open clubhouse and facilities', textIS:'Opna klúbbhús og aðstöðu' },
  { id:'am5', textEN:'Check radio / communication',   textIS:'Athuga útvarps- og samskiptabúnað' },
  { id:'am6', textEN:'Brief duty staff on conditions',textIS:'Kynna starfsfólki aðstæður' },
];
const DEFAULT_PM = [
  { id:'pm1', textEN:'All boats returned and secured',textIS:'Allir bátar komnir og tryggðir' },
  { id:'pm2', textEN:'Damage reports filed if needed',textIS:'Skemmdarskýrslur lagðar ef þarf' },
  { id:'pm3', textEN:'Safety equipment stowed',       textIS:'Öryggisbúnaður geymdur' },
  { id:'pm4', textEN:'Facilities locked and secured', textIS:'Aðstaða læst og tryggð' },
  { id:'pm5', textEN:'Log completed and signed off',  textIS:'Skráning lokið og undirrituð' },
];
const DEFAULT_TYPES = [
  { id:'t1', name:'Lesson',     nameIS:'Kennsla' },
  { id:'t2', name:'Race',       nameIS:'Keppni' },
  { id:'t3', name:'Club event', nameIS:'Félagsviðburður' },
  { id:'t4', name:'Training',   nameIS:'Þjálfun' },
  { id:'t5', name:'Maintenance',nameIS:'Viðhald' },
  { id:'t6', name:'Other',      nameIS:'Annað' },
];

// ════════════════════════════════════════════════════════════════════════════
// SECTION 3 — STATE
// ════════════════════════════════════════════════════════════════════════════
let viewDate  = TODAY;
let logId     = null;
let dirty     = false;
let wxData    = null;
let wxLog     = [];
let amChecks  = {};
let pmChecks  = {};
let amItems   = DEFAULT_AM;
let pmItems   = DEFAULT_PM;
let activities    = [];
let activityTypes = DEFAULT_TYPES;
let tripsData     = [];
let tideData      = {};
let _selectedActType = null;

// ════════════════════════════════════════════════════════════════════════════
// SECTION 4 — DOM REFS
// ════════════════════════════════════════════════════════════════════════════
const dom = domRefs({
  mainWrap:          'mainWrap',
  dateBig:           'dateBig',
  dateHero:          'dateHero',
  prevBtn:           'prevBtn',
  nextBtn:           'nextBtn',
  todayBtn:          'todayBtn',
  signoffBadge:      'signoffBadge',
  readonlyBadge:     'readonlyBadge',
  logWxBtn:          'logWxBtn',
  logWxDesc:         'logWxDesc',
  wxLogList:         'wxLogList',
  wxLogCount:        'wxLogCount',
  tripsCard:         'tripsCard',
  tripsCount:        'tripsCount',
  amCard:            'amCard',
  pmCard:            'pmCard',
  activitiesCard:    'activitiesCard',
  activitiesEmpty:   'activitiesEmpty',
  activitiesList:    'activitiesList',
  narrativeInput:    'narrativeInput',
  incidentContainer: 'incidentContainer',
  incidentHeading:   'incidentHeading',
  saveMsg:           'saveMsg',
  saveDraftBtn:      'saveDraftBtn',
  signOffBtn:        'signOffBtn',
  actTypeBtns:       'actTypeBtns',
  actName:           'actName',
  actStart:          'actStart',
  actEnd:            'actEnd',
  actParticipants:   'actParticipants',
  actNotes:          'actNotes',
  activityModal:     'activityModal',
  addActivityBtn:    'addActivityBtn',
  addActivityBtn: 'addActivityBtn',
  tideH1Time: 'tideH1Time', tideH1Height: 'tideH1Height',
  tideL1Time: 'tideL1Time', tideL1Height: 'tideL1Height',
  tideH2Time: 'tideH2Time', tideH2Height: 'tideH2Height',
  tideL2Time: 'tideL2Time', tideL2Height: 'tideL2Height',
});

// ════════════════════════════════════════════════════════════════════════════
// SECTION 5 — RENDER
// ════════════════════════════════════════════════════════════════════════════
function renderTrips() {
  const spinner = '<div class="empty-state"><span class="spinner"></span></div>';
  if (!tripsData.length) {
    dom.tripsCard.innerHTML = `<div class="empty-state">${s('daily.noTrips')}</div>`;
    dom.tripsCount.textContent = '';
    return;
  }
  dom.tripsCount.textContent = `(${tripsData.length})`;
  replaceWithFragment(dom.tripsCard, tripsData, co => {
    const row   = document.createElement('div');
    row.className = 'trip-row';
    row.dataset.tripId = co.id;
    const tout  = (co.checkedOutAt||co.timeOut||'').slice(0,5);
    const tin   = (co.checkedInAt ||co.timeIn ||'').slice(0,5);
    const retBy = (co.expectedReturn||'').slice(0,5);
    const overdue = retBy && !tin && retBy < fmtTimeNow();
    row.innerHTML = `<div style="flex:1">
      <div class="trip-boat">${esc(co.boatName||co.boatId)}
        ${co.memberIsMinor ? `<span class="badge badge-yellow" style="margin-left:6px">${s('lbl.minor')}</span>` : ''}
      </div>
      <div class="trip-meta">${esc(co.memberName||'')}${co.locationName ? ' · '+esc(co.locationName) : ''}${co.crew && co.crew > 1 ? ' · '+co.crew+' '+s('lbl.crew').toLowerCase() : ''}</div>
    </div>
    <div class="trip-times">
      <div>${tout || '—'}</div>
      ${tin ? `<div style="color:var(--green)">${tin}</div>` : (retBy ? `<div style="color:${overdue?'var(--red)':'var(--muted)'}">↩${retBy}</div>` : '')}
    </div>`;
    return row;
  });
}

function renderCL(card, items, state, prefix) {
  const done = items.filter(i => state[i.id]).length;
  const pct  = items.length ? Math.round(done / items.length * 100) : 0;
  card.innerHTML = '';
  const prog = document.createElement('div');
  prog.className = 'cl-progress-line';
  prog.innerHTML = `<span>${done}</span> / ${items.length} complete`;
  const barWrap = document.createElement('div'); barWrap.className = 'cl-bar-wrap';
  const bar = document.createElement('div'); bar.className = 'cl-bar'; bar.style.width = pct + '%';
  barWrap.appendChild(bar); card.appendChild(prog); card.appendChild(barWrap);
  items.forEach(it => {
    const row = document.createElement('label');
    row.className = 'checklist-item' + (state[it.id] ? ' done' : '');
    row.dataset.toggle = '1'; row.dataset.prefix = prefix; row.dataset.itemId = it.id;
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!state[it.id];
    const txt = document.createElement('span'); txt.className = 'item-text';
    txt.textContent = L === 'IS' && it.textIS ? it.textIS : it.textEN;
    row.appendChild(cb); row.appendChild(txt); card.appendChild(row);
  });
}

function renderWxLog() {

  dom.wxLogCount.textContent = wxLog.length
    ? wxLog.length + (wxLog.length === 1 ? ' snapshot' : ' snapshots') : '';
  dom.wxLogList.innerHTML = "";
  wxLog.forEach(function(snap, i) {
    var card = document.createElement("div");
    card.className = "wx-snap-card";
    var time = snap.time || (snap.ts ? snap.ts.slice(11,16) : "");
    var cells = [
      { lbl:"WIND",     val: (snap.dir||"") + " " + (snap.ws!=null ? snap.ws+"m/s · Force "+snap.bft : "—") },
      { lbl:"GUSTS",    val: (snap.wg!=null && snap.wg!==snap.ws) ? snap.wg+"m/s" : null },
      { lbl:"WAVES",    val: snap.wv!=null ? snap.wv+"m"+(snap.waveDir?" "+snap.waveDir:"") : null },
      { lbl:"SEA TEMP", val: snap.sst!=null ? snap.sst+"°C" : null },
      { lbl:"CONDITIONS", val: snap.cond ? snap.cond.icon+" "+snap.cond.desc : null },
      { lbl:"AIR",      val: snap.tc!=null ? snap.tc+"°C"+(snap.feels!=null&&snap.feels!==snap.tc?" / feels "+snap.feels+"°C":"") : null },
      { lbl:"PRESSURE", val: snap.pres!=null ? snap.pres+"hPa"+(snap.presTrend?" "+(snap.presTrend==="rising"?"↗":snap.presTrend==="falling"?"↘":"→"):"") : null },
    ].filter(function(c) { return c.val; });
    var gridHtml = cells.map(function(c) {
      return '<div><div class="wx-snap-label">'+c.lbl+'</div><div class="wx-snap-val">'+esc(c.val)+'</div></div>';
    }).join("");
    card.innerHTML =
      '<div class="wx-snap-header">'
      + '<span class="wx-snap-time">' + esc(time) + '</span>'
      + '<span class="wx-snap-flag">' + (snap.flag ? fi[snap.flag]||"" : "") + '</span>'
      + '<button class="del-btn" data-delete-wx="' + i + '" style="font-size:14px">&times;</button>'
      + '</div>'
      + '<div class="wx-snap-grid">' + gridHtml + '</div>';
    dom.wxLogList.appendChild(card);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildHeader('dailylog');

    toggleCL(item.dataset.prefix, item.dataset.itemId);
  });

  dom.activitiesList.addEventListener('click', e => {

    if (!btn) return;

  });

  dom.wxLogList.addEventListener('click', e => {

    if (!btn) return;
    const idx = parseInt(btn.dataset.deleteWx);
    wxLog.splice(idx, 1);
    renderWxLog();
    markDirty();
  });

  dom.actTypeBtns.addEventListener('click', e => {
    const btn = e.target.closest('[data-type-id]');
    if (!btn) return;
    _selectedActType = btn.dataset.typeId;
    dom.actTypeBtns.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('selected', b === btn));
  });

  dom.tripsCard.addEventListener('click', e => {
    const row = e.target.closest('[data-trip-id]');
    if (!row) return;
    openTripDetail(row.dataset.tripId);
  });

  function debounce(fn, ms) {
    let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }
  const debouncedNav = debounce(navigateDay, 300);
  dom.prevBtn.addEventListener('click',  () => debouncedNav(-1));
  dom.nextBtn.addEventListener('click',  () => debouncedNav(1));
  dom.todayBtn.addEventListener('click', () => navigateToToday());

  dom.addActivityBtn.addEventListener('click', openActivityModal);
  document.getElementById('actCancelBtn').addEventListener('click', closeActivityModal);
  document.getElementById('actSaveBtn').addEventListener('click',   saveActivity);

  dom.saveDraftBtn.addEventListener('click', saveDraft);
  dom.signOffBtn.addEventListener('click',   signOffDay);
  dom.logWxBtn.addEventListener('click',     logCurrentWeather);

  ['tideH1Time','tideH1Height','tideL1Time','tideL1Height',
   'tideH2Time','tideH2Height','tideL2Time','tideL2Height'].forEach(id => {
    dom[id].addEventListener('change', markDirty);
  });

  // Silent weather poll for snapshots
  let _wxTimer = null;
  async function pollWx() {
    try {
      var fetched = await wxFetch(WX_DEFAULT.lat, WX_DEFAULT.lon);
      var c = fetched.wx.current, hr = fetched.wx.hourly;
      var mc = (fetched.marine && fetched.marine.current) ? fetched.marine.current : {};
      var ws = c.wind_speed_10m || 0, wg = c.wind_gusts_10m || ws, wd = c.wind_direction_10m;
      var bft = wxMsToBft(ws), wDir = wxDirLabel(wd);
      var waveH   = mc.wave_height != null ? mc.wave_height : null;
      var waveDir = mc.wave_direction != null ? wxDirLabel(mc.wave_direction) : null;
      var sst     = mc.sea_surface_temperature != null ? mc.sea_surface_temperature : null;
      var nowISO  = new Date().toISOString().slice(0,13);
      var nowIdx  = Math.max(0, (hr.time||[]).findIndex(function(tt) { return tt.slice(0,13) === nowISO; }));
      var presObj = wxPressureTrend(hr.surface_pressure, nowIdx);
      var assessed = wxAssessFlag(ws, wDir, waveH || 0);
      wxData = { ws:ws, wd:wd, wg:wg, bft:bft, wDir:wDir, waveH:waveH,
                 waveDir:waveDir, sst:sst, flagKey:assessed.flagKey,
                 airT:c.temperature_2m, apparentT:c.apparent_temperature,
                 pres:c.surface_pressure, presTrend:presObj.trend,
                 code:c.weather_code };
    } catch(e) {}
  }
  pollWx();
  _wxTimer = setInterval(pollWx, 10 * 60 * 1000);

  navigateToToday();

  // Handle ?linkCheckout= redirect from staff group checkout
  const _lcParam = new URLSearchParams(location.search).get('linkCheckout');
  if (_lcParam) {
    _linkedGroupCheckoutIds = [_lcParam];
    setTimeout(function(){ openActivityModal(); }, 800);
  }

  warmContainer();
  // Auto-save every 30s when dirty
  setInterval(function(){ if (dirty && isToday()) saveDraft(); }, 30000);
});

function isToday() { return viewDate === TODAY; }

function updateDateNav() {
  dom.nextBtn.disabled = isToday();
  dom.todayBtn.disabled = isToday();
  dom.mainWrap.classList.toggle('readonly', !isToday());
  const isEditable = isToday();
  dom.saveDraftBtn.style.display = isEditable ? '' : 'none';
  dom.signOffBtn.style.display   = isEditable ? '' : 'none';
  dom.logWxBtn.parentElement.style.display = 'block';
  dom.logWxBtn.style.display   = isEditable ? '' : 'none';
  dom.logWxDesc.style.display  = isEditable ? '' : 'none';
  if (!isEditable) dom.readonlyBadge.classList.remove('hidden');
  else             dom.readonlyBadge.classList.add('hidden');
}

function navigateDay(d) {
  const dt = new Date(viewDate + 'T12:00:00');
  dt.setDate(dt.getDate() + d);
  const next = dt.toISOString().slice(0, 10);
  if (next > TODAY) return;
  viewDate = next;
  loadDay();
}

function navigateToToday() {
  viewDate = TODAY;
  loadDay();
}

// SECTION 8 — CHECKLIST TOGGLE
// ════════════════════════════════════════════════════════════════════════════
function toggleCL(prefix, id) {
  if (!isToday()) return;
  // normalise new phase names (opening/closing) to internal am/pm keys
  const _p    = (prefix === 'opening') ? 'am' : (prefix === 'closing') ? 'pm' : prefix;
  const state = _p === 'am' ?
  amChecks : pmChecks;
  state[id] = !state[id];
  const items = _p === 'am' ? amItems : pmItems;
  const item = document.querySelector(`[data-prefix="${prefix}"][data-item-id="${id}"]`);
  if (item) {
    item.classList.toggle('done', !!state[id]);
    const cb = item.querySelector('input[type=checkbox]');
    if (cb) cb.checked = !!state[id];
  }
  updateCLProgress(_p === 'am' ? dom.amCard : dom.pmCard, items, state);
  markDirty();
}

function updateCLProgress(card, items, state) {
  const done = items.filter(i => state[i.id]).length;
  const pct  = items.length ? Math.round(done / items.length * 100) : 0;
  const prog = card.querySelector('.cl-progress-line');
  if (prog) prog.querySelector('span').textContent = done;
  const bar = card.querySelector('.cl-bar');
  if (bar) bar.style.width = pct + '%';
}

function deleteActivity(id) {
  activities = activities.filter(a => a.id !== id);
  renderActivities();
  markDirty();
}

function openActivityModal() {
  _selectedActType = activityTypes[0]?.id || null;
  _linkedGroupCheckoutIds = [];
  _selectedSubtype = null;
  renderActTypeBtns();
  populateActSubtypes();
  dom.actName.value = '';
  dom.actStart.value = '';
  dom.actEnd.value = '';
  dom.actParticipants.value = '';
  dom.actNotes.value = '';
  document.getElementById('actAbler').checked = false;

  dom.activityModal.classList.remove('hidden');
}
function closeActivityModal() { dom.activityModal.classList.add('hidden'); }

function saveActivity() {
  const name = dom.actName.value.trim();
  const typeObj = activityTypes.find(t => t.id === _selectedActType);
  if (!name)    { showToast(s('daily.actNameLabel') + ' required.', 'warn'); return; }
  if (!typeObj) { showToast(s('daily.actType') + ' required.', 'warn'); return; }
  const selSubtype = _selectedSubtype || '';
  const subtypeObj = selSubtype ? (Array.isArray(typeObj.subtypes)?typeObj.subtypes:JSON.parse(typeObj.subtypes||'[]')).find(st => st.id === selSubtype) : null;
  activities.push({
    id:                    'act-' + Date.now(),
    activityTypeId:        typeObj.id,
    subtypeId:             selSubtype || '',
    subtypeName:           subtypeObj ? (L==='IS'&&subtypeObj.nameIS?subtypeObj.nameIS:subtypeObj.name) : '',
    type:                  L === 'IS' && typeObj.nameIS ? typeObj.nameIS : typeObj.name,
    name,
    start:                 dom.actStart.value || '',
    end:                   dom.actEnd.value   || '',
    participants:          dom.actParticipants.value || '',
    notes:                 dom.actNotes.value.trim(),
    ablerRegistered:       document.getElementById('actAbler').checked,
    linkedGroupCheckoutIds: _linkedGroupCheckoutIds.slice(),
  });
  renderActivities();
  closeActivityModal();
  markDirty();
  saveDraft(); // auto-save when activity added
}


function logCurrentWeather() {
  if (!wxData) { showToast(s('wx.unavailable'), 'warn'); return; }
  const snap = wxSnapshot(wxData);
  if (snap) {
    snap.time = new Date().toTimeString().slice(0, 5);
    snap.pres = wxData.pres  != null ? Math.round(wxData.pres)  : null;
    wxLog.unshift(snap);
    renderWxLog();
    markDirty();
  }
}

  dom.wxLogCount.textContent = '';
  dom.tripsCount.textContent = '';
  ['tideH1Time','tideH1Height','tideL1Time','tideL1Height',
   'tideH2Time','tideH2Height','tideL2Time','tideL2Height'].forEach(id => { dom[id].value = ''; });

  if (isToday()) {
    await Promise.all([loadTodayLog(), loadTodayTrips()]);
  } else {
    await Promise.all([loadPastLog(), loadPastTrips()]);
  }
}

async function loadTodayLog() {
  renderChecklists(); renderActivities(); renderWxLog(); renderActTypeBtns(); renderIncidentSection([]);
  try {
    const [logRes, cfgRes] = await Promise.all([
      apiGet('getDailyLog', { date: TODAY }),
      apiGet('getConfig'),
    ]);
    applyLogData(logRes.log, cfgRes);
  } catch(e) {
    console.warn('loadTodayLog failed:', e.message);
  }
  renderChecklists();
  renderActivities();
  renderWxLog();
  renderActTypeBtns();
}

async function loadPastLog() {
  try {
    const [logRes, cfgRes, incidents] = await Promise.all([
      apiGet('getDailyLog', { date: viewDate }),
      apiGet('getConfig'),
      loadIncidentsForDate(viewDate),
    ]);
    applyLogData(logRes.log, cfgRes);
    renderIncidentSection(incidents);
  } catch(e) {
    console.warn('loadPastLog failed:', e.message);
    renderIncidentSection([]);
  }
  renderChecklistsReadonly();
  renderActivitiesReadonly();
  renderWxLog();
}

async function loadTodayTrips() {
  try {
    const res = await apiGet('getActiveCheckouts').then(r => { window._activeCheckouts = (r.checkouts||[]); return r; });
    tripsData = res.checkouts || [];
  } catch(e) { tripsData = []; }
  renderTrips();
}

async function loadPastTrips() {
  try {
    const res = await apiGet('getTrips', { date: viewDate });
    tripsData = (res.trips || []).filter(t => t.timeIn); // only completed trips
  } catch(e) {
    tripsData = [];
  }
  renderTrips();
}
async function loadIncidentsForDate(date) {
  try {
    const res = await apiGet('getIncidents', { date });
    return res.incidents || [];
  } catch(e) { return []; }
}

function applyLogData(log, cfgRes) {
  const cfg = cfgRes || {};
  amItems       = cfg.dailyChecklist?.opening || cfg.dailyChecklist?.am  || DEFAULT_AM;
  pmItems       = cfg.dailyChecklist?.closing  || cfg.dailyChecklist?.pm  || DEFAULT_PM;
  activityTypes = cfg.activityTypes       || DEFAULT_TYPES;
  if (log) {
    logId    = log.id;
    amChecks = sjson(log.openingChecks, {});
    pmChecks = sjson(log.closingChecks, {});
    activities = sjson(log.activities, []);
    wxLog    = sjson(log.weatherLog, []);
    tideData = sjson(log.tideData, {});
    dom.narrativeInput.value = log.narrative || '';
    populateTideFields();
    if (log.signedOffBy) {
      dom.signoffBadge.classList.remove('hidden');
      const at = log.signedOffAt
        ? ' at ' + new Date(log.signedOffAt).toLocaleTimeString(L === 'IS' ? 'is-IS' : 'en-GB', {hour:'2-digit',minute:'2-digit'}) : '';
      dom.signoffBadge.textContent = s('daily.signedOffBy') + (log.signedOffBy||'') + at;
    }
  }
}

// ════════════════════════════════════════════════════════════════════════════
// SECTION 10 — SAVE / SIGN OFF
// ════════════════════════════════════════════════════════════════════════════
function markDirty() { dirty = true; }

async function saveDraft()  { if (!isToday()) return; await doSave(false); }
async function signOffDay() {
  if (!isToday()) return;
  const done = pmItems.filter(i => pmChecks[i.id]).length;
  if (done < pmItems.length) {
    const msg = s('daily.signOffConfirm').replace('{done}',done).replace('{total}',pmItems.length);
    if (!confirm(msg)) return;
  }
  await doSave(true);
}

async function doSave(signOff) {
  const btn = dom[signOff ? 'signOffBtn' : 'saveDraftBtn'];
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = signOff ? s('daily.signOffSaving') : s('daily.saveDraftSaving');
  dom.saveMsg.textContent = '';

  try {
    const payload = {
      date:          viewDate,
      openingChecks: JSON.stringify(amChecks),
      closingChecks: JSON.stringify(pmChecks),
      activities:    JSON.stringify(activities),
      weatherLog:    JSON.stringify(wxLog),
      tideData:      JSON.stringify(readTideFields()),
      narrative:     dom.narrativeInput.value.trim(),
      signOff,
      ...(logId ? { id: logId } : {}),
    };
    const res = await apiPost('saveDailyLog', payload);
    if (res.id && !logId) logId = res.id;
    dirty = false;
    dom.saveMsg.className = 'save-ok';
    dom.saveMsg.textContent = signOff ? s('toast.signedOff') : s('toast.saved');
    if (signOff) {
      dom.signoffBadge.classList.remove('hidden');
      dom.signoffBadge.textContent = s('daily.signedOffBy') + user.name;
    }
    showToast(signOff ? s('toast.signedOff') : s('toast.saved'));
  } catch(e) {
    dom.saveMsg.className = 'save-err';
    dom.saveMsg.textContent = s('toast.error') + ': ' + e.message;
    showToast(s('toast.saveFailed') + ': ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

// ── Activity subtype + group link helpers ────────────────────────────────────
let _linkedGroupCheckoutIds = [];
let _selectedSubtype = null;
let _groupLinkPickerSelected = new Set();

function populateActSubtypes() {
  const typeObj = activityTypes.find(t => t.id === _selectedActType);
  const grid    = document.getElementById('actSubtypeBtns');
  const field   = document.getElementById('actSubtypeField');
  if (!grid || !field) return;
  const subs = typeObj && typeObj.subtypes
    ? (Array.isArray(typeObj.subtypes) ? typeObj.subtypes : JSON.parse(typeObj.subtypes || '[]'))
    : [];
  if (!subs.length) { field.style.display = 'none'; grid.innerHTML = ''; return; }
  field.style.display = '';
  grid.innerHTML = '';
  subs.forEach(function(st) {
    const btn = document.createElement('button');
    btn.className = 'type-btn';
    btn.dataset.subtypeId = st.id;
    const label = L==='IS' && st.nameIS ? st.nameIS : st.name;
    const times = st.defaultStart ? '\n' + st.defaultStart + (st.defaultEnd ? '\u2013'+st.defaultEnd : '') : '';
    btn.textContent = label + times;
    btn.style.whiteSpace = 'pre';
    btn.addEventListener('click', function() {
      // Toggle selection
      const already = btn.classList.contains('selected');
      grid.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
      if (!already) {
        btn.classList.add('selected');
        _selectedSubtype = st.id;
        applyActSubtype(st);
      } else {
        _selectedSubtype = null;
      }
    });
    grid.appendChild(btn);
  });
}

function applyActSubtype(st) {
  if (!st) return;
  // Pre-fill name only if empty
  if (!dom.actName.value) dom.actName.value = L==='IS'&&st.nameIS ? st.nameIS : st.name;
  if (st.defaultStart) dom.actStart.value = st.defaultStart;
  if (st.defaultEnd)   dom.actEnd.value   = st.defaultEnd;
}

function renderGroupLinkCards() {
  const wrap = document.getElementById('actGroupLinkCards');
  if (!wrap) return;
  if (!_linkedGroupCheckoutIds.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = _linkedGroupCheckoutIds.map(function(id) {
    return '<div style="background:var(--card);border:1px solid #2e86c155;border-left:3px solid #2e86c1;border-radius:6px;padding:6px 10px;font-size:11px;display:flex;align-items:center;justify-content:space-between">' +
      '<span>⛵ Group checkout ' + esc(id.slice(-6)) + '</span>' +
      '<button onclick="_linkedGroupCheckoutIds=_linkedGroupCheckoutIds.filter(x=>x!==\'' + id + '\');renderGroupLinkCards()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>' +
      '</div>';
  }).join('');
}

function openGroupLinkPicker() {
  _groupLinkPickerSelected = new Set(_linkedGroupCheckoutIds);
  const wrap  = document.getElementById('groupLinkPickerCards');
  const empty = document.getElementById('groupLinkEmpty');
  // Get today's group checkouts from the active checkouts in memory
  const groups = (window._activeCheckouts || []).filter(function(c) {
    return (c.isGroup === true || c.isGroup === 'true') && c.status === 'out';
  });
  if (!groups.length) {
    wrap.innerHTML = '';
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    wrap.innerHTML = groups.map(function(c) {
      let boatArr; try { boatArr = c.boatNames?(typeof c.boatNames==='string'?JSON.parse(c.boatNames):c.boatNames):[c.boatName||'—']; } catch(e){ boatArr=[c.boatName||'—']; }
      let staffArr; try { staffArr = c.staffNames?(typeof c.staffNames==='string'?JSON.parse(c.staffNames):c.staffNames):[]; } catch(e){ staffArr=[]; }
      const sel = _groupLinkPickerSelected.has(c.id);
      return '<div onclick="toggleGroupLinkPick(\''+c.id+'\')" style="background:' + (sel?'#0a1e2e':'var(--surface)') + ';border:1px solid ' + (sel?'#2e86c1':'var(--border)') + ';border-left:3px solid #2e86c1;border-radius:6px;padding:8px 12px;cursor:pointer;margin-bottom:6px">' +
        '<div style="font-size:12px;font-weight:500">' + esc(boatArr.join(', ')) + '</div>' +
        '<div style="font-size:11px;color:var(--muted)">' + (staffArr[0]?esc(staffArr[0])+' · ':'') + esc(c.activityTypeName||'—') + ' · Out ' + esc((c.checkedOutAt||c.timeOut||'').slice(0,5)) + '</div>' +
        '</div>';
    }).join('');
  }
  openModal('groupLinkModal');
}

function toggleGroupLinkPick(id) {
  if (_groupLinkPickerSelected.has(id)) _groupLinkPickerSelected.delete(id);
  else _groupLinkPickerSelected.add(id);
  openGroupLinkPicker();
}

function confirmGroupLink() {
  _linkedGroupCheckoutIds = Array.from(_groupLinkPickerSelected);
  renderGroupLinkCards();
  closeModal('groupLinkModal');
}

</script>
