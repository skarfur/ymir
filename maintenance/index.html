<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ýmir — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script>document.write('<script src="../shared/strings-'+(localStorage.getItem('ymirLang')||'EN').toLowerCase()+'.js"><\/script>');</script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/maintenance.js" defer></script>
  <style>
    .page-wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; 
  warmContainer();
}

    /* ── Filter bar ── */
    .filter-bar-grouped { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .filter-group { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .filter-group-label { font-size:9px; color:var(--muted); letter-spacing:1px; min-width:68px; flex-shrink:0; }
    .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted);
      border-radius:20px; padding:5px 14px; font-size:11px; font-family:inherit; cursor:pointer;
      letter-spacing:.5px; transition:all .15s; }
    .filter-btn.active { background:var(--brass); color:#0b1f38; border-color:var(--brass); }
    .filter-btn:hover:not(.active):not(.muted) { border-color:var(--brass); color:var(--brass); }
    .filter-btn.muted { opacity:0.3; pointer-events:none; border-style:dashed; }

    /* ── Stat strip ── */
    .stat-strip { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:20px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:12px; text-align:center; }
    .stat-num { font-size:24px; color:var(--brass); font-weight:500; }
    .stat-label { font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:.5px; }
    @media(max-width:580px){ .stat-strip { grid-template-columns:repeat(2,1fr); } }

    /* ── Request card ── */
    .req-card { background:var(--card); border:1px solid var(--border); border-radius:8px;
      padding:14px 16px; margin-bottom:10px; transition:border-color .15s; }
    .req-card.resolved { opacity:.45; }
    .req-card.sev-critical { border-left:3px solid var(--red); }
    .req-card.sev-high     { border-left:3px solid var(--orange); }
    .req-card.sev-medium   { border-left:3px solid var(--yellow); }
    .req-card.sev-low      { border-left:3px solid var(--green); }

    .req-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .req-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .req-meta  { display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:11px; color:var(--muted); }
    .req-desc  { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
    .req-actions { display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }
    .req-photo { width:80px; height:60px; object-fit:cover; border-radius:6px; border:1px solid var(--border);
      margin-top:8px; cursor:pointer; transition:opacity .15s; }
    .req-photo:hover { opacity:.8; }

    /* ── Comments ── */
    .comment-thread { margin-top:8px; border-top:1px solid var(--border)44; padding-top:8px; }
    .comment-item { margin-bottom:8px; }
    .comment-by { color:var(--text); font-weight:500; }
    .comment-add { display:flex; gap:6px; margin-top:8px; }
    .comment-add input { flex:1; }

    /* ── Empty / loading ── */
    .empty-wrap { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-icon { font-size:32px; margin-bottom:12px; }

    /* ── Badges ── */
    .badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px;
      font-weight:500; letter-spacing:.3px; }
    .badge-green  { background:var(--green)22;  color:var(--green);  border:1px solid var(--green)44; }
    .badge-yellow { background:var(--yellow)22; color:var(--yellow); border:1px solid var(--yellow)44; }
    .badge-orange { background:var(--orange)22; color:var(--orange); border:1px solid var(--orange)44; }
    .badge-red    { background:var(--red)22;    color:var(--red);    border:1px solid var(--red)44; }
    .badge-muted  { background:var(--surface);  color:var(--muted);  border:1px solid var(--border); }
    .oos-badge { font-size:10px; background:var(--red)22; color:var(--red);
      border:1px solid var(--red)44; border-radius:3px; padding:2px 6px; font-weight:500; }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200;
      display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.hidden { display:none; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:22px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
    .modal h3 { color:var(--brass); margin-bottom:16px; font-size:15px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:10px; color:var(--muted); letter-spacing:.8px; margin-bottom:6px; }
    .field input, .field select, .field textarea {
      width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px;
      color:var(--text); padding:9px 10px; font-size:13px; font-family:inherit; box-sizing:border-box; }
    .field textarea { resize:vertical; min-height:72px; }
    .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

    /* Severity selector */
    .sev-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .sev-btn { flex:1; min-width:70px; padding:8px 4px; border-radius:6px; border:1px solid;
      font-size:11px; font-family:inherit; cursor:pointer; text-align:center; font-weight:bold;
      letter-spacing:.5px; transition:all .15s; }
    .sev-btn[data-sev="low"]      { color:var(--green);  border-color:var(--green)55;  background:var(--green)11; }
    .sev-btn[data-sev="medium"]   { color:var(--yellow); border-color:var(--yellow)55; background:var(--yellow)11; }
    .sev-btn[data-sev="high"]     { color:var(--orange); border-color:var(--orange)55; background:var(--orange)11; }
    .sev-btn[data-sev="critical"] { color:var(--red);    border-color:var(--red)55;    background:var(--red)11; }
    .sev-btn.selected { filter:brightness(1.4); box-shadow:0 0 0 2px currentColor; }

    /* Category selector */
    .cat-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .cat-btn { flex:1; min-width:80px; padding:8px 6px; border-radius:6px; border:1px solid var(--border);
      background:var(--surface); color:var(--muted); font-size:11px; font-family:inherit;
      cursor:pointer; text-align:center; transition:all .15s; }
    .cat-btn.selected, .cat-btn:hover { border-color:var(--brass); color:var(--brass); background:var(--brass)11; }

    /* Photo preview */
    .photo-preview { width:80px; height:60px; object-fit:cover; border-radius:6px;
      border:1px solid var(--border); margin-top:6px; display:none; }
    .photo-preview.show { display:block; }

    /* Full-size photo overlay */
    .photo-overlay { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:300;
      display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .photo-overlay.hidden { display:none; }
    .photo-overlay img { max-width:95vw; max-height:92vh; object-fit:contain; border-radius:8px; }

    /* ── Responsive ── */
    @media(max-width:600px){
      .filter-group-label{min-width:0;width:100%}
      .filter-btn{padding:6px 10px;font-size:10px}
      .req-card{padding:12px}
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-wrap">

  <!-- Stats -->
  <div class="stat-strip">
    <div class="stat-card"><div class="stat-num" id="statOpen" style="color:var(--orange)">—</div><div class="stat-label">OPEN</div></div>
    <div class="stat-card"><div class="stat-num text-red" id="statCritical">—</div><div class="stat-label">CRITICAL</div></div>
    <div class="stat-card"><div class="stat-num text-red" id="statOos">—</div><div class="stat-label">BOATS OOS</div></div>
    <div class="stat-card"><div class="stat-num text-brass" id="statPending">—</div><div class="stat-label">PENDING REVIEW</div></div>
    <div class="stat-card"><div class="stat-num text-green" id="statResolved">—</div><div class="stat-label">RESOLVED</div></div>
  </div>
  <div class="flex-center gap-8" style="margin:12px 0">
    <button class="btn btn-primary flex-1" onclick="openNewRequest()">+ New maintenance request</button>
    <button class="btn btn-secondary flex-1" onclick="openNewRequest({saumaklubbur:true})">🧵 New sewing circle project</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar-grouped" id="filterBar">
    <div class="filter-group">
      <span class="filter-group-label">STATUS</span>
      <button class="filter-btn active" data-group="status" data-value="open">Open</button>
      <button class="filter-btn" data-group="status" data-value="resolved">Resolved</button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label">TYPE</span>
      <button class="filter-btn" data-group="type" data-value="maintenance">Maintenance</button>
      <button class="filter-btn" data-group="type" data-value="sauma">🧵 Saumaklúbbur</button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label">CATEGORY</span>
      <button class="filter-btn" data-group="category" data-value="boat">Boats</button>
      <button class="filter-btn" data-group="category" data-value="equipment">Equipment</button>
      <button class="filter-btn" data-group="category" data-value="facility">Facility</button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label">SEVERITY</span>
      <button class="filter-btn" data-group="severity" data-value="critical">Critical</button>
      <button class="filter-btn" data-group="severity" data-value="high">High</button>
      <button class="filter-btn" data-group="severity" data-value="medium">Medium</button>
      <button class="filter-btn" data-group="severity" data-value="low">Low</button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label">SAUMAKLÚBBUR</span>
      <button class="filter-btn" data-group="sauma" data-value="unassigned">Unassigned</button>
      <button class="filter-btn" data-group="sauma" data-value="myprojects">My Projects</button>
      <button class="filter-btn" data-group="sauma" data-value="pending">Pending Review</button>
    </div>
  </div>

  <!-- Request list -->
  <div id="reqList"><div class="empty-wrap"><div class="spinner"></div></div></div>

</div><!-- /page-wrap -->

<!-- ══ NEW REQUEST MODAL ══ -->
<div class="modal-overlay hidden" id="newModal" onclick="if(event.target===this)closeNewModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">🔧 New Maintenance Request</h3>
      <button class="modal-close-x" onclick="closeNewModal()">&times;</button>
    </div>

    <div class="field">
      <label>Category</label>
      <div class="cat-btns">
        <button class="cat-btn" data-cat="boat"      onclick="selectCat('boat')">⛵ Boat</button>
        <button class="cat-btn" data-cat="equipment" onclick="selectCat('equipment')">🦺 Equipment</button>
        <button class="cat-btn" data-cat="facility"  onclick="selectCat('facility')">🏠 Facility</button>
      </div>
    </div>

    <div class="field hidden" id="boatField">
      <label>Boat</label>
      <select id="newBoat"><option value="">Select boat…</option></select>
      <div id="oosField">
        <label class="mt-8">Mark boat Out of Service?</label>
        <div class="flex-center gap-8" style="margin-top:4px">
          <input type="checkbox" id="newOos" class="accent-checkbox" style="accent-color:var(--red)">
          <span class="text-md text-muted">Take this boat OOS until repaired</span>
        </div>
      </div>
    </div>

    <div class="field hidden" id="itemField">
      <label id="itemLabel">Item / Location</label>
      <input type="text" id="newItem" placeholder="e.g. Wetsuit #3 / Clubhouse roof">
    </div>

    <div class="field">
      <label>Part / Area</label>
      <input type="text" id="newPart" placeholder="e.g. Hull, mast, zipper, window…">
    </div>

    <div class="field" id="sevField">
      <label id="sevLabel">Severity</label>
      <div class="sev-btns">
        <button class="sev-btn" data-sev="low"      onclick="selectSev('low')">LOW</button>
        <button class="sev-btn" data-sev="medium"   onclick="selectSev('medium')">MEDIUM</button>
        <button class="sev-btn" data-sev="high"     onclick="selectSev('high')">HIGH</button>
        <button class="sev-btn" data-sev="critical" onclick="selectSev('critical')">CRITICAL</button>
      </div>
      <div id="sevHint" class="text-sm text-muted mb-6"></div>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="newDesc" rows="3" placeholder="Describe the issue…"></textarea>
    </div>

    <div class="field hidden" id="materialsField">
      <label data-s="sauma.materials">Materials Needed</label>
      <div id="materialsList"></div>
      <div class="flex-center gap-6 mt-8">
        <input type="text" id="newMaterialInput" placeholder="e.g. Sandpaper 120-grit…" class="flex-1">
        <button type="button" class="btn-ghost-sm" onclick="addMaterialToList()">+ Add</button>
      </div>
    </div>

    <div class="field hidden" id="verkstjoriField">
      <label data-s="sauma.verkstjori">Verkstjóri (Project Lead)</label>
      <input type="text" id="newVerkstjori" placeholder="Name or leave blank…">
      <span class="text-sm text-muted" data-s="sauma.verkstjoriHint">If left blank, any member can adopt this project.</span>
    </div>

    <div class="field" id="photoField">
      <label>Photo (optional, max 5 MB)</label>
      <input type="file" id="newPhoto" accept="image/*" onchange="handlePhotoChange(this)"
        class="text-md text-muted">
      <img id="photoPreview" class="photo-preview" alt="preview">
      <div id="photoErr" class="text-sm text-red mt-8"></div>
    </div>

    <input type="hidden" id="newSaumaklubbur" value="false">

    <div id="newErr" class="msg msg-err hidden mb-10"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeNewModal()">Cancel</button>
      <button class="btn btn-primary"   id="submitBtn" onclick="submitRequest()">Submit</button>
    </div>
  </div>
</div>

<!-- ── Full-size photo overlay ── -->
<div class="photo-overlay hidden" id="photoOverlay" onclick="this.classList.add('hidden')">
  <img id="overlayImg" src="" alt="">
</div>

<script>

// ── State ──────────────────────────────────────────────────────────────────────
let allRequests = [];
let boats = [];
let selectedCat = "";
let selectedSev = "";
let photoDataUrl = "";
let pendingPhotoFile = null;
let pendingMaterials = [];
let isSaumaMode = false;

let activeFilters = {
  status:   new Set(['open']),
  type:     new Set(),
  category: new Set(),
  severity: new Set(),
  sauma:    new Set(),
};

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  buildHeader('maintenance');
  applyStrings();

  try {
    const [rRes, cfgRes] = await Promise.all([
      apiGet("getMaintenance"),
      apiGet("getConfig"),
    ]);
    allRequests = rRes.requests || [];
    window._maintUser = window.user;
    boats = (cfgRes.boats || []).filter(b => b.active !== false && b.active !== "false");
    populateBoatSelect();
    renderStats();
    updateFilterUI();
    renderList();
  } catch(e) {
    document.getElementById("reqList").innerHTML =
      `<div class="empty-wrap"><div class="empty-icon">⚠️</div><p>${esc(s('maint.loadFailed',{msg:e.message}))}</p></div>`;
  }

  // Wire filter pill clicks via delegation
  document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn || btn.classList.contains('muted')) return;
    toggleFilter(btn.dataset.group, btn.dataset.value);
  });

  // Auto-open new request modal if navigated here with ?new=1 or ?prefillBoat=<id>
  const _qs = new URLSearchParams(window.location.search);
  if (_qs.get("new") === "1") {
    openNewRequest();
  } else if (_qs.get("prefillBoat")) {
    openNewRequest({ category: 'boat', boatId: _qs.get("prefillBoat") });
  }
});

// ── Boat select ────────────────────────────────────────────────────────────────
function populateBoatSelect() {
  const sel = document.getElementById("newBoat");
  boats.forEach(b => {
    const o = document.createElement("option");
    o.value = b.id;
    o.textContent = b.name + (b.category ? " (" + b.category + ")" : "");
    sel.appendChild(o);
  });
}

// ── Stats ──────────────────────────────────────────────────────────────────────
function renderStats() {
  const open     = allRequests.filter(r => !boolVal(r.resolved));
  const critical = open.filter(r => r.severity === "critical");
  const oos      = open.filter(r => boolVal(r.markOos) && r.category === "boat");
  const pending  = allRequests.filter(r => boolVal(r.saumaklubbur) && !boolVal(r.approved) && !boolVal(r.resolved));
  const resolved = allRequests.filter(r => boolVal(r.resolved));
  document.getElementById("statOpen").textContent     = open.length;
  document.getElementById("statCritical").textContent = critical.length;
  document.getElementById("statOos").textContent      = oos.length;
  document.getElementById("statPending").textContent  = pending.length;
  document.getElementById("statResolved").textContent = resolved.length;
}

// ── Filter & render ────────────────────────────────────────────────────────────
function toggleFilter(group, value) {
  const set = activeFilters[group];
  if (set.has(value)) set.delete(value);
  else set.add(value);
  updateFilterUI();
  renderList();
}

function updateFilterUI() {
  const tf = activeFilters.type;
  const onlySauma = tf.has('sauma') && !tf.has('maintenance');
  const onlyMaint = tf.has('maintenance') && !tf.has('sauma');

  document.querySelectorAll('#filterBar .filter-btn').forEach(btn => {
    const g = btn.dataset.group, v = btn.dataset.value;
    btn.classList.toggle('active', activeFilters[g].has(v));
    let muted = false;
    if (onlySauma && g === 'severity' && v === 'critical') muted = true;
    if (onlyMaint && g === 'sauma') muted = true;
    btn.classList.toggle('muted', muted);
    if (muted && activeFilters[g].has(v)) {
      activeFilters[g].delete(v);
      btn.classList.remove('active');
    }
  });
}

function getFiltered() {
  const f = activeFilters;
  const anyActive = Object.values(f).some(s => s.size > 0);
  const userName = window._maintUser?.name || '';

  return allRequests.filter(r => {
    const resolved = boolVal(r.resolved);
    const isSauma = boolVal(r.saumaklubbur);

    // Default: no selections = show open items
    if (!anyActive) return !resolved;

    // STATUS (OR)
    if (f.status.size > 0) {
      const ok = (f.status.has('open') && !resolved) || (f.status.has('resolved') && resolved);
      if (!ok) return false;
    }

    // TYPE (OR)
    if (f.type.size > 0) {
      const ok = (f.type.has('sauma') && isSauma) || (f.type.has('maintenance') && !isSauma);
      if (!ok) return false;
    }

    // CATEGORY (OR)
    if (f.category.size > 0) {
      if (!f.category.has(r.category)) return false;
    }

    // SEVERITY (OR)
    if (f.severity.size > 0) {
      if (!f.severity.has(r.severity)) return false;
    }

    // SAUMA-specific (OR within, AND with sauma type)
    if (f.sauma.size > 0) {
      if (!isSauma) return false;
      const matchUn = f.sauma.has('unassigned') && !r.verkstjori;
      const matchMy = f.sauma.has('myprojects') && (r.verkstjori === userName || parseJson(r.comments,[]).some(c => c.by === userName));
      const matchPending = f.sauma.has('pending') && !boolVal(r.approved);
      if (!matchUn && !matchMy && !matchPending) return false;
    }

    return true;
  });
}

function renderList() {
  const items = getFiltered();
  const el = document.getElementById("reqList");
  if (!items.length) {
    el.innerHTML = `<div class="empty-wrap"><div class="empty-icon">🔧</div><p>${s('maint.noFilterMatch')}</p></div>`;
    return;
  }
  const sevOrder = { critical:0, high:1, medium:2, low:3 };
  items.sort((a,b) => {
    const ra = boolVal(a.resolved), rb = boolVal(b.resolved);
    if (!ra && rb) return -1;
    if (ra && !rb) return 1;
    const sa = sevOrder[a.severity]??9, sb = sevOrder[b.severity]??9;
    if (sa !== sb) return sa - sb;
    return (b.createdAt||"") > (a.createdAt||"") ? 1 : -1;
  });
  el.innerHTML = items.map(r => renderCard(r)).join("");
  el.onclick = e => {
    const card = e.target.closest('.maint-card-clickable');
    if (!card) return;
    const r = allRequests.find(x => x.id === card.dataset.id);
    if (r) maintOpenDetail(r, window._maintUser?.name);
  };
}

function renderCard(r) {
  return '<div class="maint-card-clickable" data-id="' + esc(r.id||'') + '">'
    + maintRenderCard(r)
    + '</div>';
}

// ── Actions ────────────────────────────────────────────────────────────────────
async function resolveRequest(id) {
  if (!await ymConfirm(s('maint.resolveConfirm'))) return;
  const r = allRequests.find(x => x.id === id);
  if (!r) return;
  try {
    await apiPost("resolveMaintenance", { id, resolvedBy: (window._maintUser?.name||'Staff') });
    r.resolved = true; r.resolvedBy = (window._maintUser?.name||'Staff'); r.resolvedAt = new Date().toISOString();
    if (boolVal(r.markOos) && r.boatId) {
      try {
        const cfgR = await apiGet("getConfig");
        const allBoats = cfgR.boats || [];
        const bi = allBoats.findIndex(b => b.id === r.boatId);
        if (bi >= 0) allBoats[bi] = { ...allBoats[bi], oos: false, oosReason: "" };
        await apiPost("saveConfig", { boats: allBoats });
        boats = allBoats.filter(b => b.active !== false && b.active !== "false");
      } catch(e2) { console.warn("Could not clear OOS:", e2.message); }
    }
    renderStats(); renderList(); toast(s('maint.resolvedToast'));
  } catch(e) { ymAlert(s('logbook.errGeneric',{msg:e.message})); }
}

async function addComment(id) {
  const input = document.getElementById("ci-" + id);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  try {
    await apiPost("addMaintenanceComment", { id, by: (window._maintUser?.name || 'Staff'), text });
    const r = allRequests.find(x => x.id === id);
    if (r) {
      const comments = parseJson(r.comments, []);
      comments.push({ by: (window._maintUser?.name || 'Staff'), at: new Date().toISOString(), text });
      r.comments = JSON.stringify(comments);
    }
    renderList(); toast(s('maint.commentAdded'));
  } catch(e) { ymAlert(s('logbook.errGeneric',{msg:e.message})); }
}

function viewPhoto(url) {
  document.getElementById("overlayImg").src = url;
  document.getElementById("photoOverlay").classList.remove("hidden");
}

// ── New request modal ──────────────────────────────────────────────────────────
function openNewRequest(prefill) {
  selectedCat = ""; selectedSev = ""; photoDataUrl = ""; pendingPhotoFile = null;
  isSaumaMode = !!(prefill && prefill.saumaklubbur);
  ["newPart","newDesc","newItem"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("newBoat").value = "";
  document.getElementById("newOos").checked = false;
  document.getElementById("newPhoto").value = "";
  document.getElementById("photoPreview").className = "photo-preview";
  document.getElementById("photoErr").textContent = "";
  document.getElementById("newErr").classList.add("hidden");
  document.querySelectorAll(".sev-btn").forEach(b => b.classList.remove("selected"));
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("selected"));
  document.getElementById("sevHint").textContent = "";
  document.getElementById("boatField").classList.add("hidden");
  document.getElementById("itemField").classList.add("hidden");
  document.getElementById("newVerkstjori").value = "";
  document.getElementById("materialsList").innerHTML = "";
  document.getElementById("newMaterialInput").value = "";
  pendingMaterials = [];

  // Two-mode modal
  document.getElementById("newSaumaklubbur").value = isSaumaMode ? "true" : "false";
  document.getElementById("modalTitle").textContent = isSaumaMode
    ? '🧵 New sewing circle project' : '🔧 New Maintenance Request';
  document.getElementById("sevLabel").textContent = isSaumaMode ? 'Priority' : 'Severity';
  document.querySelector('.sev-btn[data-sev="critical"]').classList.toggle("hidden", isSaumaMode);
  document.getElementById("oosField").classList.toggle("hidden", isSaumaMode);
  document.getElementById("verkstjoriField").classList.toggle("hidden", !isSaumaMode);
  document.getElementById("materialsField").classList.toggle("hidden", !isSaumaMode);

  if (prefill) {
    if (prefill.category)    selectCat(prefill.category);
    if (prefill.boatId)      document.getElementById("newBoat").value = prefill.boatId;
    if (prefill.severity)    selectSev(prefill.severity);
    if (prefill.description) document.getElementById("newDesc").value = prefill.description;
  }
  document.getElementById("newModal").classList.remove("hidden");
}

function closeNewModal() {
  document.getElementById("newModal").classList.add("hidden");
}

function selectCat(cat) {
  selectedCat = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("selected", b.dataset.cat === cat));
  document.getElementById("boatField").classList.toggle("hidden", cat !== "boat");
  document.getElementById("itemField").classList.toggle("hidden", cat === "boat");
  if (cat === "equipment") document.getElementById("itemLabel").textContent = s('maint.equipmentItem');
  if (cat === "facility")  document.getElementById("itemLabel").textContent = s('maint.locationArea');
}

function selectSev(sev) {
  selectedSev = sev;
  document.querySelectorAll(".sev-btn").forEach(b => b.classList.toggle("selected", b.dataset.sev === sev));
  document.getElementById("sevHint").textContent = SEV_HINTS[sev] || "";
  if (sev === "critical" && selectedCat === "boat") {
    document.getElementById("newOos").checked = true;
  }
}

function handlePhotoChange(input) {
  const file = input.files[0];
  const errEl = document.getElementById("photoErr");
  const preview = document.getElementById("photoPreview");
  if (!file) { photoDataUrl = ""; pendingPhotoFile = null; preview.className = "photo-preview"; return; }
  if (file.size > 5 * 1024 * 1024) {
    errEl.textContent = s('maint.imgTooLarge',{size:(file.size/1024/1024).toFixed(1)});
    input.value = ""; photoDataUrl = ""; pendingPhotoFile = null; preview.className = "photo-preview"; return;
  }
  errEl.textContent = "";
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1400;
      if (img.width <= maxW) { photoDataUrl = e.target.result; }
      else {
        const canvas = document.createElement("canvas");
        const ratio = maxW / img.width;
        canvas.width = maxW; canvas.height = Math.round(img.height * ratio);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        photoDataUrl = canvas.toDataURL("image/jpeg", 0.82);
      }
      pendingPhotoFile = { fileName: file.name, fileData: photoDataUrl, mimeType: file.type || 'image/jpeg' };
      preview.src = photoDataUrl;
      preview.className = "photo-preview show";
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function addMaterialToList() {
  const input = document.getElementById("newMaterialInput");
  const name = (input.value || "").trim();
  if (!name) return;
  pendingMaterials.push({ name, purchased: false });
  input.value = "";
  renderMaterialsList();
}
function removeMaterial(idx) {
  pendingMaterials.splice(idx, 1);
  renderMaterialsList();
}
function renderMaterialsList() {
  const el = document.getElementById("materialsList");
  el.innerHTML = pendingMaterials.map((m,i) =>
    `<div class="flex-center gap-6 text-md" style="padding:4px 0">
      <span class="flex-1">${esc(m.name)}</span>
      <button type="button" class="btn-dismiss" onclick="removeMaterial(${i})">&times;</button>
    </div>`
  ).join("");
}

async function submitRequest() {
  const btn = document.getElementById("submitBtn");
  document.getElementById("newErr").classList.add("hidden");

  if (!selectedCat) { showErr(s('maint.errCategory')); return; }
  if (!selectedSev) { showErr(s('maint.errSeverity')); return; }
  const desc = document.getElementById("newDesc").value.trim();
  if (!desc) { showErr(s('maint.errDescription')); return; }

  let boatId = "", boatName = "", itemName = "", markOos = false;
  if (selectedCat === "boat") {
    const sel = document.getElementById("newBoat");
    boatId = sel.value;
    boatName = sel.selectedOptions[0]?.text?.split(" (")[0] || "";
    if (!boatId) { showErr(s('maint.errBoat')); return; }
    markOos = document.getElementById("newOos").checked;
  } else {
    itemName = document.getElementById("newItem").value.trim();
    if (!itemName) { showErr(s('maint.errItem')); return; }
  }

  btn.disabled = true; btn.textContent = s('maint.submitting');
  try {
    let photoUrl = "";
    if (pendingPhotoFile) {
      btn.textContent = s('maint.uploadingPhoto');
      const upRes = await apiPost("uploadMaintenancePhoto", pendingPhotoFile);
      if (upRes.ok) photoUrl = upRes.photoUrl;
      else console.warn("Photo upload skipped:", upRes.error);
    }
    await apiPost("saveMaintenance", {
      category: selectedCat, boatId, boatName, itemName,
      part:        document.getElementById("newPart").value.trim(),
      severity:    selectedSev,
      description: desc,
      markOos,
      photoUrl,
      reportedBy:  (window._maintUser?.name||'Staff'),
      source:      "staff",
      saumaklubbur: isSaumaMode,
      verkstjori:  isSaumaMode ? document.getElementById("newVerkstjori").value.trim() : '',
      materials:   isSaumaMode && pendingMaterials.length ? JSON.stringify(pendingMaterials) : '',
    });
    if (markOos && boatId) {
      try {
        const cfgR2 = await apiGet("getConfig");
        const allB2 = cfgR2.boats || [];
        const bi2 = allB2.findIndex(function(b) { return b.id === boatId; });
        if (bi2 >= 0) { allB2[bi2] = Object.assign({}, allB2[bi2], { oos: true, oosReason: desc.slice(0,80) }); }
        await apiPost("saveConfig", { boats: allB2 });
        boats = allB2.filter(function(b) { return b.active !== false && b.active !== "false"; });
      } catch(e3) { console.warn("Could not set OOS:", e3.message); }
    }
    closeNewModal();
    const rRes = await apiGet("getMaintenance");
    allRequests = rRes.requests || [];
    renderStats(); renderList();
    toast(s('maint.submitted'));
  } catch(e) {
    showErr(s('logbook.errGeneric',{msg:e.message}));
  } finally {
    btn.disabled = false; btn.textContent = s('maint.submitBtn');
  }
}

function showErr(msg) {
  const el = document.getElementById("newErr");
  el.textContent = msg; el.classList.remove("hidden");
}

function toast(msg) {
  const el = document.createElement("div");
  el.className = "msg msg-ok";
  el.textContent = msg;
  el.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);min-width:200px;text-align:center;z-index:9999;font-size:12px;padding:10px 16px;border-radius:8px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function boolVal(v) { return v===true||v==="true"||v==="TRUE"||v===1||v==="1"; }
function parseJson(v, fallback) { if(!v) return fallback; try { return typeof v==="string"?JSON.parse(v):v; } catch(e){ return fallback; } }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
