<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
  <title>Ýmir — Maintenance</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="../shared/strings.js"></script>
  <script src="../shared/list-filter.js"></script>
  <script src="../shared/maintenance.js" defer></script>
  <style>
    .page-wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; 
  warmContainer();
}

    /* ── Filter bar ── */
    .filter-bar-grouped { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .filter-group { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .filter-group-label { font-size:9px; color:var(--muted); letter-spacing:1px; min-width:68px; flex-shrink:0; }
    .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted);
      border-radius:20px; padding:5px 14px; font-size:11px; font-family:inherit; cursor:pointer;
      letter-spacing:.5px; transition:all .2s; }
    .filter-btn.active { background:var(--brass); color:#0b1f38; border-color:var(--brass); }
    .filter-btn:hover:not(.active):not(.muted) { border-color:var(--brass); color:var(--brass-fg); }
    .filter-btn.muted { opacity:0.3; pointer-events:none; border-style:dashed; }

    /* ── Stat strip ── */
    .stat-strip { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:20px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
      padding:12px; text-align:center; box-shadow:var(--shadow-sm); }
    .stat-num { font-size:24px; color:var(--brass-fg); font-weight:500; }
    .stat-label { font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:.5px; }
    @media(max-width:580px){ .stat-strip { grid-template-columns:repeat(2,1fr); } }

    /* ── Request card ── */
    .req-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
      padding:14px 16px; margin-bottom:10px; transition:border-color .2s,box-shadow .2s; box-shadow:var(--shadow-sm); }
    .req-card.resolved { opacity:.45; }
    .req-card.sev-critical { border-left:3px solid var(--red); }
    .req-card.sev-high     { border-left:3px solid var(--orange); }
    .req-card.sev-medium   { border-left:3px solid var(--yellow); }
    .req-card.sev-low      { border-left:3px solid var(--green); }

    .req-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .req-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .req-meta  { display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:11px; color:var(--muted); }
    .req-desc  { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
    .req-actions { display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }
    .req-photo { width:80px; height:60px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--border);
      margin-top:8px; cursor:pointer; transition:opacity .2s; }
    .req-photo:hover { opacity:.8; }

    /* ── Comments ── */
    .comment-thread { margin-top:8px; border-top:1px solid var(--border)44; padding-top:8px; }
    .comment-item { margin-bottom:8px; }
    .comment-by { color:var(--text); font-weight:500; }
    .comment-add { display:flex; gap:6px; margin-top:8px; }
    .comment-add input { flex:1; }

    /* ── Empty / loading ── */
    .empty-wrap { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-icon { font-size:32px; margin-bottom:12px; }

    /* ── Badges ── */
    .badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px;
      font-weight:500; letter-spacing:.3px; }
    .badge-green  { background:var(--green)22;  color:var(--green);  border:1px solid var(--green)44; }
    .badge-yellow { background:var(--yellow)22; color:var(--yellow); border:1px solid var(--yellow)44; }
    .badge-orange { background:var(--orange)22; color:var(--orange); border:1px solid var(--orange)44; }
    .badge-red    { background:var(--red)22;    color:var(--red);    border:1px solid var(--red)44; }
    .badge-muted  { background:var(--surface);  color:var(--muted);  border:1px solid var(--border); }
    .oos-badge { font-size:10px; background:var(--red)22; color:var(--red);
      border:1px solid var(--red)44; border-radius:3px; padding:2px 6px; font-weight:500; }

    /* Modal overlay + .modal + .field styles from shared/style.css; use .field--compact for dense fields. */
    .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

    /* Severity selector */
    .sev-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .sev-btn { flex:1; min-width:70px; padding:8px 4px; border-radius:var(--radius-sm); border:1px solid;
      font-size:11px; font-family:inherit; cursor:pointer; text-align:center; font-weight:bold;
      letter-spacing:.5px; transition:all .2s; }
    .sev-btn[data-sev="low"]      { color:var(--green);  border-color:var(--green)55;  background:var(--green)11; }
    .sev-btn[data-sev="medium"]   { color:var(--yellow); border-color:var(--yellow)55; background:var(--yellow)11; }
    .sev-btn[data-sev="high"]     { color:var(--orange); border-color:var(--orange)55; background:var(--orange)11; }
    .sev-btn[data-sev="critical"] { color:var(--red);    border-color:var(--red)55;    background:var(--red)11; }
    .sev-btn.selected { filter:brightness(1.4); box-shadow:0 0 0 2px currentColor; }

    /* Category selector */
    .cat-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .cat-btn { flex:1; min-width:80px; padding:8px 6px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--surface); color:var(--muted); font-size:11px; font-family:inherit;
      cursor:pointer; text-align:center; transition:all .2s; }
    .cat-btn.selected, .cat-btn:hover { border-color:var(--brass); color:var(--brass-fg); background:var(--brass)11; }

    /* Photo preview */
    .photo-preview { width:80px; height:60px; object-fit:cover; border-radius:var(--radius-sm);
      border:1px solid var(--border); margin-top:6px; display:none; }
    .photo-preview.show { display:block; }

    /* Full-size photo overlay */
    .photo-overlay { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:300;
      display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .photo-overlay.hidden { display:none; }
    .photo-overlay img { max-width:95vw; max-height:92vh; object-fit:contain; border-radius:var(--radius-md); }

    /* ── Responsive ── */
    @media(max-width:600px){
      .filter-group-label{min-width:0;width:100%}
      .filter-btn{padding:6px 10px;font-size:10px}
      .req-card{padding:12px}
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header id="ym-header">
  <div class="header-left"></div>
  <div class="header-right"></div>
</header>

<div class="page-wrap">

  <!-- Stats -->
  <div class="stat-strip">
    <div class="stat-card"><div class="stat-num" id="statOpen" style="color:var(--orange)">—</div><div class="stat-label" data-s="maint.statOpen"></div></div>
    <div class="stat-card"><div class="stat-num text-red" id="statCritical">—</div><div class="stat-label" data-s="maint.statCritical"></div></div>
    <div class="stat-card"><div class="stat-num text-red" id="statOos">—</div><div class="stat-label" data-s="maint.statOos"></div></div>
    <div class="stat-card"><div class="stat-num text-brass" id="statPending">—</div><div class="stat-label" data-s="maint.statPending"></div></div>
    <div class="stat-card"><div class="stat-num text-green" id="statResolved">—</div><div class="stat-label" data-s="maint.statResolved"></div></div>
  </div>
  <div class="flex-center gap-8" style="margin:12px 0">
    <button class="btn btn-primary flex-1" data-mt-click="openNewRequest" data-s="maint.newBtn"></button>
    <button class="btn btn-secondary flex-1" data-mt-click="_openSaumaRequest" data-s="maint.newSaumaBtn"></button>
  </div>

  <!-- Pending sauma review alert -->
  <div id="pendingReviewAlert" class="hidden" style="margin:10px 0;padding:10px 14px;border-radius:8px;background:var(--brass)11;border:1px solid var(--brass)66;color:var(--brass-fg);font-size:13px;display:flex;align-items:center;gap:10px;cursor:pointer" data-mt-click="showPendingReviews">
    <span style="font-size:18px">⏳</span>
    <span id="pendingReviewAlertText" style="flex:1"></span>
    <span style="font-size:11px;opacity:.8">→</span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar-grouped" id="filterBar">
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupStatus"></span>
      <button class="filter-btn active" data-group="status" data-value="open" data-s="maint.filterOpen"></button>
      <button class="filter-btn" data-group="status" data-value="resolved" data-s="maint.filterResolved"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupType"></span>
      <button class="filter-btn" data-group="type" data-value="maintenance" data-s="maint.filterMaintenance"></button>
      <button class="filter-btn" data-group="type" data-value="sauma" data-s="maint.filterSauma"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupCategory"></span>
      <button class="filter-btn" data-group="category" data-value="boat" data-s="maint.filterCatBoat"></button>
      <button class="filter-btn" data-group="category" data-value="equipment" data-s="maint.filterCatEquipment"></button>
      <button class="filter-btn" data-group="category" data-value="facility" data-s="maint.filterCatFacility"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupSeverity"></span>
      <button class="filter-btn" data-group="severity" data-value="critical" data-s="maint.filterCritical"></button>
      <button class="filter-btn" data-group="severity" data-value="high" data-s="maint.filterHigh"></button>
      <button class="filter-btn" data-group="severity" data-value="medium" data-s="maint.filterMedium"></button>
      <button class="filter-btn" data-group="severity" data-value="low" data-s="maint.filterLow"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupSauma"></span>
      <button class="filter-btn" data-group="sauma" data-value="unassigned" data-s="maint.filterUnassigned"></button>
      <button class="filter-btn" data-group="sauma" data-value="myprojects" data-s="maint.filterMyProjects"></button>
      <button class="filter-btn" data-group="sauma" data-value="pending" data-s="maint.filterPending"></button>
    </div>
  </div>

  <!-- Request list -->
  <div id="reqList"><div class="empty-wrap"><div class="spinner"></div></div></div>

</div><!-- /page-wrap -->

<!-- ══ NEW REQUEST MODAL ══ -->
<div class="modal-overlay hidden" id="newModal" data-mt-close-self>
  <div class="modal modal--md">
    <div class="modal-header">
      <h3 id="modalTitle" data-s="maint.newTitle"></h3>
      <button class="modal-close-x" data-mt-click="closeNewModal">&times;</button>
    </div>

    <div class="field field--compact">
      <label data-s="maint.category"></label>
      <div class="cat-btns">
        <button class="cat-btn" data-cat="boat"      data-mt-click="selectCat" data-mt-arg="boat" data-s="maint.catBoat"></button>
        <button class="cat-btn" data-cat="equipment" data-mt-click="selectCat" data-mt-arg="equipment" data-s="maint.catEquipment"></button>
        <button class="cat-btn" data-cat="facility"  data-mt-click="selectCat" data-mt-arg="facility" data-s="maint.catFacility"></button>
      </div>
    </div>

    <div class="field field--compact hidden" id="boatField">
      <label data-s="maint.boatLabel"></label>
      <select id="newBoat"><option value="" data-s="maint.selectBoatPh"></option></select>
      <div id="oosField">
        <label class="mt-8" data-s="maint.markOosLabel"></label>
        <div class="flex-center gap-8" style="margin-top:4px">
          <input type="checkbox" id="newOos" class="accent-checkbox" style="accent-color:var(--red)">
          <span class="text-md text-muted" data-s="maint.markOosHint"></span>
        </div>
      </div>
    </div>

    <div class="field field--compact">
      <label data-s="maint.part"></label>
      <input type="text" id="newPart" data-s="maint.partPh" data-s-attr="placeholder">
    </div>

    <div class="field field--compact" id="sevField">
      <label id="sevLabel" data-s="maint.severity"></label>
      <div class="sev-btns">
        <button class="sev-btn" data-sev="low"      data-mt-click="selectSev" data-mt-arg="low" data-s="maint.sevLow"></button>
        <button class="sev-btn" data-sev="medium"   data-mt-click="selectSev" data-mt-arg="medium" data-s="maint.sevMedium"></button>
        <button class="sev-btn" data-sev="high"     data-mt-click="selectSev" data-mt-arg="high" data-s="maint.sevHigh"></button>
        <button class="sev-btn" data-sev="critical" data-mt-click="selectSev" data-mt-arg="critical" data-s="maint.sevCritical"></button>
      </div>
      <div id="sevHint" class="text-sm text-muted mb-6"></div>
    </div>

    <div class="field field--compact">
      <label data-s="maint.description"></label>
      <textarea id="newDesc" rows="3" data-s="maint.descPh" data-s-attr="placeholder"></textarea>
    </div>

    <div class="field field--compact hidden" id="materialsField">
      <label data-s="sauma.materials"></label>
      <div id="materialsList"></div>
      <div class="flex-center gap-6 mt-8">
        <input type="text" id="newMaterialInput" data-s="maint.materialPh" data-s-attr="placeholder" class="flex-1">
        <button type="button" class="btn-ghost-sm" data-mt-click="addMaterialToList" data-s="btn.add"></button>
      </div>
    </div>

    <div class="field field--compact hidden" id="verkstjoriField">
      <label data-s="maint.verkstjoriLabel"></label>
      <input type="text" id="newVerkstjori" data-s="maint.verkstjoriPh" data-s-attr="placeholder">
      <span class="text-sm text-muted" data-s="sauma.verkstjoriHint"></span>
    </div>

    <div class="field field--compact" id="photoField">
      <label data-s="maint.photoLabel"></label>
      <input type="file" id="newPhoto" accept="image/*" data-mt-change-el="handlePhotoChange"
        class="text-md text-muted">
      <img id="photoPreview" class="photo-preview" alt="preview">
      <div id="photoErr" class="text-sm text-red mt-8"></div>
    </div>

    <input type="hidden" id="newSaumaklubbur" value="false">

    <div id="newErr" class="msg msg-err hidden mb-10"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-mt-click="closeNewModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary"   id="submitBtn" data-mt-click="submitRequest" data-s="btn.submit"></button>
    </div>
  </div>
</div>

<!-- ── Full-size photo overlay ── -->
<div class="photo-overlay hidden" id="photoOverlay" data-mt-hide-self>
  <img id="overlayImg" src="" alt="">
</div>

<script src="maintenance.js" defer></script>
</body>
</html>
