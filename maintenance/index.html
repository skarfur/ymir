<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
  <title>Ýmir — Maintenance</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/api.js" defer></script>
  <script src="../shared/ui.js" defer></script>
  <script src="../shared/layout.js" defer></script>
  <script src="../shared/strings.js" defer></script>
  <script src="../shared/list-filter.js" defer></script>
  <script src="../shared/maintenance.js" defer></script>
  <link rel="stylesheet" href="maintenance.css">
</head>
<body>

<!-- ══ HEADER ══ -->
<ymir-header></ymir-header>

<div class="page-wrap">

  <!-- Stats -->
  <div class="stat-strip no-orphans-5 no-orphans-sm-2">
    <div class="stat-card"><div class="stat-num" id="statOpen" style="color:var(--orange)">—</div><div class="stat-label" data-s="maint.statOpen"></div></div>
    <div class="stat-card"><div class="stat-num text-red" id="statCritical">—</div><div class="stat-label" data-s="maint.statCritical"></div></div>
    <div class="stat-card"><div class="stat-num text-red" id="statOos">—</div><div class="stat-label" data-s="maint.statOos"></div></div>
    <div class="stat-card"><div class="stat-num text-accent" id="statPending">—</div><div class="stat-label" data-s="maint.statPending"></div></div>
    <div class="stat-card"><div class="stat-num text-green" id="statResolved">—</div><div class="stat-label" data-s="maint.statResolved"></div></div>
  </div>
  <div class="flex-center gap-8" style="margin:12px 0">
    <button class="btn btn-primary flex-1" data-mt-click="openNewRequest" data-s="maint.newBtn"></button>
    <button class="btn btn-secondary flex-1" data-mt-click="_openSaumaRequest" data-s="maint.newSaumaBtn"></button>
  </div>

  <!-- Pending sauma review alert -->
  <div id="pendingReviewAlert" class="hidden rounded-8 text-accent text-base d-flex items-center gap-10 cursor-pointer" style="margin:10px 0;padding:10px 14px;background:var(--accent)11;border:1px solid var(--accent)66" data-mt-click="showPendingReviews">
    <span class="d-flex" data-icon="hourglass"></span>
    <span id="pendingReviewAlertText" class="flex-1"></span>
    <span class="d-flex" style="opacity:.8" data-icon="arrow-right"></span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar-grouped" id="filterBar">
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupStatus"></span>
      <button class="filter-btn active" data-group="status" data-value="open" data-s="maint.filterOpen"></button>
      <button class="filter-btn" data-group="status" data-value="resolved" data-s="maint.filterResolved"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupType"></span>
      <button class="filter-btn" data-group="type" data-value="maintenance" data-s="maint.filterMaintenance"></button>
      <button class="filter-btn" data-group="type" data-value="sauma" data-s="maint.filterSauma"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupCategory"></span>
      <button class="filter-btn" data-group="category" data-value="boat" data-s="maint.filterCatBoat"></button>
      <button class="filter-btn" data-group="category" data-value="equipment" data-s="maint.filterCatEquipment"></button>
      <button class="filter-btn" data-group="category" data-value="facility" data-s="maint.filterCatFacility"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupSeverity"></span>
      <button class="filter-btn" data-group="severity" data-value="critical" data-s="maint.filterCritical"></button>
      <button class="filter-btn" data-group="severity" data-value="high" data-s="maint.filterHigh"></button>
      <button class="filter-btn" data-group="severity" data-value="medium" data-s="maint.filterMedium"></button>
      <button class="filter-btn" data-group="severity" data-value="low" data-s="maint.filterLow"></button>
    </div>
    <div class="filter-group">
      <span class="filter-group-label" data-s="maint.groupSauma"></span>
      <button class="filter-btn" data-group="sauma" data-value="unassigned" data-s="maint.filterUnassigned"></button>
      <button class="filter-btn" data-group="sauma" data-value="myprojects" data-s="maint.filterMyProjects"></button>
      <button class="filter-btn" data-group="sauma" data-value="pending" data-s="maint.filterPending"></button>
    </div>
  </div>

  <!-- Request list -->
  <div id="reqList"><div class="empty-wrap"><div class="spinner"></div></div></div>

</div><!-- /page-wrap -->

<!-- ══ NEW REQUEST MODAL ══ -->
<div class="modal-overlay hidden" id="newModal" data-mt-close-self>
  <div class="modal modal--md">
    <div class="modal-header">
      <h3 id="modalTitle" data-s="maint.newTitle"></h3>
      <button class="modal-close-x" data-mt-click="closeNewModal">&times;</button>
    </div>

    <div class="field field--compact">
      <label data-s="maint.category" for="newBoat"></label>
      <div class="cat-btns">
        <button class="cat-btn" data-cat="boat"      data-mt-click="selectCat" data-mt-arg="boat"><span data-icon="sailboat"></span> <span data-s="maint.catBoat"></span></button>
        <button class="cat-btn" data-cat="equipment" data-mt-click="selectCat" data-mt-arg="equipment"><span data-icon="life-buoy"></span> <span data-s="maint.catEquipment"></span></button>
        <button class="cat-btn" data-cat="facility"  data-mt-click="selectCat" data-mt-arg="facility"><span data-icon="warehouse"></span> <span data-s="maint.catFacility"></span></button>
      </div>
    </div>

    <div class="field field--compact hidden" id="boatField">
      <label data-s="maint.boatLabel"></label>
      <select id="newBoat"><option value="" data-s="maint.selectBoatPh"></option></select>
      <div id="oosField">
        <label class="mt-8" data-s="maint.markOosLabel" for="newPart"></label>
        <div class="flex-center gap-8 mt-4">
          <input type="checkbox" id="newOos" class="accent-checkbox" style="accent-color:var(--red)">
          <span class="text-md text-muted" data-s="maint.markOosHint"></span>
        </div>
      </div>
    </div>

    <div class="field field--compact">
      <label data-s="maint.part"></label>
      <input type="text" id="newPart" data-s="maint.partPh" data-s-attr="placeholder">
    </div>

    <div class="field field--compact" id="sevField">
      <label id="sevLabel" data-s="maint.severity" for="newDesc"></label>
      <div class="sev-btns">
        <button class="sev-btn" data-sev="low"      data-mt-click="selectSev" data-mt-arg="low" data-s="maint.sevLow"></button>
        <button class="sev-btn" data-sev="medium"   data-mt-click="selectSev" data-mt-arg="medium" data-s="maint.sevMedium"></button>
        <button class="sev-btn" data-sev="high"     data-mt-click="selectSev" data-mt-arg="high" data-s="maint.sevHigh"></button>
        <button class="sev-btn" data-sev="critical" data-mt-click="selectSev" data-mt-arg="critical" data-s="maint.sevCritical"></button>
      </div>
      <div id="sevHint" class="text-sm text-muted mb-6"></div>
    </div>

    <div class="field field--compact">
      <label data-s="maint.description"></label>
      <textarea id="newDesc" rows="3" data-s="maint.descPh" data-s-attr="placeholder"></textarea>
    </div>

    <div class="field field--compact hidden" id="materialsField">
      <label data-s="sauma.materials" for="newVerkstjori"></label>
      <div id="materialsList"></div>
      <div class="flex-center gap-6 mt-8">
        <input type="text" id="newMaterialInput" data-s="maint.materialPh" data-s-attr="placeholder" class="flex-1">
        <button type="button" class="btn-ghost-sm" data-mt-click="addMaterialToList" data-s="btn.add"></button>
      </div>
    </div>

    <div class="field field--compact hidden" id="verkstjoriField">
      <label data-s="maint.verkstjoriLabel"></label>
      <input type="text" id="newVerkstjori" data-s="maint.verkstjoriPh" data-s-attr="placeholder">
      <span class="text-sm text-muted" data-s="sauma.verkstjoriHint"></span>
    </div>

    <div class="field field--compact" id="photoField">
      <label data-s="maint.photoLabel" for="newPhoto"></label>
      <input type="file" id="newPhoto" accept="image/*" data-mt-change-el="handlePhotoChange"
        class="text-md text-muted">
      <img id="photoPreview" class="photo-preview" alt="preview">
      <div id="photoErr" class="text-sm text-red mt-8"></div>
    </div>

    <input type="hidden" id="newSaumaklubbur" value="false">

    <div id="newErr" class="msg msg-err hidden mb-10"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" data-mt-click="closeNewModal" data-s="btn.cancel"></button>
      <button class="btn btn-primary"   id="submitBtn" data-mt-click="submitRequest" data-s="btn.submit"></button>
    </div>
  </div>
</div>

<!-- ── Full-size photo overlay ── -->
<div class="photo-overlay hidden" id="photoOverlay" data-mt-hide-self>
  <img id="overlayImg" src="" alt="">
</div>

<script src="maintenance.js" defer></script>
</body>
</html>
