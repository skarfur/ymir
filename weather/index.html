<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.open-meteo.com https://marine-api.open-meteo.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../shared/logo.svg">
<title>Ýmir — Weather</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/api.js"></script>
<script src="../shared/strings.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/weather.js"></script>
<script src="../shared/tides.js"></script>
<link rel="stylesheet" href="weather.css">
</head>
<body>
<ymir-header></ymir-header>
<div class="page">

  <!-- ══ TOP BAR ══ -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="loc-row">
        <span class="loc-name" id="locName">Fossvogur</span>
        <span class="loc-coords" id="locCoords">64.1188°N 21.9376°W</span>
      </div>
      <div class="text-xs text-muted" id="updatedAt">Loading…</div>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-secondary text-sm" id="geoBtn" style="padding:6px 12px"><span data-s="wx.useMyLocation">📍 My location</span></button>
      <button class="btn btn-secondary text-sm d-none" id="fossBtn" style="padding:6px 12px"><span data-s="wx.useFossvogur">⚓ Fossvogur</span></button>
      <button class="btn btn-secondary text-sm refresh-btn" id="refreshBtn" aria-label="Refresh" title="Refresh"><span class="refresh-icon" id="refreshIcon">↻</span></button>
    </div>
  </div>


  <!-- ══ WEATHER CONTENT ══ -->
  <div id="mainContent">
    <div class="loading-msg">⚓️ <span data-s="wx.fetching">Fetching weather data…</span></div>
  </div>

</div><!-- /page -->

<script src="weather.js" defer></script>
</body>
</html>
